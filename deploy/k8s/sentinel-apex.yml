---
# ─── NAMESPACE ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-apex
  labels:
    app.kubernetes.io/name: sentinel-apex
    app.kubernetes.io/version: "29.0.0"

---
# ─── CONFIGMAP ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: sentinel-apex
data:
  SENTINEL_ENV: "production"
  SENTINEL_STORAGE: "postgres"
  SENTINEL_BROKER: "redis"
  SENTINEL_GRAPH: "neo4j"
  PROMETHEUS_PORT: "9090"
  METRICS_ENABLED: "true"
  LOG_LEVEL: "INFO"

---
# ─── SECRETS ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel-apex
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production"
  DATABASE_URL: "postgresql://sentinel:sentinel@postgres:5432/sentinel"
  REDIS_URL: "redis://redis:6379/0"
  NEO4J_PASSWORD: "sentinel"

---
# ─── API DEPLOYMENT ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
  namespace: sentinel-apex
  labels:
    app: sentinel-api
    version: "29.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sentinel-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sentinel-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: cyberdudebivash/sentinel-apex:29.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sentinel-data-pvc

---
# ─── WORKER DEPLOYMENT ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-worker
  namespace: sentinel-apex
  labels:
    app: sentinel-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-worker
  template:
    metadata:
      labels:
        app: sentinel-worker
    spec:
      containers:
        - name: worker
          image: cyberdudebivash/sentinel-apex:29.0
          command: ["python", "-m", "celery", "-A", "agent.tasks", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: sentinel-config
            - secretRef:
                name: sentinel-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

---
# ─── API SERVICE ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: sentinel-api
  namespace: sentinel-apex
  labels:
    app: sentinel-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: sentinel-api

---
# ─── INGRESS ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-ingress
  namespace: sentinel-apex
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - intel.cyberdudebivash.com
      secretName: sentinel-tls
  rules:
    - host: intel.cyberdudebivash.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinel-api
                port:
                  number: 80

---
# ─── HORIZONTAL POD AUTOSCALER ────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinel-api-hpa
  namespace: sentinel-apex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinel-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ─── PERSISTENT VOLUME CLAIM ──────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sentinel-data-pvc
  namespace: sentinel-apex
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi

---
# ─── REDIS DEPLOYMENT ─────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sentinel-apex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sentinel-apex
spec:
  ports:
    - port: 6379
  selector:
    app: redis

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: sentinel-apex
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ─── NETWORK POLICY ───────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sentinel-network-policy
  namespace: sentinel-apex
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

---
# ─── POD DISRUPTION BUDGET ────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sentinel-api-pdb
  namespace: sentinel-apex
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: sentinel-api
