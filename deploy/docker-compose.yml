# ══════════════════════════════════════════════════════════════════════════════
# CYBERDUDEBIVASH® SENTINEL APEX v29.0 — Docker Compose
# ══════════════════════════════════════════════════════════════════════════════
# Production-ready multi-container deployment
#
# Usage:
#   Development: docker-compose up -d
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Services:
#   - api: FastAPI application server
#   - redis: Message broker and caching
#   - postgres: Data persistence
#   - neo4j: Graph database (optional)
#   - prometheus: Metrics collection
#   - grafana: Metrics visualization
#
# © 2026 CyberDudeBivash Pvt. Ltd.
# ══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ─── API SERVER ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: cyberdudebivash/sentinel-apex:29.0
    container_name: sentinel-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SENTINEL_ENV=production
      - SENTINEL_STORAGE=postgres
      - SENTINEL_BROKER=redis
      - SENTINEL_GRAPH=neo4j
      - DATABASE_URL=postgresql://sentinel:sentinel@postgres:5432/sentinel
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-sentinel}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PROMETHEUS_PORT=9090
      - METRICS_ENABLED=true
    depends_on:
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - sentinel-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`intel.cyberdudebivash.com`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  # ─── WORKER (BACKGROUND TASKS) ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: cyberdudebivash/sentinel-apex:29.0
    container_name: sentinel-worker
    restart: unless-stopped
    command: ["python", "-m", "celery", "-A", "agent.tasks", "worker", "--loglevel=info"]
    environment:
      - SENTINEL_ENV=production
      - SENTINEL_STORAGE=postgres
      - SENTINEL_BROKER=redis
      - DATABASE_URL=postgresql://sentinel:sentinel@postgres:5432/sentinel
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data:/app/data
    networks:
      - sentinel-net

  # ─── REDIS (MESSAGE BROKER + CACHE) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-net

  # ─── POSTGRESQL (DATA PERSISTENCE) ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentinel}
      - POSTGRES_DB=sentinel
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel-net

  # ─── NEO4J (GRAPH DATABASE) ─────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: sentinel-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-sentinel}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - sentinel-net
    profiles:
      - full

  # ─── PROMETHEUS (METRICS) ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - sentinel-net
    profiles:
      - monitoring

  # ─── GRAFANA (VISUALIZATION) ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - sentinel-net
    profiles:
      - monitoring

# ─── VOLUMES ──────────────────────────────────────────────────────────────────
volumes:
  redis-data:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  prometheus-data:
  grafana-data:

# ─── NETWORKS ─────────────────────────────────────────────────────────────────
networks:
  sentinel-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
