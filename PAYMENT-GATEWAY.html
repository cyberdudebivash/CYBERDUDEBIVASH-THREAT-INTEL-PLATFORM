<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting to Upgrade &mdash; CYBERDUDEBIVASH SENTINEL APEX</title>
<!--
  PAYMENT-GATEWAY.html was the platform's manual payment page (direct UPI /
  Bank NEFT / PayPal / Crypto wallet transfer + a manual proof-of-payment
  confirmation form) -- no automated processor at all. Per executive
  decision, manual payment is retired platform-wide in favor of automated
  checkout (Razorpay, plus the existing Gumroad channel) -- see /upgrade.html.

  Rather than rewrite this page's markup in place, it's replaced with a
  redirect: dozens of existing links across the platform (index.html,
  store.html, services.html, docs/faq.html, customer/api-keys.html, 404.html,
  etc.) point here, and a redirect preserves every one of them -- including
  the "?plan=" query param several callers already pass -- while completely
  removing every manual-payment code path this page used to contain. No
  markup below repeats a manual payment method; there is none left.
-->
<meta name="description" content="This page has moved. Continue to the automated checkout at /upgrade.html.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://intel.cyberdudebivash.com/upgrade.html">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta http-equiv="refresh" content="0; url=/upgrade.html">
<script>
  // Forward any existing query string (e.g. ?plan=enterprise) so deep links
  // from other pages still land on the right plan.
  var qs = window.location.search || '';
  window.location.replace('/upgrade.html' + qs);
</script>
<style>
  body { background:#050c18; color:#e2e8f0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; text-align:center; }
  a { color:#00ffc6; }
</style>
</head>
<body>
  <p>Redirecting to <a href="/upgrade.html">the upgrade page</a>&hellip;</p>
</body>
</html>
