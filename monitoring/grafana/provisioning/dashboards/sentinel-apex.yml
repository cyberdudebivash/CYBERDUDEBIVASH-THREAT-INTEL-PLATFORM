# ============================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Grafana Dashboard Provisioning
# v47.0 Enterprise Observability Stack
#
# Auto-loads all dashboards from /var/lib/grafana/dashboards on container start.
# Rollback: remove this file and restart grafana container.
# ============================================================================

apiVersion: 1

providers:
  - name: SENTINEL APEX Dashboards
    type: file
    disableDeletion: true
    updateIntervalSeconds: 60
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
