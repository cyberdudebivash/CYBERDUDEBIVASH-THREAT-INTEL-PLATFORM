# ============================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Grafana Datasource Provisioning
# v47.0 Enterprise Observability Stack
#
# Auto-provisioned on Grafana container start — no manual UI configuration required.
# Rollback: remove this file and restart grafana container.
# ============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: sentinel-prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: "2.49.0"
      timeInterval: "15s"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: sentinel-jaeger
    version: 1

  - name: Loki
    type: loki
    access: proxy
    uid: sentinel-loki
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 5000
    version: 1
