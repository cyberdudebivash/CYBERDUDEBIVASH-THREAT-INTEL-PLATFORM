apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-e10e164d53ed
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "U.S. CISA adds a flaw in n8n to its Known Exploited Vulnerabilities catalog"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
