apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-98bae93dde50
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Major Cyber Attacks in March 2026: OAuth Phishing, SVG Smuggling, Magecart, and More"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
