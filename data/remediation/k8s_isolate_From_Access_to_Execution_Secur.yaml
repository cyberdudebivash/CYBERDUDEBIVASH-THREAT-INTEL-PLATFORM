apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-a0745c98230e
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "From Access to Execution: Securing Identity in the Age of Autonomous Agents"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
