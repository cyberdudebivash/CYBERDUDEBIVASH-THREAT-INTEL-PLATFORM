apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-edc4108f7281
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Software supply chain hacks trigger wave of intrusions, data theft"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
