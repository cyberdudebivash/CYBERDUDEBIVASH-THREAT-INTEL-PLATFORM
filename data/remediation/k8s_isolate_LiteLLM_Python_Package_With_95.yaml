apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-a114debeb84c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "LiteLLM Python Package With 95 Million Downloads Compromised by TeamPCP Hackers"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
