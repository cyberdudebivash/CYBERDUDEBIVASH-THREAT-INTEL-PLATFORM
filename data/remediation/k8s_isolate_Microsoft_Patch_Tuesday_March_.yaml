apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-9ffef3967841
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Microsoft Patch Tuesday, March 2026 Edition"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
