apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-dffde94ff9fa
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Axios npm packages backdoored in supply chain attack"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
