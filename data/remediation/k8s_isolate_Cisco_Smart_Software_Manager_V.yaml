apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-b505f73fbf40
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Cisco Smart Software Manager Vulnerability Let Attackers Execute Arbitrary Commands"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
