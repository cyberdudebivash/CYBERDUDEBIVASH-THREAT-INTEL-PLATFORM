apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-ccfc736cfbd6
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "North Korea-Linked Hackers Compromise Axios npm Package in Major Supply Chain Attack"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
