apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-dc6e71383a71
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Claude Code source leak exploited to spread malware"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
