apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-181e819e5680
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "CISA Warns of Langflow Code Injection Vulnerability Exploited in Attacks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
