apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-51e2978b7533
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Microsoft warns North Korean threat groups are scaling up fake worker schemes with generative AI"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
