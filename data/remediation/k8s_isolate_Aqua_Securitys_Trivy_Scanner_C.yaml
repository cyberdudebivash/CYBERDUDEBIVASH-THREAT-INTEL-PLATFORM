apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-6f9d32d19ab2
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Aqua Security’s Trivy Scanner Compromised in Supply Chain Attack"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
