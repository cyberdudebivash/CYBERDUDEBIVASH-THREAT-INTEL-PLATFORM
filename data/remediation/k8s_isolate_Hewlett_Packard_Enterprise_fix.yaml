apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-aafa5af96b85
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Hewlett Packard Enterprise fixes critical authentication bypass in Aruba AOS-CX"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
