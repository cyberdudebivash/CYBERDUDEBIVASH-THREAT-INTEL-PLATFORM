apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-8ef4826c7fed
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Ceragon Siklu MultiHaul and EtherHaul Series"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
