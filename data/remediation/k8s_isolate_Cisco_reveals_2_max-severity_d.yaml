apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-799881605e62
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Cisco reveals 2 max-severity defects in firewall management software"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
