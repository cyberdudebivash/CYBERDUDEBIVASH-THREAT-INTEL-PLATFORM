apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-33235729862e
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "An AI gateway designed to steal your data"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
