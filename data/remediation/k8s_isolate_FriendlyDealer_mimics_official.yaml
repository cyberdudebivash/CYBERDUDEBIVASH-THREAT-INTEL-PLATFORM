apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-748cd471053a
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "FriendlyDealer mimics official app stores to push unvetted gambling apps"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
