apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5f293b49c435
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Hackers Probe Citrix NetScaler Instances Ahead of Likely CVE-2026-3055 Exploitation"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
