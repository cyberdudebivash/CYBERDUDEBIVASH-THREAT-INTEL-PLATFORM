apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-fb717cb01301
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Latin America and the Caribbean Cybercrime Landscape"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
