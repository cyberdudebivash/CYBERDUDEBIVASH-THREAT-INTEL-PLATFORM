apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-49c0071876ef
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Cognizant’s TriZetto Provider Solutions data breach impacted over 3.4 million patients"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
