apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5605e22b8478
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "KadNap bot compromises 14,000+ devices to route malicious traffic"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
