apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-b245130d499a
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "The FBI’s cyber chief is using Winter SHIELD to accelerate China prep, threat intelligence sharing"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
