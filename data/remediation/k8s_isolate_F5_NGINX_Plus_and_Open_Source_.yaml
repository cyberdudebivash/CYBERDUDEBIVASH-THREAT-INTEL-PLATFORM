apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-8524df18f039
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "F5 NGINX Plus and Open Source Vulnerability Allow Attackers to Execute Code Using MP4 file"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
