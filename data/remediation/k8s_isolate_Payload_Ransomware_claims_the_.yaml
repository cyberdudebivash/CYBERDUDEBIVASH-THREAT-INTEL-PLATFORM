apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-37d8f944ca51
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Payload Ransomware claims the hack of Royal Bahrain Hospital"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
