apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-921aa0383dfa
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "The Proliferation of DarkSword: iOS Exploit Chain Adopted by Multiple Threat Actors"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
