apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-6751848bb0bf
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "A laughing RAT: CrystalX combines spyware, stealer, and prankware features"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
