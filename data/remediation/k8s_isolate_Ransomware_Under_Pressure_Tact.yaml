apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-29445efd12d0
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Ransomware Under Pressure: Tactics, Techniques, and Procedures in a Shifting Threat Landscape"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
