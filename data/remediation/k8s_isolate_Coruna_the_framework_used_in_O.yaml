apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-a38eaddce13d
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Coruna: the framework used in Operation Triangulation"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
