apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-2eb2c80a4450
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Siemens SIDIS Prime"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
