apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-6d39994e5d34
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "FBI says even in an AI-powered world, security basics still matter"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
