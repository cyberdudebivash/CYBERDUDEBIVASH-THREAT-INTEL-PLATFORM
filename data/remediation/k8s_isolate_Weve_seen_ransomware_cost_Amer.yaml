apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-ba36f94b549a
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "We’ve seen ransomware cost American lives. Here’s what it will actually take to stop it."
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
