apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-a7403ce26a82
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Microsoft warns of ClickFix campaign exploiting Windows Terminal to deliver Lumma Stealer"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
