apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-47b2fe38b190
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Release Notes: Cross-Platform Threat Analysis with macOS, SSL Decryption, and 1,300+ New Detections"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
