apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-9f0cc639e872
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Synology DiskStation Manager Vulnerability Allow Remote Attackers to Execute Arbitrary Commands"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
