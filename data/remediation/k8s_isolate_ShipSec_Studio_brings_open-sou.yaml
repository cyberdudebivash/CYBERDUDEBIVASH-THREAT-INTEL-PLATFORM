apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-d003ee6ad306
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "ShipSec Studio brings open-source workflow orchestration to security operations"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
