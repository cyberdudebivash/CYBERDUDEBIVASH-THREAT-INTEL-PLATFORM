apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-f878444bfa1b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "New Torg Grabber infostealer malware targets 728 crypto wallets"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
