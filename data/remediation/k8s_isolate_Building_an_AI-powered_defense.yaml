apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-cb02c19f72d5
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Building an AI-powered defense-in-depth security architecture for serverless microservices"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
