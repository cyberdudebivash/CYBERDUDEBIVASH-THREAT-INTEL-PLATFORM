apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-545a64b052ec
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "From fake nudes to fake quotes: AI deepfakes plagued Olympic athletes"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
