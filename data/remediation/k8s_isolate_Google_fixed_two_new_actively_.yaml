apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-17e58140bfab
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Google fixed two new actively exploited flaws in the Chrome browser"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
