apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-0693f605359d
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Google links axios supply chain attack to North Korean group"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
