apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-315cad704b98
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Cross-border collaboration: International law enforcement and Microsoft dismantle transnational scam network targeting older adults"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
