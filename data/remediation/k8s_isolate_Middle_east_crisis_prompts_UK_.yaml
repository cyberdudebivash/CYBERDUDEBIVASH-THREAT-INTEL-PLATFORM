apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5a5e7784468e
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Middle east crisis prompts UK NCSC warning on potential Iranian cyber activity"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
