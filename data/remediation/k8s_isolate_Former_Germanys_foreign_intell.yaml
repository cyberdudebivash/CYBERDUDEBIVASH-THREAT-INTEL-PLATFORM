apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-9f208d267ad7
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Former Germany’s foreign intelligence VP hit in Signal account takeover campaign"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
