apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-17cf91698199
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Attack on Stryker’s Microsoft environment wiped employee devices without malware"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
