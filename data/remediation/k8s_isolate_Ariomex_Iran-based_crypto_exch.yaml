apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-27e3ef56086e
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Ariomex, Iran-based crypto exchange, suffers data leak"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
