apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-e8b1ad9db7f2
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Beyond the Battlefield: Threats to the Defense Industrial Base"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
