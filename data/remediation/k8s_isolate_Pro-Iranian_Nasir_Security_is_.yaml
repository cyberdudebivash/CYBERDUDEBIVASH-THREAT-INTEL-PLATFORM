apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-3b769721f379
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Pro-Iranian Nasir Security is targeting energy companies in the Gulf"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
