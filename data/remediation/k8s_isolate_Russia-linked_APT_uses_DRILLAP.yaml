apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-fb17f068b25c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Russia-linked APT uses DRILLAPP backdoor to spy on Ukrainian targets"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
