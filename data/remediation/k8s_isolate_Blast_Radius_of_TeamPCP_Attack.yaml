apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5f29cf7620c9
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Blast Radius of TeamPCP Attacks Expands Amid Hacker Infighting"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
