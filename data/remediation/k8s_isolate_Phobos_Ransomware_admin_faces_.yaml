apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-8924d5f45604
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Phobos Ransomware admin faces up to 20 years after guilty plea"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
