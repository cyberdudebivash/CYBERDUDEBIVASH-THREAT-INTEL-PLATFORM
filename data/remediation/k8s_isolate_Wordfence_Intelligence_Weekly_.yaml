apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-3a9236d912c0
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Wordfence Intelligence Weekly WordPress Vulnerability Report (March 23, 2026 to March 29, 2026)"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
