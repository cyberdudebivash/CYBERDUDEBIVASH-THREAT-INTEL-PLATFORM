apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5cbc8894a916
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Silver Dragon Targets Organizations in Southeast Asia and Europe"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
