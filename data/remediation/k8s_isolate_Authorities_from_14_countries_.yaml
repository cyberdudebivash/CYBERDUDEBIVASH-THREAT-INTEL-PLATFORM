apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-91d95366b85d
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Authorities from 14 countries shut down major cybercrime forum LeakBase"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
