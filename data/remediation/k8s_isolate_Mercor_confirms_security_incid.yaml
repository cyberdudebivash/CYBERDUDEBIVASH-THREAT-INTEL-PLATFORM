apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-6bc6c1936d38
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Mercor confirms security incident tied to LiteLLM supply chain attack"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
