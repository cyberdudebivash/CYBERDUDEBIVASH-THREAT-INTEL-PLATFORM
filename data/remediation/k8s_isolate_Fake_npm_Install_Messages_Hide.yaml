apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-ccf32788e03a
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Fake npm Install Messages Hide RAT Malware in New Open Source Supply Chain Campaign"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
