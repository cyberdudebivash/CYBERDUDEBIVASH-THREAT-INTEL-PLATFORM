apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-f181412b616b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "FBI launches inquiry into Steam games spreading malware"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
