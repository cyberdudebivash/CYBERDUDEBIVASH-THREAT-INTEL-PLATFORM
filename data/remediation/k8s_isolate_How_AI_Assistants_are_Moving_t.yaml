apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-fd45dc104e4d
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "How AI Assistants are Moving the Security Goalposts"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
