apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-156688e6731a
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Threat actors use custom AuraInspector to harvest data from Salesforce systems"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
