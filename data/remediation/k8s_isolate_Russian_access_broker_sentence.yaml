apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-b0e2f2d4ff19
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Russian access broker sentenced to over 6 years in prison for ransomware schemes"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
