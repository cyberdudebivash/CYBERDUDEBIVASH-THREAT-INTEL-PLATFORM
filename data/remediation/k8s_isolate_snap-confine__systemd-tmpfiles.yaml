apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-349305604158
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "snap-confine + systemd-tmpfiles = root (CVE-2026-3888)"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
