apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-b1e23a56036b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Reading White House President Trump’s Cyber Strategy for America (March 2026)"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
