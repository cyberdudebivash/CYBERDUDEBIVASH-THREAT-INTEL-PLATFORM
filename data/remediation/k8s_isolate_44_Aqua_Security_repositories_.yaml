apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-8367b2567563
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "44 Aqua Security repositories defaced after Trivy supply chain breach"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
