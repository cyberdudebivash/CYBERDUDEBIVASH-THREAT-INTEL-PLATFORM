apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-9f44a0d1b666
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Honeywell IQ4x BMS Controller"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
