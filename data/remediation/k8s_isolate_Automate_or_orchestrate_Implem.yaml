apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-60626500f74f
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Automate or orchestrate? Implementing a streamlined remediation program to shorten MTTR"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
