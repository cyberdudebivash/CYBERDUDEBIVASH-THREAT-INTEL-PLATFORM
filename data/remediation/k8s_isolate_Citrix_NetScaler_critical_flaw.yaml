apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-7b52855ea67c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Citrix NetScaler critical flaw could leak data, update now"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
