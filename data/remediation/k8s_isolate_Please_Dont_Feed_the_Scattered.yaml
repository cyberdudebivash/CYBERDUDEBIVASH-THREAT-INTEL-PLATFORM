apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-917945182c1f
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Please Don’t Feed the Scattered Lapsus ShinyHunters"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
