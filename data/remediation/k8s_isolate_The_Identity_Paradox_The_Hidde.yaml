apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-48fa7ccc4330
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "The Identity Paradox: The Hidden Risks in Your Valid Credentials"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
