apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-9dcb41d6dc40
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Critical NVIDIA Vulnerabilities Enables RCE and DoS Attacks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
