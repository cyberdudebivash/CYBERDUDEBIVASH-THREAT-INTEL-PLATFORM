apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-c44f288348eb
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Shadow Agents: How SentinelOne Secures the AI Tools That Act Like Users"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
