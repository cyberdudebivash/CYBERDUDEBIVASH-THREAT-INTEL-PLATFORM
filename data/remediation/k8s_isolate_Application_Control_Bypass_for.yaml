apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-610a513b0df9
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Application Control Bypass for Data Exfiltration, (Tue, Mar 31st)"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
