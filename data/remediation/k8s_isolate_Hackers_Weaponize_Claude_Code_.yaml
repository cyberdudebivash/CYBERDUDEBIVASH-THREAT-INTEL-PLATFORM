apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-07cc6664614c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Hackers Weaponize Claude Code Leak to Spread Vidar and GhostSocks Malware"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
