apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-70ff12350e40
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Iran-linked hackers target IP cameras across Israel and Gulf states for military intelligence"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
