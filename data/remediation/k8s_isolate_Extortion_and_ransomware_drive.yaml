apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-168daec68b9e
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Extortion and ransomware drive over half of cyberattacks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
