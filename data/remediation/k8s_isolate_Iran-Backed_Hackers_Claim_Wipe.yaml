apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-646050a524b6
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Iran-Backed Hackers Claim Wiper Attack on Medtech Firm Stryker"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
