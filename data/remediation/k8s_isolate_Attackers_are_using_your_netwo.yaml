apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-d057bbe333b6
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Attackers are using your network against you, according to Cloudflare"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
