apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-a847895bbf24
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Cisco IMC auth bypass vulnerability allows attackers to alter user passwords (CVE-2026-20093)"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
