apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-f6024e22df6b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "BlackPearl-Full-Stack-Enumeration-Privilege-Escalation-Case-Study"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
