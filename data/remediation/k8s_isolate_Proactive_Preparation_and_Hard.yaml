apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-012135a1cbba
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Proactive Preparation and Hardening Against Destructive Attacks: 2026 Edition"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
