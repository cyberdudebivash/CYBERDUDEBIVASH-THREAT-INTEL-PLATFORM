apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-3f1255e45321
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "APT28 conducts long-term espionage on Ukrainian forces using custom malware"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
