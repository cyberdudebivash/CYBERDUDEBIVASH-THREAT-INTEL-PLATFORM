apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-d241ee1070ee
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Iran-linked actors use Telegram as C2 in malware attacks on dissidents"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
