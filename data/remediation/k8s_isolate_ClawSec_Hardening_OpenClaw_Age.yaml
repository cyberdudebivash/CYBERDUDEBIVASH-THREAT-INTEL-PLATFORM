apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5af3305c2621
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "ClawSec: Hardening OpenClaw Agents from the Inside Out"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
