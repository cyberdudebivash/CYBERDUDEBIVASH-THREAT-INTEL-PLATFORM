apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-324f5102f35a
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Hackers targeted Poland’s National Centre for Nuclear Research"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
