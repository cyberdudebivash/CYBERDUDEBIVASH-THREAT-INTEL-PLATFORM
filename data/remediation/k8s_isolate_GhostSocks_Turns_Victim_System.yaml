apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-21f57824cc34
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "GhostSocks Turns Victim Systems Into Residential Proxies for Evasive Cyberattacks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
