apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-60a053cf69c0
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Google addresses actively exploited Qualcomm zero-day in fresh batch of 129 Android vulnerabilities"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
