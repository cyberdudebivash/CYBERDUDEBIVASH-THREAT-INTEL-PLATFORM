apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-0ff34c7ca89b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "10 Best Spam Filter Tools 2026"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
