apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-f9941b1c9c03
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "China-Linked Hackers Use TernDoor, PeerTime, BruteEntry in South American Telecom Attacks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
