apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-6f7c45e0a119
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Everon OCPP Backends"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
