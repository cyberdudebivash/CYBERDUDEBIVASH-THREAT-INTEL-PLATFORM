apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-19673d7b7006
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Iran-nexus APT Dust Specter targets Iraq officials with new malware"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
