apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-e6ff46be9eba
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Silver Fox Abuses Stolen EV Certificates in AtlasCross RAT Malware Campaign"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
