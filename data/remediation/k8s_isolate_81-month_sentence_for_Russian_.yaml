apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-d6ab5bd0a7cd
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "81-month sentence for Russian hacker behind major ransomware campaigns"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
