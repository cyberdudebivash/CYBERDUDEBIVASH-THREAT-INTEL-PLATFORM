apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-b73e62769399
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "LastPass warns of spoofed alerts aimed at stealing master passwords"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
