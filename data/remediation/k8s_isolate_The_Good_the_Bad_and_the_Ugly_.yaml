apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-65fa0c8a3736
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "The Good, the Bad and the Ugly in Cybersecurity – Week 11"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
