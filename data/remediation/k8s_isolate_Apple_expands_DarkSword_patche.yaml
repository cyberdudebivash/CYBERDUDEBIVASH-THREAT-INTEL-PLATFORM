apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-59ec9b3b42a4
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Apple expands "DarkSword" patches to iOS 18.7.7"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
