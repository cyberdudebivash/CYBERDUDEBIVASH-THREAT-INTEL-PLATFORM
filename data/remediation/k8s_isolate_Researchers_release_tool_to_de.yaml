apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-fda02b2ed040
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Researchers release tool to detect stealthy BPFDoor implants in critical infrastructure networks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
