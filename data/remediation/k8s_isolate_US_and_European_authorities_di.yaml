apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-1810a2d1497b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "US and European authorities disrupt socksEscort proxy service tied to AVrecon botnet"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
