apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-d6db6bf5d7bf
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "ISC Warns of High-Severity Kea DHCP Flaw That Can Crash Services Remotely"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
