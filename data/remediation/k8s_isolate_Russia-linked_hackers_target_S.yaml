apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-e790d92306a6
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Russia-linked hackers target Signal, WhatsApp of officials globally"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
