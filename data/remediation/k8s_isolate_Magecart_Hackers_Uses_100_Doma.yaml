apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-eaaa0160b083
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Magecart Hackers Uses 100+ Domains to Hijack eStores Checkouts and Steal Card Data"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
