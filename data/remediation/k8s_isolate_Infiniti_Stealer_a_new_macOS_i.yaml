apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5e00affd2c40
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Infiniti Stealer: a new macOS infostealer using ClickFix and Python/Nuitka"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
