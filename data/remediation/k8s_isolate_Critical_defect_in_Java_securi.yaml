apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-c4188624f5ee
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Critical defect in Java security engine poses serious downstream security risks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
