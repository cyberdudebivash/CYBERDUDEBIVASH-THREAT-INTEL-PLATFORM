apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-fdad6b1d9a40
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Microsoft’s monthly Patch Tuesday is first in 6 months with no actively exploited zero-days"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
