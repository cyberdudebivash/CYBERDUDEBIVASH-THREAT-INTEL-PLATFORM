apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-b2c3219a8c8d
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Iran-linked MuddyWater deploys Dindoor malware against U.S. organizations"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
