apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-492a695077de
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Microsoft seizes 338 websites to disrupt rapidly growing ‘RaccoonO365’ phishing service"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
