apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-60ae9e6eaf4c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Google fixes Chrome zero-day with in-the-wild exploit (CVE-2026-5281)"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
