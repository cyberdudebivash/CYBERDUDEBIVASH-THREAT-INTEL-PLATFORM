apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-1fea9b84bda2
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "ClickFix Campaigns Targeting Windows and macOS"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
