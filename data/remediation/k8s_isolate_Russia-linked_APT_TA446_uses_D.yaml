apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-4f9b2a331b2f
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Russia-linked APT TA446 uses DarkSword exploit to target iPhone users in phishing wave"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
