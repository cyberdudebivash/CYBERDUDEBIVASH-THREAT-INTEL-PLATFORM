apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-89c744ca1f72
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Unprivileged users could exploit AppArmor bugs to gain root access"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
