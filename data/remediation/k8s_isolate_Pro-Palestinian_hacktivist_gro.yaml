apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-909f2283b7ef
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Pro-Palestinian hacktivist group Handala targets Stryker in global disruption"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
