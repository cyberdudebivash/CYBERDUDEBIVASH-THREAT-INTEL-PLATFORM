apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-5168e24ba956
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Initial Access Brokers have Shifted to High-Value Targets and Premium Pricing"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
