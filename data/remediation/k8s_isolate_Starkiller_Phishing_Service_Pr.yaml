apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-64f40bc87ecc
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "‘Starkiller’ Phishing Service Proxies Real Login Pages, MFA"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
