apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-eabf681932ae
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Urgent Alert: NetScaler bug CVE-2026-3055 probed by attackers could leak sensitive data"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
