apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-123897a0449f
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Look What You Made Us Patch: 2025 Zero-Days in Review"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
