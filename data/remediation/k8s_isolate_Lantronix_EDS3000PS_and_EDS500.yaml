apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-0a8e1b038c73
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Lantronix EDS3000PS and EDS5000"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
