apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-a31b82efa983
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Data breach at University of Hawaiʻi Cancer Center impacts 1.2 Million individuals"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
