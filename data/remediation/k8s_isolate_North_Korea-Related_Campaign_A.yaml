apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-81baca9b9f16
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "North Korea-Related Campaign Abuses GitHub as C2 in New LNK Phishing Attacks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
