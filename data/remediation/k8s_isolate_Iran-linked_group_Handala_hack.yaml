apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-2cc8435b1aea
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Iran-linked group Handala hacked FBI Director Kash Patel's personal email account"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
