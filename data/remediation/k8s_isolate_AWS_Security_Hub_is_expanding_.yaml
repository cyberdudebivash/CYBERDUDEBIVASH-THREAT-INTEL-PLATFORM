apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-69d068d92db2
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "AWS Security Hub is expanding to unify security operations across multicloud environments"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
