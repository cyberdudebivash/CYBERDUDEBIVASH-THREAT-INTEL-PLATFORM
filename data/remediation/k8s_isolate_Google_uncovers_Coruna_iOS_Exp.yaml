apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-dfbc0396c500
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Google uncovers Coruna iOS Exploit Kit targeting iOS 13–17.2.1"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
