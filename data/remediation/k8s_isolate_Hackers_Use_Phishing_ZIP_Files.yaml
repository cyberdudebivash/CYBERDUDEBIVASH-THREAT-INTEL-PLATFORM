apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-7104a121fd5f
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Hackers Use Phishing ZIP Files to Deploy PXA Stealer Against Financial Firms"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
