apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-0732b613d4eb
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Malicious LiteLLM versions linked to TeamPCP supply chain attack"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
