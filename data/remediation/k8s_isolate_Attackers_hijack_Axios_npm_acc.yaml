apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-f7c809597b2a
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Attackers hijack Axios npm account to spread RAT malware"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
