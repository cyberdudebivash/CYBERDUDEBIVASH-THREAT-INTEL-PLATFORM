apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-e17d3e6f84c7
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "ClawJacked flaw exposed OpenClaw users to data theft"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
