apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-6ad1d82c2acc
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Authorities takedown global proxy network SocksEscort"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
