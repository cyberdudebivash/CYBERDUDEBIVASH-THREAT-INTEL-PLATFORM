apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-414dcf549a64
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "FBI, CISA warn of Russian hackers hijacking Signal and WhatsApp accounts"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
