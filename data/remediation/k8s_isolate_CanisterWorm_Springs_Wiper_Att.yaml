apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-e552fe54bb2c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "‘CanisterWorm’ Springs Wiper Attack Targeting Iran"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
