apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-9b7b815d5944
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "FBI targeted with ‘suspicious’ activity on its networks"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
