apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-2b8ebb31418b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Inside AWS Security Agent: A multi-agent architecture for automated penetration testing"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
