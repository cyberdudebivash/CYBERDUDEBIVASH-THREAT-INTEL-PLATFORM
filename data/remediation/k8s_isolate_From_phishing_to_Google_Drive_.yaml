apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-dee4af83b94b
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "From phishing to Google Drive C2: Silver Dragon expands APT41 playbook"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
