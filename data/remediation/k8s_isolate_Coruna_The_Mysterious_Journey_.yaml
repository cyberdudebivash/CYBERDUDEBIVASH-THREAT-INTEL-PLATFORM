apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-e588437e251c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Coruna: The Mysterious Journey of a Powerful iOS Exploit Kit"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
