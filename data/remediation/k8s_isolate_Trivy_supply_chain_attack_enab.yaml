apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-a46dc96f96ad
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Trivy supply chain attack enabled European Commission cloud breach"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
