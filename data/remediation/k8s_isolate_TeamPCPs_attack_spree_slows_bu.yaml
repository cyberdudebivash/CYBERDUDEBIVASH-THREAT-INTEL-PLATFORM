apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-cf6a1167c0a1
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "TeamPCP’s attack spree slows, but threat escalates with ransomware pivot"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
