apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-f468836e4ce2
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "European Commission breach exposed data of 30 EU entities, CERT-EU says"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
