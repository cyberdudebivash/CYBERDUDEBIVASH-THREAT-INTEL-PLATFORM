apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-926af4cda023
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Storm-2561 lures victims to spoofed VPN sites to harvest corporate logins"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
