apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-cc11904c3326
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Cisco Secure Firewall Vulnerability Allows Remote Code Execution as Root User"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
