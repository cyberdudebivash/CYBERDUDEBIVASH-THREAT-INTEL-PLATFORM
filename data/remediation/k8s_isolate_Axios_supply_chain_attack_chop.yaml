apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-c572035be26c
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Axios supply chain attack chops away at npm trust"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
