apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-47f5c329abce
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "How ‘silent probing’ can make your security playbook a liability"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
