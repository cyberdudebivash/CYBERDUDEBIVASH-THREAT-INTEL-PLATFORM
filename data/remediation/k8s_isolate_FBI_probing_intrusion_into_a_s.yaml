apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-9dfecb6b54e8
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "FBI probing intrusion into a system managing sensitive surveillance information"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
