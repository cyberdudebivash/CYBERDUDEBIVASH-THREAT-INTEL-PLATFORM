apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-f35577cae9e3
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "North Korea-linked hackers drain $285M from Drift in sophisticated attack"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
