apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-4be93f6eec32
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "Bell Ambulance data breach impacted over 238,000 people"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
