apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apex-quarantine-65f547b18a89
  namespace: production
  labels:
    managed-by: cdb-apex-soar
    threat-ref: "ENISA Technical Advisory on Secure Package Managers: Essential DevSecOps Guidance"
spec:
  podSelector:
    matchLabels:
      apex-isolated: "true"
  policyTypes:
  - Ingress
  - Egress
  # Default Deny All to isolate the compromised pod milliseconds after detection
