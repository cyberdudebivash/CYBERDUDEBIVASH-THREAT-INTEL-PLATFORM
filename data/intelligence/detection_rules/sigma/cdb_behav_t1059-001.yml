title: Suspicious PowerShell Encoded Command Execution
id: cdb-behav-t1059-001
status: production
description: Detects PowerShell execution with base64-encoded commands used by ransomware loaders (LockBit, BlackCat) and post-exploitation frameworks (Cobalt Strike, Metasploit).
author: CyberDudeBivash SENTINEL APEX v166.2
date: 2026-05-29
modified: 2026-05-29
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://intel.cyberdudebivash.com/advisory/T1059
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection_encoded:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains:
            - ' -enc '
            - ' -EncodedCommand '
            - ' -e '
            - ' -ec '
    selection_suspicious_flags:
        CommandLine|contains:
            - ' -nop '
            - ' -noni '
            - ' -w hidden'
            - ' -WindowStyle Hidden'
            - ' bypass '
    selection_download:
        CommandLine|contains:
            - 'DownloadString'
            - 'DownloadFile'
            - 'WebClient'
            - 'Invoke-Expression'
            - 'IEX'
            - 'iex('
    condition: selection_encoded AND (selection_suspicious_flags OR selection_download)
falsepositives:
    - Legitimate administrative scripts using encoded commands (rare, should be audited)
    - Software deployment tools (SCCM, Ansible) using encoded payloads
level: high
