title: Suspicious Large Outbound HTTP Transfer — Possible C2 Exfiltration
id: cdb-behav-t1041-001
status: production
description: Detects potential data exfiltration via anomalous large outbound HTTP/HTTPS transfers to non-approved destinations. T1041 (Exfiltration Over C2 Channel) observed in 61 SENTINEL APEX advisories.
author: CyberDudeBivash SENTINEL APEX v166.2
date: 2026-05-29
tags:
    - attack.exfiltration
    - attack.t1041
    - attack.command_and_control
logsource:
    category: proxy
    product: any
detection:
    selection_large_upload:
        cs-bytes|gt: 50000000
        cs-method: POST
    filter_approved_destinations:
        cs-host|contains:
            - '.microsoft.com'
            - '.office365.com'
            - '.sharepoint.com'
            - '.amazonaws.com'
            - '.google.com'
            - '.dropbox.com'
    condition: selection_large_upload AND NOT filter_approved_destinations
falsepositives:
    - Legitimate large file uploads to business cloud services
    - Software update mechanisms
level: high
