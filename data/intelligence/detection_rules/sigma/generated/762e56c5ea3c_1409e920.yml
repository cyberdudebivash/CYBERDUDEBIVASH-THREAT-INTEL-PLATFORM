title: CDB - Ransomware Behavioral Pattern - Lockbit
id: 1409e920-61cb-42d8-9da5-0b48d7206935
status: stable
description: |
    Detects behavioral patterns associated with lockbit ransomware: shadow copy deletion, backup tampering, and recovery inhibition. High confidence ransomware pre-encryption activity.
author: CYBERDUDEBIVASH(R) SENTINEL APEX v82.0
date: 2026/04/04
modified: 2026/04/04
references:
    - 'https://intel.cyberdudebivash.com'
    - 'https://attack.mitre.org/techniques/T1490/'
tags:
    - 'attack.t1486'
    - 'attack.t1490'
    - 'attack.t1059/003'
    - 'attack.execution'
    - 'attack.impact'
    - 'detection.cdb.lockbit'
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains|all:
            - 'vssadmin'
            - 'delete'
            - 'shadows'
        selection_recover:
        CommandLine|contains|all:
            - 'wbadmin'
            - 'delete'
        selection_bcdedit:
        CommandLine|contains|all:
            - 'bcdedit'
            - 'recoveryenabled'
            - 'no'
    condition: selection
falsepositives:
    - Legitimate system administration (review context carefully)
level: critical
