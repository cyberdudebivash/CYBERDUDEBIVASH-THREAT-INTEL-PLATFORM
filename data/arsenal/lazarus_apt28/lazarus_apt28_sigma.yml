# Rule 7: APT28 LOJAX -- UEFI Flash Write Attempt
title: CDB_APT28_LOJAX_UEFI_Persistence
id: cdb-apt28-003-uefi
status: stable
description: >
  Detects LoJax UEFI rootkit driver loading and flash write activity.
  APT28 uses LoJax to achieve firmware-level persistence that survives OS reinstallation.
author: CyberDudeBivash SENTINEL APEX v143.0.0
date: 2026/01/01
tags:
  - attack.persistence
  - attack.t1542.001
  - attack.t1542.003
  - apt28
  - uefi
  - firmware
logsource:
  product: windows
  category: driver_load
detection:
  selection_driver:
    ImageLoaded|endswith:
      - '\RwDrv.sys'
      - '\rw64.sys'
    Signed: 'false'
  selection_firmware_access:
    EventID: 4656
    ObjectName|contains:
      - 'UEFI'
      - 'EFI'
    AccessMask|contains:
      - '0x40'
  condition: selection_driver or selection_firmware_access
falsepositives:
  - Legitimate firmware update utilities (rare)
  - Hardware diagnostic tools
level: critical

