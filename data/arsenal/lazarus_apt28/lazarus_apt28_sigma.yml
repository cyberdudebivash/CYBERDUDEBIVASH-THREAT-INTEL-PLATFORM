# Rule 4: APT28 Scheduled Task Persistence
title: CDB_APT28_Scheduled_Task_Persistence
id: cdb-apt28-002-schtask
status: stable
description: >
  Detects APT28 persistence via scheduled task creation with SYSTEM privileges
  or onlogon trigger -- characteristic of X-Agent and GAMEFISH implant deployment.
author: CyberDudeBivash SENTINEL APEX v143.0.0
date: 2026/01/01
tags:
  - attack.persistence
  - attack.t1053.005
  - attack.privilege_escalation
  - apt28
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\schtasks.exe'
    CommandLine|contains|all:
      - '/create'
      - '/ru'
    CommandLine|contains:
      - 'SYSTEM'
      - 'ONLOGON'
      - 'ONSTART'
  filter_legitimate:
    CommandLine|contains:
      - 'MicrosoftEdge'
      - 'GoogleUpdate'
      - 'Adobe'
  condition: selection and not filter_legitimate
falsepositives:
  - Enterprise software deployment
  - IT administration scripts
level: medium

---
# Rule 5: Nation-State Credential Dumping via LSASS
title: CDB_NationState_LSASS_Dump_Attempt
id: cdb-ns-001-lsass
status: stable
description: >
  Detects credential dumping from LSASS -- used by both Lazarus Group and APT28
  for lateral movement and privilege escalation post-initial compromise.
author: CyberDudeBivash SENTINEL APEX v143.0.0
date: 2026/01/01
tags:
  - attack.credential_access
  - attack.t1003.001
  - lazarus
  - apt28
  - nation_state
logsource:
  product: windows
  category: process_access
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'
      - '0x1410'
      - '0x147a'
      - '0x1fffff'
      - '0x1f1fff'
  filter_legit_av:
    SourceImage|contains:
      - 'MsMpEng.exe'
      - 'WinDefend'
      - 'csrss.exe'
      - 'wininit.exe'
  condition: selection and not filter_legit_av
falsepositives:
  - Legitimate security tools (CrowdStrike, SentinelOne)
  - Crash dump utilities
level: critical

