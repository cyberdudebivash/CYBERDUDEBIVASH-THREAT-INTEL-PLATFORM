---
# Rule 1: Lazarus Operation Dream Job -- Lure Document Execution
title: CDB_Lazarus_DreamJob_Lure_Execution
id: cdb-laz-001-dreamjob
status: stable
description: >
  Detects execution patterns consistent with Lazarus Group "Operation Dream Job"
  spearphishing lures -- malicious Office documents executing PowerShell or WMIC
  to download secondary payloads from attacker-controlled infrastructure.
author: CyberDudeBivash SENTINEL APEX v143.0.0
date: 2026/01/01
modified: 2026/05/01
references:
  - https://intel.cyberdudebivash.com
  - https://www.cisa.gov/news-events/cybersecurity-advisories
tags:
  - attack.initial_access
  - attack.t1566.001
  - attack.execution
  - attack.t1059.001
  - attack.t1059.003
  - attack.defense_evasion
  - attack.t1027
  - lazarus
  - dprk
logsource:
  category: process_creation
  product: windows
detection:
  selection_parent:
    ParentImage|endswith:
      - '\WINWORD.EXE'
      - '\EXCEL.EXE'
      - '\POWERPNT.EXE'
      - '\mspub.exe'
  selection_child:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\mshta.exe'
  selection_download_indicators:
    CommandLine|contains:
      - 'DownloadFile'
      - 'DownloadString'
      - 'Invoke-Expression'
      - 'IEX'
      - '-enc '
      - 'WebClient'
      - 'certutil'
      - 'bitsadmin'
  condition: selection_parent and selection_child and selection_download_indicators
falsepositives:
  - Legitimate macro-enabled documents with download functionality (rare in enterprise)
  - Developer environments with Office automation
level: high
fields:
  - ComputerName
  - User
  - ParentImage
  - ParentCommandLine
  - Image
  - CommandLine

