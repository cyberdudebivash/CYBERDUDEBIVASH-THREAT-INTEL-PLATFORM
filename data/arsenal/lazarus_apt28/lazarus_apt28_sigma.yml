# Rule 2: Lazarus DTrack -- Keyboard Logger Hook Installation
title: CDB_Lazarus_DTrack_Keylogger_Hook
id: cdb-laz-002-dtrack
status: stable
description: >
  Detects DTrack infostealer keyboard hooking and credential harvesting
  via SetWindowsHookEx combined with suspicious exfiltration patterns.
author: CyberDudeBivash SENTINEL APEX v143.0.0
date: 2026/01/01
modified: 2026/05/01
tags:
  - attack.collection
  - attack.t1056.001
  - attack.exfiltration
  - attack.t1041
  - lazarus
  - dtrack
logsource:
  product: windows
  category: process_creation
detection:
  selection_hook_process:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\regsvr32.exe'
    CommandLine|contains:
      - 'SetWindowsHookEx'
      - 'GetAsyncKeyState'
  selection_self_delete:
    CommandLine|contains:
      - 'cmd.exe /c del'
      - 'cmd /c del'
      - 'ping 127.0.0.1'
      - '&& del '
  condition: selection_hook_process or selection_self_delete
falsepositives:
  - Accessibility software
  - Legitimate keyboard remapping tools
level: high

---
# Rule 3: APT28 Living-off-the-Land Binary (LOLBin) Abuse Chain
title: CDB_APT28_LOLBin_Execution_Chain
id: cdb-apt28-001-lolbin
status: stable
description: >
  Detects APT28 (Fancy Bear) characteristic LOLBin execution chains used
  for initial payload delivery and defence evasion. Commonly seen in Zebrocy
  dropper chains and post-exploitation lateral movement.
author: CyberDudeBivash SENTINEL APEX v143.0.0
date: 2026/01/01
modified: 2026/05/01
tags:
  - attack.defense_evasion
  - attack.t1218
  - attack.t1059.003
  - attack.t1027.002
  - apt28
  - fancy_bear
  - russia
logsource:
  product: windows
  category: process_creation
detection:
  selection_regsvr32_remote:
    Image|endswith: '\regsvr32.exe'
    CommandLine|contains|all:
      - '/s'
      - '/i:http'
  selection_certutil_download:
    Image|endswith: '\certutil.exe'
    CommandLine|contains:
      - '-urlcache'
      - '-decode'
      - '-encode'
  selection_bitsadmin_download:
    Image|endswith: '\bitsadmin.exe'
    CommandLine|contains:
      - '/transfer'
      - '/download'
  selection_mshta_remote:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'http://'
      - 'https://'
      - 'vbscript:'
      - 'javascript:'
  condition: >
    selection_regsvr32_remote or
    selection_certutil_download or
    selection_bitsadmin_download or
    selection_mshta_remote
falsepositives:
  - Software deployment tools using certutil for certificate operations
  - SCCM / Intune managed deployments
level: high

