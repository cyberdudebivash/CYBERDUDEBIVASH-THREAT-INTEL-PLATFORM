# Rule 6: Lazarus / APT28 -- Suspicious Outbound DNS-over-HTTPS
title: CDB_NationState_DoH_C2_Evasion
id: cdb-ns-002-doh
status: experimental
description: >
  Detects DNS-over-HTTPS (DoH) usage for C2 communication evasion -- a TTP
  used by both Lazarus BeagleBoyz and APT28 GAMEFISH to bypass DNS monitoring.
author: CyberDudeBivash SENTINEL APEX v143.0.0
date: 2026/01/01
tags:
  - attack.command_and_control
  - attack.t1071.004
  - attack.t1573.002
  - lazarus
  - apt28
logsource:
  product: windows
  category: network_connection
detection:
  selection_doh_providers:
    DestinationIp:
      - '8.8.8.8'
      - '1.1.1.1'
      - '9.9.9.9'
    DestinationPort: 443
    Initiated: 'true'
  selection_suspicious_process:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\regsvr32.exe'
      - '\mshta.exe'
      - '\wscript.exe'
  condition: selection_doh_providers and selection_suspicious_process
falsepositives:
  - Browsers using DoH (Chrome, Firefox with DoH enabled)
  - Legitimate applications using Google/Cloudflare DNS
level: medium

