<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>CYBERDUDEBIVASH SOC COMMAND CENTER</title> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style> body { margin:0; background:#020617; color:#e2e8f0; font-family: monospace; } /* HEADER */ .header { text-align:center; padding:15px; color:#38bdf8; } /* TICKER */ .ticker { overflow:hidden; border-top:1px solid #0ea5e9; border-bottom:1px solid #0ea5e9; padding:10px; } .ticker span { display:inline-block; white-space:nowrap; animation:scroll 25s linear infinite; } @keyframes scroll { 0% {transform:translateX(100%)} 100% {transform:translateX(-100%)} } /* GRID */ .dashboard { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px; } .panel { background:#0f172a; padding:15px; border-radius:10px; border:1px solid #0ea5e9; } /* MAP */ .map { height:300px; position:relative; background:#020617; } /* DOT */ .dot { width:6px; height:6px; background:red; border-radius:50%; position:absolute; } /* CARDS */ .card { padding:8px; margin:8px 0; background:#020617; border-left:4px solid #0ea5e9; } /* FOOTER */ .footer { text-align:center; padding:20px; font-size:12px; } </style> </head> <body> <div class="header"> 🚨 CYBERDUDEBIVASH SENTINEL APEX — LIVE SOC COMMAND </div> <div class="ticker"> <span id="tickerText">Initializing threat intelligence...</span> </div> <div class="dashboard"> <div class="panel"> <h3>🌍 Global Threat Map</h3> <div class="map" id="map"></div> </div> <div class="panel"> <h3>📊 Threat Distribution</h3> <canvas id="chart"></canvas> </div> <div class="panel"> <h3>⚡ Live Threat Feed</h3> <div id="feed"></div> </div> <div class="panel"> <h3>🧠 AI Threat Insights</h3> <div id="ai"></div> </div> </div> <div class="footer"> CYBERDUDEBIVASH® Sentinel APEX © 2026 </div> <script> // 🔥 DATA SOURCE const DATA_URL = "https://intel.cyberdudebivash.com/data/stix/feed_manifest.json"; // LOAD DATA async function loadData() { try { const res = await fetch(DATA_URL); let data = await res.json(); if (!data || data.length === 0) throw "Empty data"; data = data.reverse().slice(0, 50); renderAll(data); } catch (err) { console.error(err); document.getElementById("tickerText").innerText = "⚠️ Failed to load threat intel. Retrying..."; setTimeout(loadData, 5000); } } // MAIN RENDER function renderAll(data) { renderTicker(data); renderFeed(data); renderAI(data); renderChart(data); renderMap(data); } // ✅ TICKER function renderTicker(data) { const text = data.map(x => x.title).join(" ⚡ "); document.getElementById("tickerText").innerText = text; } // ✅ FEED function renderFeed(data) { const feed = document.getElementById("feed"); feed.innerHTML = ""; data.slice(0, 20).forEach(item => { feed.innerHTML += `<div class="card">${item.title}</div>`; }); } // ✅ AI INSIGHTS function renderAI(data) { const ai = document.getElementById("ai"); ai.innerHTML = ""; data.slice(0, 10).forEach(item => { let level = "LOW"; if (item.risk_score >= 7) level = "CRITICAL"; else if (item.risk_score >= 4) level = "MEDIUM"; ai.innerHTML += `<div class="card">[${level}] ${item.title}</div>`; }); } // ✅ CHART function renderChart(data) { let high=0, med=0, low=0; data.forEach(x=>{ if (x.risk_score>=7) high++; else if (x.risk_score>=4) med++; else low++; }); new Chart(document.getElementById("chart"), { type:"doughnut", data:{ labels:["High","Medium","Low"], datasets:[{ data:[high,med,low] }] } }); } // ✅ MAP (SIMULATED GEO) function renderMap(data) { const map = document.getElementById("map"); map.innerHTML = ""; data.slice(0, 30).forEach(() => { const dot = document.createElement("div"); dot.className = "dot"; dot.style.top = Math.random()*280 + "px"; dot.style.left = Math.random()*95 + "%"; map.appendChild(dot); }); } // AUTO REFRESH setInterval(loadData, 60000); // INIT loadData(); </script> </body> </html>
