<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>CYBERDUDEBIVASH SENTINEL APEX — SOC COMMAND CENTER</title> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style> body { margin:0; background:#020617; color:#e2e8f0; font-family: monospace; overflow-x:hidden; } /* MATRIX */ canvas { position:fixed; top:0; left:0; z-index:-2; } /* GRID */ body::after { content:""; position:fixed; width:100%; height:100%; background-image:linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px); background-size:40px 40px; z-index:-1; } /* HEADER */ .header { text-align:center; padding:20px; color:#38bdf8; text-shadow:0 0 20px #0ea5e9; } /* TICKER */ .ticker { white-space:nowrap; overflow:hidden; background:#020617; border-top:1px solid #0ea5e9; border-bottom:1px solid #0ea5e9; padding:10px; } .ticker span { display:inline-block; padding-left:100%; animation:scroll 25s linear infinite; } @keyframes scroll { 0% {transform:translateX(0);} 100% {transform:translateX(-100%);} } /* GRID LAYOUT */ .dashboard { display:grid; grid-template-columns: 1fr 1fr; gap:20px; padding:20px; } /* PANELS */ .panel { background:rgba(15,23,42,0.8); border:1px solid #0ea5e9; padding:15px; border-radius:10px; } /* MAP */ .map { height:300px; background:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg'); background-size:cover; position:relative; } /* DOT */ .dot { width:8px; height:8px; background:red; border-radius:50%; position:absolute; animation:pulse 1s infinite; } @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.5);} 100%{transform:scale(1);} } /* CARDS */ .card { background:#0f172a; padding:10px; margin:10px 0; border-left:4px solid #0ea5e9; } /* FOOTER */ .footer { text-align:center; padding:20px; font-size:12px; color:#64748b; } </style> </head> <body>

<canvas id="matrix"></canvas>

<div class="header"> 🚨 CYBERDUDEBIVASH SENTINEL APEX — SOC COMMAND CENTER </div> <div class="ticker"><span id="tickerText">Loading threat stream...</span></div> <div class="dashboard"> <div class="panel"> <h3>🌍 Global Threat Map</h3> <div class="map" id="map"></div> </div> <div class="panel"> <h3>📊 Threat Distribution</h3> <canvas id="chart"></canvas> </div> <div class="panel"> <h3>⚡ Live Threat Feed</h3> <div id="feed"></div> </div> <div class="panel"> <h3>🧠 AI Threat Insights</h3> <div id="ai"></div> </div> </div> <div class="footer"> CYBERDUDEBIVASH® Sentinel APEX Platform © 2026 CyberDudeBivash Pvt. Ltd. — Global Cyber Intelligence Authority </div> <script> // MATRIX const canvas=document.getElementById("matrix"); const ctx=canvas.getContext("2d"); canvas.height=window.innerHeight; canvas.width=window.innerWidth; const letters="01CYBER"; const fontSize=14; const columns=canvas.width/fontSize; const drops=Array(Math.floor(columns)).fill(1); function draw(){ ctx.fillStyle="rgba(2,6,23,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#0ea5e9"; ctx.font=fontSize+"px monospace"; drops.forEach((y,i)=>{ const text=letters[Math.floor(Math.random()*letters.length)]; ctx.fillText(text,i*fontSize,y*fontSize); if(y*fontSize>canvas.height && Math.random()>0.975) drops[i]=0; drops[i]++; }); } setInterval(draw,30); // LOAD DATA fetch("https://raw.githubusercontent.com/cyberdudebivash/CYBERDUDEBIVASH-THREAT-INTEL-PLATFORM/main/data/stix/feed_manifest.json") .then(res=>res.json()) .then(data=>{ data=data.reverse().slice(0,30); // FEED const feed=document.getElementById("feed"); let ticker=""; let high=0,med=0,low=0; data.forEach((item,i)=>{ feed.innerHTML+=`<div class="card">${item.title}</div>`; ticker+=item.title+" ⚡ "; // AI classification let ai="LOW"; if(item.risk_score>=7){ai="CRITICAL"; high++;} else if(item.risk_score>=4){ai="MEDIUM"; med++;} else {low++;} document.getElementById("ai").innerHTML+=` <div class="card">AI: ${ai} → ${item.title}</div> `; // MAP DOT const dot=document.createElement("div"); dot.className="dot"; dot.style.top=Math.random()*280+"px"; dot.style.left=Math.random()*90+"%"; document.getElementById("map").appendChild(dot); }); // TICKER document.getElementById("tickerText").innerText=ticker; // CHART new Chart(document.getElementById("chart"),{ type:"bar", data:{ labels:["High","Medium","Low"], datasets:[{ data:[high,med,low] }] } }); }); </script> </body> </html>
