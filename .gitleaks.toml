# SENTINEL APEX — Gitleaks configuration
# Suppress known false positives and local tooling files

title = "SENTINEL APEX Gitleaks Config"

[allowlist]
  description = "Allowlist for known non-production files"
  paths = [
    '''.gh_tok''',
    '''_.*\.py''',
    '''_.*\.bat''',
    '''_.*\.ps1''',
    '''_.*\.txt''',
    '''__commit.*\.txt''',
    '''commit_.*\.ps1''',
    '''check_.*\.py''',
    '''poll_.*\.py''',
    '''monitor_.*\.py''',
    '''get_token\.py''',
    '''get_gh_token\.ps1''',
    '''watch_.*\.py''',
    '''audit_.*\.py''',
    '''dispatch_.*\.py''',
    '''quick_.*\.py''',
    '''final_check\.py''',
    '''oneshot\.py''',
  ]

  # Suppress generic token patterns in CI helper scripts
  regexes = [
    '''gho_[A-Za-z0-9]{36}''',
  ]
