name: CDB Lead-to-Cash Auto-Responder

on:
  schedule:
    - cron: '0 8 * * *'   # Daily at 08:00 UTC — 1:30 PM IST
  workflow_dispatch:       # Manual trigger for testing

jobs:
  autoresponder:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Lead-to-Cash Auto-Responder
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME: "CyberDudeBivash SENTINEL APEX"
        run: |
          python -m agent.lead_autoresponder
