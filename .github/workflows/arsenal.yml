name: CDB Sentinel APEX  -  Arsenal v38.0

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  arsenal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with: {fetch-depth: 1, ref: main}
      - uses: actions/setup-python@v5.5.0
        with: {python-version: '3.12', cache: 'pip'}
      - run: pip install --upgrade pip && [ -f requirements.txt ] && pip install -r requirements-ci-light.txt || true
      - name: Run Arsenal Engine
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          MANIFEST_PATH: data/stix/feed_manifest.json
          STIX_DIR: data/stix
          FUSION_DIR: data/fusion
          ZDH_DIR: data/zerodayhunter
          ANALYST_DIR: data/analyst
          ARSENAL_DIR: data/arsenal
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v38_arsenal.arsenal_engine
      - name: Commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/arsenal/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || {
            FEEDS=$(python3 -c "import json; d=json.load(open('data/arsenal/arsenal_report.json')); print(d['productization_stats']['intelligence_feed_items'])" 2>/dev/null || echo "0")
            git commit -m " ARSENAL v38.0  -  ${FEEDS} feed items | Intelligence Productization [skip ci]"
            git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            for i in 1 2 3 4; do
              git fetch origin main --quiet 2>/dev/null || true
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
              if git push origin main; then echo "Push OK ($i/4)"; break; fi
              sleep $((i*15))
              [ $i -eq 4 ] && echo "Push deferred."
            done
          }
