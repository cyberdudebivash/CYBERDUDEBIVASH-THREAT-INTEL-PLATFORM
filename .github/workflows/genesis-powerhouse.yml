name: CDB GENESIS Intelligence Powerhouse v140.0

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# v141.0 FIX (2026-06-08): Unique concurrency group prevents cancellation by
# other sentinel-data-writer workflows queuing simultaneously.
concurrency:
  group: sentinel-data-writer-genesis
  cancel-in-progress: false

jobs:
  genesis-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with: { fetch-depth: 1, ref: main }
      - uses: actions/setup-python@v5.5.0
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - run: mkdir -p data/genesis data/nexus data/cortex data/quantum data/sovereign
      - name: "Pipeline Lock Check"
        run: |
          if [ -f ".PIPELINE_LOCK" ]; then
            echo "PIPELINE LOCKED - skipping genesis cycle"
            exit 0
          fi
          echo "[OK] No lock active."
      - name: Execute GENESIS 12-Engine Cycle
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v43_genesis.genesis_engine
      - name: Validate
        run: python -m pytest tests/test_v43_genesis.py -v --tb=short 2>&1 | tail -15
      - name: Commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add data/genesis/ -f
          if git diff --cached --quiet; then
            echo "No GENESIS changes to commit."
          else
            git commit -m " GENESIS v140.0: 12-engine cycle $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            for i in 1 2 3 4; do
              git fetch origin main --quiet 2>/dev/null || true
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
              if git push origin main; then echo "Push OK ($i/4)"; break; fi
              sleep $((i*15))
              [ $i -eq 4 ] && echo "Push deferred."
            done
          fi
