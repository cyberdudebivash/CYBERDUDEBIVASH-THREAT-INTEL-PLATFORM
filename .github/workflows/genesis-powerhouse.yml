name: CDB GENESIS Intelligence Powerhouse v134.0

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: genesis-powerhouse
  cancel-in-progress: false

jobs:
  genesis-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4.2.2
        with: { fetch-depth: 0, ref: main }
      - uses: actions/setup-python@v5.4.0
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - run: mkdir -p data/genesis data/nexus data/cortex data/quantum data/sovereign
      - name: Execute GENESIS 12-Engine Cycle
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v43_genesis.genesis_engine
      - name: Validate
        run: python -m pytest tests/test_v43_genesis.py -v --tb=short 2>&1 | tail -15
      - name: Commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CDB-GENESIS-BOT"
          git config user.email "genesis@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add data/genesis/ -f
          if git diff --cached --quiet; then
            echo "No GENESIS changes to commit."
          else
            git commit -m " GENESIS v134.0: 12-engine cycle $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            for i in 1 2 3 4; do
              git fetch origin main --quiet
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
              git push origin main && { echo "Push OK ($i/4)"; break; }
              sleep $((i*15))
              [ $i -eq 4 ] && echo "Push deferred."
            done
          fi
