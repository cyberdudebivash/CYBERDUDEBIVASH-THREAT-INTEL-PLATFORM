name: CDB GENESIS Intelligence Powerhouse v43.0

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sentinel-main-deploy
  cancel-in-progress: false

jobs:
  genesis-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, ref: main }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - run: mkdir -p data/genesis data/nexus data/cortex data/quantum data/sovereign
      - name: Execute GENESIS 12-Engine Cycle
        run: python -m agent.v43_genesis.genesis_engine
      - name: Validate
        run: python -m pytest tests/test_v43_genesis.py -v --tb=short 2>&1 | tail -15
      - name: Commit
        continue-on-error: true
        run: |
          git config user.name "CDB-GENESIS-BOT"
          git config user.email "genesis@cyberdudebivash.com"
          git add data/genesis/ -f
          git diff --cached --quiet || git commit -m "🌐 GENESIS v43.0: 12-engine cycle $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push origin main && break
            echo "Retry $i failed, retrying..."
            sleep 3
          done
