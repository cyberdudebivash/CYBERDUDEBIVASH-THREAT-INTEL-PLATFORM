name: CDB Sentinel APEX  -  OmniShield v36.0

on:
  schedule:
    - cron: '15 */12 * * *'  # Every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  omnishield:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with: {fetch-depth: 1, ref: main}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5.5.0
        with: {python-version: '3.12', cache: 'pip'}

      - name: Install deps
        run: pip install --upgrade pip && pip install requests feedparser networkx && [ -f requirements.txt ] && pip install -r requirements-ci-light.txt || true

      - name: Run OmniShield Engine
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          MANIFEST_PATH: data/stix/feed_manifest.json
          FUSION_DIR: data/fusion
          ZDH_DIR: data/zerodayhunter
          OMNISHIELD_DIR: data/omnishield
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v36_omnishield.omnishield_orchestrator

      - name: Commit outputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/omnishield/ 2>/dev/null || true
          if git diff --cached --quiet; then echo "No changes"; else
            SCORE=$(python3 -c "import json; d=json.load(open('data/omnishield/omnishield_report.json')); print(d['platform_security_score']['composite'])" 2>/dev/null || echo "N/A")
            git commit -m "OmniShield v36.0 | Platform Score: ${SCORE}/10 | 12 subsystems [skip ci]"
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            git push origin main || echo '::warning::Push deferred — will sync next run.'
          fi
