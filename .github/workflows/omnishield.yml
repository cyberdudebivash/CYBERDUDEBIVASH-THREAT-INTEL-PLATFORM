name: CDB Sentinel APEX — OmniShield v36.0

on:
  schedule:
    - cron: '15 */12 * * *'  # Every 12 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sentinel-main-deploy
  cancel-in-progress: false

jobs:
  omnishield:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: {fetch-depth: 0, ref: main}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with: {python-version: '3.12', cache: 'pip'}

      - name: Install deps
        run: pip install --upgrade pip && pip install requests feedparser networkx && [ -f requirements.txt ] && pip install -r requirements.txt || true

      - name: Run OmniShield Engine
        env:
          MANIFEST_PATH: data/stix/feed_manifest.json
          FUSION_DIR: data/fusion
          ZDH_DIR: data/zerodayhunter
          OMNISHIELD_DIR: data/omnishield
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v36_omnishield.omnishield_orchestrator

      - name: Commit outputs
        continue-on-error: true
        run: |
          git config user.name "CDB-GOC-OmniShield"
          git config user.email "goc@cyberdudebivash.com"
          git add data/omnishield/ || true
          if git diff --cached --quiet; then echo "No changes"; else
            SCORE=$(python3 -c "import json; d=json.load(open('data/omnishield/omnishield_report.json')); print(d['platform_security_score']['composite'])" 2>/dev/null || echo "N/A")
            git commit -m "🛡️ OMNISHIELD v36.0 — Platform Score: ${SCORE}/10 | 12 subsystems"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push origin main && break
              echo "Retry $i failed, retrying..."
              sleep 3
            done
          fi
