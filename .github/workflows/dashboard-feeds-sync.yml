# =============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX v170.0
# DASHBOARD-FEEDS-SYNC — Generate all dashboard JSON feeds + upload to R2
# =============================================================================
#
# PURPOSE:
#   Generates the 13 static JSON feeds required by the live dashboard,
#   uploads them to Cloudflare R2, and purges CF cache.
#   Runs AFTER the main intel pipeline has produced api/feed.json.
#
# FEEDS GENERATED:
#   api/v1/intel/apex.json          (was broken / empty)
#   api/v1/intel/ai_summary.json    (was broken / empty)
#   api/v1/intel/stats.json         (new)
#   api/v1/intel/campaigns.json     (new — kill chain)
#   api/v1/intel/ransomware.json    (new — ransomware tracker)
#   api/v1/intel/apt.json           (new — APT radar)
#   api/v1/intel/epss.json          (new — EPSS CVE tracker)
#   api/v1/intel/defcon.json        (new — DEFCON status)
#   api/v1/intel/pulse.json         (new — live threat pulse)
#   api/v1/intel/darkweb.json       (new — dark web monitor)
#   api/v1/intel/cybermap.json      (new — geo heatmap)
#   api/reports/index.json          (was missing — reports archive)
#   api/reports/stats.json          (new)
#
# GOVERNANCE:
#   - Never publishes synthetic data as real intel
#   - All outputs include provenance: generated_at, derivation_method
#   - Hard-fails if any output is missing or empty
#   - Post-deploy validation against live endpoints
#
# CONCURRENCY:
#   group: sentinel-dashboard-feeds (isolated from intel write group)
#   cancel-in-progress: false
#
# SCHEDULE:
#   Every 6h offset from main intel pipeline to ensure fresh data is available
#
# AUTHOR: CYBERDUDEBIVASH Pvt. Ltd. | Principal AI Systems Architect
# =============================================================================

name: "SENTINEL APEX — Dashboard Feeds Sync v170.0"

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/generate_dashboard_feeds.py'
      - 'api/feed.json'
      - 'api/v1/intel/latest.json'
      - 'data/feed_manifest.json'
      - '.github/workflows/dashboard-feeds-sync.yml'
  schedule:
    # Every 6h at :30 — offset +30min from generate-and-sync to ensure feed is ready
    - cron: '30 3,9,15,21 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but do not upload to R2)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  PIPELINE_VERSION: "170.0"
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"

concurrency:
  group: sentinel-dashboard-feeds
  cancel-in-progress: false

jobs:
  generate-dashboard-feeds:
    name: "Generate Dashboard Feeds + R2 Upload"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.actor != 'github-actions[bot]')

    steps:
      - name: "Checkout repository (shallow)"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: "Python 3.12 setup"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip --quiet
          echo "[OK] Dependencies ready"

      - name: "Syntax check generate_dashboard_feeds.py"
        run: |
          python3 -m py_compile scripts/generate_dashboard_feeds.py
          echo "[OK] Syntax check passed"

      - name: "Ensure output directories"
        run: |
          mkdir -p api/v1/intel
          mkdir -p api/reports
          echo "[OK] Directories ready"

      - name: "Generate all dashboard feeds"
        run: |
          python3 scripts/generate_dashboard_feeds.py
        env:
          PIPELINE_VERSION: ${{ env.PIPELINE_VERSION }}
          API_OUT_DIR: "api/v1/intel"

      - name: "Validate all feed outputs (hard-fail gate)"
        run: |
          set -e
          ERRORS=0
          for f in \
            api/v1/intel/apex.json \
            api/v1/intel/ai_summary.json \
            api/v1/intel/stats.json \
            api/v1/intel/campaigns.json \
            api/v1/intel/ransomware.json \
            api/v1/intel/apt.json \
            api/v1/intel/epss.json \
            api/v1/intel/defcon.json \
            api/v1/intel/pulse.json \
            api/v1/intel/darkweb.json \
            api/v1/intel/cybermap.json \
            api/reports/index.json \
            api/reports/stats.json; do
            if [ ! -f "$f" ]; then
              echo "::error::MISSING: $f"
              ERRORS=$((ERRORS+1))
              continue
            fi
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -lt 10 ]; then
              echo "::error::EMPTY: $f (${SIZE} bytes)"
              ERRORS=$((ERRORS+1))
              continue
            fi
            python3 -c "import json,sys; json.load(open('$f'))" || {
              echo "::error::INVALID JSON: $f"
              ERRORS=$((ERRORS+1))
              continue
            }
            echo "  OK  $f  (${SIZE} bytes)"
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS feed(s) failed validation — aborting R2 upload"
            exit 1
          fi
          echo "All 13 feed outputs validated."

      - name: "Upload feeds to Cloudflare R2"
        if: github.event.inputs.dry_run != 'true'
        env:
          CF_ACCOUNT_ID:         ${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
        run: |
          set -e
          ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          BUCKET="sentinel-apex-data"

          pip install awscli --quiet --break-system-packages 2>/dev/null || pip install awscli --quiet

          UPLOADED=0
          FAILED=0
          for FILE in \
            api/v1/intel/apex.json \
            api/v1/intel/ai_summary.json \
            api/v1/intel/stats.json \
            api/v1/intel/campaigns.json \
            api/v1/intel/ransomware.json \
            api/v1/intel/apt.json \
            api/v1/intel/epss.json \
            api/v1/intel/defcon.json \
            api/v1/intel/pulse.json \
            api/v1/intel/darkweb.json \
            api/v1/intel/cybermap.json \
            api/reports/index.json \
            api/reports/stats.json; do
            if [ -f "$FILE" ]; then
              aws s3 cp "$FILE" "s3://${BUCKET}/${FILE}" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "max-age=120, s-maxage=120" \
                --quiet && {
                echo "  UPLOADED  $FILE"
                UPLOADED=$((UPLOADED+1))
              } || {
                echo "::warning::  FAILED    $FILE"
                FAILED=$((FAILED+1))
              }
            fi
          done
          echo "R2 upload complete: ${UPLOADED} uploaded, ${FAILED} failed"
          [ "$FAILED" -gt 3 ] && { echo "::error::Too many R2 upload failures"; exit 1; } || true

      - name: "Purge Cloudflare cache"
        if: github.event.inputs.dry_run != 'true'
        continue-on-error: true
        run: |
          ZONE_ID="${{ secrets.CF_ZONE_ID }}"
          TOKEN="${{ secrets.CF_CACHE_PURGE_TOKEN }}"
          if [ -z "$ZONE_ID" ] || [ -z "$TOKEN" ]; then
            echo "[SKIP] CF_ZONE_ID or CF_CACHE_PURGE_TOKEN not configured"
            exit 0
          fi
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://intel.cyberdudebivash.com/api/v1/intel/apex.json",
                "https://intel.cyberdudebivash.com/api/v1/intel/ai_summary.json",
                "https://intel.cyberdudebivash.com/api/v1/intel/stats",
                "https://intel.cyberdudebivash.com/api/v1/intel/campaigns",
                "https://intel.cyberdudebivash.com/api/v1/intel/ransomware",
                "https://intel.cyberdudebivash.com/api/v1/intel/apt",
                "https://intel.cyberdudebivash.com/api/v1/intel/epss",
                "https://intel.cyberdudebivash.com/api/v1/intel/defcon",
                "https://intel.cyberdudebivash.com/api/v1/intel/pulse",
                "https://intel.cyberdudebivash.com/api/v1/intel/darkweb",
                "https://intel.cyberdudebivash.com/api/v1/intel/cybermap",
                "https://intel.cyberdudebivash.com/api/v1/news/feed",
                "https://intel.cyberdudebivash.com/api/reports/index.json",
                "https://intel.cyberdudebivash.com/api/reports/stats.json"
              ]
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); print('Cache purge:', 'OK' if d.get('success') else 'FAILED', d.get('errors',[]))"

      - name: "Post-deploy endpoint validation"
        if: github.event.inputs.dry_run != 'true'
        continue-on-error: true
        run: |
          sleep 8
          BASE="https://intel.cyberdudebivash.com"
          PASS=0
          FAIL=0
          for endpoint in \
            /api/health \
            /api/v1/intel/apex.json \
            /api/v1/intel/ai_summary.json \
            /api/v1/intel/stats \
            /api/v1/intel/campaigns \
            /api/v1/intel/ransomware \
            /api/v1/intel/apt \
            /api/v1/intel/epss \
            /api/v1/intel/defcon \
            /api/v1/intel/pulse \
            /api/v1/intel/darkweb \
            /api/v1/intel/cybermap \
            /api/v1/news/feed \
            /api/reports/index.json \
            /api/reports/stats.json; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" "${BASE}${endpoint}" --max-time 10)
            SIZE=$(curl -s "${BASE}${endpoint}" --max-time 10 | wc -c)
            if [ "$HTTP" = "200" ] && [ "$SIZE" -gt 10 ]; then
              echo "  PASS  ${endpoint}  (HTTP ${HTTP}, ${SIZE}b)"
              PASS=$((PASS+1))
            else
              echo "::warning::  FAIL  ${endpoint}  (HTTP ${HTTP}, ${SIZE}b)"
              FAIL=$((FAIL+1))
            fi
          done
          echo ""
          echo "=== POST-DEPLOY: ${PASS} PASS / ${FAIL} FAIL ==="
