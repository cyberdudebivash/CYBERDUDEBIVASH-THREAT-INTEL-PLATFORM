name: CYBERDUDEBIVASH PRODUCT FACTORY v45.0

# Founder & CEO — CyberDudeBivash Pvt. Ltd.
# Strategic Mandate: Transform technical intelligence into sellable assets.

on:
  workflow_run:
    workflows: ["CDB Sentinel Powerhouse – Genesis reasoning v43.0"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sentinel-main-deploy
  cancel-in-progress: false

jobs:
  run-factory-assembly:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v45.0 Core
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install v45 Dependencies
        run: pip install -r requirements.txt

      - name: Run Intelligence Product Factory
        run: python3 -m agent.product_factory.intel_product_factory
        env:
          AUTHORITY: "CYBERDUDEBIVASH OFFICIAL"

      - name: Commit Packaged Products
        run: |
          git config --local user.name "CDB-Sentinel-Bot"
          git config --local user.email "bivash@cyberdudebivash.com"
          git add data/products/
          git commit -m "🏭 v45.0: New Intelligence Products Packaged [skip ci]"
          git push origin main
