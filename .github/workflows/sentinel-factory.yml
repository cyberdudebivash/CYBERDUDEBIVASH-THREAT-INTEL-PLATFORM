name: CYBERDUDEBIVASH PRODUCT FACTORY v45.0

# Founder & CEO  -  CyberDudeBivash Pvt. Ltd.
# Strategic Mandate: Transform technical intelligence into sellable assets.

on:
  workflow_run:
    workflows: ["CDB GENESIS Intelligence Powerhouse v140.0"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  run-factory-assembly:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout v45.0 Core
        uses: actions/checkout@v6.0.2

      - name: Setup Python 3.12
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install v45 Dependencies
        run: pip install -r requirements-ci-light.txt

      - name: Run Intelligence Product Factory
        run: python3 -m agent.product_factory.intel_product_factory
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          AUTHORITY: "CYBERDUDEBIVASH OFFICIAL"

      - name: Commit Packaged Products
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.name "CYBERDUDEBIVASH"
          git config --local user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/products/ || true
          if git diff --staged --quiet; then
            echo "No product changes to commit"
          else
            git commit -m " v45.0: New Intelligence Products Packaged [skip ci]"
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            git push origin main || echo '::warning::Push deferred — will sync next run.'
          fi
