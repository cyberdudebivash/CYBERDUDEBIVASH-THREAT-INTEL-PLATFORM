name: CDB Sentinel APEX — Convergence v37.0

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: convergence
  cancel-in-progress: false

jobs:
  convergence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
        with: {fetch-depth: 0, ref: main}
      - uses: actions/setup-python@v5.4.0
        with: {python-version: '3.12', cache: 'pip'}
      - run: pip install --upgrade pip requests feedparser networkx && [ -f requirements.txt ] && pip install -r requirements.txt || true
      - name: Run Convergence Engine
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          MANIFEST_PATH: data/stix/feed_manifest.json
          STIX_DIR: data/stix
          FUSION_DIR: data/fusion
          ZDH_DIR: data/zerodayhunter
          OMNISHIELD_DIR: data/omnishield
          CONVERGENCE_DIR: data/convergence
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v37_convergence.convergence_engine
      - name: Commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CDB-GOC-Convergence"
          git config user.email "goc@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/convergence/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || {
            RULES=$(python3 -c "import json; d=json.load(open('data/convergence/convergence_report.json')); print(d['integration_stats']['detection_rules'])" 2>/dev/null || echo "0")
            git commit -m "🔗 CONVERGENCE v37.0 — ZDH Integration | ${RULES} detection rules"
            git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            for i in 1 2 3 4; do
              git fetch origin main --quiet
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
              git push origin main && { echo "Push OK ($i/4)"; break; }
              sleep $((i*15))
              [ $i -eq 4 ] && echo "Push deferred."
            done
          }
