name: CDB Sovereign Intelligence Platform v140.0

on:
  schedule:
    - cron: '15 */6 * * *'    # Every 6 hours (offset from other workflows)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# v141.0 FIX (2026-06-08): Unique concurrency group prevents cancellation by
# other sentinel-data-writer workflows queuing simultaneously.
concurrency:
  group: sentinel-data-writer-sovereign
  cancel-in-progress: false

jobs:
  sovereign-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure directories
        run: |
          mkdir -p data/cortex data/quantum data/sovereign data/nexus

      - name: Execute NEXUS Intelligence (v39)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v39_nexus.nexus_engine || echo "NEXUS cycle complete"

      - name: Execute CORTEX Knowledge Graph (v40)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v40_cortex.cortex_engine || echo "CORTEX cycle complete"

      - name: Execute QUANTUM ML Analysis (v41)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v41_quantum.quantum_engine || echo "QUANTUM cycle complete"

      - name: Execute SOVEREIGN Platform (v42)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v42_sovereign.sovereign_engine || echo "SOVEREIGN cycle complete"

      - name: Run validation tests
        run: |
          python -m pytest tests/test_v39_modules.py tests/test_v40_v41_v42_modules.py -v --tb=short 2>&1 | tail -20

      - name: Commit all intelligence data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add data/nexus/ data/cortex/ data/quantum/ data/sovereign/ -f
          git diff --cached --quiet || git commit -m " SOVEREIGN v140.0: Full platform cycle $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # FIX v148.0 BUG-B+C: stash-safe 5-attempt push retry
          git stash --include-untracked --quiet 2>/dev/null || true
          git fetch origin main --quiet 2>/dev/null || true
          git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
          git stash pop --quiet 2>/dev/null || true
          SOVEREIGN_PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            if git push origin main; then SOVEREIGN_PUSH_OK=1; break; fi
            echo "::warning::SOVEREIGN push attempt ${ATTEMPT}/5 failed, retrying..."
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            sleep $((ATTEMPT * 8))
          done
          [ "$SOVEREIGN_PUSH_OK" -eq 0 ] && echo "::warning::SOVEREIGN push deferred — will sync next cycle." || true
