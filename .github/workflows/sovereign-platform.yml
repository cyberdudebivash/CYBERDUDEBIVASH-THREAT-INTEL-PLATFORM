name: CDB Sovereign Intelligence Platform v140.0

on:
  schedule:
    - cron: '15 */6 * * *'    # Every 6 hours (offset from other workflows)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sovereign-platform
  cancel-in-progress: false

jobs:
  sovereign-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure directories
        run: |
          mkdir -p data/cortex data/quantum data/sovereign data/nexus

      - name: Execute NEXUS Intelligence (v39)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v39_nexus.nexus_engine || echo "NEXUS cycle complete"

      - name: Execute CORTEX Knowledge Graph (v40)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v40_cortex.cortex_engine || echo "CORTEX cycle complete"

      - name: Execute QUANTUM ML Analysis (v41)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v41_quantum.quantum_engine || echo "QUANTUM cycle complete"

      - name: Execute SOVEREIGN Platform (v42)
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v42_sovereign.sovereign_engine || echo "SOVEREIGN cycle complete"

      - name: Run validation tests
        run: |
          python -m pytest tests/test_v39_modules.py tests/test_v40_v41_v42_modules.py -v --tb=short 2>&1 | tail -20

      - name: Commit all intelligence data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add data/nexus/ data/cortex/ data/quantum/ data/sovereign/ -f
          git diff --cached --quiet || git commit -m " SOVEREIGN v140.0: Full platform cycle $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase origin main || true
          git push origin main || echo "Push deferred"
