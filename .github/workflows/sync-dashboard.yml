name: "DISABLED - Dashboard Sync v134.0 (merged into sentinel-blogger v134.0)"

on:
  # " ALL AUTO-TRIGGERS DISABLED " sentinel-blogger v134.0 handles dashboard sync
  # workflow_run:              DISABLED: caused overwrite race with sentinel-blogger
  #   workflows: ["sentinel-blogger"]
  #   types: [completed]
  # schedule:                  DISABLED: caused --force-rebuild manifest destruction
  #   - cron: '20 */4 * * *'
  workflow_dispatch:          #  MANUAL EMERGENCY USE ONLY
    inputs:
      force_patch:
        description: 'Force EMBEDDED_INTEL patch (EMERGENCY USE ONLY " reads current git state)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sentinel-deployment
  cancel-in-progress: true

jobs:
  sync-dashboard:
    name: "DISABLED - Emergency Manual EMBEDDED_INTEL Patch"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # " GATE: Only run on explicit manual dispatch with force_patch=true
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.force_patch == 'true'

    steps:
      - name: "  Safety Warning"
        run: |
          echo "EMERGENCY MANUAL SYNC - sync-dashboard is DISABLED in v134.0.0"
          echo "    sentinel-blogger handles all dashboard sync automatically."
          echo "    This manual run will ONLY patch EMBEDDED_INTEL from current git state."
          echo "    It will NOT run --force-rebuild (manifest destruction risk)."
          echo "    It will NOT commit data/stix/feed_manifest.json."

      - name: "Checkout Repository"
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: "Set up Python 3.12"
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'

      - name: "Python Syntax Guard (v142.4 - abort on any syntax error)"
        run: |
          ERRORS=0
          for f in scripts/*.py; do
            python3 -m py_compile "$f" 2>/tmp/py_err.txt
            if [ $? -ne 0 ]; then echo "SYNTAX ERROR: $f"; cat /tmp/py_err.txt; ERRORS=$((ERRORS+1)); fi
          done
          echo "Syntax errors: $ERRORS"
          [ $ERRORS -eq 0 ] || { echo "ABORTING"; exit 1; }

      #  v143.1 HARD-FAIL CI GATES (added - must all PASS before any data write) 
      - name: "GATE 1/4 - Encoding Validator (HARD FAIL on mojibake)"
        run: python3 scripts/encoding_validator.py

      - name: "GATE 2/4 - Output Validation Gate (HARD FAIL on schema violations)"
        run: python3 scripts/output_validation_gate.py

      - name: "GATE 3/4 - API Dashboard Contract Validator (HARD FAIL on mismatch)"
        run: python3 scripts/api_dashboard_contract_validator.py

      - name: "GATE 4/4 - Regression Immunity System (HARD FAIL on regression)"
        run: python3 scripts/regression_immunity.py
      #  END HARD-FAIL GATES 

      - name: "Patch EMBEDDED_INTEL (v142.4 - writes [] to keep dashboard API-only)"
        run: |
          echo "=== EMBEDDED_INTEL patch: writes [] so dashboard fetches live from API ==="
          python3 scripts/update_embedded_intel.py && echo "EMBEDDED_INTEL patch OK (array=[])" || {
            echo "EMBEDDED_INTEL patch FAILED"
            exit 1
          }

      - name: "Safe Commit & Push (index.html ONLY)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name  "CYBERDUDEBIVASH"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git rebase --abort 2>/dev/null || true
          git merge  --abort  2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # " STRICTLY index.html ONLY " do NOT commit feed_manifest.json
          git add index.html 2>/dev/null || true
          # " BLOCKED: git add -f data/stix/feed_manifest.json  manifest destruction risk

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Emergency Dashboard Sync v134.0 - EMBEDDED_INTEL patch @ $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"

          for i in 1 2 3 4; do
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit --quiet || true
            }
            if git push origin main; then echo "Push OK (attempt $i/4)"; break; fi
            sleep $((i * 15))
            [ $i -eq 4 ] && echo "Push deferred."
          done

