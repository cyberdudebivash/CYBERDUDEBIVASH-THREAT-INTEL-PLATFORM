# =====================================================================
# SENTINEL APEX — Dashboard Sync Workflow v64.5
# SINGLE SOURCE OF TRUTH: data/stix/feed_manifest.json
# =====================================================================
name: Dashboard Sync — EMBEDDED_INTEL Auto-Patcher v64.5

on:
  workflow_run:
    workflows:
      - "CDB Sentinel Blogger - Threat Intel Auto-Publisher v64.5"
      - "CDB Multi-Source Intelligence Enrichment"
    types: [completed]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force_patch:
        description: 'Force patch even if unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sentinel-main-deploy
  cancel-in-progress: false

jobs:
  sync-dashboard:
    name: Sync Dashboard Intelligence Cache v64.5
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify Data Files Exist
        run: |
          echo "=== v64.5 Dashboard Sync Pre-Check ==="
          echo "SINGLE SOURCE OF TRUTH: data/stix/feed_manifest.json"
          if [ ! -f "data/stix/feed_manifest.json" ]; then
            echo "FATAL: feed_manifest.json not found — aborting sync"
            exit 1
          fi
          python3 -c "
          import json
          d = json.load(open('data/stix/feed_manifest.json'))
          items = d if isinstance(d, list) else d.get('items', [])
          if items:
              newest = items[-1].get('timestamp', 'N/A')[:19]
              oldest = items[0].get('timestamp', 'N/A')[:19]
              print(f'  feed_manifest: {len(items)} items | newest: {newest} | oldest: {oldest}')
          else:
              print('  feed_manifest: EMPTY')
          "

      - name: EPSS/CVSS Batch Enrichment
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "Running EPSS/CVSS batch enrichment..."
          if [ -f "agent/v47_integrity/integrity_guard.py" ]; then
            python3 -c "
          import sys, os
          sys.path.insert(0, os.getcwd())
          try:
              from agent.v47_integrity.integrity_guard import EPSSBatchEnricher
              enricher = EPSSBatchEnricher()
              count = enricher.enrich_manifest()
              print(f'  EPSS/CVSS enriched: {count} entries')
          except Exception as e:
              print(f'  EPSS enrichment unavailable (non-blocking): {e}')
          "
          elif [ -f "agent/v48_pipeline_hardening/epss_batch_enricher.py" ]; then
            python3 agent/v48_pipeline_hardening/epss_batch_enricher.py
          else
            echo "  No enrichment module found — continuing without EPSS"
          fi

      - name: Patch EMBEDDED_INTEL in index.html
        run: |
          python3 scripts/update_embedded_intel.py

      - name: Verify Patch Quality
        run: |
          python3 -c "
          import json, re
          with open('index.html') as f:
              html = f.read()
          m = re.search(r'const EMBEDDED_INTEL = (\[[\s\S]*?\]);', html)
          if not m:
              print('FATAL: EMBEDDED_INTEL not found in index.html')
              exit(1)
          data = json.loads(m.group(1))
          critical = sum(1 for i in data if (i.get('risk_score') or 0) >= 9)
          latest = max((i.get('timestamp','') for i in data), default='—')
          print(f'  EMBEDDED_INTEL verified: {len(data)} items | CRITICAL:{critical} | Latest:{latest[:19]}')
          "

      - name: Commit and Push
        continue-on-error: true
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          git add index.html
          git add data/stix/feed_manifest.json 2>/dev/null || true
          git add data/enrichment/*.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit — dashboard already current"
          else
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "v64.5 Dashboard Sync: EMBEDDED_INTEL updated @ $TIMESTAMP [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push origin main && break
              echo "Retry $i failed, retrying..."
              sleep 3
            done
          fi

      - name: Deploy to gh-pages
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          single-commit: false
          git-config-name: CDB-Sentinel-Bot
          git-config-email: bivash@cyberdudebivash.com
          commit-message: "v64.5 Dashboard sync deploy"
