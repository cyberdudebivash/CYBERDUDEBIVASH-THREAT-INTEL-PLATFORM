  #   types: [completed]
  # schedule:                 â† DISABLED: caused --force-rebuild manifest destruction
  #   - cron: '20 */4 * * *'
  workflow_dispatch:          # â† MANUAL EMERGENCY USE ONLY
    inputs:
      force_patch:
        description: 'Force EMBEDDED_INTEL patch (EMERGENCY USE ONLY â€” reads current git state)'
        type: boolean
        default: false

permissions:
  contents: write

env:
