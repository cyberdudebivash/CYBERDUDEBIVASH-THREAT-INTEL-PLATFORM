concurrency:
  # â›” CHANGED: was sentinel-data-writer (caused race with sentinel-blogger)
  # Now uses isolated group â€” if manually triggered, won't conflict with main pipeline
  group: sync-dashboard-manual
  cancel-in-progress: false

jobs:
  sync-dashboard:
    name: "â›” DISABLED â€” Emergency Manual EMBEDDED_INTEL Patch"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # â›” GATE: Only run on explicit manual dispatch with force_patch=true
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.force_patch == 'true'

    steps:
      - name: "âš ï¸ Safety Warning"
        run: |
          echo "âš ï¸  EMERGENCY MANUAL SYNC â€” sync-dashboard is DISABLED in v116.2.0"
          echo "    sentinel-blogger handles all dashboard sync automatically."
          echo "    This manual run will ONLY patch EMBEDDED_INTEL from current git state."
          echo "    It will NOT run --force-rebuild (manifest destruction risk)."
          echo "    It will NOT commit data/stix/feed_manifest.json."

      - name: "Checkout Repository"
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      - name: "Set up Python 3.12"
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: "Patch EMBEDDED_INTEL (emergency â€” NO --force-rebuild)"
        run: |
          echo "=== Emergency EMBEDDED_INTEL patch from current data/stix/feed_manifest.json ==="
          python3 -c "
          import json
          d = json.load(open('data/stix/feed_manifest.json'))
          items = d.get('advisories', d if isinstance(d, list) else [])
          print(f'Manifest: {len(items)} entries â€” proceeding with patch')
          "
          python3 scripts/update_embedded_intel.py && echo "âœ… Emergency EMBEDDED_INTEL patch OK" || {
            echo "âŒ EMBEDDED_INTEL patch FAILED"
            exit 1
          }

      - name: "Safe Commit & Push (index.html ONLY)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "dashboard@cyberdudebivash.com"
          git config --local user.name  "CDB-Dashboard-Emergency-Bot"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git rebase --abort 2>/dev/null || true
          git merge  --abort  2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # â›” STRICTLY index.html ONLY â€” do NOT commit feed_manifest.json
          git add index.html 2>/dev/null || true
          # â›” BLOCKED: git add -f data/stix/feed_manifest.json â† manifest destruction risk

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "âš ï¸ Emergency Dashboard Sync v116.2 â€” EMBEDDED_INTEL patch @ $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"

          for i in 1 2 3 4; do
            git fetch origin main --quiet
            git rebase origin/main --quiet 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit --quiet || true
            }
            git push origin main && { echo "Push OK (attempt $i/4)"; break; }
            sleep $((i * 15))
            [ $i -eq 4 ] && echo "Push deferred."
          done

