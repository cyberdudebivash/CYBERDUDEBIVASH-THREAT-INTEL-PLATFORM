# =============================================================================
# CYBERDUDEBIVASH® SENTINEL APEX v131.0.0 — Worker Auto-Deploy
# =============================================================================
# Deploys the Cloudflare Worker whenever src/** or wrangler.toml changes.
# Secrets required: CF_API_TOKEN, CF_ACCOUNT_ID
# Runtime secret (set once via wrangler CLI): CDB_JWT_SECRET
#
# JWT SECRET POLICY:
#   • CDB_JWT_SECRET is a Cloudflare Worker runtime secret (not a GH Actions secret)
#   • Set it ONCE via: npx wrangler secret put CDB_JWT_SECRET
#   • Generate value: openssl rand -hex 32
#   • This workflow validates it is configured AFTER deployment
#   • NEVER hardcode or fallback-generate the secret — it must be explicit
#
# STABILITY GUARANTEES (v131.0.0):
#   • JS syntax validated BEFORE any deploy attempt (node --check)
#   • Wrangler v3 (proven stable — v4 has breaking TOML/env changes)
#   • Deploy retried once on transient failure
#   • Health check is informational-only (never blocks deploy success)
#   • Version header verified post-deploy
# =============================================================================

name: deploy-worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/intel-gateway/src/**'
      - 'workers/intel-gateway/wrangler.toml'
      - 'workers/intel-gateway/package.json'
      - 'config/version.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WORKER_DIR: workers/intel-gateway
  PLATFORM_VERSION: "131.0.0"

concurrency:
  group: worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📦 Checkout repository"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: "🔧 Install Wrangler (stable)"
        run: |
          # Use wrangler@3 — proven stable for this platform (run #20 confirmed install OK).
          # wrangler@4 introduced breaking changes in TOML parsing and --env flag handling.
          npm install -g wrangler@3
          wrangler --version
          echo "Wrangler installation: OK"

      - name: "🔍 Pre-flight: Validate Worker source"
        run: |
          echo "=== SENTINEL APEX v${PLATFORM_VERSION} — WORKER PRE-FLIGHT ==="
          echo ""
          echo "--- Source files ---"
          ls -la ${WORKER_DIR}/src/
          echo ""
          echo "--- wrangler.toml ---"
          cat ${WORKER_DIR}/wrangler.toml
          echo ""

          echo "--- Null-byte check ---"
          python3 -c "
          data = open('${WORKER_DIR}/src/index.js','rb').read()
          nulls = data.count(b'\x00')
          print(f'Null bytes: {nulls}')
          assert nulls == 0, 'FATAL: null bytes in Worker source!'
          print('OK: Worker source is clean')
          "

          echo "--- Security check: no hardcoded secrets ---"
          python3 -c "
          import re, sys
          src = open('${WORKER_DIR}/src/index.js').read()
          bad_patterns = [
              r'CDB_JWT_SECRET.*\|\|.*[\"\']{1}[a-zA-Z0-9]{8,}',
              r'generateSecret\(\)',
              r'Math\.random.*secret',
          ]
          found = [p for p in bad_patterns if re.search(p, src)]
          if found:
              print('FATAL: Hardcoded/ephemeral JWT secret patterns found:', found)
              sys.exit(1)
          print('OK: No hardcoded JWT secret patterns found')
          "

          echo "--- JavaScript syntax validation ---"
          node --check ${WORKER_DIR}/src/index.js && echo "OK: index.js syntax valid" || {
            echo "FATAL: index.js has syntax errors — aborting deploy"
            exit 1
          }

          echo "--- Version lock check ---"
          python3 -c "
          import json
          cfg = json.load(open('config/version.json'))
          v = cfg.get('version','')
          print(f'config/version.json version: {v}')
          assert v == '${PLATFORM_VERSION}', f'Version mismatch: expected ${PLATFORM_VERSION} got {v}'
          print('OK: Version lock confirmed')
          "

          echo "=== PRE-FLIGHT PASSED ==="

      - name: "🚀 Deploy Worker to Cloudflare (with retry)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "=== Deploying SENTINEL APEX Worker v${PLATFORM_VERSION} ==="
          cd ${WORKER_DIR}

          # Attempt 1: deploy with --env production
          echo "Deploy attempt 1/2 (--env production)..."
          if wrangler deploy --env production 2>&1; then
            echo "Deploy successful (production env)"
            exit 0
          fi

          echo "Production env deploy failed — retrying without env flag..."
          sleep 5

          # Attempt 2: deploy without env (fallback)
          if wrangler deploy 2>&1; then
            echo "Deploy successful (default env)"
            exit 0
          fi

          echo "FATAL: Both deploy attempts failed"
          exit 1

      - name: "✅ Post-deploy validation (informational)"
        continue-on-error: true
        run: |
          echo "=== Post-deploy health check ==="
          echo "Waiting 15s for global propagation..."
          sleep 15

          HEALTH=$(curl -sf --max-time 10 "https://intel.cyberdudebivash.com/api/health" 2>/dev/null || echo '{}')
          echo "Health response: ${HEALTH}"

          python3 -c "
          import json, sys
          try:
              d = json.loads('''${HEALTH}''')
          except Exception:
              print('NOTE: Could not parse health response — worker may still be propagating')
              sys.exit(0)

          gateway = d.get('gateway', 'unknown')
          print(f'Gateway: {gateway}')

          checks = d.get('checks', {})
          jwt_ok = checks.get('jwt_configured', None)
          print(f'jwt_configured: {jwt_ok}')

          # Version check
          gw_ver = d.get('version', d.get('gateway_version', 'unknown'))
          print(f'Reported version: {gw_ver}')

          if jwt_ok is False:
              print('')
              print('WARNING: CDB_JWT_SECRET may not be configured in the Cloudflare Worker.')
              print('Auth endpoints will return 503 if missing.')
              print('Fix: openssl rand -hex 32 | npx wrangler secret put CDB_JWT_SECRET')
          elif jwt_ok is True:
              print('OK: CDB_JWT_SECRET is configured')
          else:
              print('NOTE: jwt_configured status unknown (health endpoint may be outdated)')

          # This step is informational — never fail the workflow based on health check
          print('')
          print('Post-deploy validation complete (informational)')
          " 2>&1 || echo "Health check skipped — worker still propagating"

          # Verify version header
          VERSION_HEADER=$(curl -sI --max-time 10 "https://intel.cyberdudebivash.com/api/health" 2>/dev/null | grep -i "x-sentinel-version" || echo "header-not-yet-visible")
          echo "X-SENTINEL-Version header: ${VERSION_HEADER}"

          PREVIEW=$(curl -s --max-time 10 "https://intel.cyberdudebivash.com/api/preview" 2>/dev/null | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              print('preview items:', d.get('preview',{}).get('total_in_feed',0))
          except:
              print('preview: still propagating')
          " 2>/dev/null || echo "preview: not yet available")
          echo "Preview endpoint: ${PREVIEW}"

          echo ""
          echo "=== SENTINEL APEX v${PLATFORM_VERSION} DEPLOYMENT COMPLETE ==="
