# =============================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Worker Auto-Deploy
# Deploys the Cloudflare Worker whenever src/index.js or wrangler.toml changes.
# Secrets required: CF_API_TOKEN, CF_ACCOUNT_ID
# =============================================================================

name: deploy-worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/intel-gateway/src/**'
      - 'workers/intel-gateway/wrangler.toml'
      - 'workers/intel-gateway/package.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: worker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "🔧 Checkout repository"
        uses: actions/checkout@v4.2.2

      - name: "📦 Setup Node.js"
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22'

      - name: "⚙️ Install wrangler"
        run: npm install -g wrangler@3

      - name: "✅ Verify Worker source"
        run: |
          echo "Worker source files:"
          ls -la workers/intel-gateway/src/
          echo "wrangler.toml:"
          cat workers/intel-gateway/wrangler.toml
          echo "YAML null-byte check:"
          python3 -c "
          data = open('workers/intel-gateway/src/index.js','rb').read()
          nulls = data.count(b'\x00')
          print(f'Null bytes: {nulls}')
          assert nulls == 0, 'FATAL: null bytes in Worker source!'
          print('OK: Worker source is clean')
          "

      - name: "🚀 Deploy Worker to Cloudflare"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd workers/intel-gateway
          wrangler deploy --env production 2>&1 || wrangler deploy

      - name: "🔍 Validate live deployment + JWT secret"
        run: |
          echo "Waiting 10s for propagation..."
          sleep 10
          HEALTH=$(curl -s "https://intel.cyberdudebivash.com/api/health" 2>/dev/null || echo '{}')
          GATEWAY=$(echo "$HEALTH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('gateway','unknown'))" 2>/dev/null || echo "error")
          echo "Live gateway: $GATEWAY"
          PREVIEW=$(curl -s "https://intel.cyberdudebivash.com/api/preview" 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print('items:', d.get('preview',{}).get('total_in_feed',0))" 2>/dev/null || echo "error")
          echo "Preview endpoint: $PREVIEW"

          # v123.1: Validate CDB_JWT_SECRET is configured in Cloudflare Worker
          # The secret must be set via: npx wrangler secret put CDB_JWT_SECRET
          # /api/health returns {"checks":{"jwt_configured":true}} when the secret is present
          JWT_OK=$(echo "$HEALTH" | python3 -c "
          import json,sys
          d = json.load(sys.stdin)
          checks = d.get('checks', {})
          jwt_ok = checks.get('jwt_configured', False)
          print('jwt_configured:', jwt_ok)
          if not jwt_ok:
              print('WARNING: CDB_JWT_SECRET not configured in Cloudflare Worker secrets.')
              print('Fix: npx wrangler secret put CDB_JWT_SECRET')
              print('     openssl rand -hex 32  (to generate a secure value)')
              # Exit 1 only on explicit False (not missing checks key — old gateway)
              if jwt_ok is False:
                  sys.exit(1)
          " 2>/dev/null || echo "jwt_check_skipped")
          echo "$JWT_OK"
