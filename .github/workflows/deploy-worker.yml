# =============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX v142.3.1  -  Worker Auto-Deploy
# =============================================================================
# Deploys the Cloudflare Worker whenever src/** or wrangler.toml changes.
# Secrets required: CF_API_TOKEN, CF_ACCOUNT_ID
# Runtime secret (set once via wrangler CLI): CDB_JWT_SECRET
#
# JWT SECRET POLICY:
#   * CDB_JWT_SECRET is a Cloudflare Worker runtime secret (not a GH Actions secret)
#   * Set it ONCE via: npx wrangler secret put CDB_JWT_SECRET
#   * Generate value: openssl rand -hex 32
#   * This workflow validates it is configured AFTER deployment
#   * NEVER hardcode or fallback-generate the secret  -  it must be explicit
#
# STABILITY GUARANTEES (v142.3.1):
#   * PLATFORM_VERSION is auto-injected from config/version.json (SSOT)
#   * All 5 Worker JS files checked for null bytes + non-ASCII BEFORE deploy
#   * All 5 Worker JS files syntax-validated via node --check BEFORE deploy
#   * esbuild bundle pre-flight (HARD GATE) catches duplicate keys + bundler errors
#   * Wrangler v3 (proven stable  -  v4 has breaking TOML/env changes)
#   * Deploy retried once on transient failure
#   * Health check is informational-only (never blocks deploy success)
#
# HARDENING (v149.0 - ENTERPRISE GRADE):
#   * CI BOT GUARD: job-level if: condition blocks github-actions[bot] push
#     triggers. sentinel-blogger commits config/version.json with [skip ci]
#     but this guard adds defense-in-depth so bot pushes NEVER redeploy Worker.
#   * cancel-in-progress: true -- Worker deploys are idempotent. If two deploys
#     queue simultaneously (e.g. manual dispatch + push), cancel the older one.
#     The latest source is always what we want in production.
# =============================================================================

name: deploy-worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/intel-gateway/src/**'
      - 'workers/intel-gateway/wrangler.toml'
      - 'workers/intel-gateway/package.json'
      - 'config/version.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WORKER_DIR: workers/intel-gateway
  # v148.1.0 FIX: updated from stale 147.0.0. Note: this default is overridden
  # at runtime by the "Inject version from config/version.json" step (SSOT).
  PLATFORM_VERSION: "148.0.0"

concurrency:
  group: worker-deploy
  # cancel-in-progress: true -- Worker deploys are fully idempotent.
  # If a newer deploy queues while one is running, cancel the stale one.
  # This prevents deploying an older Worker build when a newer commit lands.
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # CI BOT GUARD (v149.0 HARDENING):
    # Block deploy when triggered by github-actions[bot] push events.
    # Data pipelines (sentinel-blogger etc.) commit config/version.json with
    # [skip ci] -- but this guard is defense-in-depth so no bot commit can
    # ever accidentally trigger a Worker redeploy.
    # workflow_dispatch is always allowed (manual operator override).
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.actor != 'github-actions[bot]')

    steps:
      - name: " Checkout repository"
        uses: actions/checkout@v4

      - name: " Setup Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: " Inject version from config/version.json (SSOT)"
        run: |
          python3 -c "
          import json, sys
          try:
              with open('config/version.json', encoding='utf-8-sig') as f:
                  cfg = json.load(f)
          except Exception as e:
              print(f'FATAL: Cannot read config/version.json: {e}')
              sys.exit(1)
          v = cfg.get('version', '').strip()
          if not v:
              print('FATAL: config/version.json missing \"version\" key')
              sys.exit(1)
          print(f'config/version.json => PLATFORM_VERSION={v}')
          with open('$GITHUB_ENV', 'a') as env_file:
              env_file.write(f'PLATFORM_VERSION={v}\n')
          print(f'PLATFORM_VERSION injected into GITHUB_ENV: {v}')
          "

      # a'a'a' v143.1 DATA INTEGRITY HARD-FAIL GATES a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'
      # Worker serves live data a' block deploy if underlying data is corrupt.
      - name: "Setup Python for data integrity gates"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "GATE 1/4 a' Encoding Validator (HARD FAIL on mojibake)"
        run: python3 scripts/encoding_validator.py

      - name: "GATE 2/4 a' Output Validation Gate (HARD FAIL on schema violations)"
        run: python3 scripts/output_validation_gate.py

      - name: "GATE 3/4 a' API Dashboard Contract Validator (HARD FAIL on mismatch)"
        run: python3 scripts/api_dashboard_contract_validator.py

      - name: "GATE 4/4 a' Regression Immunity System (HARD FAIL on regression)"
        run: python3 scripts/regression_immunity.py
      # a'a'a' END DATA INTEGRITY GATES a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'a'

      - name: " Sanitize encoding (strip BOM + normalize CRLF)"
        run: |
          python3 scripts/sanitize_encoding.py --fix
          echo "Encoding sanitization: OK"

      - name: " Worker JS ASCII enforcement (P0 permanent fix v153.1)"
        # ROOT CAUSE FIX (commit-144fc10 regression):
        # sanitize_encoding.py only handled BOM/CRLF/null, NOT Unicode chars.
        # sanitize_encoding.py now includes Worker ASCII enforcement AND this
        # dedicated step runs worker_js_integrity_gate.py as a hard-fail verify.
        run: |
          python3 scripts/worker_js_integrity_gate.py

      - name: " Install Wrangler (stable)"
        run: |
          npm install -g wrangler@3
          wrangler --version
          echo "Wrangler installation: OK"

      - name: " Pre-flight: Validate Worker source"
        run: |
          echo "=== SENTINEL APEX v${PLATFORM_VERSION}  -  WORKER PRE-FLIGHT ==="
          echo ""
          echo "--- Source files ---"
          ls -la ${WORKER_DIR}/src/
          echo ""
          echo "--- wrangler.toml ---"
          cat ${WORKER_DIR}/wrangler.toml
          echo ""

          echo "--- Null-byte + non-ASCII check (all Worker JS files) ---"
          python3 -c "
          import sys, pathlib
          src_dir = pathlib.Path('${WORKER_DIR}/src')
          js_files = sorted(src_dir.glob('*.js'))
          if not js_files:
              print('FATAL: No .js files found in', src_dir)
              sys.exit(1)
          failed = []
          for f in js_files:
              data = f.read_bytes()
              nulls = data.count(b'\x00')
              non_ascii = sum(1 for b in data if b > 127)
              status = 'OK' if nulls == 0 and non_ascii == 0 else 'FAIL'
              print(f'  {status}: {f.name}  null={nulls}  non-ascii={non_ascii}')
              if nulls > 0 or non_ascii > 0:
                  failed.append(f.name)
          if failed:
              print('FATAL: Dirty Worker source files:', failed)
              print('Run: python3 scripts/sanitize_encoding.py --fix')
              print('     python3 scripts/worker_js_integrity_gate.py')
              sys.exit(1)
          print(f'OK: All {len(js_files)} Worker JS files are clean')
          "

          echo "--- Security check: no hardcoded secrets ---"
          python3 -c "
          import re, sys
          src = open('${WORKER_DIR}/src/index.js', encoding='utf-8-sig').read()
          bad_patterns = [
              r'CDB_JWT_SECRET.*\|\|.*[\"\']{1}[a-zA-Z0-9]{8,}',
              r'generateSecret\(\)',
              r'Math\.random.*secret',
          ]
          found = [p for p in bad_patterns if re.search(p, src)]
          if found:
              print('FATAL: Hardcoded/ephemeral JWT secret patterns found:', found)
              sys.exit(1)
          print('OK: No hardcoded JWT secret patterns found')
          "

          echo "--- JavaScript syntax validation (all Worker JS files) ---"
          SYNTAX_FAILED=0
          for jsfile in ${WORKER_DIR}/src/*.js; do
            fname=$(basename "$jsfile")
            node --check "$jsfile" 2>&1 && echo "  OK: $fname syntax valid" || {
              echo "  FATAL: $fname has syntax errors"
              SYNTAX_FAILED=1
            }
          done
          if [ "$SYNTAX_FAILED" -ne 0 ]; then
            echo "FATAL: JS syntax errors found -- aborting deploy"
            exit 1
          fi
          echo "OK: All Worker JS files passed syntax check"

          echo "--- Version lock check ---"
          python3 -c "
          import json, sys, os
          try:
              with open('config/version.json', encoding='utf-8-sig') as f:
                  cfg = json.load(f)
          except json.JSONDecodeError as e:
              print(f'FATAL: version.json parse error: {e}')
              sys.exit(1)
          v = cfg.get('version', '')
          if not v:
              print('FATAL: version.json missing version key')
              sys.exit(1)
          expected = os.environ.get('PLATFORM_VERSION', '')
          print(f'config/version.json version : {v}')
          print(f'PLATFORM_VERSION (injected)  : {expected}')
          if v != expected:
              print(f'FATAL: Version mismatch: PLATFORM_VERSION={expected} but config/version.json={v}')
              sys.exit(1)
          print('OK: Version lock confirmed -- ' + v)
          "

          echo "=== PRE-FLIGHT PASSED ==="

      - name: " esbuild bundle pre-flight (HARD GATE)"
        run: |
          echo "=== esbuild bundle pre-flight -- HARD GATE ==="
          echo "Catches: duplicate keys, bad imports, bundling errors."
          echo "Deploy is BLOCKED unless esbuild exits 0."
          echo ""
          cd ${WORKER_DIR}
          npm install --save-dev esbuild@latest 2>&1 | tail -3

          echo "--- Bundle attempt ---"
          npx esbuild src/index.js \
            --bundle \
            --platform=browser \
            --target=es2022 \
            --format=esm \
            --outfile=/tmp/worker_bundle_preflight.js \
            --log-level=warning 2>&1

          ESBUILD_EXIT=$?
          if [ "$ESBUILD_EXIT" -ne 0 ]; then
            echo ""
            echo "FATAL: esbuild bundle failed (exit $ESBUILD_EXIT) -- deploy blocked."
            exit 1
          fi

          BUNDLE_SIZE=$(wc -c < /tmp/worker_bundle_preflight.js)
          BUNDLE_LINES=$(wc -l < /tmp/worker_bundle_preflight.js)
          echo "Bundle size: ${BUNDLE_SIZE} bytes, ${BUNDLE_LINES} lines"

          if [ "$BUNDLE_SIZE" -lt 10000 ]; then
            echo "FATAL: Bundle suspiciously small (${BUNDLE_SIZE} bytes) -- possible truncation"
            exit 1
          fi

          python3 -c "
          with open('/tmp/worker_bundle_preflight.js', 'rb') as f:
              data = f.read()
          last_line = data.rstrip(b'\n').rsplit(b'\n', 1)[-1].decode('ascii', errors='replace').strip()
          print(f'Bundle last line: {repr(last_line[:80])}')
          valid_endings = ('}', '};', '})', '});', '//', '/*', '*/')
          ok = any(last_line.startswith(t) or last_line.endswith(t) for t in valid_endings)
          print('Bundle tail:', 'VALID' if ok else 'WARNING -- review manually')
          "

          rm -f /tmp/worker_bundle_preflight.js
          echo ""
          echo "=== esbuild pre-flight PASSED -- deploy unblocked ==="

      - name: " Deploy Worker to Cloudflare (with retry)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "=== Deploying SENTINEL APEX Worker v${PLATFORM_VERSION} ==="
          cd ${WORKER_DIR}

          echo "Deploy attempt 1/2 (--env production)..."
          if wrangler deploy --env production 2>&1; then
            echo "Deploy successful (production env)"
            exit 0
          fi

          echo "Production env deploy failed  -  retrying without env flag..."
          sleep 5

          if wrangler deploy 2>&1; then
            echo "Deploy successful (default env)"
            exit 0
          fi

          echo "FATAL: Both deploy attempts failed"
          exit 1

      - name: "[OK] Post-deploy smoke test (version assertion)"
        continue-on-error: true
        run: |
          echo "=== SENTINEL APEX Post-Deploy Smoke Test ==="
          echo "Waiting 20s for global Cloudflare propagation..."
          sleep 20

          HEALTH=$(curl -sf --max-time 15 "https://intel.cyberdudebivash.com/api/health" 2>/dev/null || echo '{}')
          echo "Health response: ${HEALTH}"

          python3 -c "
          import json, sys, os
          expected = os.environ.get('PLATFORM_VERSION', '').strip()
          raw = '''${HEALTH}'''
          try:
              d = json.loads(raw)
          except Exception:
              print('NOTE: Could not parse health response -- worker still propagating')
              sys.exit(0)
          gateway = d.get('gateway', 'unknown')
          print(f'Gateway     : {gateway}')
          checks  = d.get('checks', {})
          jwt_ok  = checks.get('jwt_configured', None)
          gw_ver  = d.get('version', d.get('gateway_version', 'unknown'))
          print(f'Live version: {gw_ver}')
          print(f'Expected    : {expected}')

          # Version assertion
          if gw_ver and expected and gw_ver == expected:
              print(f'OK: Version match confirmed -- {gw_ver}')
          elif gw_ver == 'unknown':
              print('NOTE: Version not yet visible -- Cloudflare edge still propagating')
          else:
              print(f'WARNING: Version mismatch -- live={gw_ver}, expected={expected}')
              print('This may resolve within 30-60s as Cloudflare propagates globally.')

          # JWT check
          if jwt_ok is False:
              print('')
              print('ACTION REQUIRED: CDB_JWT_SECRET is not configured.')
              print('Fix: openssl rand -hex 32 | npx wrangler secret put CDB_JWT_SECRET')
          elif jwt_ok is True:
              print('OK: CDB_JWT_SECRET is configured')
          else:
              print('NOTE: jwt_configured status unknown (health endpoint may be at different version)')
          " 2>&1 || echo "Smoke test skipped -- worker still propagating"

          echo ""
          echo "--- Security header check ---"
          HEADERS=$(curl -sI --max-time 15 "https://intel.cyberdudebivash.com/api/health" 2>/dev/null)
          echo "$HEADERS" | grep -i "x-sentinel-version\|strict-transport\|content-security\|x-frame" || echo "Security headers: not yet visible"

          echo ""
          echo "--- Preview endpoint check ---"
          curl -s --max-time 10 "https://intel.cyberdudebivash.com/api/preview" 2>/dev/null | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              total = d.get('preview',{}).get('total_in_feed',0)
              items = len(d.get('preview',{}).get('items', []))
              print(f'Preview: total_in_feed={total}, preview_items={items}')
          except:
              print('Preview: still propagating or parsing error')
          " 2>/dev/null || echo "Preview endpoint: not yet available"

          echo ""
          echo "=== SENTINEL APEX v${PLATFORM_VERSION} DEPLOYMENT COMPLETE ==="
