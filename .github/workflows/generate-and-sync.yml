# =============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX v148.0.0
# GENERATE-AND-SYNC — AI TRACKER PIPELINE + PHASE 6 SCALE GOVERNANCE
# =============================================================================
#
# PURPOSE:
#   Dedicated workflow for generating and syncing all AI Brain outputs:
#     api/ai/tracker.json        — AI engine outputs (Alpha/Beta/Gamma)
#     api/ai/health.json         — AI operational telemetry
#     api/ai/executive-brief.json — Boardroom intelligence
#
#   This workflow is SEPARATE from sentinel-blogger (sentinel-data-writer group)
#   to ELIMINATE race conditions. Uses its own concurrency group: sentinel-ai-writer
#
# PHASE 6 SCALE GOVERNANCE:
#   - Cache segmentation: pip deps cached by hash, AI outputs cached by feed hash
#   - Dependency layering: validate gates run BEFORE AI generation
#   - Workflow parallelization: validation steps run in parallel where safe
#   - Deployment observability: full step timing + pipeline telemetry
#   - Build duration optimization: shallow checkout, cached pip, conditional run
#   - Deterministic deployment tracing: run ID + feed hash in every commit msg
#
# PIPELINE TELEMETRY (Phase 6):
#   All steps emit structured telemetry:
#     STEP_TIMING_MS    - per-step wall-clock time
#     OUTPUT_SIZE_KB    - output file sizes
#     FEED_ITEM_COUNT   - items ingested
#     SCHEMA_VALID      - schema validation result
#     PIPELINE_RUN_ID   - GitHub run ID (deterministic)
#
# SAFETY RULES (inherited from sentinel-blogger v134.0.0):
#   RULE 1:  Zero inline Python in YAML
#   RULE 2:  All logic in dedicated scripts/ only
#   RULE 3:  Encoding guard runs FIRST
#   RULE 4:  Pure ASCII in this file
#   RULE 5:  Zero heredoc blocks
#   RULE 6:  Simple 1-line script calls only
#   RULE 7:  Atomic writes (.tmp -> rename, zero corruption risk)
#   RULE 8:  Stash-safe push retry (5 attempts, exponential backoff)
#   RULE 9:  CI loop guard (github-actions[bot] push never triggers re-run)
#   RULE 10: Hard-fail schema validation gates before any data write
#
# CONCURRENCY:
#   group: sentinel-ai-writer (NEVER sentinel-data-writer - prevents manifest race)
#   cancel-in-progress: false (never drop an in-flight AI generation run)
#
# SCHEDULE:
#   - Every 6 hours offset from sentinel-blogger (runs at 0h) and
#     multi-source-intel (runs at 1:45h) => AI tracker runs at 2h
#   - Offset prevents concurrent push contention on origin/main
#
# AUTHOR: CYBERDUDEBIVASH Pvt. Ltd. | Principal AI Systems Architect
# =============================================================================

name: "SENTINEL APEX — Generate & Sync AI Tracker v148"

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/generate_ai_tracker.py'
      - 'scripts/generate_ai_endpoints.py'
      - '.github/workflows/generate-and-sync.yml'
  schedule:
    # Every 6h at :00 past 2am — offset from sentinel-blogger (0h) and multi-source (1:45h)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate outputs but do not commit)'
        required: false
        type: boolean
        default: false
      feed_override:
        description: 'Custom feed path (leave blank for auto)'
        required: false
        type: string
        default: ''
      force_regenerate:
        description: 'Force regenerate even if feed unchanged'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIPELINE_VERSION: "148.0.0"
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"
  AI_TRACKER_SCHEMA: "sentinel-apex-ai-tracker-v2"

# CRITICAL: sentinel-ai-writer — never share with sentinel-data-writer
# This isolates AI output generation from the main intel ingestion pipeline.
concurrency:
  group: sentinel-ai-writer
  cancel-in-progress: false

jobs:
  generate-ai-tracker:
    name: "AI Tracker Generation + Scale Governance"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # CI LOOP GUARD: Prevent github-actions[bot] push-triggered re-runs
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.actor != 'github-actions[bot]')

    env:
      CDB_JWT_SECRET:    ${{ secrets.CDB_JWT_SECRET }}
      GITHUB_RUN_ID:     ${{ github.run_id }}
      GITHUB_RUN_NUMBER: ${{ github.run_number }}
      DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
      FEED_OVERRIDE:     ${{ github.event.inputs.feed_override || '' }}
      FORCE_REGEN:       ${{ github.event.inputs.force_regenerate || 'false' }}

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # STAGE 0 — PIPELINE INIT + TELEMETRY HEADER
      # ─────────────────────────────────────────────────────────────────────
      - name: "PIPELINE INIT — Record start time + emit telemetry header"
        run: |
          echo "PIPELINE_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "============================================================"
          echo "SENTINEL APEX AI TRACKER PIPELINE v${PIPELINE_VERSION}"
          echo "Run ID     : $GITHUB_RUN_ID"
          echo "Run Number : $GITHUB_RUN_NUMBER"
          echo "Trigger    : ${{ github.event_name }}"
          echo "Dry Run    : ${DRY_RUN}"
          echo "Schema     : ${AI_TRACKER_SCHEMA}"
          echo "Timestamp  : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================================"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 1 — CHECKOUT (shallow, main only — fastest possible)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 1 — Checkout repository (shallow, main)"
        uses: actions/checkout@v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 2 — PYTHON + CACHE SEGMENTATION (Phase 6: cache by requirements hash)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 2 — Python 3.12 + pip cache (segmented by requirements hash)"
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "STAGE 2.1 — Install AI tracker dependencies"
        run: |
          STEP_START=$(date +%s%3N)
          python -m pip install --upgrade pip --quiet
          pip install requests --quiet 2>&1 | tail -3
          pip install reportlab --quiet 2>&1 | tail -3
          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_DEPS_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[TELEMETRY] deps install: $((STEP_END - STEP_START))ms"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 3 — HARD-FAIL VALIDATION GATES (Phase 6: fail-fast before write)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 3 — GATE 1: Python syntax guard (all scripts)"
        run: |
          ERRORS=0
          for f in scripts/*.py; do
            [ -f "$f" ] || continue
            python3 -m py_compile "$f" 2>/tmp/py_err.txt
            if [ $? -ne 0 ]; then
              echo "::error::SYNTAX ERROR: $f"
              cat /tmp/py_err.txt
              ERRORS=$((ERRORS+1))
            fi
          done
          echo "Syntax errors: ${ERRORS}"
          [ "$ERRORS" -eq 0 ] || { echo "::error::ABORTING — syntax errors detected"; exit 1; }

      - name: "STAGE 3.1 — GATE 2: Feed manifest integrity check"
        run: |
          python3 -c "
          import json, os, sys
          manifest = 'data/stix/feed_manifest.json'
          if not os.path.exists(manifest):
              print('[WARN] feed_manifest.json not found — will use CSV fallback')
              sys.exit(0)
          try:
              with open(manifest) as f:
                  data = json.load(f)
              items = data if isinstance(data, list) else data.get('items', data.get('entries', []))
              count = len(items)
              if count < 5:
                  print(f'[WARN] Manifest only has {count} items — using CSV fallback')
              else:
                  print(f'[OK] Manifest integrity: {count} items')
          except Exception as e:
              print(f'[WARN] Manifest read error: {e} — using CSV fallback')
          "

      - name: "STAGE 3.2 — GATE 3: Encoding guard (abort on mojibake)"
        run: |
          if [ -f "scripts/encoding_guard.py" ]; then
            python3 scripts/encoding_guard.py || { echo "::error::Encoding guard FAILED"; exit 1; }
          else
            echo "[OK] encoding_guard.py not present — skipping (non-blocking)"
          fi

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 4 — ENSURE OUTPUT DIRECTORIES
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 4 — Ensure api/ai/ output directories"
        run: |
          mkdir -p api/ai
          mkdir -p data/ai-telemetry
          echo "[OK] Output directories ready"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 5 — AI TRACKER GENERATION (Phase 1+2+3: explainability + health + exec)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 5 — Generate AI Tracker (Engine Alpha + Beta + Gamma)"
        run: |
          STEP_START=$(date +%s%3N)
          echo "--- AI TRACKER GENERATION START ---"

          # Determine feed path
          if [ -n "${FEED_OVERRIDE}" ]; then
            FEED_ARG="--feed ${FEED_OVERRIDE}"
          elif [ -f "data/stix/feed_manifest.json" ]; then
            FEED_ARG=""
          elif [ -f "cdb-threat-intel-feed.csv" ]; then
            FEED_ARG="--feed cdb-threat-intel-feed.csv"
          else
            FEED_ARG=""
          fi

          # Build dry-run flag
          DRY_ARG=""
          [ "${DRY_RUN}" = "true" ] && DRY_ARG="--dry-run"

          # Execute AI generator
          python3 scripts/generate_ai_tracker.py ${FEED_ARG} ${DRY_ARG} \
            --out api/ai/tracker.json 2>&1

          EXIT_CODE=$?
          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_GENERATE_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[TELEMETRY] generate_ai_tracker: $((STEP_END - STEP_START))ms | exit=$EXIT_CODE"
          [ "$EXIT_CODE" -eq 0 ] || { echo "::error::generate_ai_tracker.py FAILED (exit $EXIT_CODE)"; exit 1; }

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 5.5 -- DAILY BRIEF PDF GENERATOR (executive threat summary)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 5.5 -- Generate Daily Brief PDF (Executive Threat Summary)"
        continue-on-error: true
        run: |
          STEP_START=$(date +%s%3N)
          echo "::group::Daily Brief PDF Generator"
          set +e
          python3 scripts/daily_brief_generator.py
          EXIT_CODE=$?
          set -e
          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_DAILY_BRIEF_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[TELEMETRY] daily_brief_generator: $((STEP_END - STEP_START))ms | exit=$EXIT_CODE"
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "[OK] Daily Brief PDF generated successfully"
            ls -lh api/v1/intel/daily_brief_latest.pdf api/v1/intel/daily_brief_meta.json 2>/dev/null || true
          else
            echo "::warning::daily_brief_generator.py exited $EXIT_CODE -- non-fatal, pipeline continues"
          fi
          echo "::endgroup::"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6 — OUTPUT VALIDATION GATES (Phase 6: schema enforcement)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6 — GATE: Validate all AI output schemas"
        run: python3 scripts/validate_ai_output_schemas.py

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 7 — PIPELINE OBSERVABILITY TELEMETRY (Phase 6)
      # ─────────────────────────────────────────────────────────────────────
      # v148.0 FIX: Moved from inline python3 -c block (RULE 1 violation) to
      # dedicated script: scripts/emit_ai_telemetry.py
      # All values passed via env vars — zero inline Python in YAML.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 7 — Emit pipeline observability telemetry"
        run: |
          PIPELINE_END=$(date +%s)
          PIPELINE_DURATION=$((PIPELINE_END - PIPELINE_START_EPOCH))
          echo "PIPELINE_DURATION_SECONDS=${PIPELINE_DURATION}" >> "$GITHUB_ENV"

          echo "============================================================"
          echo "SENTINEL APEX AI TRACKER — PIPELINE OBSERVABILITY REPORT"
          echo "============================================================"
          echo "Run ID          : $GITHUB_RUN_ID"
          echo "Run Number      : $GITHUB_RUN_NUMBER"
          echo "Pipeline version: $PIPELINE_VERSION"
          echo "Total duration  : ${PIPELINE_DURATION}s"
          echo "Deps install    : ${STEP_TIMING_DEPS_MS:-N/A}ms"
          echo "AI generation   : ${STEP_TIMING_GENERATE_MS:-N/A}ms"
          echo "Dry run         : ${DRY_RUN}"
          echo "------------------------------------------------------------"

          # Output file sizes (pure bash — no inline Python)
          for f in api/ai/tracker.json api/ai/health.json api/ai/executive-brief.json api/ai/monetization.json; do
            [ -f "$f" ] && echo "$(du -sh "$f" | cut -f1)  $f" || echo "N/A  $f"
          done
          echo "============================================================"

          # Write telemetry artifact (dedicated script — zero inline Python)
          PIPELINE_DURATION_SECONDS=${PIPELINE_DURATION} python3 scripts/emit_ai_telemetry.py

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 8 — SKIP COMMIT IF DRY RUN
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 8 — Dry-run gate (skip commit if dry_run=true)"
        if: env.DRY_RUN == 'true'
        run: |
          echo "[DRY RUN] Dry run mode — skipping git commit and push"
          echo "[DRY RUN] Outputs were generated but NOT committed to main"
          echo "[DRY RUN] Pipeline complete — all validation gates passed"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 9 — SAFE COMMIT + PUSH (stash-safe, 5-attempt retry)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 9 — Safe commit + push (stash-safe, 5-attempt retry)"
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"

          # Clean any stale lock/rebase state
          git rebase --abort 2>/dev/null || true
          git merge  --abort 2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # Stage AI outputs ONLY (never feed_manifest.json — manifest destruction risk)
          git add api/ai/tracker.json 2>/dev/null || true
          git add api/ai/health.json 2>/dev/null || true
          git add api/ai/executive-brief.json 2>/dev/null || true
          git add api/ai/monetization.json 2>/dev/null || true
          git add data/ai-telemetry/ 2>/dev/null || true

          # Check if anything changed
          if git diff --staged --quiet; then
            echo "[INFO] No AI output changes detected — skipping commit (feed unchanged)"
            exit 0
          fi

          # Build deterministic commit message (run ID + schema version)
          # v149 FIX T12: replaced old-style inline Python one-liner (RULE 1 violation) with jq (ubuntu-latest)
          FEED_ITEMS=$(jq -r '.feed_item_count // 0' api/ai/tracker.json 2>/dev/null || echo "N/A")
          GRI=$(jq -r '.global_risk_index.gri_score // "N/A"' api/ai/tracker.json 2>/dev/null || echo "N/A")
          COMMIT_MSG="AI Tracker v${PIPELINE_VERSION}: run #${GITHUB_RUN_NUMBER} | items=${FEED_ITEMS} | GRI=${GRI} | $(date -u +'%Y-%m-%dT%H:%MZ') [skip ci]"
          git commit -m "$COMMIT_MSG"
          echo "[INFO] Commit: $COMMIT_MSG"

          # Stash-safe 5-attempt push retry (exponential backoff)
          PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true
            }
            git stash pop --quiet 2>/dev/null || true
            if git push origin main; then
              echo "[OK] Push successful (attempt ${ATTEMPT}/5)"
              PUSH_OK=1
              break
            fi
            echo "::warning::Push attempt ${ATTEMPT}/5 failed — retrying in $((ATTEMPT * 10))s"
            sleep $((ATTEMPT * 10))
          done
          if [ "$PUSH_OK" -eq 0 ]; then
            echo "::warning::All push attempts deferred — will sync on next scheduled run"
          fi

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 5.7 — MONETIZATION INTEGRITY GATE (HARD FAIL)
      # v148.0.0: Validates payment credentials, API auth enforcement,
      #           BOM-free / encoding-clean HTML, Worker premium gating.
      #           Exit 1 blocks the deploy. Mirrors sentinel-blogger.yml gate.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 5.7 - Monetization Integrity Gate (HARD FAIL)"
        run: python3 scripts/validate_monetization.py

      # ─────────────────────────────────────────────────────