# =============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX v160.0
# GENERATE-AND-SYNC — AI TRACKER PIPELINE + PHASE 6 SCALE GOVERNANCE
# =============================================================================
#
# PURPOSE:
#   Dedicated workflow for generating and syncing all AI Brain outputs:
#     api/ai/tracker.json        — AI engine outputs (Alpha/Beta/Gamma)
#     api/ai/health.json         — AI operational telemetry
#     api/ai/executive-brief.json — Boardroom intelligence
#
#   This workflow is SEPARATE from sentinel-blogger (sentinel-data-writer group)
#   to ELIMINATE race conditions. Uses its own concurrency group: sentinel-ai-writer
#
# PHASE 6 SCALE GOVERNANCE:
#   - Cache segmentation: pip deps cached by hash, AI outputs cached by feed hash
#   - Dependency layering: validate gates run BEFORE AI generation
#   - Workflow parallelization: validation steps run in parallel where safe
#   - Deployment observability: full step timing + pipeline telemetry
#   - Build duration optimization: shallow checkout, cached pip, conditional run
#   - Deterministic deployment tracing: run ID + feed hash in every commit msg
#
# PIPELINE TELEMETRY (Phase 6):
#   All steps emit structured telemetry:
#     STEP_TIMING_MS    - per-step wall-clock time
#     OUTPUT_SIZE_KB    - output file sizes
#     FEED_ITEM_COUNT   - items ingested
#     SCHEMA_VALID      - schema validation result
#     PIPELINE_RUN_ID   - GitHub run ID (deterministic)
#
# SAFETY RULES (inherited from sentinel-blogger v134.0.0):
#   RULE 1:  Zero inline Python in YAML
#   RULE 2:  All logic in dedicated scripts/ only
#   RULE 3:  Encoding guard runs FIRST
#   RULE 4:  Pure ASCII in this file
#   RULE 5:  Zero heredoc blocks
#   RULE 6:  Simple 1-line script calls only
#   RULE 7:  Atomic writes (.tmp -> rename, zero corruption risk)
#   RULE 8:  Stash-safe push retry (5 attempts, exponential backoff)
#   RULE 9:  CI loop guard (github-actions[bot] push never triggers re-run)
#   RULE 10: Hard-fail schema validation gates before any data write
#
# CONCURRENCY:
#   group: sentinel-ai-writer (NEVER sentinel-data-writer - prevents manifest race)
#   cancel-in-progress: false (never drop an in-flight AI generation run)
#
# SCHEDULE:
#   - Every 6 hours offset from sentinel-blogger (runs at 0h) and
#     multi-source-intel (runs at 1:45h) => AI tracker runs at 2h
#   - Offset prevents concurrent push contention on origin/main
#
# AUTHOR: CYBERDUDEBIVASH Pvt. Ltd. | Principal AI Systems Architect
# =============================================================================

name: "SENTINEL APEX — Generate & Sync AI Tracker v160"

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/generate_ai_tracker.py'
      - 'scripts/generate_ai_endpoints.py'
      - '.github/workflows/generate-and-sync.yml'
  schedule:
    # Every 6h at :00 past 2am — offset from sentinel-blogger (0h) and multi-source (1:45h)
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate outputs but do not commit)'
        required: false
        type: boolean
        default: false
      feed_override:
        description: 'Custom feed path (leave blank for auto)'
        required: false
        type: string
        default: ''
      force_regenerate:
        description: 'Force regenerate even if feed unchanged'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIPELINE_VERSION: "169.0"
  PYTHONIOENCODING: "utf-8"
  PYTHONUTF8: "1"
  AI_TRACKER_SCHEMA: "sentinel-apex-ai-tracker-v2"

# CRITICAL: sentinel-ai-writer — never share with sentinel-data-writer
# This isolates AI output generation from the main intel ingestion pipeline.
concurrency:
  group: sentinel-ai-writer
  cancel-in-progress: false

jobs:
  generate-ai-tracker:
    name: "AI Tracker Generation + Scale Governance"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # CI LOOP GUARD: Prevent github-actions[bot] push-triggered re-runs
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.actor != 'github-actions[bot]')

    env:
      CDB_JWT_SECRET:    ${{ secrets.CDB_JWT_SECRET }}
      GITHUB_RUN_ID:     ${{ github.run_id }}
      GITHUB_RUN_NUMBER: ${{ github.run_number }}
      DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
      FEED_OVERRIDE:     ${{ github.event.inputs.feed_override || '' }}
      FORCE_REGEN:       ${{ github.event.inputs.force_regenerate || 'false' }}

    steps:
      # ─────────────────────────────────────────────────────────────────────
      # STAGE 0 — PIPELINE INIT + TELEMETRY HEADER
      # ─────────────────────────────────────────────────────────────────────
      - name: "PIPELINE INIT — Record start time + emit telemetry header"
        run: |
          echo "PIPELINE_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "============================================================"
          echo "SENTINEL APEX AI TRACKER PIPELINE v${PIPELINE_VERSION}"
          echo "Run ID     : $GITHUB_RUN_ID"
          echo "Run Number : $GITHUB_RUN_NUMBER"
          echo "Trigger    : ${{ github.event_name }}"
          echo "Dry Run    : ${DRY_RUN}"
          echo "Schema     : ${AI_TRACKER_SCHEMA}"
          echo "Timestamp  : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "============================================================"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 1 — CHECKOUT (shallow, main only — fastest possible)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 1 — Checkout repository (shallow, main)"
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 2 — PYTHON + CACHE SEGMENTATION (Phase 6: cache by requirements hash)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 2 — Python 3.12 + pip cache (segmented by requirements hash)"
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "STAGE 2.1 — Install AI tracker dependencies"
        run: |
          STEP_START=$(date +%s%3N)
          python -m pip install --upgrade pip --quiet
          pip install requests --quiet 2>&1 | tail -3
          pip install reportlab --quiet 2>&1 | tail -3
          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_DEPS_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[TELEMETRY] deps install: $((STEP_END - STEP_START))ms"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 3 — HARD-FAIL VALIDATION GATES (Phase 6: fail-fast before write)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 3 — GATE 1: Python syntax guard (all scripts)"
        run: |
          # v152.1 P0 HARDENING: py_compile (syntax) + pyflakes (undefined names / NameErrors)
          # py_compile catches SyntaxError; pyflakes catches NameError, ImportError, unused vars
          python3 -m pip install pyflakes --quiet 2>&1 | tail -1
          ERRORS=0
          for f in scripts/*.py; do
            [ -f "$f" ] || continue
            python3 -m py_compile "$f" 2>/tmp/py_err.txt
            if [ $? -ne 0 ]; then
              echo "::error::SYNTAX ERROR: $f"
              cat /tmp/py_err.txt
              ERRORS=$((ERRORS+1))
            fi
          done
          echo "Checked scripts/*.py — syntax errors: ${ERRORS}"
          [ "$ERRORS" -eq 0 ] || { echo "::error::ABORTING — syntax errors detected"; exit 1; }
          # Static undefined-name analysis (catches NameError before runtime)
          FLAKE_ERRORS=0
          for f in scripts/*.py; do
            [ -f "$f" ] || continue
            python3 -m pyflakes "$f" 2>&1 | grep -E "undefined name|'[^']+' imported but unused|redefinition of" > /tmp/flake_err.txt || true
            if [ -s /tmp/flake_err.txt ]; then
              echo "::warning::PYFLAKES WARNINGS in $f:"
              cat /tmp/flake_err.txt
            fi
          done
          echo "Running pyflakes a' undefined-name check on scripts/generate_intel_reports.py"
          python3 -m pyflakes scripts/generate_intel_reports.py 2>&1 | grep "undefined name" > /tmp/undef_err.txt || true
          if [ -s /tmp/undef_err.txt ]; then
            echo "::error::UNDEFINED NAME(S) detected — would cause NameError at runtime:"
            cat /tmp/undef_err.txt
            exit 1
          fi
          echo "GATE 1: ALL PASS (syntax + undefined-name check)"

      - name: "STAGE 3.1 — GATE 2: Feed manifest integrity check"
        run: |
          # RULE 1: Zero inline Python in YAML -- use jq for manifest integrity check
          if [ ! -f "data/stix/feed_manifest.json" ]; then
            echo "[WARN] feed_manifest.json not found -- will use CSV fallback"
          else
            COUNT=$(jq 'if type == "array" then length else ((.items // .entries // []) | length) end' \
              data/stix/feed_manifest.json 2>/dev/null || echo "0")
            if [ "${COUNT:-0}" -lt 5 ]; then
              echo "[WARN] Manifest only has ${COUNT} items -- using CSV fallback"
            else
              echo "[OK] Manifest integrity: ${COUNT} items"
            fi
          fi

      - name: "STAGE 3.2 — GATE 3: Encoding guard (abort on mojibake)"
        run: |
          if [ -f "scripts/encoding_guard.py" ]; then
            python3 scripts/encoding_guard.py || { echo "::error::Encoding guard FAILED"; exit 1; }
          else
            echo "[OK] encoding_guard.py not present — skipping (non-blocking)"
          fi

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 4 — ENSURE OUTPUT DIRECTORIES
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 4 — Ensure api/ai/ output directories"
        run: |
          mkdir -p api/ai
          mkdir -p data/ai-telemetry
          echo "[OK] Output directories ready"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 4.1 — CISA KEV FEED MARKER (v160.0 — non-blocking)
      # Marks any feed items matching the live CISA KEV catalog as CRITICAL.
      # Runs before AI tracker generation so tracker inherits KEV enrichment.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 4.1 — CISA KEV Feed Marker (v160.0)"
        timeout-minutes: 5
        continue-on-error: true
        run: |
          set +e
          if [ -f "api/feed.json" ]; then
            FEED_PATH="api/feed.json" python3 scripts/kev_feed_marker.py
            KEV_EXIT=$?
            if [ -f "data/health/kev_marker_report.json" ]; then
              KEV_MARKED=$(jq -r '.items_marked // "0"' data/health/kev_marker_report.json 2>/dev/null || echo "0")
              KEV_SIZE=$(jq -r '.kev_catalog_size // "0"' data/health/kev_marker_report.json 2>/dev/null || echo "0")
              echo "[KEV-MARKER] CatalogSize=$KEV_SIZE | NewlyMarked=$KEV_MARKED"
            fi
          else
            echo "[KEV-MARKER] api/feed.json not present — skipping (non-fatal)"
          fi
          set -e
          echo "STAGE 4.1: CISA KEV Feed Marker complete"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 4.2 — INTELLIGENCE QUALITY HARDENER (v160.0 — non-blocking)
      # Fixes actor attribution, clamps invalid scores, improves generic titles,
      # flags synthetic CVEs, adds IOC type hints, derives TLP levels.
      # Runs before AI tracker generation so tracker reflects hardened data.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 4.2 — Intelligence Quality Hardener (v160.0)"
        timeout-minutes: 5
        continue-on-error: true
        run: |
          set +e
          if [ -f "api/feed.json" ]; then
            FEED_PATH="api/feed.json" python3 scripts/intelligence_quality_hardener.py
            IQH_EXIT=$?
            if [ -f "data/health/intelligence_quality_hardener_report.json" ]; then
              IQH_STATUS=$(jq -r '.status // "UNKNOWN"' data/health/intelligence_quality_hardener_report.json 2>/dev/null || echo "UNKNOWN")
              IQH_SYNTHETIC=$(jq -r '.synthetic_cve_flagged // "?"' data/health/intelligence_quality_hardener_report.json 2>/dev/null || echo "?")
              IQH_ACTORS=$(jq -r '.actors_upgraded // "?"' data/health/intelligence_quality_hardener_report.json 2>/dev/null || echo "?")
              echo "[INTEL-QUALITY] Status=$IQH_STATUS | Synthetic=$IQH_SYNTHETIC | Actors=$IQH_ACTORS"
            fi
          else
            echo "[INTEL-QUALITY] api/feed.json not present — skipping (non-fatal)"
          fi
          set -e
          echo "STAGE 4.2: Intelligence Quality Hardener complete"


      # ─────────────────────────────────────────────────────────────────────
      # STAGE 4.3 -- REAL OSINT IOC ENRICHMENT (v161.x P0-001 fix)
      # Extracts real IOCs from AlienVault OTX, URLhaus, MalwareBazaar,
      # Abuse.ch, and ThreatFox per advisory CVE/title. Adds verified
      # ioc_list, ioc_count, ioc_types, ioc_confidence fields to feed.
      # Non-blocking (continue-on-error) -- pipeline continues if keys absent.
      # RULE 1: Zero inline Python -- all logic in real_osint_ioc_enricher.py
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 4.3 -- Real OSINT IOC Enrichment (OTX + URLhaus + MalwareBazaar)"
        timeout-minutes: 8
        continue-on-error: true
        env:
          OTX_API_KEY:           ${{ secrets.OTX_API_KEY }}
          URLHAUS_API_KEY:       ${{ secrets.URLHAUS_API_KEY }}
          MALWAREBAZAAR_API_KEY: ${{ secrets.MALWAREBAZAAR_API_KEY }}
          THREATFOX_API_KEY:     ${{ secrets.THREATFOX_API_KEY }}
          FEED_PATH:             "api/feed.json"
          MAX_ADVISORIES:        "50"
        run: |
          set +e
          STEP_START=$(date +%s%3N)
          echo "::group::Real OSINT IOC Enricher (v161.x)"

          if [ ! -f "api/feed.json" ]; then
            echo "[IOC-ENRICH] api/feed.json not present -- skipping (non-fatal)"
            echo "::endgroup::"
            exit 0
          fi

          # Count pre-enrichment IOCs (jq -- RULE 1: zero inline Python)
          PRE_IOC=$(jq '[.[] | (.ioc_count // 0)] | add // 0' api/feed.json 2>/dev/null || echo 0)
          echo "[IOC-ENRICH] Pre-enrichment total IOCs: ${PRE_IOC}"

          python3 scripts/real_osint_ioc_enricher.py
          IOC_EXIT=$?

          # Count post-enrichment IOCs (jq -- RULE 1: zero inline Python)
          POST_IOC=$(jq '[.[] | (.ioc_count // 0)] | add // 0' api/feed.json 2>/dev/null || echo 0)

          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_IOC_ENRICH_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[IOC-ENRICH] Post-enrichment: ${POST_IOC} IOCs | delta: $((POST_IOC - PRE_IOC)) | exit=${IOC_EXIT}"

          if [ "$IOC_EXIT" -eq 0 ]; then
            echo "[IOC-ENRICH] Real OSINT IOC enrichment complete"
          else
            echo "::warning::real_osint_ioc_enricher.py exited ${IOC_EXIT} -- non-fatal, pipeline continues"
            echo "[IOC-ENRICH] Check OTX_API_KEY / URLHAUS_API_KEY secrets in repo settings"
          fi
          echo "::endgroup::"
          set -e
          exit 0

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 3.1.11 — DETECTION ENGINEERING CORE (v162.0)
      # Full 10-stage detection pipeline: validate, suppress FPs, normalize multi-SIEM,
      # generate retro-hunt packs, map telemetry deps, benchmark quality, analyze gaps,
      # and package enterprise deployment bundles.
      # Outputs: api/detections/*.json + data/audit/detection_*.json
      # Non-blocking (continue-on-error) — zero-failure architecture.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 3.1.11 - Detection Engineering Core (v162.0)"
        timeout-minutes: 15
        continue-on-error: true
        env:
          FEED_PATH: "api/feed.json"
        run: |
          set +e
          STEP_START=$(date +%s%3N)
          echo "::group::Detection Engineering Core (v162.0)"
          echo "[DET-ENG] Starting Detection Engineering Core..."
          echo "[DET-ENG] Feed: ${FEED_PATH}"

          python3 scripts/stage_3_1_11_detection_engineering_core.py
          DET_EXIT=$?

          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_DET_ENG_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[DET-ENG] Detection Engineering Core: $((STEP_END - STEP_START))ms | exit=${DET_EXIT}"

          if [ "$DET_EXIT" -ne 0 ]; then
            echo "::warning::Detection Engineering Core exited ${DET_EXIT} -- non-fatal, pipeline continues"
            echo "[DET-ENG] Check scripts/stage_3_1_11_detection_engineering_core.py for errors"
          else
            echo "[DET-ENG] Detection Engineering Core completed successfully"
            DET_COUNT=$(python3 -c "import os,json; d='api/detections'; print(len([f for f in os.listdir(d) if f.endswith('.json') and f != 'detection-index.json']))" 2>/dev/null || echo "N/A")
            echo "[DET-ENG] Detection packs generated: ${DET_COUNT}"
          fi

          echo "::endgroup::"
          set -e
          exit 0

      # ═════════════════════════════════════════════════════════════════════
      # SENTINEL APEX v167.0 — ENTERPRISE CTI TRANSFORMATION STAGES
      # Phases 1-6: Actor Attribution, Campaign Correlation, Malware Intel,
      # Detection Content v2, Knowledge Graph, Executive Brief
      # ═════════════════════════════════════════════════════════════════════

      - name: "STAGE 3.1.18 - Threat Actor Intelligence Engine (v167.0)"
        timeout-minutes: 8
        continue-on-error: true
        run: |
          set +e
          echo "::group::STAGE 3.1.18 — Threat Actor Intelligence Engine v167.0"
          echo "[TAIE] Starting actor attribution for all advisories..."
          python3 scripts/threat_actor_engine.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            ATTR_RATE=$(python3 -c "import json; r=json.load(open('data/health/actor_attribution_report.json')); print(r.get('attribution_rate_pct','?'))" 2>/dev/null || echo "N/A")
            echo "[TAIE] Actor attribution complete | Rate: ${ATTR_RATE}%"
          else
            echo "::warning::TAIE exited ${EXIT_CODE} -- non-fatal, pipeline continues"
          fi
          echo "::endgroup::"
          set -e; exit 0

      - name: "STAGE 3.1.19 - Campaign Intelligence Engine (v167.0)"
        timeout-minutes: 5
        continue-on-error: true
        run: |
          set +e
          echo "::group::STAGE 3.1.19 — Campaign Intelligence Engine v167.0"
          echo "[CIE] Starting campaign correlation for all advisories..."
          python3 scripts/campaign_intelligence_engine.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            CORR_RATE=$(python3 -c "import json; r=json.load(open('data/health/campaign_correlation_report.json')); print(r.get('correlation_rate_pct','?'))" 2>/dev/null || echo "N/A")
            echo "[CIE] Campaign correlation complete | Rate: ${CORR_RATE}%"
          else
            echo "::warning::CIE exited ${EXIT_CODE} -- non-fatal"
          fi
          echo "::endgroup::"
          set -e; exit 0

      - name: "STAGE 3.1.20 - Malware Intelligence Engine (v167.0)"
        timeout-minutes: 5
        continue-on-error: true
        run: |
          set +e
          echo "::group::STAGE 3.1.20 — Malware Intelligence Engine v167.0"
          python3 scripts/malware_intelligence_engine.py
          EXIT_CODE=$?
          [ $EXIT_CODE -ne 0 ] && echo "::warning::MIE exited ${EXIT_CODE} -- non-fatal"
          echo "::endgroup::"
          set -e; exit 0

      - name: "STAGE 3.1.21 - Detection Content Generator v2 (v167.0)"
        timeout-minutes: 10
        continue-on-error: true
        run: |
          set +e
          echo "::group::STAGE 3.1.21 — Detection Content Generator v2 v167.0"
          echo "[DCG-V2] Generating threat-specific Sigma/YARA/KQL/Suricata packs..."
          python3 scripts/detection_content_generator_v2.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            PACK_COUNT=$(find data/detection -name "detection_pack.json" 2>/dev/null | wc -l)
            echo "[DCG-V2] Detection packs generated: ${PACK_COUNT}"
          else
            echo "::warning::DCG-V2 exited ${EXIT_CODE} -- non-fatal"
          fi
          echo "::endgroup::"
          set -e; exit 0

      - name: "STAGE 3.1.22 - Intelligence Knowledge Graph (v167.0)"
        timeout-minutes: 8
        continue-on-error: true
        run: |
          set +e
          echo "::group::STAGE 3.1.22 — Intelligence Knowledge Graph v167.0"
          echo "[KG] Building actor-campaign-malware-IOC knowledge graph..."
          python3 scripts/intelligence_knowledge_graph.py
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            NODE_COUNT=$(python3 -c "import json; g=json.load(open('data/graph/snapshot.json')); print(g['stats']['total_nodes'])" 2>/dev/null || echo "N/A")
            EDGE_COUNT=$(python3 -c "import json; g=json.load(open('data/graph/snapshot.json')); print(g['stats']['total_edges'])" 2>/dev/null || echo "N/A")
            echo "[KG] Graph built: ${NODE_COUNT} nodes, ${EDGE_COUNT} edges"
          else
            echo "::warning::KG exited ${EXIT_CODE} -- non-fatal"
          fi
          echo "::endgroup::"
          set -e; exit 0

      - name: "STAGE 3.2.1 - Executive Intelligence Brief Generator (v167.0)"
        timeout-minutes: 5
        continue-on-error: true
        run: |
          set +e
          echo "::group::STAGE 3.2.1 — Executive Intelligence Brief Generator v167.0"
          python3 scripts/executive_brief_generator.py
          EXIT_CODE=$?
          [ $EXIT_CODE -eq 0 ] && echo "[EBG] Executive brief generated: data/reports/executive-briefs/latest.json"
          [ $EXIT_CODE -ne 0 ] && echo "::warning::EBG exited ${EXIT_CODE} -- non-fatal"
          echo "::endgroup::"
          set -e; exit 0

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 5 — AI TRACKER GENERATION (Phase 1+2+3: explainability + health + exec)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 5 — Generate AI Tracker (Engine Alpha + Beta + Gamma)"
        run: |
          STEP_START=$(date +%s%3N)
          echo "--- AI TRACKER GENERATION START ---"

          # Determine feed path
          if [ -n "${FEED_OVERRIDE}" ]; then
            FEED_ARG="--feed ${FEED_OVERRIDE}"
          elif [ -f "data/stix/feed_manifest.json" ]; then
            FEED_ARG=""
          elif [ -f "cdb-threat-intel-feed.csv" ]; then
            FEED_ARG="--feed cdb-threat-intel-feed.csv"
          else
            FEED_ARG=""
          fi

          # Build dry-run flag
          DRY_ARG=""
          [ "${DRY_RUN}" = "true" ] && DRY_ARG="--dry-run"

          # Execute AI generator
          python3 scripts/generate_ai_tracker.py ${FEED_ARG} ${DRY_ARG} \
            --out api/ai/tracker.json 2>&1

          EXIT_CODE=$?
          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_GENERATE_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[TELEMETRY] generate_ai_tracker: $((STEP_END - STEP_START))ms | exit=$EXIT_CODE"
          [ "$EXIT_CODE" -eq 0 ] || { echo "::error::generate_ai_tracker.py FAILED (exit $EXIT_CODE)"; exit 1; }

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 5.5 -- DAILY BRIEF PDF GENERATOR (executive threat summary)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 5.5 -- Generate Daily Brief PDF (Executive Threat Summary)"
        continue-on-error: true
        run: |
          STEP_START=$(date +%s%3N)
          echo "::group::Daily Brief PDF Generator"
          set +e
          python3 scripts/daily_brief_generator.py
          EXIT_CODE=$?
          set -e
          STEP_END=$(date +%s%3N)
          echo "STEP_TIMING_DAILY_BRIEF_MS=$((STEP_END - STEP_START))" >> "$GITHUB_ENV"
          echo "[TELEMETRY] daily_brief_generator: $((STEP_END - STEP_START))ms | exit=$EXIT_CODE"
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "[OK] Daily Brief PDF generated successfully"
            ls -lh api/v1/intel/daily_brief_latest.pdf api/v1/intel/daily_brief_meta.json 2>/dev/null || true
          else
            echo "::warning::daily_brief_generator.py exited $EXIT_CODE -- non-fatal, pipeline continues"
          fi
          echo "::endgroup::"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6 — OUTPUT VALIDATION GATES (Phase 6: schema enforcement)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6 — GATE: Validate all AI output schemas"
        run: python3 scripts/validate_ai_output_schemas.py

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.5 — AI EXPLAINABILITY ENRICHMENT (P2 governance)
      # ─────────────────────────────────────────────────────────────────────
      # Adds _explainability blocks to every prediction/anomaly/campaign entry:
      #   confidence_score, confidence_band, evidence_sources, attack_mapping,
      #   detection_rationale, timestamp_lineage, false_positive_probability,
      #   ioc_confidence_map, anomaly_evidence_chain, forecast_rationale
      # Runs AFTER ai_brain_publisher (Step 6) and BEFORE r2_upload (Step 9.5)
      # to ensure explainability metadata is included in the R2-served payload.
      # Non-fatal: continues if tracker.json not yet generated (dry-run safe).
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.5 — AI Explainability enrichment (ATT&CK + confidence)"
        run: |
          if [ -f api/ai/tracker.json ]; then
            python3 scripts/ai_explainability_engine.py
            echo "STAGE 6.5: AI Explainability enrichment complete"
          else
            echo "STAGE 6.5: tracker.json not found (dry-run or generation skipped) -- skip"
          fi

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 5.7 — MONETIZATION INTEGRITY GATE (HARD FAIL)
      # v148.0.0: Validates payment credentials, API auth enforcement,
      #           BOM-free / encoding-clean HTML, Worker premium gating.
      #           Exit 1 blocks the deploy. Mirrors sentinel-blogger.yml gate.
      #           POSITION: pre-deploy gate — runs BEFORE commit and R2 upload.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 5.7 - Monetization Integrity Gate (HARD FAIL)"
        run: python3 scripts/validate_monetization.py

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.7 — VERSION GOVERNANCE AUTO-APPLY (drift correction)
      # Mirrors sentinel-blogger.yml pattern (STAGE 3.93.7 + 3.93.8):
      #   --apply first auto-corrects any drift, then --check verifies zero drift.
      # Belt-and-suspenders: ensures sla_status.json, version.json, workers/
      #   and all governed surfaces are aligned BEFORE commit or R2 upload.
      # ROOT CAUSE FIX: prevents sla_status.json version drift from hard-failing
      #   the CI gate (was the cause of run #25776778055 failure: 143.0.0 vs 148.0.0).
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.7 — Version governance auto-apply (drift correction)"
        run: |
          python3 scripts/version_governance.py --apply
          echo "STAGE 6.7: Version governance applied — all targets aligned to $(cat VERSION)"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.8 — VERSION GOVERNANCE CI GATE (P6 governance)
      # Belt-and-suspenders: after --apply, confirms zero drift remains.
      # Verifies version consistency across all platform surfaces before any
      # commit or R2 upload. Rejects deployment if any drift is detected.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.8 — Version governance CI gate (drift detection)"
        run: |
          python3 scripts/version_governance.py --check
          echo "STAGE 6.8: Version governance gate PASSED — no drift detected"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.85 — MANIFEST INTEGRITY GATE (Phase 1B)
      # Validates feed manifest freshness, stale reuse, advisory uniqueness,
      # and field-level mutation. Non-blocking.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.85 — Manifest Integrity Gate (Phase 1B)"
        timeout-minutes: 3
        continue-on-error: true
        run: |
          python3 scripts/manifest_integrity_system.py --check 2>&1 | tail -20 || true
          echo "STAGE 6.85: Manifest integrity gate complete"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.87 — RUNTIME STABILITY ENGINE (Phase 1B)
      # Validates STIX count, output existence proof, orchestration integrity,
      # and latency anomaly. Writes signed stability report. Non-blocking.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.87 — Runtime Stability Engine (Phase 1B)"
        timeout-minutes: 3
        continue-on-error: true
        run: |
          python3 scripts/runtime_stability_engine.py --check 2>&1 | tail -20 || true
          echo "STAGE 6.87: Runtime stability check complete"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.88 — SOURCE DIVERSITY ENFORCER (Phase 1C Enterprise Hardening)
      # Runs after runtime stability check — when the freshly generated feed
      # is in its final committed state. Scores source dominance, Shannon
      # entropy, synthetic marker density, and flood injection patterns.
      # Writes signed report to data/health/source_diversity.json.
      # Non-blocking — surfaces violations as CI annotations for observability.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.88 — Source Diversity Enforcer (Phase 1C)"
        timeout-minutes: 3
        continue-on-error: true
        run: |
          set +e
          python3 scripts/source_diversity_enforcer.py --report
          SDE_EXIT=$?
          set -e
          if [ -f "data/health/source_diversity.json" ]; then
            STATUS=$(jq -r '.status // "UNKNOWN"' data/health/source_diversity.json 2>/dev/null || echo "UNKNOWN")
            TOP_SRC=$(jq -r '.top_source // "?"' data/health/source_diversity.json 2>/dev/null || echo "?")
            TOP_PCT=$(jq -r '.top_source_pct // "?"' data/health/source_diversity.json 2>/dev/null || echo "?")
            ENT=$(jq -r '.entropy_bits // "?"' data/health/source_diversity.json 2>/dev/null || echo "?")
            echo "[SOURCE-DIVERSITY] Status=$STATUS | Top=$TOP_SRC ($TOP_PCT%) | Entropy=${ENT}bits"
            if [ "$STATUS" = "FAIL" ]; then
              echo "::warning::SOURCE DIVERSITY P0 VIOLATION — $TOP_SRC at $TOP_PCT% exceeds 30% golden invariant"
            fi
          else
            echo "::warning::source_diversity.json not written — check enforcer"
          fi
          echo "STAGE 6.88: Source Diversity Enforcer complete"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.89 — FEED HEALTH GATE (v159.0 Enterprise Hardening)
      # Validates feed quality after enrichment but before baseline capture.
      # Checks: uniform risk-score ratio, stale CVE ratio, synthetic actor ratio,
      #         CVSS coverage, confidence uniformity.
      # Non-blocking — violations emit CI warnings + write health report.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.89 — Feed Health Gate (v160.0)"
        timeout-minutes: 3
        continue-on-error: true
        run: |
          set +e
          python3 scripts/feed_health_gate.py --feed api/feed.json --report
          FHG_EXIT=$?
          set -e
          if [ -f "data/health/feed_health_gate.json" ]; then
            FHG_STATUS=$(jq -r '.status // "UNKNOWN"' data/health/feed_health_gate.json 2>/dev/null || echo "UNKNOWN")
            FHG_FAILS=$(jq -r '.hard_fails | join(",")' data/health/feed_health_gate.json 2>/dev/null || echo "?")
            FHG_TOTAL=$(jq -r '.total_items // "?"' data/health/feed_health_gate.json 2>/dev/null || echo "?")
            echo "[FEED-HEALTH] Status=$FHG_STATUS | Items=$FHG_TOTAL | Fails=$FHG_FAILS"
            if [ "$FHG_STATUS" = "FAIL" ]; then
              echo "::warning::FEED HEALTH GATE FAIL — $FHG_FAILS. Feed quality degraded."
            fi
          fi
          echo "STAGE 6.89: Feed Health Gate complete"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.895 — ADVISORY IMMUTABILITY ENGINE (v159.0 Enterprise Hardening)
      # Fingerprints all advisories, detects intra-feed duplicates, tracks
      # cross-run reuse via persistent registry, flags stale CVE reuse.
      # Non-blocking — writes data/health/advisory_immutability.json.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.895 — Advisory Immutability Engine (v160.0)"
        timeout-minutes: 3
        continue-on-error: true
        run: |
          set +e
          python3 scripts/advisory_immutability_engine.py --feed api/feed.json --report --update-registry
          AIE_EXIT=$?
          set -e
          if [ -f "data/health/advisory_immutability.json" ]; then
            AIE_COLL=$(jq -r '.intra_collisions // "?"' data/health/advisory_immutability.json 2>/dev/null || echo "?")
            AIE_STALE=$(jq -r '.stale_cve_count // "?"' data/health/advisory_immutability.json 2>/dev/null || echo "?")
            AIE_SYN=$(jq -r '.synthetic_count // "?"' data/health/advisory_immutability.json 2>/dev/null || echo "?")
            echo "[IMMUTABILITY] Collisions=$AIE_COLL | Stale=$AIE_STALE | Synthetic=$AIE_SYN"
          fi
          echo "STAGE 6.895: Advisory Immutability Engine complete"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 6.9 — GOLDEN BASELINE CAPTURE (Phase 1A Enterprise Hardening)
      # Captures an immutable production snapshot after every successful
      # generate-and-sync run. Writes signed lineage record and deployment
      # attestation to data/golden_baseline/. Non-blocking (continue-on-error)
      # so a baseline failure never blocks a successful intelligence publish.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 6.9 — Golden Baseline Capture (Phase 1A)"
        timeout-minutes: 3
        continue-on-error: true
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python3 scripts/golden_baseline_system.py --capture \
            --label "generate-and-sync" \
            --run-id "$GITHUB_RUN_ID" \
            2>&1 | tail -30 || true
          echo "STAGE 6.9: Golden Baseline Capture complete"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 7 — PIPELINE OBSERVABILITY TELEMETRY (Phase 6)
      # ─────────────────────────────────────────────────────────────────────
      # v148.0 FIX: Moved from inline python3 -c block (RULE 1 violation) to
      # dedicated script: scripts/emit_ai_telemetry.py
      # All values passed via env vars — zero inline Python in YAML.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 7 — Emit pipeline observability telemetry"
        run: |
          PIPELINE_END=$(date +%s)
          PIPELINE_DURATION=$((PIPELINE_END - PIPELINE_START_EPOCH))
          echo "PIPELINE_DURATION_SECONDS=${PIPELINE_DURATION}" >> "$GITHUB_ENV"

          echo "============================================================"
          echo "SENTINEL APEX AI TRACKER — PIPELINE OBSERVABILITY REPORT"
          echo "============================================================"
          echo "Run ID          : $GITHUB_RUN_ID"
          echo "Run Number      : $GITHUB_RUN_NUMBER"
          echo "Pipeline version: $PIPELINE_VERSION"
          echo "Total duration  : ${PIPELINE_DURATION}s"
          echo "Deps install    : ${STEP_TIMING_DEPS_MS:-N/A}ms"
          echo "AI generation   : ${STEP_TIMING_GENERATE_MS:-N/A}ms"
          echo "Dry run         : ${DRY_RUN}"
          echo "------------------------------------------------------------"

          # Output file sizes (pure bash — no inline Python)
          for f in api/ai/tracker.json api/ai/health.json api/ai/executive-brief.json api/ai/monetization.json; do
            [ -f "$f" ] && echo "$(du -sh "$f" | cut -f1)  $f" || echo "N/A  $f"
          done
          echo "============================================================"

          # Write telemetry artifact (dedicated script — zero inline Python)
          PIPELINE_DURATION_SECONDS=${PIPELINE_DURATION} python3 scripts/emit_ai_telemetry.py

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 7.5 — NULL-BYTE AUTO-REPAIR (defensive, non-fatal)
      # Strips trailing null-byte padding from all AI output JSON files before
      # commit. Covers api/v1/intel/ai_summary.json and all api/v1/intel/*.json.
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 7.5 — Null-Byte Auto-Repair (pre-commit defensive)"
        timeout-minutes: 2
        run: python3 scripts/null_byte_repair.py || true

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 8 — SKIP COMMIT IF DRY RUN
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 8 — Dry-run gate (skip commit if dry_run=true)"
        if: env.DRY_RUN == 'true'
        run: |
          echo "[DRY RUN] Dry run mode — skipping git commit and push"
          echo "[DRY RUN] Outputs were generated but NOT committed to main"
          echo "[DRY RUN] Pipeline complete — all validation gates passed"

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 9 — SAFE COMMIT + PUSH (stash-safe, 5-attempt retry)
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 9 — Safe commit + push (stash-safe, 5-attempt retry)"
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"

          # Clean any stale lock/rebase state
          git rebase --abort 2>/dev/null || true
          git merge  --abort 2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # Stage AI outputs ONLY (never feed_manifest.json — manifest destruction risk)
          git add api/ai/tracker.json 2>/dev/null || true
          git add api/ai/health.json 2>/dev/null || true
          git add api/ai/executive-brief.json 2>/dev/null || true
          git add api/ai/monetization.json 2>/dev/null || true
          git add data/ai-telemetry/ 2>/dev/null || true

          # Check if anything changed
          if git diff --staged --quiet; then
            echo "[INFO] No AI output changes detected — skipping commit (feed unchanged)"
            exit 0
          fi

          # Build deterministic commit message (run ID + schema version)
          # v149 FIX T12: replaced old-style inline Python one-liner (RULE 1 violation) with jq (ubuntu-latest)
          FEED_ITEMS=$(jq -r '.feed_item_count // 0' api/ai/tracker.json 2>/dev/null || echo "N/A")
          GRI=$(jq -r '.global_risk_index.gri_score // "N/A"' api/ai/tracker.json 2>/dev/null || echo "N/A")
          COMMIT_MSG="AI Tracker v${PIPELINE_VERSION}: run #${GITHUB_RUN_NUMBER} | items=${FEED_ITEMS} | GRI=${GRI} | $(date -u +'%Y-%m-%dT%H:%MZ') [skip ci]"
          git commit -m "$COMMIT_MSG"
          echo "[INFO] Commit: $COMMIT_MSG"

          # ── No-stash push retry (fetch+rebase only — stash not needed post-commit) ──
          # Rationale: commit already made before loop; stash-pop after rebase can
          # introduce index conflicts. Clean fetch+rebase is simpler and more reliable.
          PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
              git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true
            }
            if git push origin main 2>&1; then
              echo "[STAGE 9] Push successful (attempt ${ATTEMPT}/5)"
              PUSH_OK=1
              break
            fi
            echo "::warning::Push attempt ${ATTEMPT}/5 failed — retrying in $((ATTEMPT * 10))s"
            sleep $((ATTEMPT * 10))
          done
          if [ "$PUSH_OK" -eq 0 ]; then
            echo "::warning::STAGE 9: All push attempts exhausted — will sync on next scheduled run"
          fi

      # ─────────────────────────────────────────────────────────────────────
      # STAGE 9.5 — R2 UPLOAD: AI Tracker files → Cloudflare R2
      # v148.1.0 FIX: AI tracker files were committed to GitHub only.
      # The Cloudflare Worker reads exclusively from R2 (private bucket).
      # Without this step the Worker had no ai/tracker.json, ai/health.json,
      # or ai/executive-brief.json in R2, causing ai-threat-tracker.html to
      # show empty/stalled dashboard (handleAI fell back to ai_index.json).
      # ─────────────────────────────────────────────────────────────────────
      - name: "STAGE 9.5 — Upload AI Tracker outputs to Cloudflare R2"
        if: env.DRY_RUN != 'true'
        env:
          CF_ACCOUNT_ID:          ${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID:      ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:  ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          WORKER_ADMIN_SECRET:    ${{ secrets.WORKER_ADMIN_SECRET }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          BUCKET="sentinel-apex-data"

          echo "[R2] Installing AWS CLI..."
          pip install awscli --quiet --break-system-packages 2>/dev/null || pip install awscli --quiet

          echo "[R2] Uploading AI Tracker files to R2..."
          UPLOADED=0
          for FILE in \
            api/ai/tracker.json \
            api/ai/health.json \
            api/ai/executive-brief.json \
            api/ai/monetization.json; do
            if [ -f "$FILE" ]; then
              R2_KEY="ai/$(basename $FILE)"
              aws s3 cp "$FILE" "s3://${BUCKET}/${R2_KEY}" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "max-age=300, s-maxage=300" \
                --quiet
              echo "[R2] Uploaded: $FILE → ${R2_KEY}"
              UPLOADED=$((UPLOADED + 1))
            else
              echo "[R2] SKIP (not found): $FILE"
            fi
          done
          echo "[R2] Upload complete — ${UPLOADED} file(s) synced to R2"

          # Bust KV cache so Worker serves fresh AI data immediately
          echo "[R2] Busting Worker KV cache for AI endpoints..."
          for KV_KEY in "ai:tracker" "ai:health" "ai:exec-brief" "ai:monetize"; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://intel.cyberdudebivash.com/api/admin/cache/bust?key=${KV_KEY}" \
              -H "X-Admin-Secret: ${WORKER_ADMIN_SECRET}" || echo "000")
            echo "[KV] Busted ${KV_KEY} → HTTP ${HTTP}"
          done
          echo "[R2] Stage 9.5 complete — AI Tracker live on Worker"
