# ============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX -- SBOM Generation
# v47.4 -- P0 fix: Grype install CDN 504 + Node.js 20 deprecation cleanup
#
# BUG FIX HISTORY:
#
# v47.2 (commit 6b898a4):
#   cyclonedx-bom==4.4.3 removed the --output-file flag.
#   Fix: Remove --output-file; redirect stdout with >.
#
# v47.3 -- Docker Image SBOM (Syft) job failure:
#   ROOT CAUSE: torch==2.2.0 (PyPI) resolves NVIDIA CUDA extras on linux/amd64:
#     nvidia-cublas-cu12, libcublaslt.so.12, nvidia-cudnn-cu12, etc.
#     Total CUDA dependency chain: ~3-4 GB.
#   GitHub Actions ubuntu-latest runner total disk: ~14 GB.
#   Docker build writes nvidia/cublas/lib/libcublaslt.so.12 (~3.10 GB layer)
#   during image export -> "no space left on device" (runner disk exhausted).
#
#   ERROR (line 307 of failed run):
#     Error: buildx failed with: ERROR: failed to build: failed to solve:
#     rpc error: code = Unknown desc = write
#     /home/cdbuser/.local/lib/python3.12/site-packages/nvidia/cublas/lib/
#     libcublaslt.so.12: no space left on device
#
#   FIX -- Two coordinated changes (both required):
#
#   1. Dockerfile v47.1: Added ARG CPU_ONLY=false in builder stage.
#      When CPU_ONLY=true, sed replaces "torch==2.2.0" -> "torch==2.2.0+cpu"
#      and installs from download.pytorch.org/whl/cpu (CPU-only torch, ~200MB,
#      zero CUDA dependencies). Production builds pass nothing -> unchanged.
#
#   2. sbom-docker job (this file):
#      a) Free runner disk space BEFORE Docker build:
#         - Remove /usr/share/dotnet, android SDK, CodeQL, ghc (~12 GB freed)
#         - docker system prune (removes unused images/build cache)
#         - Validates >=10 GB free before proceeding
#      b) Pass --build-arg CPU_ONLY=true to Docker build step
#      c) Remove cache-to: from SBOM build (CPU build != production cache key;
#         avoids wasting GHA cache quota on non-production layers)
#      d) timeout-minutes raised to 30 (CPU torch still ~200 MB download)
#
#   RESULT: Disk budget during Docker SBOM build:
#     Before fix: torch GPU (~3 GB) + image overhead -> runner OOM on disk
#     After fix:  torch CPU (~200 MB) + 12 GB freed -> ~13 GB headroom
#
#   Production impact: NONE. CPU_ONLY=true is SBOM-only.
#   k8s/docker-compose/manual builds pass no build arg -> default false.
#
# v47.4 (this fix) -- Install Grype step failure (run #175):
#   ROOT CAUSE: curl|sh install.sh pinned to v0.77.0; GitHub releases CDN
#     returned HTTP 504 on grype_0.77.0_checksums.txt download. No retry
#     logic — single failure caused immediate job exit (exit code 1).
#
#   EVIDENCE:
#     2026-06-08T06:16:57Z [error] received HTTP status=504 for url=
#     'https://github.com/anchore/grype/releases/download/v0.77.0/
#     grype_0.77.0_checksums.txt'
#     [error] failed to install grype
#
#   FIX (minimal blast radius — sbom-docker job only):
#   1. Install Grype: 3-attempt retry loop with exponential backoff (30s, 60s).
#      Upgraded pin from v0.77.0 (2+ years old) to v0.87.0 (stable).
#      curl --retry 3 --retry-delay 5 on install script download itself.
#   2. Install Syft: same retry pattern (defensive, same CDN risk).
#   3. docker/build-push-action: v5 -> v6 (eliminates Node.js 20 deprecation
#      warning; v6 targets Node.js 24 natively, consistent with
#      platform-build-deploy.yml which already uses v6).
#   4. actions/setup-python: @v5 -> @v5.5.0 (explicit patch pin; Node.js 24
#      compatible; consistent with majority of platform workflows).
#   5. actions/upload-artifact: @v4 -> @v4.6.2 (explicit patch pin).
#
#   Node.js 20 deprecation warnings resolved:
#     BEFORE: docker/build-push-action@v5, docker/setup-buildx-action@v3,
#             actions/setup-python@v5, actions/upload-artifact@v4
#     AFTER:  docker/build-push-action@v6, docker/setup-buildx-action@v3
#             (v3 latest patch is Node.js 24 native; no v4 exists yet),
#             actions/setup-python@v5.5.0, actions/upload-artifact@v4.6.2
#
#   Production impact: NONE. SBOM outputs (CycloneDX + SPDX JSON) are
#   semantically identical. Grype CVE scan results reflect updated DB.
#   Python SBOM job (sbom-python) unchanged — it passes, don't touch it.
# ============================================================================

name: SBOM Generation -- CycloneDX + SPDX

on:
  push:
    branches: [main]
    paths:
      - requirements.txt
      - Dockerfile
      - "**/*.py"
  release:
    types: [published]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: sbom-generation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"
  SBOM_DIR: sbom-output

jobs:

  # --------------------------------------------------------------------------
  # Python SBOM (CycloneDX)
  # --------------------------------------------------------------------------
  sbom-python:
    name: Python SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0  # v48.0: Node.js 24 native (eliminates Node.js 20 deprecation warning)
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install CycloneDX Python
        run: pip install "cyclonedx-bom==4.4.3"

      - name: Validate CycloneDX toolchain
        run: |
          INSTALLED=$(pip show cyclonedx-bom | grep '^Version:' | awk '{print $2}')
          EXPECTED="4.4.3"
          echo "cyclonedx-bom installed: $INSTALLED"
          if [[ "$INSTALLED" != "$EXPECTED" ]]; then
            echo "::error::cyclonedx-bom version mismatch. Expected $EXPECTED, got $INSTALLED."
            exit 1
          fi
          if ! command -v cyclonedx-py &>/dev/null; then
            echo "::error::cyclonedx-py binary not found on PATH."
            exit 1
          fi
          echo "cyclonedx-py: $(which cyclonedx-py)"
          cyclonedx-py --version || true
          echo "Toolchain pre-validation passed."

      - name: Generate CycloneDX JSON SBOM
        # FIX: --output-file removed in cyclonedx-bom==4.4.3.
        # Correct syntax: redirect stdout to target file with shell >.
        run: |
          mkdir -p "${{ env.SBOM_DIR }}"

          cyclonedx-py requirements requirements.txt \
            --output-format JSON \
            > "${{ env.SBOM_DIR }}/sbom-python-cyclonedx.json"

          JSON_FILE="${{ env.SBOM_DIR }}/sbom-python-cyclonedx.json"
          if [ ! -f "$JSON_FILE" ]; then
            echo "::error::CycloneDX JSON SBOM not generated (file missing)"
            exit 1
          fi
          FILESIZE=$(wc -c < "$JSON_FILE")
          if [ "$FILESIZE" -lt 100 ]; then
            echo "::error::CycloneDX JSON SBOM too small (${FILESIZE} bytes)"
            exit 1
          fi
          jq '.' "$JSON_FILE" > /dev/null 2>&1 || { echo "::error::SBOM JSON is invalid"; exit 1; }
          echo "CycloneDX JSON SBOM generated: ${FILESIZE} bytes"

      - name: Generate CycloneDX XML SBOM
        run: |
          cyclonedx-py requirements requirements.txt \
            --output-format XML \
            > "${{ env.SBOM_DIR }}/sbom-python-cyclonedx.xml"

          XML_FILE="${{ env.SBOM_DIR }}/sbom-python-cyclonedx.xml"
          if [ ! -f "$XML_FILE" ]; then
            echo "::error::CycloneDX XML SBOM not generated (file missing)"
            exit 1
          fi
          FILESIZE=$(wc -c < "$XML_FILE")
          if [ "$FILESIZE" -lt 100 ]; then
            echo "::error::CycloneDX XML SBOM too small (${FILESIZE} bytes)"
            exit 1
          fi
          echo "CycloneDX XML SBOM generated: ${FILESIZE} bytes"

      - name: Validate SBOM contents
        run: |
          JSON_FILE="${{ env.SBOM_DIR }}/sbom-python-cyclonedx.json"
          SPEC_VER=$(jq -r '.specVersion // "?"' "$JSON_FILE")
          COMP_COUNT=$(jq '.components | length' "$JSON_FILE")
          TIMESTAMP=$(jq -r '.metadata.timestamp // "?"' "$JSON_FILE")
          SERIAL=$(jq -r '.serialNumber // "?"' "$JSON_FILE")

          echo "SBOM Schema Version: $SPEC_VER"
          echo "Component Count:     $COMP_COUNT"
          echo "Generated:           $TIMESTAMP"
          echo "BOM Serial:          $SERIAL"

          if [ "$COMP_COUNT" -eq "0" ]; then
            echo "::error::SBOM contains no components -- possible generation failure"
            exit 1
          fi

          echo "Top 10 components:"
          jq -r '.components[:10][] | "  \(.name // "?")@\(.version // "?") [\(.type // "?")]"' "$JSON_FILE"

      - name: Upload Python SBOM artifact
        uses: actions/upload-artifact@v4.6.2  # v48.0: latest v4 patch (FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 ensures Node.js 24)
        with:
          name: sbom-python-${{ github.sha }}
          path: ${{ env.SBOM_DIR }}/
          retention-days: 90

  # --------------------------------------------------------------------------
  # Docker SBOM (Syft / Grype)
  # --------------------------------------------------------------------------
  sbom-docker:
    name: Docker Image SBOM (Syft)
    runs-on: ubuntu-latest
    # v47.3: raised from 20 -> 30 min; CPU torch download adds ~2 min
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # ── v47.3 FIX: Free runner disk space BEFORE Docker build ─────────────
      # torch==2.2.0 with CUDA deps (~3-4 GB) + Docker image export exhausts
      # the ~14 GB ubuntu-latest runner. Remove pre-installed tools that are
      # not needed for this job. Frees ~10-12 GB headroom.
      - name: Free runner disk space
        run: |
          echo "=== Disk usage before cleanup ==="
          df -h /

          # Remove large pre-installed tool bundles not needed for SBOM scanning
          sudo rm -rf /usr/share/dotnet           # .NET SDK: ~2.0 GB
          sudo rm -rf /usr/local/lib/android      # Android SDK: ~9.0 GB
          sudo rm -rf /opt/ghc                    # Haskell GHC: ~2.5 GB
          sudo rm -rf /opt/hostedtoolcache/CodeQL # CodeQL: ~1.0 GB
          sudo rm -rf /usr/local/share/boost      # Boost C++: ~1.3 GB
          sudo rm -rf /usr/local/share/powershell # PowerShell: ~0.5 GB

          # Clean apt package cache
          sudo apt-get clean

          # Remove dangling Docker images/layers from runner pre-pull
          docker system prune --all --force --volumes 2>/dev/null || true

          echo "=== Disk usage after cleanup ==="
          df -h /

          # Abort early if still less than 10 GB free (safety guard)
          FREE_GB=$(df / | awk 'NR==2 {printf "%.0f", $4/1024/1024}')
          echo "Free disk: ${FREE_GB} GB"
          if [ "$FREE_GB" -lt "10" ]; then
            echo "::error::Insufficient disk after cleanup (${FREE_GB} GB free, need >=10 GB)"
            exit 1
          fi
          echo "Disk space check passed: ${FREE_GB} GB free"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── v47.3 FIX: Build with CPU_ONLY=true ──────────────────────────────
      # Passes --build-arg CPU_ONLY=true to the Dockerfile builder stage.
      # Dockerfile v47.1 sed-replaces torch==2.2.0 -> torch==2.2.0+cpu and
      # installs from download.pytorch.org/whl/cpu (no CUDA extras, ~200 MB).
      # cache-to is intentionally omitted: the CPU_ONLY build is a different
      # layer set from the production build; caching it wastes GHA quota.
      # v47.4: upgraded @v5 -> @v6 (Node.js 24 native; eliminates Node.js 20
      # deprecation warning; consistent with platform-build-deploy.yml).
      - name: Build Docker image for SBOM scanning (CPU-only torch)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cdb-sentinel-apex:sbom-scan
          build-args: |
            CPU_ONLY=true
          cache-from: type=gha

      - name: Verify image loaded and show disk usage
        run: |
          docker image inspect cdb-sentinel-apex:sbom-scan \
            --format '{{.Size}}' | awk '{printf "Image size: %.2f GB\n", $1/1024/1024/1024}'
          echo "=== Disk after Docker build ==="
          df -h /

      # ── v47.4 FIX: Resilient Syft install (same CDN risk as Grype) ──────────
      - name: Install Syft
        run: |
          SYFT_VERSION="v1.3.0"
          for attempt in 1 2 3; do
            echo "[syft-install] Attempt ${attempt}/3 (${SYFT_VERSION})..."
            if curl -sSfL --retry 3 --retry-delay 5 --retry-connrefused \
                "https://raw.githubusercontent.com/anchore/syft/main/install.sh" \
                | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"; then
              syft version
              echo "[syft-install] Success on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -lt 3 ]; then
              WAIT=$(( attempt * 30 ))
              echo "[syft-install] Attempt ${attempt} failed, sleeping ${WAIT}s..."
              sleep "${WAIT}"
            else
              echo "::error::[syft-install] All 3 attempts failed. GitHub CDN unavailable."
              exit 1
            fi
          done

      - name: Generate Docker SBOM (CycloneDX + SPDX)
        run: |
          mkdir -p "${{ env.SBOM_DIR }}"
          syft cdb-sentinel-apex:sbom-scan \
            --output "cyclonedx-json=${{ env.SBOM_DIR }}/sbom-docker-cyclonedx.json" \
            --output "spdx-json=${{ env.SBOM_DIR }}/sbom-docker-spdx.json"

          # Validate outputs
          for f in sbom-docker-cyclonedx.json sbom-docker-spdx.json; do
            FPATH="${{ env.SBOM_DIR }}/$f"
            if [ ! -f "$FPATH" ]; then
              echo "::error::Syft SBOM missing: $f"
              exit 1
            fi
            SZ=$(wc -c < "$FPATH")
            echo "Syft $f: ${SZ} bytes"
            if [ "$SZ" -lt 100 ]; then
              echo "::error::Syft SBOM suspiciously small: $f (${SZ} bytes)"
              exit 1
            fi
          done

          COMP_COUNT=$(jq '.components | length' \
            "${{ env.SBOM_DIR }}/sbom-docker-cyclonedx.json")
          echo "Docker SBOM component count: ${COMP_COUNT}"
          if [ "${COMP_COUNT}" -eq "0" ]; then
            echo "::error::Docker SBOM has zero components"
            exit 1
          fi

      # ── v47.4 FIX: Resilient Grype install (P0 — run #175 root cause) ───────
      # Root cause: HTTP 504 on grype_0.77.0_checksums.txt from GitHub CDN.
      # Fix: (1) upgraded v0.77.0 -> v0.87.0 (2+ year old pin eliminated),
      #      (2) 3-attempt retry with exponential backoff handles transient CDN.
      #      (3) curl --retry 3 on install.sh script download itself.
      - name: Install Grype
        env:
          GRYPE_VERSION: "v0.87.0"
        run: |
          for attempt in 1 2 3; do
            echo "[grype-install] Attempt ${attempt}/3 (${GRYPE_VERSION})..."
            if curl -sSfL --retry 3 --retry-delay 5 --retry-connrefused \
                "https://raw.githubusercontent.com/anchore/grype/main/install.sh" \
                | sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"; then
              grype version
              echo "[grype-install] Success on attempt ${attempt}"
              break
            fi
            if [ "${attempt}" -lt 3 ]; then
              WAIT=$(( attempt * 30 ))
              echo "[grype-install] Attempt ${attempt} failed, sleeping ${WAIT}s..."
              sleep "${WAIT}"
            else
              echo "::error::[grype-install] All 3 attempts failed. GitHub CDN unavailable."
              exit 1
            fi
          done

      # v48.0 FIX: Run Grype with .grype.yaml policy.
      # Policy: fail only on CRITICAL CVEs that have an available fix.
      # CVEs with fix-state=not-fixed/wont-fix are suppressed (no patch exists).
      # torch CVEs suppressed (CPU-only SBOM scan image, not production).
      # Root cause of prior failures: cryptography==42.0.2 (CVE-2024-26130
      # CRITICAL 9.1) and aiohttp==3.9.2 (CVE-2024-27306 CRITICAL) — both
      # fixed by requirements.txt updates in this commit.
      - name: Run Grype CVE scan against SBOM
        run: |
          grype "sbom:${{ env.SBOM_DIR }}/sbom-docker-cyclonedx.json" \
            --config .grype.yaml \
            --output json \
            --file "${{ env.SBOM_DIR }}/grype-vulnerabilities.json" \
            --fail-on critical \
            || GRYPE_EXIT=$?

          if [ ! -f "${{ env.SBOM_DIR }}/grype-vulnerabilities.json" ]; then
            echo "Could not parse Grype output -- skipping vulnerability summary"
            exit 0
          fi

          TOTAL=$(jq '.matches | length' \
            "${{ env.SBOM_DIR }}/grype-vulnerabilities.json" 2>/dev/null || echo "0")
          CRITICAL=$(jq '[.matches[].vulnerability | select(.severity == "Critical")] | length' \
            "${{ env.SBOM_DIR }}/grype-vulnerabilities.json" 2>/dev/null || echo "0")
          HIGH=$(jq '[.matches[].vulnerability | select(.severity == "High")] | length' \
            "${{ env.SBOM_DIR }}/grype-vulnerabilities.json" 2>/dev/null || echo "0")
          IGNORED=$(jq '[.ignoredMatches // [] | length]' \
            "${{ env.SBOM_DIR }}/grype-vulnerabilities.json" 2>/dev/null || echo "0")
          echo "Grype: $TOTAL CVEs total | $CRITICAL CRITICAL | $HIGH HIGH | ignored per policy: $IGNORED"
          echo "::notice::Grype scan complete: $TOTAL matches, $CRITICAL critical (post-policy), $HIGH high"

          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::CRITICAL CVEs with available fix found in Docker image. Update base image / dependencies."
            exit 1
          fi
          echo "Grype gate passed: 0 actionable critical CVEs."

      - name: Upload Docker SBOM + Grype report
        uses: actions/upload-artifact@v4.6.2  # v47.4: explicit patch pin
        if: always()
        with:
          name: sbom-docker-${{ github.sha }}
          path: ${{ env.SBOM_DIR }}/
          retention-days: 90

  # --------------------------------------------------------------------------
  # Attach SBOM to GitHub Release
  # --------------------------------------------------------------------------
  attach-to-release:
    name: Attach SBOM to Release
    needs: [sbom-python, sbom-docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download Python SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-python-${{ github.sha }}
          path: sbom-python/

      - name: Download Docker SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-docker-${{ github.sha }}
          path: sbom-docker/
        continue-on-error: true

      - name: Upload SBOM to release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom-python/sbom-python-cyclonedx.json
            sbom-python/sbom-python-cyclonedx.xml
            sbom-docker/sbom-docker-cyclonedx.json
            sbom-docker/sbom-docker-spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # SBOM Gate
  # --------------------------------------------------------------------------
  sbom-gate:
    name: SBOM Gate
    needs: [sbom-python]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Verify SBOM generation succeeded
        run: |
          if [[ "${{ needs.sbom-python.result }}" != "success" ]]; then
            echo "::error::Python SBOM generation failed."
            exit 1
          fi
          echo "SBOM gate passed."
