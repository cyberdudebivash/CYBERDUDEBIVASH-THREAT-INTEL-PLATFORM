# =============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX v142.0 - MULTI-SOURCE INTELLIGENCE ENRICHMENT
# Version: v142.0.0 - P0 TIMESTAMP INTEGRITY FIX
# Race condition FIX: Cron unchanged - '45 1,5,9,13,17,21 * * *'
#                     (sentinel-blogger runs at 0,4,8,12,16,20 - no overlap)
#
# v142.0 CHANGES (P0 Intel Ingestion Fix):
#   - REPLACED broken ManifestMerger (class never existed) with true_intel_ingestor.py
#   - REPLACED broken SourceIntelligenceOrchestrator import (import path wrong)
#   - NOW commits feed_state.json + processed_intel.json for cross-run state persistence
#   - NOW commits feed_manifest.json (additive merge - safe with dedup engine)
#   - true_intel_ingestor.py enforces: published_at = SOURCE date, never NOW_UTC
#   - Per-source last_seen_timestamp prevents full re-scan on every run
# =============================================================================
name: CDB Multi-Source Intelligence Enrichment v142

on:
  schedule:
    - cron: '45 1,5,9,13,17,21 * * *'   # FIXED: no overlap with sentinel-blogger
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  multi-source-enrichment:
    name: Multi-Source Intelligence v142
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6.0.2
        with: {fetch-depth: 1, ref: main}

      - uses: actions/setup-python@v5.5.0
        with: {python-version: '3.12', cache: 'pip'}

      - name: "Install Dependencies"
        run: pip install requests feedparser --quiet

      - name: "Prepare Directories"
        run: mkdir -p data/enrichment data/stix data/cache api

      - name: "Bootstrap Critical Files"
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
        run: python3 scripts/bootstrap_critical_files.py

      # 
      # TRUE INCREMENTAL INGESTION (P0 FIX v142.0)
      # Replaces the broken ManifestMerger + SourceIntelligenceOrchestrator.
      # true_intel_ingestor.py:
      #   - Fetches CISA KEV, NVD CVE, GitHub Advisories, ransomware.live, URLhaus, RSS
      #   - Tracks per-source last_seen_timestamp in data/cache/feed_state.json
      #   - Only processes items WHERE source_published_at > last_seen_timestamp[source]
      #   - Deduplicates via SHA256(source_url + title + published_at) fingerprint
      #   - Writes ONLY new items to data/stix/feed_manifest.json (additive merge)
      #   - NEVER sets published_at = NOW_UTC - always preserves source date
      # 
      - name: "True Incremental Intel Ingestion"
        env:
          GITHUB_TOKEN_INTEL: ${{ secrets.GH_INTEL_TOKEN }}
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 scripts/true_intel_ingestor.py
          echo "Ingestion exit code: $?"

      # 
      # VALIDATE OUTPUT - fail fast if something broke the manifest
      # 
      - name: "Validate Manifest Integrity"
        run: |
          python3 scripts/validate_manifest_integrity.py

      # 
      # COMMIT STATE FILES - CRITICAL for cross-run incremental ingestion
      # feed_state.json    = per-source last_seen timestamps (MUST persist)
      # processed_intel.json = dedup fingerprint store (MUST persist)
      # feed_manifest.json  = intel manifest (additive, safe to commit)
      # 
      - name: "Commit Intel State & Manifest"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name  "CYBERDUDEBIVASH"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"

          # Clean up any stale rebase/merge state
          git rebase --abort 2>/dev/null || true
          git merge --abort  2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # Stage state files that MUST persist between runs
          git add -f data/cache/feed_state.json    2>/dev/null || true  # per-source last_seen
          git add -f data/processed_intel.json     2>/dev/null || true  # dedup fingerprint store
          git add -f data/stix/feed_manifest.json  2>/dev/null || true  # intel manifest (additive)

          if git diff --staged --quiet; then
            echo "No intel state changes to commit."; exit 0
          fi

          # Count new entries for commit message
          NEW_COUNT=$(python3 -c "
          import json
          try:
              d = json.loads(open('data/cache/feed_state.json').read())
              print(len(d.get('sources',{})))
          except: print('?')
          " 2>/dev/null || echo "?")

          git commit -m "Intel v142.0 incremental ingest | ${NEW_COUNT} sources tracked | $(date -u +'%Y-%m-%dT%H:%M:%SZ') [skip ci]"

          # Push with retry + rebase strategy
          for i in 1 2 3 4; do
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null \
              || { git rebase --abort 2>/dev/null || true; \
                   git merge origin/main -X ours --no-edit --quiet || true; }
            if git push origin main; then echo "Push OK on attempt $i"; break; fi
            sleep $((i * 15))
            [ "$i" -eq 4 ] && echo "[WARN] Push deferred after 4 attempts - will retry next run"
          done
