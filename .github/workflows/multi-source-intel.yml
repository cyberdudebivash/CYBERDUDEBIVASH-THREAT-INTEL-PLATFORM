# =============================================================================
# CYBERDUDEBIVASHÂ® SENTINEL APEX v131.0 â€” MULTI-SOURCE INTELLIGENCE ENRICHMENT
# Version: v101.0.0 â€” PERMANENT PRODUCTION CONTRACT
# Race condition FIX: Cron changed from '0 */4 * * *' (same as sentinel-blogger)
#                     to '45 1,5,9,13,17,21 * * *' â€” 45 min past odd hours
#                     (sentinel-blogger runs at 0,4,8,12,16,20 â†’ no overlap)
# =============================================================================
name: CDB Multi-Source Intelligence Enrichment v101

on:
  schedule:
    - cron: '45 1,5,9,13,17,21 * * *'   # FIXED: no overlap with sentinel-blogger
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  multi-source-enrichment:
    name: Multi-Source Intelligence v101
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4.2.2
        with: {fetch-depth: 1, ref: main}
      - uses: actions/setup-python@v5.4.0
        with: {python-version: '3.12', cache: 'pip'}
      - run: pip install requests feedparser --quiet
      - run: mkdir -p data/enrichment data/stix api

      - name: "Bootstrap Critical Files"
        run: python3 scripts/bootstrap_critical_files.py

      - name: "Collect Fresh Intelligence"
        continue-on-error: true
        env:
          GITHUB_TOKEN_INTEL: ${{ secrets.GH_INTEL_TOKEN }}
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 - << 'PYEOF'
          import sys, os, json
          from datetime import datetime, timezone
          sys.path.insert(0, os.getcwd())
          try:
              from agent.integrations.sources.multi_source_intel import SourceIntelligenceOrchestrator
              orch = SourceIntelligenceOrchestrator(github_token=os.environ.get("GITHUB_TOKEN_INTEL"))
              batch = orch.get_fresh_intelligence_batch()
              os.makedirs("data/enrichment", exist_ok=True)
              with open("data/enrichment/latest_intel_batch.json","w") as f:
                  json.dump(batch, f, indent=2)
              print(f"Intel batch: {batch.get('sources_polled',0)} sources polled")
          except Exception as e:
              print(f"Multi-source enrichment skipped (non-critical): {e}")
          PYEOF

      - name: "Merge Into Manifest"
        continue-on-error: true
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 - << 'PYEOF'
          import sys, os, json
          from datetime import datetime, timezone
          sys.path.insert(0, os.getcwd())
          try:
              from agent.integrations.sources.multi_source_intel import ManifestMerger
              merger = ManifestMerger()
              result = merger.merge_batch_into_manifest(
                  "data/enrichment/latest_intel_batch.json",
                  "data/stix/feed_manifest.json"
              )
              print(f"Manifest merge: {result.get('new_entries', 0)} new entries added")
          except Exception as e:
              print(f"Manifest merge skipped (non-critical): {e}")
          PYEOF

      - name: "Safe Commit & Push (enrichment metadata only)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "intel@cyberdudebivash.com"
          git config --local user.name  "CDB-Intel-Bot"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # P0 FIX v131.0: DO NOT commit feed_manifest.json to git.
          # The manifest is R2-only data (gitignored). Committing it here caused
          # the bootstrap to recycle stale manifest every run (skip if >= 50 entries).
          # Only commit the enrichment batch metadata (non-intel).
          git add -f data/enrichment/ 2>/dev/null || true
          # BLOCKED (R2-only): git add -f data/stix/feed_manifest.json

          if git diff --staged --quiet; then
            echo "No enrichment metadata changes to commit."; exit 0
          fi

          git commit -m "Multi-source Intel v101 enrichment-meta @ $(date -u +'%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          for i in 1 2 3 4; do
            git fetch origin main --quiet
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
            git push origin main && break
            sleep $((i*15)); [ $i -eq 4 ] && echo "Push deferred."
          done

