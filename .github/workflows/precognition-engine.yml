name: CDB Sentinel APEX -- Precognition Engine v140.0

on:
  schedule:
    - cron: '0 */8 * * *'  # Every 8 hours
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Signal collection lookback window (hours)'
        required: false
        type: number
        default: 72
      enable_external:
        description: 'Enable external API collectors (NVD, CISA KEV, GitHub)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  predictive-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser --quiet
          if [ -f requirements.txt ]; then pip install -r requirements-ci-light.txt; fi

      - name: Run Precognition Engine
        continue-on-error: true
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          MANIFEST_PATH: data/stix/feed_manifest.json
          PREDICTIVE_DIR: data/predictive
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "***************************************************"
          echo "SENTINEL APEX v140.0 -- PRECOGNITION ENGINE"
          echo "Predictive Threat Intelligence Pipeline"
          echo "***************************************************"
          python -m agent.v34_predictive.predictive_orchestrator

      - name: Commit predictive outputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/predictive/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No predictive changes to commit -- skipping"
          else
            REPORT="data/predictive/precognition_report.json"
            WARNING_COUNT=$(python3 -c "import json,os; d=json.load(open('${REPORT}')) if os.path.exists('${REPORT}') else {}; print(d.get('pipeline_stats',{}).get('early_warnings_issued',0))" 2>/dev/null || echo "0")
            WAVE_COUNT=$(python3 -c "import json,os; d=json.load(open('${REPORT}')) if os.path.exists('${REPORT}') else {}; print(d.get('pipeline_stats',{}).get('attack_waves_detected',0))" 2>/dev/null || echo "0")
            git commit -m "PRECOGNITION v34.0 -- ${WARNING_COUNT} warnings | ${WAVE_COUNT} attack waves detected [skip ci]"
            # FIX v148.0 BUG-C: stash BEFORE rebase (bare pull --rebase exits 128 on unstaged files)
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            # ── Stash-safe retry loop ──
            PUSH_OK=0
            for ATTEMPT in 1 2 3 4 5; do
              if git push origin main; then PUSH_OK=1; break; fi
              echo "::warning::Precognition push attempt ${ATTEMPT}/5..."
              git stash --include-untracked --quiet 2>/dev/null || true
              git fetch origin main --quiet 2>/dev/null || true
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
              git stash pop --quiet 2>/dev/null || true
              sleep $((ATTEMPT * 8))
            done
            [ "$PUSH_OK" -eq 0 ] && echo "::warning::Precognition push deferred — non-blocking." || true
          fi
