name: CDB Sentinel APEX — AI Threat Analyst v37.0

on:
  schedule:
    - cron: '30 */8 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ai-threat-analyst
  cancel-in-progress: false

jobs:
  ai-analyst:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4.2.2
        with: {fetch-depth: 0, ref: main}
      - uses: actions/setup-python@v5.4.0
        with: {python-version: '3.12', cache: 'pip'}
      - run: pip install --upgrade pip && pip install requests feedparser networkx && [ -f requirements.txt ] && pip install -r requirements.txt || true
      - name: Run AI Threat Analyst
        env:
          MANIFEST_PATH: data/stix/feed_manifest.json
          STIX_DIR: data/stix
          FUSION_DIR: data/fusion
          ZDH_DIR: data/zerodayhunter
          ANALYST_DIR: data/analyst
          PYTHONPATH: ${{ github.workspace }}
        run: python -m agent.v37_analyst.analyst_engine
      - name: Commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CDB-GOC-Analyst"
          git config user.email "goc@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/analyst/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || {
            THREATS=$(python3 -c "import json; d=json.load(open('data/analyst/analyst_report.json')); print(d['pipeline_stats']['threats_monitored'])" 2>/dev/null || echo "0")
            RULES=$(python3 -c "import json; d=json.load(open('data/analyst/analyst_report.json')); print(d['pipeline_stats']['total_detection_rules'])" 2>/dev/null || echo "0")
            git commit -m "🤖 AI ANALYST v37.0 — ${THREATS} threats analyzed | ${RULES} detection rules"
                        git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            for i in 1 2 3 4; do
              git fetch origin main --quiet
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
              git push origin main && { echo "Push OK ($i/4)"; break; }
              sleep $((i*15))
              [ $i -eq 4 ] && echo "Push deferred."
            done
