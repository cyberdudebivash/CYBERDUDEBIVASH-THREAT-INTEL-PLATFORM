name: CYBERDUDEBIVASH REVENUE ORCHESTRATOR v44.0

# Founder & CEO — CyberDudeBivash Pvt. Ltd.
# Operational Mandate: Automate fulfillment of Premium Intelligence.

on:
  # Listens for Gumroad/Stripe Purchase Events via Repository Dispatch
  repository_dispatch:
    types: [gumroad_purchase, stripe_subscription_update]
  
  # Daily Financial Audit for the CEO
  schedule:
    - cron: '0 0 * * *'

  # Manual Trigger for Ad-hoc Reports
  workflow_dispatch:
    inputs:
      action:
        description: 'report | provision | audit'
        required: true
        default: 'report'

permissions:
  contents: write
  actions: read

jobs:
  fulfillment-and-provisioning:
    if: github.event.action != 'report'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (v44.0 Revenue Core)
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install v44 Revenue Dependencies
        run: pip install -r requirements.txt

      - name: Provision Enterprise License
        env:
          PURCHASE_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python3 -m agent.subscription_manager --webhook-event

      - name: Build Premium Asset Pack
        run: |
          # Links G07 Detection Gen outputs to the specific customer tier
          python3 -m tools.detection_pack_builder --tier enterprise

      - name: Sync Sovereign Registry
        run: |
          git config --local user.name "CDB-Sentinel-Bot"
          git config --local user.email "bivash@cyberdudebivash.com"
          git add data/sovereign/tenants.json
          git commit -m "💰 v44.0 Auto-Provision: New Enterprise License [skip ci]"
          git push origin main

  ceo-financial-briefing:
    if: github.event_name == 'schedule' || github.event.inputs.action == 'report'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate MRR Analytics
        run: python3 -m agent.revenue_analytics --generate-mrr-report

      - name: Commit Financial Status
        run: |
          git config --local user.name "CDB-Sentinel-Bot"
          git config --local user.email "bivash@cyberdudebivash.com"
          git add data/sovereign/mrr_report.json data/revenue/transaction_log.json
          git commit -m "📈 v44.0: CEO Financial Update Sync"
          git push origin main
