name: CYBERDUDEBIVASH REVENUE ORCHESTRATOR v44.0

on:
  repository_dispatch:
    types: [gumroad_purchase, stripe_subscription_update]

  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      action:
        description: 'report | provision | audit'
        required: true
        default: 'report'

permissions:
  contents: write
  actions: read

concurrency:
  group: sentinel-main-deploy
  cancel-in-progress: false

jobs:
  fulfillment-and-provisioning:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (v44 Revenue Core)
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Provision Enterprise License
        env:
          PURCHASE_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python -m agent.subscription_manager --webhook-event

      - name: Sync Sovereign Registry
        continue-on-error: true
        run: |
          git config --local user.name "CDB-Sentinel-Bot"
          git config --local user.email "bivash@cyberdudebivash.com"
          git add data/sovereign/tenants.json
          git commit -m "💰 v44 Auto-Provision Enterprise License [skip ci]" || echo "No changes"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push origin main && break
            echo "Retry $i failed, retrying..."
            sleep 3
          done

  ceo-financial-briefing:
    if: github.event_name == 'schedule' || github.event.inputs.action == 'report'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate MRR Analytics
        run: python -m agent.revenue_analytics --generate-mrr-report

      - name: Commit Financial Status
        continue-on-error: true
        run: |
          git config --local user.name "CDB-Sentinel-Bot"
          git config --local user.email "bivash@cyberdudebivash.com"
          git add data/sovereign/mrr_report.json data/revenue/transaction_log.json
          git commit -m "📈 v44 CEO Financial Update" || echo "No changes"
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push origin main && break
            echo "Retry $i failed, retrying..."
            sleep 3
          done
