name: CYBERDUDEBIVASH REVENUE ORCHESTRATOR v44.0

on:
  repository_dispatch:
    types: [gumroad_purchase, stripe_subscription_update]

  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      action:
        description: 'report | provision | audit'
        required: true
        default: 'report'

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: revenue-orchestrator
  cancel-in-progress: false

jobs:
  fulfillment-and-provisioning:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (v44 Revenue Core)
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Provision Enterprise License
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PURCHASE_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python -m agent.subscription_manager --webhook-event

      - name: Sync Sovereign Registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.name "CDB-Sentinel-Bot"
          git config --local user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/sovereign/tenants.json || true
          if git diff --staged --quiet; then
            echo "No tenant changes"
          else
            git commit -m " v44 Auto-Provision Enterprise License [skip ci]"
            git pull --rebase origin main || true
            git push origin main
          fi

  ceo-financial-briefing:
    if: github.event_name == 'schedule' || github.event.inputs.action == 'report'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate MRR Analytics
        run: python -m agent.revenue_analytics --generate-mrr-report

      - name: Commit Financial Status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.name "CDB-Sentinel-Bot"
          git config --local user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add -f data/sovereign/mrr_report.json || true
          git add -f data/revenue/transaction_log.json || true
          if git diff --staged --quiet; then
            echo "No financial data changes to commit"
          else
            git commit -m " v44 CEO Financial Update [skip ci]"
            git pull --rebase origin main || true
            git push origin main
          fi
