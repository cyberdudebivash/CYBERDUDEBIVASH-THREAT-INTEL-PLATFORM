# ============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX -- SAST Security Scan
# v47.4 -- v160.0 fix: Safety CLI replaced with pip-audit (typer crash fix)
#          safety==3.x crashes: AttributeError: module 'typer' has no attribute
#          'rich_utils'. pip-audit==2.7.3 is the stable, auth-wall-free successor.
# v47.3 -- Permanent P0 fix (Bandit format, JSONDecodeError, TruffleHog range,
#           Semgrep SARIF empty-runs API rejection + scan timeout)
#
# BUG FIXES (commit 6b898a4 regression):
#
#   FIX-1 (Bandit human-readable): --format text -> --format txt
#         'text' is not a valid bandit -f choice; valid: txt, json, csv, sarif, etc.
#
#   FIX-2 (JSONDecodeError cascade): replaced pipe-based JSON parsing with file+jq.
#         bash -o pipefail broke the pipe on bandit non-zero exit; python3 received
#         empty stdin -> JSONDecodeError line 1 col 1 (char 0).
#         Fix: bandit --output bandit-high.json (writes file, not stdout), validate
#         file exists + non-empty, parse with jq (pre-installed on ubuntu-latest).
#
#   FIX-3 (TruffleHog same-commit error): base: branch-name -> event.before SHA.
#         After push lands on main: git rev-parse main == HEAD == 6b898a4.
#         TruffleHog error: "BASE and HEAD commits are the same."
#         Fix: compute scan range per event type before running scan.
#           push:         base=github.event.before, head=github.sha
#           pull_request: base=PR base SHA, head=PR head SHA
#           schedule/dispatch: empty -> TruffleHog full-filesystem scan
#
#   FIX-4 (Semgrep "Invalid request. 1 item required; only 0 were supplied."):
#         Commit e4f691a introduced a fallback SARIF with "runs":[] (empty array).
#         GitHub Code Scanning API requires runs array to have >= 1 item.
#         Uploading "runs":[] produces exactly the observed API rejection error.
#         Root cause chain: scan timeout (5 rulesets on 800+ files > 20 min) ->
#         semgrep killed -> no SARIF written -> guard creates "runs":[] -> upload
#         rejected by GitHub API.
#         Fix A: Replace "runs":[] fallback with a structurally valid minimal SARIF
#                containing 1 run object with empty results array.
#         Fix B: Scope scan to agent/ + api/ (~425 files) to prevent timeout.
#                Bandit already scans agent/ only; Semgrep now matches that scope.
#         Fix C: Add --timeout 120 (per-rule timeout in seconds) to prevent any
#                single rule from hanging the runner indefinitely.
#         Fix D: Increase job timeout-minutes: 20 -> 30 as safety buffer.
# ============================================================================

name: SAST Security Scan -- Bandit + Safety + Semgrep

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Run full deep scan (slower, more thorough)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.11"

jobs:

  # --------------------------------------------------------------------------
  # Bandit: Python AST-based SAST
  # --------------------------------------------------------------------------
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Bandit
        run: pip install "bandit[sarif]==1.7.8" "bandit-sarif-formatter==1.1.1"

      - name: Run Bandit (SARIF output)
        run: |
          bandit \
            --recursive agent/ \
            --format sarif \
            --output bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            --exclude agent/tests,agent/__pycache__ \
            --skip B101,B601,B324 \
            || true

      - name: Run Bandit (human-readable summary)
        run: |
          bandit \
            --recursive agent/ \
            --format txt \
            --severity-level high \
            --confidence-level high \
            --skip B101,B601,B324 \
            --exit-zero \
            --output bandit-summary.txt
          echo "Bandit summary (HIGH/HIGH):"
          cat bandit-summary.txt

      - name: Upload Bandit SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit summary artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ github.run_id }}
          path: |
            bandit-results.sarif
            bandit-summary.txt
          retention-days: 30

      - name: Fail on HIGH severity + HIGH confidence findings
        run: |
          bandit \
            --recursive agent/ \
            --format json \
            --output bandit-high.json \
            --severity-level high \
            --confidence-level high \
            --skip B101,B601,B324 \
            --exit-zero

          if [ ! -f "bandit-high.json" ]; then
            echo "::error::bandit-high.json not generated"
            exit 1
          fi

          FILESIZE=$(wc -c < bandit-high.json)
          if [ "$FILESIZE" -lt 10 ]; then
            echo "::error::bandit-high.json too small (${FILESIZE} bytes)"
            exit 1
          fi

          COUNT=$(jq '.results | length' bandit-high.json)
          echo "HIGH/HIGH findings: $COUNT"

          if [ "$COUNT" -gt "0" ]; then
            jq -r '.results[] | "  [\(.issue_severity)/\(.issue_confidence)] \(.test_id) \(.test_name) @ \(.filename):\(.line_number)"' bandit-high.json >&2
            echo "::error::Bandit found $COUNT HIGH/HIGH issues. Review the Security tab."
            exit 1
          fi
          echo "Bandit: No HIGH/HIGH findings."

  # --------------------------------------------------------------------------
  # pip-audit: Python Dependency CVE Check (v160.0 — replaces broken Safety)
  # ROOT CAUSE: safety==3.x crashes with AttributeError: module 'typer' has no
  # attribute 'rich_utils' on current GitHub Actions runners. pip-audit is the
  # actively maintained, auth-wall-free, SARIF-native replacement.
  # --------------------------------------------------------------------------
  safety:
    name: Safety Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install "pip-audit==2.7.3"

      - name: Run pip-audit dependency scan
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --skip-editable \
            || true
          echo "pip-audit scan complete"

      - name: Parse pip-audit results
        run: |
          if [ ! -f pip-audit-report.json ] || [ "$(wc -c < pip-audit-report.json)" -lt 5 ]; then
            echo "pip-audit: report not generated — no requirements.txt or no vulnerabilities"
            echo '{"dependencies":[]}' > pip-audit-report.json
            exit 0
          fi

          # pip-audit JSON: {"dependencies": [{"name":..., "vulns": [...]}]}
          TOTAL=$(jq '[.dependencies[].vulns[]] | length' pip-audit-report.json 2>/dev/null || echo "0")
          echo "Total vulnerabilities: $TOTAL"

          if [ "$TOTAL" -eq "0" ]; then
            echo "pip-audit: No known vulnerabilities found."
            exit 0
          fi

          # Show summary for logs
          jq -r '.dependencies[] | select(.vulns | length > 0) | "\(.name)==\(.version): \([.vulns[].id] | join(", "))"' \
            pip-audit-report.json 2>/dev/null || true

          # Count CRITICAL/HIGH by checking CVE severity aliases in vuln IDs
          CRITICAL=$(jq '[.dependencies[].vulns[] | select(.id | test("CVE|PYSEC"))] | length' \
            pip-audit-report.json 2>/dev/null || echo "0")
          echo "CVE-linked vulnerabilities: $CRITICAL"

          if [ "$CRITICAL" -gt "0" ]; then
            echo "::warning::pip-audit found $CRITICAL CVE-linked vulnerabilities. Review pip-audit-report.json and update requirements.txt."
          fi

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report-${{ github.run_id }}
          path: pip-audit-report.json
          retention-days: 30

  # --------------------------------------------------------------------------
  # Semgrep: Pattern-based SAST
  # --------------------------------------------------------------------------
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule' || github.event.inputs.full_scan == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Semgrep (SARIF)
        run: |
          pip install semgrep --quiet
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/jwt \
            --config p/secrets \
            --config p/fastapi \
            --sarif \
            --output semgrep.sarif \
            --timeout 120 \
            agent/ api/ \
            || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Ensure Semgrep SARIF is valid
        if: always()
        run: |
          SCHEMA="https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json"
          MINIMAL_SARIF='{"version":"2.1.0","$schema":"'"${SCHEMA}"'","runs":[{"tool":{"driver":{"name":"Semgrep","informationUri":"https://semgrep.dev","rules":[]}},"results":[]}]}'

          write_minimal() {
            echo "Writing valid minimal SARIF (1 run, 0 results)"
            printf '%s' "${MINIMAL_SARIF}" > semgrep.sarif
          }

          if [ ! -f semgrep.sarif ]; then
            echo "semgrep.sarif not found -- Semgrep produced no output file"
            write_minimal
          else
            BYTES=$(wc -c < semgrep.sarif)
            echo "semgrep.sarif present (${BYTES} bytes)"
            if ! jq empty semgrep.sarif 2>/dev/null; then
              echo "::warning::semgrep.sarif contains malformed JSON -- replacing"
              write_minimal
            else
              RUNS=$(jq '.runs | length' semgrep.sarif)
              echo "semgrep.sarif runs count: ${RUNS}"
              if [ "${RUNS}" -lt "1" ]; then
                echo "::warning::semgrep.sarif has empty runs[] -- GitHub API requires >= 1 -- replacing"
                write_minimal
              else
                echo "semgrep.sarif validated OK: ${RUNS} run(s)"
              fi
            fi
          fi

          echo "Final semgrep.sarif: $(wc -c < semgrep.sarif) bytes, runs=$(jq '.runs | length' semgrep.sarif)"

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # --------------------------------------------------------------------------
  # TruffleHog: Secret Scanning
  # FIX-3: Compute proper diff range before running TruffleHog.
  # --------------------------------------------------------------------------
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Compute TruffleHog scan range
        id: scan-range
        run: |
          EVENT="${{ github.event_name }}"
          echo "Event: $EVENT"

          if [[ "$EVENT" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            ZERO="0000000000000000000000000000000000000000"

            if [[ -z "$BEFORE" || "$BEFORE" == "$ZERO" ]]; then
              echo "First push -- full-filesystem scan"
              echo "base=" >> "$GITHUB_OUTPUT"
              echo "head=" >> "$GITHUB_OUTPUT"
            else
              echo "Push diff: $BEFORE -> $HEAD_SHA"
              echo "base=${BEFORE}" >> "$GITHUB_OUTPUT"
              echo "head=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            fi

          elif [[ "$EVENT" == "pull_request" ]]; then
            PR_BASE="${{ github.event.pull_request.base.sha }}"
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            echo "PR diff: $PR_BASE -> $PR_HEAD"
            echo "base=${PR_BASE}" >> "$GITHUB_OUTPUT"
            echo "head=${PR_HEAD}" >> "$GITHUB_OUTPUT"

          else
            echo "Full scan (${EVENT})"
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "head=" >> "$GITHUB_OUTPUT"
          fi

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ steps.scan-range.outputs.base }}
          head: ${{ steps.scan-range.outputs.head }}
          extra_args: --only-verified

  # --------------------------------------------------------------------------
  # Summary Gate
  # --------------------------------------------------------------------------
  sast-gate:
    name: SAST Gate (required)
    needs: [bandit, safety, trufflehog]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check SAST results
        run: |
          BANDIT="${{ needs.bandit.result }}"
          SAFETY="${{ needs.safety.result }}"
          TRUFFLE="${{ needs.trufflehog.result }}"

          echo "Bandit:      $BANDIT"
          echo "Safety:      $SAFETY"
          echo "TruffleHog:  $TRUFFLE"

          if [[ "$BANDIT" == "failure" || "$SAFETY" == "failure" || "$TRUFFLE" == "failure" ]]; then
            echo "::error::One or more SAST scans failed."
            exit 1
          fi
          echo "All SAST scans passed."
