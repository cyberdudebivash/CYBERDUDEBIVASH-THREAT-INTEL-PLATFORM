# ============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX -- SAST Security Scan
# v47.2 -- Permanent P0 fix (Bandit format, JSONDecodeError, TruffleHog range)
#
# BUG FIXES (commit 6b898a4 regression):
#
#   FIX-1 (Bandit human-readable): --format text -> --format txt
#         'text' is not a valid bandit -f choice; valid: txt, json, csv, sarif, etc.
#
#   FIX-2 (JSONDecodeError cascade): replaced pipe-based JSON parsing with file+jq.
#         bash -o pipefail broke the pipe on bandit non-zero exit; python3 received
#         empty stdin -> JSONDecodeError line 1 col 1 (char 0).
#         Fix: bandit --output bandit-high.json (writes file, not stdout), validate
#         file exists + non-empty, parse with jq (pre-installed on ubuntu-latest).
#
#   FIX-3 (TruffleHog same-commit error): base: branch-name -> event.before SHA.
#         After push lands on main: git rev-parse main == HEAD == 6b898a4.
#         TruffleHog error: "BASE and HEAD commits are the same."
#         Fix: compute scan range per event type before running scan.
#           push:         base=github.event.before, head=github.sha
#           pull_request: base=PR base SHA, head=PR head SHA
#           schedule/dispatch: empty -> TruffleHog full-filesystem scan
# ============================================================================

name: SAST Security Scan -- Bandit + Safety + Semgrep

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      full_scan:
        description: "Run full deep scan (slower, more thorough)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  PYTHON_VERSION: "3.11"

jobs:

  # --------------------------------------------------------------------------
  # Bandit: Python AST-based SAST
  # --------------------------------------------------------------------------
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Bandit
        run: pip install "bandit[sarif]==1.7.8" "bandit-sarif-formatter==1.1.1"

      - name: Run Bandit (SARIF output)
        run: |
          bandit \
            --recursive agent/ \
            --format sarif \
            --output bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            --exclude agent/tests,agent/__pycache__ \
            --skip B101,B601 \
            || true

      - name: Run Bandit (human-readable summary)
        # FIX-1: --format txt  (bandit rejects 'text'; valid formats include txt)
        run: |
          bandit \
            --recursive agent/ \
            --format txt \
            --severity-level high \
            --confidence-level high \
            --exit-zero \
            --output bandit-summary.txt
          echo "Bandit summary (HIGH/HIGH):"
          cat bandit-summary.txt

      - name: Upload Bandit SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Upload Bandit summary artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ github.run_id }}
          path: |
            bandit-results.sarif
            bandit-summary.txt
          retention-days: 30

      - name: Fail on HIGH severity + HIGH confidence findings
        # FIX-2: File output + jq replaces broken pipe->python pattern.
        # Write JSON to file (--output), validate file, count with jq.
        run: |
          bandit \
            --recursive agent/ \
            --format json \
            --output bandit-high.json \
            --severity-level high \
            --confidence-level high \
            --exit-zero

          if [ ! -f "bandit-high.json" ]; then
            echo "::error::bandit-high.json not generated"
            exit 1
          fi

          FILESIZE=$(wc -c < bandit-high.json)
          if [ "$FILESIZE" -lt 10 ]; then
            echo "::error::bandit-high.json too small (${FILESIZE} bytes)"
            exit 1
          fi

          COUNT=$(jq '.results | length' bandit-high.json)
          echo "HIGH/HIGH findings: $COUNT"

          if [ "$COUNT" -gt "0" ]; then
            jq -r '.results[] | "  [\(.issue_severity)/\(.issue_confidence)] \(.test_id) \(.test_name) @ \(.filename):\(.line_number)"' bandit-high.json >&2
            echo "::error::Bandit found $COUNT HIGH/HIGH issues. Review the Security tab."
            exit 1
          fi
          echo "Bandit: No HIGH/HIGH findings."

  # --------------------------------------------------------------------------
  # Safety: Python Dependency CVE Check
  # --------------------------------------------------------------------------
  safety:
    name: Safety Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Safety
        run: pip install "safety==3.2.3"

      - name: Run Safety scan
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          safety check \
            --file requirements.txt \
            --json \
            --output safety-report.json \
            || true

      - name: Parse Safety results
        run: |
          if [ ! -f safety-report.json ] || [ "$(wc -c < safety-report.json)" -lt 5 ]; then
            echo "Safety: report not generated"
            exit 0
          fi

          TOTAL=$(jq 'if type == "array" then length elif .vulnerabilities then (.vulnerabilities | length) else 0 end' safety-report.json 2>/dev/null || echo "0")
          echo "Total vulnerabilities: $TOTAL"

          if [ "$TOTAL" -eq "0" ]; then
            echo "Safety: No known vulnerabilities found."
            exit 0
          fi

          CRITICAL=$(jq 'if type == "array" then [.[] | select(.severity == "CRITICAL" or .severity == "HIGH")] | length elif .vulnerabilities then [.vulnerabilities[] | select(.severity == "CRITICAL" or .severity == "HIGH")] | length else 0 end' safety-report.json 2>/dev/null || echo "0")
          echo "CRITICAL/HIGH: $CRITICAL"

          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::Safety found $CRITICAL CRITICAL/HIGH CVEs. Update requirements.txt."
            exit 1
          fi

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-report-${{ github.run_id }}
          path: safety-report.json
          retention-days: 30

  # --------------------------------------------------------------------------
  # Semgrep: Pattern-based SAST
  # --------------------------------------------------------------------------
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'schedule' || github.event.inputs.full_scan == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep (SARIF)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/jwt
            p/secrets
            p/fastapi
          generateSarif: "1"
          auditOn: push
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # --------------------------------------------------------------------------
  # TruffleHog: Secret Scanning
  # FIX-3: Compute proper diff range before running TruffleHog.
  # --------------------------------------------------------------------------
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute TruffleHog scan range
        id: scan-range
        run: |
          EVENT="${{ github.event_name }}"
          echo "Event: $EVENT"

          if [[ "$EVENT" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
            ZERO="0000000000000000000000000000000000000000"

            if [[ -z "$BEFORE" || "$BEFORE" == "$ZERO" ]]; then
              echo "First push -- full-filesystem scan"
              echo "base=" >> "$GITHUB_OUTPUT"
              echo "head=" >> "$GITHUB_OUTPUT"
            else
              echo "Push diff: $BEFORE -> $HEAD_SHA"
              echo "base=${BEFORE}" >> "$GITHUB_OUTPUT"
              echo "head=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
            fi

          elif [[ "$EVENT" == "pull_request" ]]; then
            PR_BASE="${{ github.event.pull_request.base.sha }}"
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            echo "PR diff: $PR_BASE -> $PR_HEAD"
            echo "base=${PR_BASE}" >> "$GITHUB_OUTPUT"
            echo "head=${PR_HEAD}" >> "$GITHUB_OUTPUT"

          else
            echo "Full scan (${EVENT})"
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "head=" >> "$GITHUB_OUTPUT"
          fi

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ steps.scan-range.outputs.base }}
          head: ${{ steps.scan-range.outputs.head }}
          extra_args: --only-verified

  # --------------------------------------------------------------------------
  # Summary Gate
  # --------------------------------------------------------------------------
  sast-gate:
    name: SAST Gate (required)
    needs: [bandit, safety, trufflehog]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check SAST results
        run: |
          BANDIT="${{ needs.bandit.result }}"
          SAFETY="${{ needs.safety.result }}"
          TRUFFLE="${{ needs.trufflehog.result }}"

          echo "Bandit:      $BANDIT"
          echo "Safety:      $SAFETY"
          echo "TruffleHog:  $TRUFFLE"

          if [[ "$BANDIT" == "failure" || "$SAFETY" == "failure" || "$TRUFFLE" == "failure" ]]; then
            echo "::error::One or more SAST scans failed."
            exit 1
          fi
          echo "All SAST scans passed."
