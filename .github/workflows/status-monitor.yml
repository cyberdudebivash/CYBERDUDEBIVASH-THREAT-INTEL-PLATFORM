# =============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX v134.0 " PLATFORM STATUS MONITOR
# Version: v134.0.0 " PERMANENT PRODUCTION CONTRACT
# =============================================================================
name: CDB Platform Status Monitor v134

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: autonomous-guardian   # Use guardian group " status is lightweight
  cancel-in-progress: false

jobs:
  status-check:
    name: Platform Health Check v134
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2
        with: {fetch-depth: 1}
      - uses: actions/setup-python@v5.4.0
        with: {python-version: '3.12', cache: 'pip'}
      - run: pip install requests --quiet
      - run: mkdir -p data/status

      - name: "Run Platform Status Monitor"
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          CDB_API_URL: ${{ vars.CDB_API_URL || 'https://api.cyberdudebivash.com' }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 - << 'PYEOF'
          import sys, os, json
          from datetime import datetime, timezone
          sys.path.insert(0, os.getcwd())
          try:
              from agent.monitoring.status_page import PlatformStatusMonitor
              monitor = PlatformStatusMonitor()
              status = monitor.run()
              print(f"Platform: {status.get('status','UNKNOWN')}")
          except Exception as e:
              print(f"Status monitor: {e}")
              from pathlib import Path
              Path("data/status").mkdir(exist_ok=True)
              with open("data/status/status.json","w") as f:
                  json.dump({"version":"101.0.0","platform":"CYBERDUDEBIVASH SENTINEL APEX",
                             "status":"MONITORING","generated_at":datetime.now(timezone.utc).isoformat()},f,indent=2)
          PYEOF

      - name: "Safe Commit Status"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "status@cyberdudebivash.com"
          git config --local user.name  "CDB-Status-Bot"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          git add -f data/status/ 2>/dev/null || true
          if git diff --staged --quiet; then echo "No status changes."; exit 0; fi

          git commit -m "Status update: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          for i in 1 2 3; do
            git fetch origin main --quiet
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
            git push origin main && break
            sleep $((i*10)); [ $i -eq 3 ] && echo "Push deferred."
          done

