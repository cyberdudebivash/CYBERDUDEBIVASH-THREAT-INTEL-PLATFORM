# =====================================================================
# SENTINEL APEX — Platform Status Monitor v71.0
# FIXED: gh-pages deploy REMOVED (sentinel-blogger is sole deployer)
# FIXED: Global concurrency lock added
# Status data written to data/status/ and committed to main only.
# =====================================================================
name: CDB Platform Status Monitor

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  status-check:
    name: Platform Health Check & Status Page Generation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Create status directory
        run: mkdir -p data/status

      - name: Run Platform Status Monitor
        env:
          CDB_API_URL: ${{ vars.CDB_API_URL || 'https://api.cyberdudebivash.com' }}
        run: |
          python3 - << 'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          try:
              from agent.monitoring.status_page import PlatformStatusMonitor
              monitor = PlatformStatusMonitor()
              status  = monitor.run()
              print(f"Platform Status: {status['status']}")
              print(f"   Feed entries: {status['components']['threat_feed'].get('entry_count', 0)}")
          except Exception as e:
              print(f"Status monitor error: {e}")
              import json
              from datetime import datetime, timezone
              fallback = {
                  "platform": "CYBERDUDEBIVASH SENTINEL APEX",
                  "status": "MONITORING",
                  "generated_at": datetime.now(timezone.utc).isoformat(),
                  "note": "Status monitor initializing"
              }
              os.makedirs("data/status", exist_ok=True)
              with open("data/status/status.json", "w") as f:
                  json.dump(fallback, f, indent=2)
          PYEOF

      - name: Commit status data
        run: |
          git config user.email "bivash@cyberdudebivash.com"
          git config user.name "CDB-Status-Bot"
          git add data/status/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No status changes to commit."
          else
            git commit -m "Status update: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git pull origin main --no-rebase --no-edit -X ours && git push origin main || echo "Push skipped"
          fi

      # ═══════════════════════════════════════════════════
      # gh-pages deploy REMOVED — sentinel-blogger is
      # the SOLE AUTHORIZED deployer to gh-pages.
      # Status data is committed to main and included
      # in the next sentinel-blogger deployment cycle.
      # ═══════════════════════════════════════════════════
