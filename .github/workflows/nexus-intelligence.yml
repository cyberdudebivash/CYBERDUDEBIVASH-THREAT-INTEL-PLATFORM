name: CDB NEXUS Intelligence Engine v39.0

on:
  schedule:
    - cron: '30 */6 * * *'    # Every 6 hours (offset from blogger)
  workflow_dispatch:
    inputs:
      full_cycle:
        description: 'Run full NEXUS intelligence cycle'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  nexus-intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci-light.txt

      - name: Ensure NEXUS directories
        run: |
          mkdir -p data/nexus
          mkdir -p data/stix

      - name: "Pipeline Lock Check"
        run: |
          if [ -f ".PIPELINE_LOCK" ]; then
            echo "PIPELINE LOCKED - skipping genesis cycle"
            exit 0
          fi
          echo "[OK] No lock active."
      - name: Execute NEXUS Intelligence Cycle
        run: python -m agent.v39_nexus.nexus_engine
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          MANIFEST_PATH: data/stix/feed_manifest.json
          NEXUS_DIR: data/nexus

      - name: Validate NEXUS Output
        run: |
          python -c "
          import json, sys
          try:
              with open('data/nexus/nexus_output.json') as f:
                  data = json.load(f)
              hunts = len(data.get('threat_hunts', []))
              campaigns = len(data.get('campaigns', []))
              chains = len(data.get('attack_chains', []))
              rules = data.get('detection_pack', {}).get('stats', {}).get('total_rules', 0)
              exposure = data.get('exposure', {}).get('overall_score', 0)
              print(f'[OK] NEXUS Validation Passed')
              print(f'   Hunts: {hunts} | Campaigns: {campaigns} | Chains: {chains}')
              print(f'   Rules: {rules} | Exposure: {exposure}/10')
          except Exception as e:
              print(f' NEXUS output validation: {e}')
              sys.exit(0)  # Non-blocking
          "

      - name: Commit NEXUS Intelligence Data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add data/nexus/ -f
          git diff --cached --quiet || git commit -m " NEXUS v39.0: Intelligence cycle $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # FIX v148.0 BUG-B+C: stash-safe 5-attempt push retry
          git stash --include-untracked --quiet 2>/dev/null || true
          git fetch origin main --quiet 2>/dev/null || true
          git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
          git stash pop --quiet 2>/dev/null || true
          NEXUS_PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            if git push origin main; then NEXUS_PUSH_OK=1; break; fi
            echo "::warning::NEXUS push attempt ${ATTEMPT}/5 failed, retrying..."
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            sleep $((ATTEMPT * 8))
          done
          [ "$NEXUS_PUSH_OK" -eq 0 ] && echo "::warning::NEXUS push deferred — will sync next cycle." || true
