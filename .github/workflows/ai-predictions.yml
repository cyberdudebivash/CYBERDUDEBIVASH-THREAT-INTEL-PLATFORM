name: CDB AI Predictive Intelligence

on:
  schedule:
    - cron: '30 */6 * * *'  # Every 6 hours (offset from main pipeline)
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# v50.0 FIX (2026-06-08): Unique concurrency group prevents cancellation by
# other sentinel-data-writer workflows (genesis, nexus, sovereign, zerodayhunter,
# production-hardening, sentinel-blogger) queuing simultaneously.
# Git push conflicts are handled by the rebase retry loop in the commit step.
concurrency:
  group: sentinel-data-writer-ai-predictions
  cancel-in-progress: false

jobs:
  ai-predictions:
    name: AI Predictive Model Scoring & Financial Impact Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Ensure directories
        run: mkdir -p data/ai_predictions data/stix

      - name: Run AI Predictive Models on Latest Manifest
        continue-on-error: true
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python3 scripts/run_ai_predictions.py

      - name: Commit AI prediction results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git config user.name "CYBERDUDEBIVASH"
          git add -f data/ai_predictions/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No AI prediction changes."
          else
            git commit -m " AI Predictions: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
            for i in 1 2 3 4; do
              git fetch origin main --quiet 2>/dev/null || true
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
              if git push origin main; then echo "Push OK ($i/4)"; break; fi
              sleep $((i*15))
              [ $i -eq 4 ] && echo "Push deferred."
            done
          fi
