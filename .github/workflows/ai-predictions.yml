name: CDB AI Predictive Intelligence

on:
  schedule:
    - cron: '30 */6 * * *'  # Every 6 hours (offset from main pipeline)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-predictions
  cancel-in-progress: false

jobs:
  ai-predictions:
    name: AI Predictive Model Scoring & Financial Impact Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Ensure directories
        run: mkdir -p data/ai_predictions data/stix

      - name: Run AI Predictive Models on Latest Manifest
        continue-on-error: true
        run: |
          python - << 'PYEOF'
          import sys, os, json
          from datetime import datetime, timezone
          sys.path.insert(0, os.getcwd())

          manifest_path = "data/stix/feed_manifest.json"
          if not os.path.exists(manifest_path):
              print("No manifest found. AI predictions skipped.")
              sys.exit(0)

          with open(manifest_path) as f:
              raw = json.load(f)
          # v75.1 FIX: Handle both flat list and v70 dict envelope
          entries = raw if isinstance(raw, list) else raw.get("advisories", raw.get("entries", []))

          print(f"Processing {len(entries)} manifest entries...")

          try:
              from agent.ai.predictive_models import PredictiveIntelligenceEngine
              engine = PredictiveIntelligenceEngine()

              # Full manifest enrichment
              enriched = engine.enrich_manifest(entries)

              # Executive summary
              summary = engine.generate_executive_summary(entries)

              # Top risks
              top_risks = engine.get_top_risks(entries, top_n=5)

              output = {
                  "executive_summary": summary,
                  "top_5_risks":       [
                      {
                          "title":   e.get("title",""),
                          "severity": e.get("severity",""),
                          "risk_score": e.get("risk_score",0),
                          "triage_score": e.get("ai_predictions",{}).get("triage",{}).get("triage_score",0),
                          "exploit_probability": e.get("ai_predictions",{}).get("exploit_probability",{}).get("exploit_probability_pct",0),
                          "financial_exposure": e.get("ai_predictions",{}).get("financial_impact",{}).get("loss_range_label","N/A"),
                          "primary_sector": e.get("ai_predictions",{}).get("industry_impact",{}).get("primary_sector","N/A"),
                      }
                      for e in top_risks
                  ],
                  "model_version":  "v24.0",
                  "entries_scored": len(enriched),
                  "generated_at":   datetime.now(timezone.utc).isoformat(),
              }

              output_path = "data/ai_predictions/latest.json"
              with open(output_path, "w") as f:
                  json.dump(output, f, indent=2)

              print(f"\n✅ AI Predictions Complete:")
              print(f"   Entries scored: {output['entries_scored']}")
              print(f"   Critical threats: {summary['critical_threat_count']}")
              print(f"   Avg exploit prob: {summary['avg_exploit_probability']}%")
              print(f"   Max financial exposure: {summary['max_financial_formatted']}")
              print(f"   Sectors at risk: {', '.join(summary['sectors_at_risk'])}")
              print(f"\n   Top 5 Risks:")
              for i, risk in enumerate(output['top_5_risks'], 1):
                  print(f"   {i}. [{risk['severity']}] {risk['title'][:55]}... | Triage: {risk['triage_score']}/100 | Prob: {risk['exploit_probability']}%")

          except Exception as e:
              print(f"AI predictions failed (non-critical): {e}")
              import traceback
              traceback.print_exc()
          PYEOF

      - name: Commit AI prediction results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git config user.name "CDB-AI-Bot"
          git add -f data/ai_predictions/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No AI prediction changes."
          else
            git commit -m "🤖 AI Predictions: $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git rebase --abort 2>/dev/null || true; git merge --abort 2>/dev/null || true
            for i in 1 2 3 4; do
              git fetch origin main --quiet
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
              git push origin main && { echo "Push OK ($i/4)"; break; }
              sleep $((i*15))
              [ $i -eq 4 ] && echo "Push deferred."
            done
          fi
