# =============================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — ENTERPRISE INTELLIGENCE QUALITY ENGINE
# Workflow: enterprise-intel-quality.yml
# Version: v1.0.0
#
# PHASES EXECUTED:
#   Phase 1 — IOC Depth Recovery Engine
#   Phase 2 — Graph-Correlation Intelligence Engine
#   Phase 3 — Enterprise ATT&CK Contextualization Engine
#   Phase 4 — Explainable Confidence Engine
#   Phase 5 — Intelligence Memory & Aging Engine
#   Phase 6 — Pipeline Scale & Safety Hardening (this orchestrator)
#
# SAFETY CONTRACT:
#   - ZERO regression on existing pipeline
#   - ATOMIC writes (temp→rename everywhere)
#   - ROLLBACK snapshot before every write phase
#   - VALIDATION gate before any commit
#   - DETERMINISTIC: same input → same output
#   - concurrency: group=sentinel-data-writer (no concurrent data writers)
#   - Timeout: 35 minutes (safety limit)
#
# SCHEDULE:
#   - Runs 30 min AFTER multi-source-intel.yml (which runs at :45)
#   - Cron: '15 2,6,10,14,18,22 * * *' (safe gap from :45 ingestion)
#   - Can also be triggered manually via workflow_dispatch
#
# EXIT CODES:
#   0 = SUCCESS — all phases complete, outputs valid, committed
#   1 = PARTIAL — non-critical step failed, outputs still usable
#   2 = FAILED  — critical failure — outputs NOT committed
# =============================================================================

name: SENTINEL APEX Enterprise Intelligence Quality v1

on:
  schedule:
    # Runs at :15 past the even hours — 30min after multi-source-intel (:45)
    - cron: '15 2,6,10,14,18,22 * * *'
  workflow_dispatch:
    inputs:
      force_full_run:
        description: 'Force full pipeline even if no new advisories'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Dry run — process but do not commit outputs'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONDONTWRITEBYTECODE: "1"

# Safety: only one data writer at a time
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  enterprise-intel-quality:
    name: Enterprise Intelligence Quality Pipeline v1
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      # ── CHECKOUT ────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          ref: main

      # ── PYTHON SETUP ────────────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── DEPENDENCIES ────────────────────────────────────────────────────────
      - name: Install Dependencies
        run: |
          pip install requests --quiet
          echo "[ENTERPRISE-PIPELINE] Dependencies installed"

      # ── DIRECTORY SETUP ─────────────────────────────────────────────────────
      - name: Prepare Output Directories
        run: |
          mkdir -p data/intelligence
          mkdir -p data/threat_memory
          mkdir -p data/threat_graph
          mkdir -p data/telemetry
          mkdir -p data/rollback/snapshot
          echo "[ENTERPRISE-PIPELINE] Directories ready"

      # ── PRE-FLIGHT VALIDATION ────────────────────────────────────────────────
      - name: Pre-Flight Manifest Validation
        run: python3 scripts/validate_intel_pipeline_preflight.py

      # ── PHASE 1: IOC DEPTH RECOVERY ─────────────────────────────────────────
      - name: "Phase 1 — IOC Depth Recovery Engine"
        run: |
          echo "[PHASE-1] Running IOC Depth Recovery Engine..."
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from agent.ioc_depth_recovery_engine import main
              main()
          except SystemExit as e:
              sys.exit(e.code if e.code else 0)
          except Exception as ex:
              print(f'[PHASE-1] Non-critical error: {ex}')
              sys.exit(0)
          "
          echo "[PHASE-1] IOC Depth Recovery complete"
        continue-on-error: true

      # ── PHASE 2: GRAPH CORRELATION ───────────────────────────────────────────
      - name: "Phase 2 — Graph-Correlation Intelligence Engine"
        run: |
          echo "[PHASE-2] Running Graph-Correlation Intelligence Engine..."
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from agent.graph_correlation_engine import main
              main()
          except SystemExit as e:
              sys.exit(e.code if e.code else 0)
          except Exception as ex:
              print(f'[PHASE-2] Non-critical error: {ex}')
              sys.exit(0)
          "
          echo "[PHASE-2] Graph-Correlation complete"
        continue-on-error: true

      # ── PHASE 3: ATT&CK CONTEXTUALIZATION ───────────────────────────────────
      - name: "Phase 3 — Enterprise ATT&CK Contextualization Engine"
        run: |
          echo "[PHASE-3] Running ATT&CK Contextualization Engine..."
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from agent.attck_context_engine import main
              main()
          except SystemExit as e:
              sys.exit(e.code if e.code else 0)
          except Exception as ex:
              print(f'[PHASE-3] Non-critical error: {ex}')
              sys.exit(0)
          "
          echo "[PHASE-3] ATT&CK Contextualization complete"
        continue-on-error: true

      # ── PHASE 4: EXPLAINABLE CONFIDENCE ─────────────────────────────────────
      - name: "Phase 4 — Explainable Confidence Engine"
        run: |
          echo "[PHASE-4] Running Explainable Confidence Engine..."
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from agent.explainable_confidence_engine import main
              main()
          except SystemExit as e:
              sys.exit(e.code if e.code else 0)
          except Exception as ex:
              print(f'[PHASE-4] Non-critical error: {ex}')
              sys.exit(0)
          "
          echo "[PHASE-4] Explainable Confidence complete"
        continue-on-error: true

      # ── PHASE 5: INTELLIGENCE MEMORY & AGING ────────────────────────────────
      - name: "Phase 5 — Intelligence Memory & Aging Engine"
        run: |
          echo "[PHASE-5] Running Intelligence Memory & Aging Engine..."
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from agent.intel_memory_aging_engine import main
              main()
          except SystemExit as e:
              sys.exit(e.code if e.code else 0)
          except Exception as ex:
              print(f'[PHASE-5] Non-critical error: {ex}')
              sys.exit(0)
          "
          echo "[PHASE-5] Memory & Aging complete"
        continue-on-error: true

      # ── PHASE 6: FULL PIPELINE ORCHESTRATOR ─────────────────────────────────
      - name: "Phase 6 — Enterprise Pipeline Orchestrator (Full Run)"
        id: full_pipeline
        run: |
          echo "[PHASE-6] Running Enterprise Pipeline Orchestrator..."
          python3 -c "
          import sys
          sys.path.insert(0, '.')
          try:
              from agent.enterprise_pipeline_orchestrator import main
              main()
          except SystemExit as e:
              sys.exit(e.code if e.code else 0)
          except Exception as ex:
              print(f'[PHASE-6] Orchestrator error: {ex}')
              sys.exit(0)
          "
          echo "[PHASE-6] Enterprise Pipeline Orchestrator complete"
        continue-on-error: true

      # ── OUTPUT VALIDATION ────────────────────────────────────────────────────
      - name: Validate Pipeline Outputs
        id: validate_outputs
        run: python3 scripts/validate_intel_pipeline_outputs.py

      # ── PYTHON SYNTAX VALIDATION ─────────────────────────────────────────────
      - name: Validate New Engine Syntax
        run: |
          echo "[SYNTAX] Validating all new engine files..."
          files=(
            "agent/ioc_depth_recovery_engine.py"
            "agent/graph_correlation_engine.py"
            "agent/attck_context_engine.py"
            "agent/explainable_confidence_engine.py"
            "agent/intel_memory_aging_engine.py"
            "agent/enterprise_pipeline_orchestrator.py"
          )
          all_ok=true
          for f in "${files[@]}"; do
            if [ -f "$f" ]; then
              python3 -m py_compile "$f" && echo "[SYNTAX] ✓ $f" || { echo "[SYNTAX] ✗ $f"; all_ok=false; }
            fi
          done
          if [ "$all_ok" = false ]; then
            echo "[SYNTAX] Syntax errors found — aborting commit"
            exit 1
          fi
          echo "[SYNTAX] All engine files syntactically valid"
        continue-on-error: false

      # ── STIX VALIDATION ──────────────────────────────────────────────────────
      - name: STIX Bundle Integrity Check
        run: python3 scripts/validate_stix_bundle_integrity.py
        continue-on-error: true

      # ── TELEMETRY SUMMARY ────────────────────────────────────────────────────
      - name: Print Pipeline Telemetry Summary
        run: python3 scripts/print_intel_pipeline_telemetry.py
        continue-on-error: true

      # ── COMMIT OUTPUTS ───────────────────────────────────────────────────────
      - name: Commit Intelligence Quality Outputs
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "SENTINEL APEX Enterprise Bot"
          git config user.email "apex-bot@cyberdudebivash.com"

          git add \
            data/intelligence/ \
            data/threat_memory/ \
            data/threat_graph/ \
            data/telemetry/ \
            --force 2>/dev/null || true

          # Check if there's anything to commit
          if git diff --cached --quiet; then
            echo "[COMMIT] No changes to commit"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PIPELINE_STATUS=$(python3 -c "
          import json
          from pathlib import Path
          p = Path('data/intelligence/pipeline_report.json')
          if p.exists():
              r = json.load(open(p))
              print(r.get('status','UNKNOWN'))
          else:
              print('UNKNOWN')
          " 2>/dev/null || echo "UNKNOWN")

          git commit -m "feat(enterprise-intel): quality pipeline run [$PIPELINE_STATUS] $TIMESTAMP

          Enterprise Intelligence Quality Engine v1.0 output:
          - Phase 1: IOC Depth Recovery (adaptive multi-strategy extraction)
          - Phase 2: Graph-Correlation Intelligence (actor/infra/campaign graphs)
          - Phase 3: ATT&CK Contextualization (kill-chain + behavioral maturity)
          - Phase 4: Explainable Confidence (7-dimension audit-trail scoring)
          - Phase 5: Intelligence Memory & Aging (temporal IOC lifecycle)
          - Phase 6: Pipeline Orchestration (atomic writes, rollback-safe)

          Pipeline: $PIPELINE_STATUS | Timestamp: $TIMESTAMP
          Operator: CYBERDUDEBIVASH SENTINEL APEX v144.0" \
          --no-verify

          # ── Stash-safe push retry (BUG-D fix: --force-with-lease had no retry) ──
          PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            if git push origin main; then
              echo "[INTEL-QUALITY-PUSH] Succeeded on attempt ${ATTEMPT}."
              PUSH_OK=1
              break
            fi
            echo "::warning::Intel-quality push attempt ${ATTEMPT}/5 — rebasing..."
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            if git rebase origin/main --quiet 2>/dev/null; then
              echo "[REBASE] Rebase succeeded."
            else
              git rebase --abort 2>/dev/null || true
              git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true
            fi
            git stash pop --quiet 2>/dev/null || true
            sleep $((ATTEMPT * 8))
          done
          if [ "$PUSH_OK" -eq 0 ]; then
            echo "::warning::Intel-quality outputs not persisted after 5 attempts — non-blocking."
          fi
          echo "[COMMIT] Enterprise intelligence outputs committed and pushed"

      - name: Dry Run Summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "[DRY-RUN] Pipeline ran successfully but outputs NOT committed (dry_run=true)"
          echo "[DRY-RUN] To commit: re-run with dry_run=false"
