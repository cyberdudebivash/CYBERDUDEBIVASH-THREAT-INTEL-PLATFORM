name: CDB Weekly Analyst Briefing

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC — Weekly briefing
  workflow_dispatch:
    inputs:
      week_override:
        description: 'Override week number (e.g., 2026-W08)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  weekly-briefing:
    name: Generate & Publish Weekly Threat Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ensure output directories
        run: |
          mkdir -p data/weekly_briefings
          mkdir -p data/stix

      - name: Generate Weekly Threat Intelligence Briefing
        env:
          BLOG_ID:          ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN:    ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID:        ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET:    ${{ secrets.CLIENT_SECRET }}
          NVD_API_KEY:      ${{ secrets.NVD_API_KEY }}
          CI: true
        run: |
          python - << 'PYEOF'
          import sys, os, json
          from datetime import datetime, timezone, timedelta

          sys.path.insert(0, os.getcwd())

          # Load manifest for weekly summary
          manifest_path = "data/stix/feed_manifest.json"
          if not os.path.exists(manifest_path):
              print("No manifest found. Skipping briefing.")
              sys.exit(0)

          with open(manifest_path) as f:
              entries = json.load(f)

          # Filter to last 7 days
          cutoff = datetime.now(timezone.utc) - timedelta(days=7)
          recent = []
          for e in entries:
              try:
                  ts_str = e.get("generated_at") or e.get("timestamp") or ""
                  if ts_str:
                      ts = datetime.fromisoformat(ts_str.replace("Z", "+00:00"))
                      if ts >= cutoff:
                          recent.append(e)
                  else:
                      recent.append(e)
              except Exception:
                  recent.append(e)

          # Generate briefing summary
          week = datetime.now(timezone.utc).strftime("W%V-%Y")
          critical = [e for e in recent if e.get("severity") == "CRITICAL"]
          high      = [e for e in recent if e.get("severity") == "HIGH"]
          kev_hits  = [e for e in recent if e.get("kev_present")]

          briefing = {
              "week":              week,
              "period":            f"{(datetime.now(timezone.utc)-timedelta(days=7)).strftime('%Y-%m-%d')} to {datetime.now(timezone.utc).strftime('%Y-%m-%d')}",
              "total_advisories":  len(recent),
              "critical_count":    len(critical),
              "high_count":        len(high),
              "kev_count":         len(kev_hits),
              "avg_risk_score":    round(sum(float(e.get("risk_score",0)) for e in recent)/max(len(recent),1), 2),
              "top_threats":       sorted(recent, key=lambda x: float(x.get("risk_score",0)), reverse=True)[:5],
              "generated_at":      datetime.now(timezone.utc).isoformat(),
              "platform":          "CYBERDUDEBIVASH SENTINEL APEX",
          }

          # Save briefing
          briefing_path = f"data/weekly_briefings/briefing-{week}.json"
          with open(briefing_path, "w") as f:
              json.dump(briefing, f, indent=2)

          print(f"Weekly Briefing {week}:")
          print(f"  Total advisories: {briefing['total_advisories']}")
          print(f"  Critical:         {briefing['critical_count']}")
          print(f"  High:             {briefing['high_count']}")
          print(f"  KEV confirmed:    {briefing['kev_count']}")
          print(f"  Avg risk score:   {briefing['avg_risk_score']}")
          print(f"  Saved: {briefing_path}")
          PYEOF

      - name: Run AI Predictive Analysis on Weekly Threats
        continue-on-error: true
        run: |
          python - << 'PYEOF'
          import sys, os, json
          sys.path.insert(0, os.getcwd())
          try:
              from agent.ai.predictive_models import PredictiveIntelligenceEngine
              manifest_path = "data/stix/feed_manifest.json"
              with open(manifest_path) as f:
                  entries = json.load(f)[:20]

              engine = PredictiveIntelligenceEngine()
              summary = engine.generate_executive_summary(entries)
              summary_path = "data/weekly_briefings/ai_executive_summary.json"
              with open(summary_path, "w") as f:
                  json.dump(summary, f, indent=2)
              print(f"AI Executive Summary generated: {summary_path}")
              print(f"  Avg exploit probability: {summary['avg_exploit_probability']}%")
              print(f"  Sectors at risk: {summary['sectors_at_risk']}")
              print(f"  Max financial exposure: {summary['max_financial_formatted']}")
          except Exception as e:
              print(f"AI analysis skipped (non-critical): {e}")
          PYEOF

      - name: Commit weekly briefing data
        run: |
          git config user.email "bivash@cyberdudebivash.com"
          git config user.name "CDB-Weekly-Bot"
          git add data/weekly_briefings/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No weekly briefing changes."
          else
            git commit -m "📊 Weekly Threat Briefing: $(date -u +'%Y-W%V') [skip ci]"
            for i in {1..3}; do
              git pull origin main --rebase && git push origin main && break || sleep 10
            done
          fi
