name: CDB Weekly Analyst Briefing

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC  -  Weekly briefing
  workflow_dispatch:
    inputs:
      week_override:
        description: 'Override week number (e.g., 2026-W08)'
        required: false
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  weekly-briefing:
    name: Generate & Publish Weekly Threat Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install requests feedparser --quiet
          [ -f requirements-ci-light.txt ] && pip install -r requirements-ci-light.txt --quiet || true

      - name: Ensure output directories
        run: |
          mkdir -p data/weekly_briefings
          mkdir -p data/stix

      - name: Generate Weekly Threat Intelligence Briefing
        env:
          CDB_JWT_SECRET:   ${{ secrets.CDB_JWT_SECRET }}
          BLOG_ID:          ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN:    ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID:        ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET:    ${{ secrets.CLIENT_SECRET }}
          NVD_API_KEY:      ${{ secrets.NVD_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          CI: true
        run: python3 scripts/generate_weekly_briefing.py

      - name: Run AI Predictive Analysis on Weekly Threats
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python3 scripts/run_weekly_ai_predictions.py

      - name: Commit weekly briefing data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git config user.name "CYBERDUDEBIVASH"
          git add -f data/weekly_briefings/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No weekly briefing changes."
          else
            git commit -m " Weekly Threat Briefing: $(date -u +'%Y-W%V') [skip ci]"
            for i in 1 2 3; do
              git stash --include-untracked --quiet 2>/dev/null || true
              git fetch origin main --quiet 2>/dev/null || true
              git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
              git stash pop --quiet 2>/dev/null || true
              if git push origin main; then break; fi
              echo "::warning::Weekly briefing push attempt ${i}/3 failed, retrying..."
              sleep $((i * 10))
            done
          fi
