# STAGE 2.5: INTEL FRESHNESS GATE
# Fails the pipeline if the manifest has NO entries (hard stop).
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโโ Intel Freshness Gate รขโฌโ Fail if manifest empty"
        run: |
          python3 - << 'PYEOF'
          import json, sys, os

          manifest   = "data/stix/feed_manifest.json"
          MIN_ENTRIES = 10  # Absolute minimum รขโฌ" fail hard if below this

          if not os.path.exists(manifest):
              print(f"FATAL: {manifest} missing after stabilisation step.")
              sys.exit(1)

          try:
              d = json.load(open(manifest))
              # Handle both formats: engine may produce LIST or DICT.
              # Manifest Stabilisation should have normalised to DICT by now,
              # but this is a safety net for any future format changes.
              if isinstance(d, list):
                  count = len(d)
                  print(f"WARNING: Manifest is still in LIST format at gate รขโฌ" "
                        f"normalisation step may have been skipped. Count={count}.")
              elif isinstance(d, dict):
                  items = d.get("advisories", d.get("reports", d.get("items", [])))
                  count = len(items) if isinstance(items, list) else 0
              else:
                  print(f"FATAL: Unexpected manifest root type: {type(d).__name__}")
                  sys.exit(1)
          except Exception as e:
              print(f"FATAL: Cannot parse {manifest}: {e}")
              sys.exit(1)

          if count < MIN_ENTRIES:
              print(f"FATAL: Manifest has only {count} entries (minimum: {MIN_ENTRIES})")
              print("Root causes to check in logs above:")
              print("  1. Engine manifest format (list vs dict)")
              print("  2. Manifest Stabilisation normalisation output")
              print("  3. clean_feed_manifest.py exit code")
              sys.exit(1)

          print(f"รขลโฆ FRESHNESS GATE PASSED: {count} entries in manifest.")
          PYEOF

