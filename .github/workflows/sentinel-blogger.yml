          set -euo pipefail

          echo "--- [GROWTH] SEO Blog Generator ---"
          if python3 scripts/growth/seo_blog_generator.py; then
            echo "[GROWTH] SEO posts generated"
          else
            echo "[GROWTH] SEO complete (non-fatal)"
          fi

          echo "--- [GROWTH] Weekly Threat Page ---"
          if python3 << 'EOF'
          from scripts.growth.seo_blog_generator import generate_weekly_page
          r = generate_weekly_page()
          print("[GROWTH] Weekly page:", r or "skipped")
          EOF
          then
            echo "[GROWTH] Weekly page generated"
          else
            echo "[GROWTH] Weekly page complete (non-fatal)"
          fi

          echo "--- [GROWTH] Telegram Daily Roundup ---"
          if python3 scripts/growth/telegram_content_generator.py daily_roundup; then
            echo "[GROWTH] Telegram roundup done"
          else
            echo "[GROWTH] Telegram complete (non-fatal)"
          fi

          echo "--- [GROWTH] Telegram CVE Spotlight ---"
          if python3 scripts/growth/telegram_content_generator.py cve_spotlight; then
            echo "[GROWTH] Telegram spotlight done"
          else
            echo "[GROWTH] Telegram spotlight complete (non-fatal)"
          fi

          echo "--- [GROWTH] LinkedIn Threat Insight ---"
          if python3 scripts/growth/linkedin_content_generator.py threat_insight; then
            echo "[GROWTH] LinkedIn post generated"
          else
            echo "[GROWTH] LinkedIn complete (non-fatal)"
          fi

          echo "[GROWTH] Content generation stage complete"

      # ── STAGE 8: Deploy to GitHub Pages ──────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          commit-message: "Deploying to gh-pages from @ ${{ github.repository }}@${{ github.sha }} 🚀"
          git-config-name: cyberdudebivash
          git-config-email: cyberdudebivash@users.noreply.github.com
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── STAGE 9: Pipeline summary ─────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        shell: bash
        run: |
          echo "======================================================="
          echo "SENTINEL APEX v77.2 Pipeline Summary"
          echo "======================================================="
          echo "Timestamp: $(date -u)"
          echo "Commit:    ${{ github.sha }}"
          echo "Trigger:   ${{ github.event_name }}"

          if [ -f data/status/feed_health.json ]; then
            python3 -c "
          import json
          with open('data/status/feed_health.json') as f:
              h = json.load(f)
          print('Feed Health: ', h.get('alive', 0), 'alive /', h.get('dead', 0), 'dead')
          if h.get('dead_feeds'):
              print('Dead feeds (for investigation):')
              for feed in h.get('dead_feeds', []):
                  print(' -', feed)
            " 2>/dev/null || true
          fi

          echo "======================================================="

      # ── Cleanup on failure ────────────────────────────────────────────────
      - name: Cleanup secrets on failure
        if: failure()
        shell: bash
        run: |
          rm -f secrets/.env
          echo "Secrets cleaned up after failure"
