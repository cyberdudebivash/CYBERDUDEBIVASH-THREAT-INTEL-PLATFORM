# ================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Sovereign Intelligence Cycle
# Version: v76.0 (v75.1 base + v76 Platform Finalizer)
# ================================================================
# This workflow PRESERVES all v64.4 working functionality AND
# adds v70/v75/v76 intelligence enhancements as ADDITIVE stages.
# ================================================================

name: sentinel-blogger

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false
      skip_ai:
        description: 'Skip AI phases (faster run)'
        required: false
        type: boolean
        default: false

# v75.0: Opt into Node.js 24 runtime for all actions — eliminates Node.js 20 deprecation warning
# GitHub will force Node.js 24 on June 2nd 2026. This is a safe early opt-in.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write

concurrency:
  group: sentinel-sync
  cancel-in-progress: false

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

# ================================================================
# STAGE 0: CHECKOUT & SETUP (from v64 — preserved exactly)
# ================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Directories
        run: |
          mkdir -p data/stix data/stix/archive data/nexus data/genesis data/cortex data/quantum data/sovereign data/rule_packs data/playbooks data/playbooks/scripts data/premium_packs data/enterprise_kits data/enrichment data/status data/logs data/remediation data/.manifest_backups data/manifest_versions data/archive data/v46_ultraintel api secrets

# ================================================================
# STAGE 1: PRE-FLIGHT (from v64 — preserved exactly)
# ================================================================
      - name: Monthly Maintenance
        if: github.event.schedule == '0 0 1 * *'
        run: |
          python -m agent.janitor || true
          # v75.1: Archive orphaned STIX bundles older than 90 days
          if [ -f scripts/v75_stix_cleanup.py ]; then
            python3 scripts/v75_stix_cleanup.py --max-orphans=500 || true
          fi

      - name: Inject Sovereign Key
        run: |
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem

# ================================================================
# STAGE 2: INGEST — Sentinel Engine (from v64 — preserved exactly)
# This is what fetches FRESH INTEL from global sources
# ================================================================
      - name: Run Sentinel Engine
        continue-on-error: true
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "Running Sentinel Engine (SAFE MODE)"
          set +e
          timeout 1500 python -m agent.sentinel_blogger
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Sentinel engine error ignored (non-blocking)"
          fi

# ================================================================
# STAGE 2.1: STATE UPDATE (from v64 — preserved exactly)
# ================================================================
      - name: Update Sync State
        run: |
          python3 scripts/update_embedded_intel.py || true

# ================================================================
# STAGE 2.5: v70 DATA BRIDGE + INTELLIGENCE PIPELINE (NEW — ADDITIVE)
# Runs AFTER v64 ingestion to enhance data with AI/ML
# ================================================================
      - name: "v70: Data Bridge"
        continue-on-error: true
        run: |
          echo "::group::v70 Data Bridge"
          if [ -f scripts/data_bridge.py ]; then
            python scripts/data_bridge.py
            BRIDGE_EXIT=$?
            if [ $BRIDGE_EXIT -eq 0 ]; then
              echo "DATA_BRIDGE_OK=true" >> $GITHUB_ENV
              echo "Data bridge completed successfully"
            else
              echo "DATA_BRIDGE_OK=false" >> $GITHUB_ENV
              echo "Data bridge had issues (non-fatal)"
            fi
          else
            echo "DATA_BRIDGE_OK=false" >> $GITHUB_ENV
            echo "Data bridge not present — skipping v70 enhancements"
          fi
          echo "::endgroup::"

      - name: "v70: Intelligence Pipeline"
        continue-on-error: true
        timeout-minutes: 5
        env:
          TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
          TOKENIZERS_PARALLELISM: "false"
        run: |
          echo "::group::v70 Intelligence Pipeline"
          if [ -d agent/v70_apex_upgrade ]; then
            AI_FLAG=""
            if [ "${{ github.event.inputs.skip_ai }}" = "true" ]; then
              AI_FLAG="--no-ai"
            fi
            # v75.0: Always run orchestrator regardless of data bridge status
            # Previously only ran when DATA_BRIDGE_OK=true, causing silent skips
            timeout 240 python -m agent.v70_apex_upgrade.orchestrator \
              --data-dir data \
              --dashboard index.html \
              --json $AI_FLAG \
              | tee /tmp/v70_result.json || echo "v70 orchestrator had issues (non-fatal)"

            if [ -f /tmp/v70_result.json ]; then
              python3 -c '
          import json
          d = json.load(open("/tmp/v70_result.json"))
          print("v70 Status: " + ("PASS" if d.get("success") else "FAIL"))
          print("v70 Advisories: " + str(d.get("total_advisories", "?")))
          print("v70 Dedup: " + str(d.get("dedup_removed", "?")))
          print("v70 Correlations: " + str(d.get("correlations_found", "?")))
          '
            fi
          else
            echo "v70 module not present — skipping intelligence enhancements"
          fi
          echo "::endgroup::"

      - name: "v74: Manifest Enrichment"
        continue-on-error: true
        run: |
          if [ -f scripts/v74_manifest_enricher.py ]; then
            python3 scripts/v74_manifest_enricher.py
          else
            echo "v74 enricher not present — skipping"
          fi

      - name: "v75: Pipeline Hardener (Sort + Dedup + Archive)"
        continue-on-error: false
        run: |
          echo "::group::v75 Pipeline Hardener"
          # CRITICAL: Runs AFTER all intel generation, BEFORE dashboard patch.
          # Fixes: sort-before-trim bug, strong dedup, timestamp validation, daily archive.
          if [ -f scripts/v75_pipeline_hardener.py ]; then
            python3 scripts/v75_pipeline_hardener.py
            HARDENER_EXIT=$?
            if [ $HARDENER_EXIT -ne 0 ]; then
              echo "::error::v75 hardener failed (exit $HARDENER_EXIT) — pipeline halted"
              exit 1
            fi
            echo "v75 hardener: PASS"
          else
            echo "::warning::v75_pipeline_hardener.py not found — skipping"
          fi
          echo "::endgroup::"

      - name: "v74: Re-patch EMBEDDED_INTEL with enriched data"
        continue-on-error: true
        run: |
          if [ -f scripts/update_embedded_intel.py ]; then
            python3 scripts/update_embedded_intel.py || true
          fi

      - name: "Update Sync Marker"
        continue-on-error: true
        run: |
          if [ -f scripts/update_sync_marker.sh ]; then
            bash scripts/update_sync_marker.sh || true
          else
            echo "{\"last_sync\":\"$(date -u +%Y-%m-%dT%H:%M:%S+00:00)\",\"updated_by\":\"sentinel-blogger\"}" > data/sync_marker.json
          fi

# ================================================================
# STAGE 3: SAFE GIT SYNC (from v64 — preserved exactly)
# ================================================================
      - name: "STAGE 3: Safe Git Sync (v74.5 — COMMIT-FIRST + PERMANENT FULL STAGE)"
        run: |
          rm -rf .git/rebase-merge || true
          rm -rf .git/rebase-apply || true

          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          # ─────────────────────────────────────────────────────────────────────
          # v74.5 PERMANENT FIX — DEFINITIVE SOLUTION
          #
          # ROOT CAUSE OF RECURRING FAILURES:
          #   The old "data/*.json" glob only matches FILES in the data/ root.
          #   It does NOT match subdirectories. The pipeline writes to:
          #     data/status/status.json         ← update_sync_marker.sh
          #     data/.manifest_backups/         ← update_embedded_intel.py + v70
          #     data/manifest_versions/         ← update_embedded_intel.py + v70
          #     data/sovereign/                 ← quality_gate_audit.py
          #     data/enrichment/                ← pipeline_hardener.py
          #     data/archive/                   ← v75 pipeline_hardener
          #   All these were left UNSTAGED, causing git pull to abort with
          #   "your local changes would be overwritten" even after committing.
          #
          # THE FIX:
          #   Use "git add data/" to stage the ENTIRE data directory recursively.
          #   This is future-proof: any new subdirectory added by any script
          #   will automatically be staged without needing another workflow patch.
          # ─────────────────────────────────────────────────────────────────────
          git add data/ 2>/dev/null || true          # ALL of data/ — recursive, future-proof
          git add api/ 2>/dev/null || true           # api/feed.json + api/latest.json
          git add index.html 2>/dev/null || true     # dashboard
          git add threat/ 2>/dev/null || true        # threat intelligence pages
          git add sitemap.xml 2>/dev/null || true    # sitemap

          if ! git diff --staged --quiet; then
            git commit -m "v76.0 Pipeline data [skip ci]"
          fi

          # SAFETY LAYER: Discard any remaining unstaged changes (e.g. temp files)
          # so git pull can NEVER abort with "changes would be overwritten"
          git checkout -- . 2>/dev/null || true

          # Pull with merge (not rebase), ours strategy for conflicts
          git pull origin main --no-rebase --no-edit -X ours || {
            echo "Pull conflict — resolving with ours strategy..."
            git checkout --ours index.html 2>/dev/null || true
            git add index.html 2>/dev/null || true
            git commit --no-edit 2>/dev/null || true
          }

          # SAFETY CHECK: Verify no conflict markers in index.html
          if grep -q '<<<<<<<' index.html 2>/dev/null; then
            echo "FATAL: Conflict markers detected — cleaning index.html"
            git checkout HEAD~1 -- index.html 2>/dev/null || true
            python3 scripts/update_embedded_intel.py || true
            git add index.html
            git commit --amend --no-edit 2>/dev/null || true
          fi

# ================================================================
# STAGE 4: COMMIT CORE DATA (from v64 — preserved exactly)
# ================================================================
      - name: "STAGE 4: Push (v73.4)"
        run: |
          # Changes already committed in STAGE 3
          # Just push (or pull+push if behind)
          git push origin main || {
            git pull origin main --no-rebase --no-edit -X ours
            git push origin main
          }

# ================================================================
# STAGE 5: DEPLOY CORE (from v64 — preserved exactly)
# ================================================================
      - name: "GATE: Pre-deploy integrity check (v73.4)"
        run: |
          python3 scripts/pre_deploy_gate.py || {
            echo "GATE FAILED — attempting auto-repair..."
            python3 scripts/update_embedded_intel.py || true
            python3 scripts/pre_deploy_gate.py
          }

      - name: Deploy Core
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false

# ================================================================
# STAGE 5.1: OPTIONAL HARDENING (from v64 — preserved exactly)
# ================================================================
      - name: Pipeline Hardener
        continue-on-error: true
        run: |
          python agent/v48_pipeline_hardening/pipeline_hardener.py || true

      - name: Quality Gate
        continue-on-error: true
        run: |
          python agent/quality_gate_audit.py || true

      - name: Generate Threat Pages
        continue-on-error: true
        run: |
          python scripts/threat_page_generator.py || true

# ================================================================
# STAGE 6: POST-EXTRAS COMMIT + DEPLOY (from v64 — preserved exactly)
# ================================================================
      - name: Commit Post Extras
        continue-on-error: true
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          # v74.5: Same permanent fix — stage ALL of data/ recursively
          git add data/ 2>/dev/null || true
          git add api/ 2>/dev/null || true
          git add threat/ sitemap.xml 2>/dev/null || true
          git checkout -- . 2>/dev/null || true  # discard any remaining unstaged

          if ! git diff --staged --quiet; then
            git commit -m "v76.0 Post Extras [skip ci]"
            git push origin main
          fi

      - name: "GATE: Pre-deploy check (Post Extras)"
        continue-on-error: true
        run: python3 scripts/pre_deploy_gate.py

      - name: Deploy Post Extras
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false

# ================================================================
# STAGE 6.5: v76 PLATFORM FINALIZER (NEW — runs after all deploys)
# Syncs API endpoints, writes health reports, prunes old data
# ================================================================
      - name: "v76: Platform Finalizer"
        continue-on-error: true
        run: |
          echo "::group::v76 Platform Finalizer"
          if [ -f scripts/v76_platform_finalizer.py ]; then
            python3 scripts/v76_platform_finalizer.py
          else
            echo "::warning::v76_platform_finalizer.py not found"
          fi
          echo "::endgroup::"

      - name: "v76: Commit Finalizer Outputs"
        continue-on-error: true
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          git add api/ data/status/ data/archive/ VERSION 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "v76.0 Platform state [skip ci]"
            git push origin main || true
          fi

# ================================================================
# STAGE 7: PIPELINE SUMMARY (v70 — new, additive)
# ================================================================
      - name: Pipeline Summary
        if: always()
        run: |
          echo "======================================================="
          echo "SENTINEL APEX v76.0 Pipeline Summary"
          echo "======================================================="
          echo "Timestamp: $(date -u)"
          if [ -f /tmp/v70_result.json ]; then
            python3 -c '
          import json
          d = json.load(open("/tmp/v70_result.json"))
          status = "PASS" if d.get("success") else "FAIL"
          print("v70 Intelligence: " + status)
          print("Advisories: " + str(d.get("total_advisories", "?")))
          print("Dedup Removed: " + str(d.get("dedup_removed", "?")))
          print("Correlations: " + str(d.get("correlations_found", "?")))
          print("Duration: " + str(d.get("duration_seconds", "?")) + "s")
          icons = {"OK": "+", "SKIPPED": ">", "DEGRADED": "!", "FAILED": "X"}
          for p in d.get("phases", []):
              icon = icons.get(p["status"], "?")
              print("  [" + icon + "] " + p["phase"] + ": " + p["status"] + " (" + str(p["duration_s"]) + "s)")
          ' || true
          else
            echo "v70 intelligence pipeline did not run"
          fi
          # v75 archive summary
          if [ -f data/archive/index.json ]; then
            python3 -c '
          import json
          idx = json.load(open("data/archive/index.json"))
          print("v75 Archive: " + str(idx.get("total_archive_days","?")) + " days | " + str(idx.get("total_archive_entries","?")) + " total archived")
          dates = idx.get("dates", [])
          if dates:
              latest = dates[0]
              print("  Latest: " + latest.get("date","?") + " — " + str(latest.get("count","?")) + " entries")
          ' || true
          fi
          if [ -f data/status/pipeline_health.json ]; then
            python3 -c '
          import json
          h = json.load(open("data/status/pipeline_health.json"))
          s = h.get("severity_breakdown", {})
          print("v76 Platform: " + h.get("pipeline_status","?") + " | v" + h.get("platform_version","?"))
          print("  CRIT=" + str(s.get("CRITICAL",0)) + " HIGH=" + str(s.get("HIGH",0)) + " MED=" + str(s.get("MEDIUM",0)) + " KEV=" + str(h.get("kev_confirmed",0)))
          ' || true
          fi
          echo "======================================================="
