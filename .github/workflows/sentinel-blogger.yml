# =============================================================================
# CYBERDUDEBIVASH® SENTINEL APEX v116.0 — SOVEREIGN INTELLIGENCE PIPELINE
# Version    : v116.0.0 (R2-NATIVE / BLOGGER-FREE / P0-FIXED / MANIFEST-STABLE)
# Rebuilt    : 2026-04-18 — P0-ESCALATION Fix: Manifest destruction eliminated,
#              R2 corruption guard added, v70 stale-backup guard added,
#              STIX bundle persistence added.
# Author     : CYBERDUDEBIVASH Pvt. Ltd.
# =============================================================================
# ARCHITECTURE (v116.0 — canonical):
#   Intel Engine → writes data/stix/feed_manifest.json (authoritative)
#       → Manifest Stabilisation (preserve if valid, --force-rebuild only fallback)
#       → Freshness Gate (blocks if < 10 entries — GATES R2 upload)
#       → Schema Validation (non-blocking)
#       → R2 Upload (if: SUCCESS only — never uploads on gate failure)
#       → Worker KV Cache Bust → Dashboard
# =============================================================================
# P0 FIXES (v111.0 — 2026-04-16):
#   ✅ Blogger import and publish queue REMOVED from sentinel_blogger.py
#   ✅ publish_queue.json cleared (queue bomb neutralised)
#   ✅ bootstrap skip-if->=50 logic REMOVED — always merges new STIX entries
#   ✅ _load_manifest "entries" key bug FIXED to "advisories"
#   ✅ Pipeline FAILS if no new intel generated (failure guard added)
#   ✅ R2 upload is MANDATORY step (no continue-on-error)
#   ✅ Worker KV cache bust always executed
#   ✅ EMBEDDED_INTEL purged from dashboard
# =============================================================================
# P0-ESCALATION FIXES (v116.0 — 2026-04-18 — root cause: run #744 failure):
#   ✅ FIX-1: --force-rebuild REPLACED with smart conditional (Manifest
#             Stabilisation). Engine manifest preserved when >= 50 entries.
#             --force-rebuild is now FALLBACK ONLY (engine manifest absent/tiny).
#             Root cause: unconditional --force-rebuild was re-parsing only
#             current run's STIX bundles (52) → 9 entries, destroying the
#             engine's authoritative 2222-entry manifest.
#   ✅ FIX-2: R2 upload if:always() REMOVED. R2 upload now only runs when
#             Freshness Gate PASSED (default if:success() behaviour).
#             Root cause: R2 was being overwritten with corrupt 9-entry
#             manifest after every Freshness Gate failure.
#   ✅ FIX-3: v70 orchestrator stale-backup guard added. v70 skipped if
#             all available manifest inputs are older than 48h.
#             Root cause: v70 fell back to manifest_20260326T055548.json
#             (3 weeks old), polluting the pipeline with stale data.
#   ✅ FIX-4: STIX bundles (data/stix/CDB-APEX-*.json) now committed to git,
#             capped at 500 newest (≈1-2 MB). --force-rebuild fallback path
#             now has cumulative bundle history across runs instead of only
#             seeing the current run's bundles.
# =============================================================================

name: sentinel-blogger

on:
  schedule:
    - cron: '0 */4 * * *'    # Primary: every 4h
    - cron: '0 0 1 * *'      # Monthly maintenance
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false
      skip_ai:
        description: 'Skip AI enrichment phases (faster run)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIPELINE_VERSION: "116.0.0"

# Only ONE data-writing workflow at a time — prevents manifest corruption
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 0: CHECKOUT & ENVIRONMENT SETUP
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🔧 Checkout repository"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Setup Python 3.12"
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "📦 Install pipeline dependencies"
        run: |
          python -m pip install --upgrade pip --quiet
          # Core intelligence pipeline deps
          pip install --quiet requests feedparser beautifulsoup4 pydantic \
            python-dotenv psutil cryptography pyjwt
          # NOTE: google-api-python-client and google-auth-oauthlib are NOT
          # installed — Blogger is permanently disabled in v111.0.
          # Any remaining import of blogger_auth will degrade gracefully.
          pip install --quiet reportlab fpdf2 || true
          [ -f requirements.txt ] && pip install --quiet -r requirements.txt || true

      - name: "📁 Ensure required directories"
        run: |
          mkdir -p data/stix data/nexus data/genesis data/cortex data/quantum \
                   data/sovereign data/playbooks/scripts data/premium_packs \
                   data/enterprise_kits data/enrichment data/status data/logs \
                   data/remediation data/health data/ai_predictions data/bughunter \
                   data/analyst data/arsenal data/convergence data/incidents \
                   data/intelligence/detection_rules secrets api \
                   data/ai_intelligence

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 0.5: P0 SAFETY — CLEAR PUBLISH QUEUE BOMB
# Ensures the queue does not consume the runner timeout on retry.
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🧹 P0 Safety — Purge Blogger publish queue"
        run: |
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          queue_path = "data/publish_queue.json"
          if os.path.exists(queue_path):
              try:
                  with open(queue_path) as f:
                      q = json.load(f)
                  queue = q.get("queue", q) if isinstance(q, dict) else q
                  count = len(queue) if isinstance(queue, list) else 0
                  if count > 0:
                      print(f"[P0] Clearing {count} stale Blogger queue entries (queue bomb neutralised)")
              except Exception:
                  pass
          # Always write empty queue
          empty = {"queue": [], "version": "111.0",
                   "cleared_at": datetime.now(timezone.utc).isoformat()}
          with open(queue_path, "w") as f:
              json.dump(empty, f)
          print("[P0] publish_queue.json cleared.")
          PYEOF

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 1: SELF-HEALING BOOTSTRAP
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🛡️ Bootstrap — Ensure critical files exist"
        run: |
          python3 scripts/bootstrap_critical_files.py
          echo "Bootstrap complete."

      - name: "✅ Validate bootstrap output"
        run: |
          python3 - << 'PYEOF'
          import json, sys, os
          manifest = "data/stix/feed_manifest.json"
          if not os.path.exists(manifest):
              print(f"WARNING: {manifest} missing after bootstrap — will be created by engine")
          else:
              try:
                  d = json.load(open(manifest))
                  items = d.get("advisories", d.get("reports", d.get("items", [])))
                  print(f"Bootstrap manifest: {len(items)} items")
              except Exception as e:
                  print(f"WARNING: {manifest} issue: {e}")
          print("Bootstrap validation COMPLETE")
          PYEOF

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 2: INTEL GENERATION
# R2 is the ONLY output channel. Blogger PERMANENTLY DISABLED.
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🔑 Inject Sovereign Key (optional)"
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CDB_SOVEREIGN_KEY }}" ]; then
            echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
            chmod 600 secrets/cdb_sovereign.pem
          fi

      - name: "📡 Run Sentinel Intelligence Engine v111.0 (R2-only)"
        continue-on-error: true
        env:
          # Intel sources
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
          # BLOG_ID intentionally NOT set — Blogger permanently disabled v111.0
        run: |
          echo "=== SENTINEL APEX v111.0 — R2-NATIVE INTEL ENGINE ==="
          # Count STIX bundles BEFORE run
          STIX_BEFORE=$(ls data/stix/CDB-APEX-*.json 2>/dev/null | wc -l || echo 0)
          echo "STIX bundles before run: $STIX_BEFORE"

          set +e
          timeout 1200 python -m agent.sentinel_blogger
          EXIT_CODE=$?
          set -e
          echo "Engine exited: $EXIT_CODE"

          # Count STIX bundles AFTER run — measure new intel
          STIX_AFTER=$(ls data/stix/CDB-APEX-*.json 2>/dev/null | wc -l || echo 0)
          NEW_BUNDLES=$((STIX_AFTER - STIX_BEFORE))
          echo "STIX bundles after run: $STIX_AFTER (NEW: $NEW_BUNDLES)"
          echo "STIX_NEW_BUNDLES=$NEW_BUNDLES" >> $GITHUB_ENV

      - name: "🧠 v70 Intelligence Orchestrator (enrichment)"
        continue-on-error: true
        timeout-minutes: 5
        env:
          TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
          TOKENIZERS_PARALLELISM: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # ─────────────────────────────────────────────────────────────────
          # ROOT CAUSE FIX (run #744 v70 stale-backup regression):
          #   v70 fell back to manifest_20260326T055548.json (3 weeks old) and
          #   wrote 497 stale entries to data/feed_manifest.json.  While this
          #   does NOT directly overwrite data/stix/feed_manifest.json (the R2
          #   source of truth), the stale backup fallback pollutes the data
          #   layer and wastes the 5-minute timeout on useless work.
          #
          # FIX: Pre-check whether v70's newest available input data is fresh
          #   (< 48h).  If every candidate manifest file is older than 48h,
          #   skip v70 entirely.  v70 only runs when it has fresh data to
          #   enrich.  This prevents 3-week-old backup data from entering the
          #   pipeline on every timeout/fresh-run scenario.
          # ─────────────────────────────────────────────────────────────────
          if [ ! -d agent/v70_apex_upgrade ]; then
            echo "INFO: agent/v70_apex_upgrade not found — skipping."
            exit 0
          fi

          # Check freshness of available manifest inputs
          FRESH=$(python3 - << 'PYEOF'
          import os, json, time
          from pathlib import Path
          MAX_AGE_SECONDS = 48 * 3600  # 48 hours
          now = time.time()
          candidates = [
              "data/stix/feed_manifest.json",
              "data/feed_manifest.json",
              "data/apex_enriched_manifest.json",
          ]
          newest_age = None
          for path in candidates:
              if os.path.exists(path):
                  age = now - os.path.getmtime(path)
                  if newest_age is None or age < newest_age:
                      newest_age = age
          if newest_age is None:
              print("SKIP")  # No manifest files at all
          elif newest_age > MAX_AGE_SECONDS:
              hours = newest_age / 3600
              print(f"SKIP")  # Newest file is {hours:.1f}h old — stale
          else:
              hours = newest_age / 3600
              print(f"RUN")
          PYEOF
          )

          if [ "$FRESH" = "SKIP" ]; then
            echo "WARN: v70 input manifests are all older than 48h (stale-backup scenario)."
            echo "      Skipping v70 to prevent 3-week-old backup data entering the pipeline."
            echo "      v70 will run automatically on the next successful intel engine run."
            exit 0
          fi

          echo "INFO: v70 input data is fresh — proceeding with enrichment."
          AI_FLAG=""
          [ "${{ github.event.inputs.skip_ai }}" = "true" ] && AI_FLAG="--no-ai"
          timeout 240 python -m agent.v70_apex_upgrade.orchestrator \
            --data-dir data --dashboard index.html --json $AI_FLAG | \
            tee /tmp/v70_result.json || true

      - name: "🔄 Manifest Stabilisation — Preserve Engine Output / Rebuild Only If Needed"
        # ─────────────────────────────────────────────────────────────────────
        # ROOT CAUSE FIX (run #744 regression):
        #   The old unconditional --force-rebuild re-parsed STIX bundles from
        #   scratch.  STIX bundles are NOT persisted between git runs, so only
        #   the current run's freshly-created bundles exist (52 in run #744).
        #   bootstrap parsed those 52 bundles → 9 valid entries, then overwrote
        #   the engine's authoritative 2222-entry manifest with those 9 entries.
        #   Freshness Gate failed (9 < 10).  R2 upload (if: always()) then
        #   uploaded the 9-entry manifest → LIVE SYSTEM CORRUPTED.
        #
        # FIX LOGIC:
        #   1. Read the manifest the engine just wrote.
        #   2. If engine wrote >= MIN_ENGINE_ENTRIES (50), it is authoritative.
        #      Run clean_feed_manifest.py on it (normalise + dedup) but DO NOT
        #      re-parse STIX bundles.  Preserve the engine's full history.
        #   3. Only fall back to --force-rebuild when the engine manifest is
        #      absent or undersized (engine crashed before writing anything
        #      useful).
        # ─────────────────────────────────────────────────────────────────────
        run: |
          python3 - << 'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          MANIFEST   = "data/stix/feed_manifest.json"
          MIN_ENGINE = 50   # Engine normally writes 1000+; < 50 = engine failed

          # ── Step 1: Read engine manifest ──────────────────────────────────
          engine_count = 0
          if os.path.exists(MANIFEST):
              try:
                  d = json.load(open(MANIFEST))
                  items = d.get("advisories", d.get("reports", []))
                  engine_count = len(items)
              except Exception as e:
                  print(f"WARNING: Cannot parse engine manifest: {e}")

          stix_bundles = len(list(Path("data/stix").glob("CDB-APEX-*.json")))
          print(f"Engine manifest: {engine_count} entries | STIX bundles on disk: {stix_bundles}")

          # ── Step 2: Decide whether to preserve or rebuild ─────────────────
          if engine_count >= MIN_ENGINE:
              print(f"✅ Engine manifest is valid ({engine_count} >= {MIN_ENGINE}).")
              print(f"   Preserving engine manifest. --force-rebuild SKIPPED.")
              print(f"   (--force-rebuild would have re-parsed only {stix_bundles} bundles")
              print(f"    and discarded the engine's {engine_count} accumulated entries.)")
              # Run the cleaner (normalise, dedup, strip brand/blog) without
              # touching which entries are present.
              r = subprocess.run(
                  ["python3", "scripts/clean_feed_manifest.py"],
                  check=False, capture_output=True, text=True
              )
              print(r.stdout.strip() or "(no cleaner output)")
              if r.returncode != 0:
                  print(f"WARN: clean_feed_manifest exited {r.returncode}: {r.stderr.strip()}")
                  print("      Cleaner is non-blocking — engine manifest retained as-is.")
          else:
              print(f"⚠️  Engine manifest too small ({engine_count} < {MIN_ENGINE} threshold).")
              print(f"   Falling back to --force-rebuild from {stix_bundles} STIX bundles.")
              r = subprocess.run(
                  ["python3", "scripts/bootstrap_critical_files.py", "--force-rebuild"],
                  check=False
              )
              print(f"   --force-rebuild exit code: {r.returncode}")

          # ── Step 3: Report final manifest state ───────────────────────────
          final_count = 0
          for path in ("data/stix/feed_manifest.json", "data/feed_manifest.json"):
              if os.path.exists(path):
                  try:
                      d = json.load(open(path))
                      items = d.get("advisories", d.get("reports", []))
                      cnt = len(items)
                      print(f"  {path}: {cnt} entries  generated_at={d.get('generated_at','?')}")
                      if path == "data/stix/feed_manifest.json":
                          final_count = cnt
                  except Exception as e:
                      print(f"  {path}: ERROR — {e}")

          # Export for downstream steps
          env_file = os.environ.get("GITHUB_ENV", "/dev/null")
          with open(env_file, "a") as fh:
              fh.write(f"MANIFEST_FINAL_COUNT={final_count}\n")
          PYEOF

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 2.5: INTEL FRESHNESS GATE
# Fails the pipeline if the manifest has NO entries (hard stop).
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🔒 Intel Freshness Gate — Fail if manifest empty"
        run: |
          python3 - << 'PYEOF'
          import json, sys, os

          manifest = "data/stix/feed_manifest.json"
          MIN_ENTRIES = 10  # Absolute minimum — fail hard if below this

          if not os.path.exists(manifest):
              print(f"FATAL: {manifest} missing after bootstrap+engine+force-rebuild")
              sys.exit(1)

          try:
              d = json.load(open(manifest))
              items = d.get("advisories", d.get("reports", []))
              count = len(items)
          except Exception as e:
              print(f"FATAL: Cannot parse {manifest}: {e}")
              sys.exit(1)

          if count < MIN_ENTRIES:
              print(f"FATAL: Manifest has only {count} entries (minimum: {MIN_ENTRIES})")
              print("Check engine logs above for feed failures or dedup issues.")
              sys.exit(1)

          print(f"FRESHNESS GATE PASSED: {count} entries in manifest")
          PYEOF

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 3: SCHEMA VALIDATION
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🧹 Manifest Cleanup — Remove brand entries + deduplicate"
        continue-on-error: true
        run: |
          python3 scripts/clean_feed_manifest.py || echo "Cleanup skipped (non-critical)"

      - name: "🔍 Schema Validation — Validate intel before R2 upload"
        continue-on-error: true  # v112.0: Non-blocking — log warnings, NEVER block R2 upload
        run: |
          python3 scripts/validate_intel_schema.py || echo "WARN: Schema validation reported issues (non-fatal, R2 upload will proceed)"
          echo "Schema validation complete."

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 3.6: HTML REPORT GENERATION
# Generates one full Tactical Dossier per advisory at reports/YYYY/MM/<id>.html
# These files MUST be generated BEFORE R2 upload and gh-pages deploy so that
# report_url links in the dashboard resolve to real pages.
# ═══════════════════════════════════════════════════════════════════════════
      - name: "📄 Generate HTML Tactical Dossiers (report_url pages)"
        continue-on-error: true
        run: |
          echo "=== SENTINEL APEX v115.0 — HTML Report Generation ==="
          python3 scripts/generate_intel_reports.py \
            --manifest data/stix/feed_manifest.json \
            --limit 0
          REPORT_COUNT=$(find reports -name '*.html' -not -name 'index.html' 2>/dev/null | wc -l || echo 0)
          echo "Generated $REPORT_COUNT tactical dossier HTML files"
          echo "REPORT_COUNT=$REPORT_COUNT" >> $GITHUB_ENV

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 3.5: R2 UPLOAD — MANDATORY, OVERWRITE GUARANTEED
# No continue-on-error. Pipeline fails if R2 upload fails.
# ═══════════════════════════════════════════════════════════════════════════
      - name: "☁️ Upload Intel to Cloudflare R2 (MANDATORY OVERWRITE)"
        # ─────────────────────────────────────────────────────────────────────
        # ROOT CAUSE FIX (run #744 R2 corruption):
        #   The previous if:always() caused R2 upload to run even after the
        #   Freshness Gate failed (manifest had only 9 entries).  This uploaded
        #   the 9-entry manifest to R2 and corrupted the live system.
        #
        # FIX: Remove if:always().  Default GitHub Actions behaviour is
        #   if:success() — this step ONLY runs when ALL prior required steps
        #   (including the Freshness Gate) passed.  If Freshness Gate exits 1,
        #   this step is skipped → R2 is never overwritten with corrupt data.
        #
        # The KV cache bust step below retains if:always() because busting a
        # cache is always safe and causes no data corruption.
        # ─────────────────────────────────────────────────────────────────────
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$CF_ACCOUNT_ID" ] || [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "ERROR: CF_ACCOUNT_ID or CF_R2_ACCESS_KEY_ID not set."
            echo "Add secrets per SETUP_GITHUB_SECRETS.md — R2 upload is MANDATORY."
            exit 1
          fi

          pip install awscli --quiet 2>/dev/null
          ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Get item count
          ITEM_COUNT=$(python3 -c "
          import json
          d = json.load(open('data/stix/feed_manifest.json'))
          items = d.get('advisories', d.get('reports', d if isinstance(d, list) else []))
          print(len(items))
          " 2>/dev/null || echo 0)

          echo "Uploading $ITEM_COUNT advisories to R2..."

          # UPLOAD 1: Primary feed manifest (OVERWRITE)
          aws s3 cp data/stix/feed_manifest.json \
            s3://sentinel-apex-data/intel/feed_manifest.json \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "OK: feed_manifest.json uploaded ($ITEM_COUNT items)"

          # UPLOAD 2: Enriched manifests (if present)
          for f in \
            data/apex_enriched_manifest.json \
            data/apex_v2_manifest.json \
            data/apex_v2_strategic_report.json \
            data/validated_manifest.json
          do
            if [ -f "$f" ]; then
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/intel/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "no-cache, no-store, must-revalidate"
              echo "OK: $fname uploaded"
            fi
          done

          # UPLOAD 3: apex_v2 API endpoint files
          if [ -d "api/apex_v2" ]; then
            for f in api/apex_v2/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/apex_v2/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json"
            done
            echo "OK: apex_v2/ uploaded"
          fi

          # UPLOAD 4a: Generated HTML reports (Tactical Dossiers)
          # These are the files that report_url links point to.
          # Upload to R2 so https://reports.cyberdudebivash.com/YYYY/MM/<id>.html resolves.
          if [ -d "reports" ] && [ "$(find reports -name '*.html' | head -1)" ]; then
            echo "Uploading HTML reports to R2..."
            aws s3 sync reports/ \
              s3://sentinel-apex-reports/reports/ \
              --endpoint-url "$ENDPOINT" \
              --content-type "text/html; charset=utf-8" \
              --cache-control "public, max-age=300" \
              --only-show-errors || echo "WARN: Report upload had errors (non-fatal)"
            echo "OK: HTML reports uploaded to R2 (sentinel-apex-reports/reports/)"
          else
            echo "INFO: No reports/ directory or no HTML files — skipping report upload"
          fi

          # UPLOAD 4b: AI Intelligence data (MITRE heatmap, AI panels, analysis)
          # First generate the AI endpoints from the current manifest
          python3 scripts/generate_ai_endpoints.py || \
            echo "WARN: AI endpoint generation failed (non-fatal)"

          if [ -d "data/ai_intelligence" ]; then
            for f in data/ai_intelligence/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/ai/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "no-cache, no-store, must-revalidate"
              echo "OK: ai/$fname uploaded"
            done
          fi

          if [ -d "api/ai" ]; then
            for f in api/ai/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/ai/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "no-cache, no-store, must-revalidate"
              echo "OK: ai/$fname (from api/ai/) uploaded"
            done
          fi
          echo "OK: AI intelligence data uploaded"

          # UPLOAD 4: Sync metadata (timestamp proof)
          python3 - << PYEOF
          import json, datetime
          meta = {
              "synced_at":       datetime.datetime.utcnow().isoformat() + "Z",
              "advisory_count":  int("$ITEM_COUNT"),
              "source":          "sentinel-blogger",
              "pipeline_version":"${{ env.PIPELINE_VERSION }}",
              "run_id":          "${{ github.run_id }}",
              "p0_fix":          "v111.0 — blogger_removed, queue_cleared"
          }
          with open("/tmp/sync_meta.json", "w") as fh:
              json.dump(meta, fh, indent=2)
          PYEOF

          aws s3 cp /tmp/sync_meta.json \
            s3://sentinel-apex-data/intel/_sync_meta.json \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/json"
          echo "OK: Sync metadata written ($ITEM_COUNT advisories synced to R2)"
          echo "R2_UPLOAD_COUNT=$ITEM_COUNT" >> $GITHUB_ENV

      - name: "🔄 Bust Worker KV Cache (MANDATORY)"
        if: always()  # v112.0: ALWAYS bust cache, even if R2 upload had issues
        run: |
          # Always attempt cache bust. Non-fatal if secret not set.
          if [ -z "${{ secrets.WORKER_ADMIN_SECRET }}" ]; then
            echo "INFO: WORKER_ADMIN_SECRET not set — KV cache will expire naturally (3 min TTL)"
            echo "ACTION REQUIRED: Set WORKER_ADMIN_SECRET secret for instant cache invalidation."
            exit 0
          fi

          # Bust feed index cache
          HTTP=$(curl -s -o /tmp/bust_resp.json -w "%{http_code}" \
            -X POST "https://intel.cyberdudebivash.com/api/admin/cache/bust?key=idx:reports" \
            -H "X-Admin-Secret: ${{ secrets.WORKER_ADMIN_SECRET }}")
          echo "Cache bust idx:reports → HTTP $HTTP"
          cat /tmp/bust_resp.json || true

          # Bust preview cache
          HTTP2=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://intel.cyberdudebivash.com/api/admin/cache/bust?key=idx:preview" \
            -H "X-Admin-Secret: ${{ secrets.WORKER_ADMIN_SECRET }}")
          echo "Cache bust idx:preview → HTTP $HTTP2"

          # Bust AI cache keys
          for AI_KEY in "ai:index" "ai:analyze" "ai:respond" "ai:correlate"; do
            HTTP_AI=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://intel.cyberdudebivash.com/api/admin/cache/bust?key=${AI_KEY}" \
              -H "X-Admin-Secret: ${{ secrets.WORKER_ADMIN_SECRET }}")
            echo "Cache bust ${AI_KEY} → HTTP $HTTP_AI"
          done

          [ "$HTTP" = "200" ] && echo "OK: Worker KV cache busted" || \
            echo "INFO: Cache bust HTTP $HTTP (non-fatal)"

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 4: GIT SYNC — Non-sensitive metadata only
# Intel data (feed_manifest.json) is R2-only. NOT committed to GitHub.
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🔒 Git Sync — Commit non-sensitive metadata"
        if: always()  # v112.0: ALWAYS sync metadata — persists run state regardless of upstream failures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "sentinel@cyberdudebivash.com"
          git config --local user.name  "CDB-Sentinel-Bot"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"

          # Clear stale locks
          rm -f .git/index.lock .git/config.lock .git/HEAD.lock 2>/dev/null || true
          git rebase --abort 2>/dev/null || true
          git merge  --abort  2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # Stage NON-SENSITIVE files only
          # CRITICAL: feed_manifest.json, api/feed.json → R2 ONLY (never to GitHub)

          # ── FIX: Persist STIX bundles across runs ──────────────────────────
          # ROOT CAUSE (run #744): STIX bundles were not in git, so every run
          # started with 0 bundles.  --force-rebuild's fallback path could only
          # see the current run's bundles (52), producing only 9 valid entries.
          # By committing bundles, --force-rebuild's fallback now has full
          # cumulative history (hundreds of bundles) if the engine manifest is
          # ever absent or undersized.
          #
          # Bundles are capped at the 500 newest files to prevent repo bloat.
          # Each bundle is ~2-4 KB so 500 bundles ≈ 1-2 MB — acceptable.
          python3 - << 'PYEOF'
          import os, glob, json
          from pathlib import Path
          bundles = sorted(Path("data/stix").glob("CDB-APEX-*.json"),
                           key=lambda p: p.stat().st_mtime, reverse=True)
          if len(bundles) > 500:
              # Remove oldest bundles from disk before staging — keeps repo lean
              for old in bundles[500:]:
                  try:
                      old.unlink()
                  except Exception:
                      pass
              print(f"Pruned STIX bundles to 500 newest (removed {len(bundles)-500} oldest).")
          else:
              print(f"STIX bundle count: {len(bundles)} (under 500 cap, no pruning needed).")
          PYEOF
          git add -f data/stix/CDB-APEX-*.json           2>/dev/null || true
          # ─────────────────────────────────────────────────────────────────

          git add -f data/sync_marker.json               2>/dev/null || true
          git add -f api/latest.json api/status.json     2>/dev/null || true
          git add -f api/engines.json api/ai/            2>/dev/null || true
          git add    index.html sitemap.xml               2>/dev/null || true
          git add    .gitignore                           2>/dev/null || true
          # Stage generated HTML reports so they are accessible via GitHub Pages
          # gh-pages serves reports/YYYY/MM/<id>.html → matches report_url fields
          git add -f reports/                             2>/dev/null || true
          git add -f data/status/status.json              2>/dev/null || true
          git add -f data/health/guardian_report.json    2>/dev/null || true
          git add -f data/health/apex_engine_report.json 2>/dev/null || true
          git add -f data/health/apex_v2_audit.json      2>/dev/null || true
          git add -f data/apex_v2_manifest.json          2>/dev/null || true
          git add -f data/apex_v2_strategic_report.json  2>/dev/null || true
          git add -f data/apex_intelligence_report.json  2>/dev/null || true
          git add -f data/apex_enriched_manifest.json    2>/dev/null || true
          git add -f data/validated_manifest.json        2>/dev/null || true
          git add -f config/feature_flags.json           2>/dev/null || true
          # P0 FIX v111.0: Always commit cleared publish queue
          git add -f data/publish_queue.json             2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No metadata changes to commit."
          else
            ENTRY_COUNT="${{ env.R2_UPLOAD_COUNT }}"
            [ -z "$ENTRY_COUNT" ] && ENTRY_COUNT=$(python3 -c "
          import json, os
          try:
              d = json.load(open('data/stix/feed_manifest.json'))
              items = d.get('advisories', d.get('reports', []))
              print(len(items))
          except: print('N/A')
            " 2>/dev/null || echo "N/A")
            git commit -m "🌐 SENTINEL APEX v111.0 — ${ENTRY_COUNT} advisories @ $(date -u +'%Y-%m-%dT%H:%M:%SZ') [P0-FIXED] [skip ci]"
          fi

          # 4-attempt push with merge recovery
          for i in 1 2 3 4; do
            git fetch origin main --quiet
            rm -f .git/index.lock 2>/dev/null || true
            git merge origin/main -X ours --no-edit --quiet 2>/dev/null || {
              git merge --abort 2>/dev/null || true
              git stash push -m "sentinel-recovery-$i" 2>/dev/null || true
              git reset --hard origin/main 2>/dev/null || true
              git stash pop 2>/dev/null || true
            }
            if git push origin main; then
              echo "OK: Push succeeded (attempt $i)"
              break
            fi
            sleep $((i * 15))
            [ $i -eq 4 ] && echo "WARN: All push attempts exhausted — syncs next run"
          done

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 5: GITHUB PAGES DEPLOY
# ═══════════════════════════════════════════════════════════════════════════
      - name: "🚀 Deploy to GitHub Pages"
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          branch: gh-pages
          folder: .
          clean: false

# ═══════════════════════════════════════════════════════════════════════════
# STAGE 6: E2E PIPELINE VALIDATION
# ═══════════════════════════════════════════════════════════════════════════
      - name: "✅ E2E Pipeline Validation"
        continue-on-error: true
        run: |
          echo "=== SENTINEL APEX v111.0 — E2E PIPELINE VALIDATION ==="
          sleep 10  # Allow KV cache to propagate

          # Test 1: Worker health
          HEALTH=$(curl -s --max-time 10 "https://intel.cyberdudebivash.com/api/health" 2>/dev/null || echo '{}')
          R2_STATUS=$(echo "$HEALTH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('checks',{}).get('r2_intel','unknown'))" 2>/dev/null || echo "error")
          GATEWAY=$(echo "$HEALTH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('gateway','unknown'))" 2>/dev/null || echo "error")
          echo "[Health] Gateway: $GATEWAY | R2: $R2_STATUS"

          # Test 2: Preview endpoint (public, no auth)
          PREVIEW=$(curl -s --max-time 10 "https://intel.cyberdudebivash.com/api/preview" 2>/dev/null || echo '{}')
          TOTAL=$(echo "$PREVIEW" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('preview',{}).get('total_in_feed',0))" 2>/dev/null || echo 0)
          ITEMS=$(echo "$PREVIEW" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('preview',{}).get('items',[])))" 2>/dev/null || echo 0)
          echo "[Preview] $ITEMS preview items | $TOTAL total in feed"

          # Test 3: Auth enforcement
          FEED_RESP=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "https://intel.cyberdudebivash.com/api/feed" 2>/dev/null || echo "000")
          echo "[Auth] /api/feed (no key) → HTTP $FEED_RESP (expect 401)"

          # Summary
          echo "=== R2_UPLOAD_COUNT=${{ env.R2_UPLOAD_COUNT }} | STIX_NEW=${{ env.STIX_NEW_BUNDLES }} ==="
          if [ "$R2_STATUS" = "ok" ] && [ "$TOTAL" -gt "10" ] && [ "$FEED_RESP" = "401" ]; then
            echo "=== VALIDATION PASSED: Pipeline fully operational ==="
          else
            echo "=== VALIDATION WARNING: R2=$R2_STATUS TOTAL=$TOTAL FEED_HTTP=$FEED_RESP ==="
          fi

      - name: "🔧 Post-pipeline extras"
        continue-on-error: true
        run: |
          python agent/v48_pipeline_hardening/pipeline_hardener.py || true
          python agent/quality_gate_audit.py || true
          python3 scripts/generate_ai_endpoints.py || true
