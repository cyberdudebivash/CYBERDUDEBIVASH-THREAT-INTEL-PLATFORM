# STAGE 3.6b: REFRESH EMBEDDED_INTEL IN DASHBOARD
# ROOT CAUSE FIX (run #748 dashboard staleness):
#   index.html was committed with EMBEDDED_INTEL baked in from a PREVIOUS run
#   (2170 items, most recent timestamp April 16). No workflow step was
#   updating EMBEDDED_INTEL after each run. The dashboard would render the
#   stale EMBEDDED_INTEL on load, and the FRESHEST-WINS logic would compare
#   it against the Worker API data รขโฌโ if API data was the same age or older,
#   the dashboard would stay on the stale EMBEDDED_INTEL view.
#
# FIX: Run scripts/update_embedded_intel.py after HTML report generation
#   (so report_url fields are set in the manifest) to inject fresh
#   EMBEDDED_INTEL from data/stix/feed_manifest.json into index.html.
#   This bakes the latest N items into the dashboard HTML so users get
#   instant fresh data on load, and the LIVE 7D counter reflects current
#   intel.  The script also strips brand entries and normalises all fields.
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโโฐ Refresh EMBEDDED_INTEL + version-sync in dashboard"
        continue-on-error: true   # Non-blocking รขโฌโ Worker API is authoritative fallback
        run: |
          echo "=== EMBEDDED_INTEL refresh from data/stix/feed_manifest.json ==="
          ITEM_COUNT=$(python3 -c "
          import json
          d = json.load(open('data/stix/feed_manifest.json'))
          items = d.get('advisories', d.get('reports', d if isinstance(d, list) else []))
          print(len(items))
          " 2>/dev/null || echo 0)
          echo "Manifest has $ITEM_COUNT items รขโฌ" injecting into index.html..."
          python3 scripts/update_embedded_intel.py
          if [ $? -eq 0 ]; then
            echo "OK: EMBEDDED_INTEL refreshed in index.html ($ITEM_COUNT items)"
          else
            echo "WARN: update_embedded_intel.py failed (non-fatal รขโฌ" Worker API is authoritative)"
          fi

          # รข"โฌรข"โฌ v130.1: AI Brain panels + CDB_NEWS engine injection (idempotent) รข"โฌรข"โฌ
          # patch_ai_brain_news.py reads scripts/ai_brain_patch.js and injects
          # the self-contained JS block before </body> in index.html every run.
          # Idempotent: strips and re-injects on each pipeline execution so the
          # fix survives the v70 orchestrator re-generating HTML sections.
          python3 scripts/patch_ai_brain_news.py || echo "WARN: patch_ai_brain_news.py failed (non-fatal)"

          # รข"โฌรข"โฌ Version-sync: keep dashboard title aligned with pipeline version รข"โฌรข"โฌ
          # Replaces any SENTINEL APEX vX.Y.Z in index.html with the current
          # PIPELINE_VERSION so dashboard, API, and workflow always show the same
          # canonical version.  Non-destructive: only touches the version string.
          python3 - << 'PYEOF'
          import re, os
          from pathlib import Path
          PIPELINE_VERSION = os.environ.get("PIPELINE_VERSION", "131.0.0")
          NEW_TAG = f"SENTINEL APEX v{PIPELINE_VERSION}"
          html_path = Path("index.html")
          if not html_path.exists():
              print("WARN: index.html not found รขโฌ" version sync skipped")
          else:
              content = html_path.read_text(encoding="utf-8", errors="replace")
              # Replace versioned SENTINEL APEX strings (e.g. v110.1, v116.2.0)
              updated = re.sub(
                  r'SENTINEL APEX [Vv]\d+\.\d+(?:\.\d+)?(?:\.\d+)?',
                  NEW_TAG,
                  content
              )
              changed = content.count(NEW_TAG) != updated.count(NEW_TAG) or content != updated
              if changed:
                  html_path.write_text(updated, encoding="utf-8")
                  count = updated.count(NEW_TAG)
                  print(f"Version-sync: dashboard updated to {NEW_TAG} ({count} occurrences)")
              else:
                  print(f"Version-sync: dashboard already at {NEW_TAG}")
          PYEOF

# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
# STAGE 3.5: R2 UPLOAD รขโฌโ MANDATORY, OVERWRITE GUARANTEED
# No continue-on-error. Pipeline fails if R2 upload fails.
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รขหรฏยธ Upload Intel to Cloudflare R2 (MANDATORY OVERWRITE)"
        # รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
        # ROOT CAUSE FIX (run #744 R2 corruption):
        #   The previous if:always() caused R2 upload to run even after the
        #   Freshness Gate failed (manifest had only 9 entries).  This uploaded
        #   the 9-entry manifest to R2 and corrupted the live system.
        #
        # FIX: Remove if:always().  Default GitHub Actions behaviour is
        #   if:success() รขโฌโ this step ONLY runs when ALL prior required steps
        #   (including the Freshness Gate) passed.  If Freshness Gate exits 1,
        #   this step is skipped รขโ โ R2 is never overwritten with corrupt data.
        #
        # The KV cache bust step below retains if:always() because busting a
        # cache is always safe and causes no data corruption.
        # รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$CF_ACCOUNT_ID" ] || [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "ERROR: CF_ACCOUNT_ID or CF_R2_ACCESS_KEY_ID not set."
            echo "Add secrets per SETUP_GITHUB_SECRETS.md รขโฌ" R2 upload is MANDATORY."
            exit 1
          fi

          pip install awscli --quiet 2>/dev/null
          ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Get item count
          ITEM_COUNT=$(python3 -c "
          import json
          d = json.load(open('data/stix/feed_manifest.json'))
          items = d.get('advisories', d.get('reports', d if isinstance(d, list) else []))
          print(len(items))
          " 2>/dev/null || echo 0)

          echo "Uploading $ITEM_COUNT advisories to R2..."

          # UPLOAD 1: Primary feed manifest (OVERWRITE)
          aws s3 cp data/stix/feed_manifest.json \
            s3://sentinel-apex-data/intel/feed_manifest.json \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"
          echo "OK: feed_manifest.json uploaded ($ITEM_COUNT items)"

          # UPLOAD 2: Enriched manifests (if present)
          for f in \
            data/apex_enriched_manifest.json \
            data/apex_v2_manifest.json \
            data/apex_v2_strategic_report.json \
            data/validated_manifest.json
          do
            if [ -f "$f" ]; then
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/intel/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "no-cache, no-store, must-revalidate"
              echo "OK: $fname uploaded"
            fi
          done

          # UPLOAD 3: apex_v2 API endpoint files
          if [ -d "api/apex_v2" ]; then
            for f in api/apex_v2/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/apex_v2/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json"
            done
            echo "OK: apex_v2/ uploaded"
          fi

          # UPLOAD 4a: Generated HTML reports (Tactical Dossiers)
          # These are the files that report_url links point to.
          # Upload to R2 so https://reports.cyberdudebivash.com/YYYY/MM/<id>.html resolves.
          if [ -d "reports" ] && [ "$(find reports -name '*.html' | head -1)" ]; then
            echo "Uploading HTML reports to R2..."
            aws s3 sync reports/ \
              s3://sentinel-apex-reports/reports/ \
              --endpoint-url "$ENDPOINT" \
              --content-type "text/html; charset=utf-8" \
              --cache-control "public, max-age=300" \
              --only-show-errors || echo "WARN: Report upload had errors (non-fatal)"
            echo "OK: HTML reports uploaded to R2 (sentinel-apex-reports/reports/)"
          else
            echo "INFO: No reports/ directory or no HTML files รขโฌ" skipping report upload"
          fi

          # UPLOAD 4b: AI Intelligence data (MITRE heatmap, AI panels, analysis)
          # First generate the AI endpoints from the current manifest
          python3 scripts/generate_ai_endpoints.py || \
            echo "WARN: AI endpoint generation failed (non-fatal)"

          if [ -d "data/ai_intelligence" ]; then
            for f in data/ai_intelligence/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/ai/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "no-cache, no-store, must-revalidate"
              echo "OK: ai/$fname uploaded"
            done
          fi

          if [ -d "api/ai" ]; then
            for f in api/ai/*.json; do
              [ -f "$f" ] || continue
              fname=$(basename "$f")
              aws s3 cp "$f" "s3://sentinel-apex-data/ai/$fname" \
                --endpoint-url "$ENDPOINT" \
                --content-type "application/json" \
                --cache-control "no-cache, no-store, must-revalidate"
              echo "OK: ai/$fname (from api/ai/) uploaded"
            done
          fi
          echo "OK: AI intelligence data uploaded"

          # UPLOAD 4: Sync metadata (timestamp proof)
          python3 - << PYEOF
          import json, datetime
          meta = {
              "synced_at":       datetime.datetime.utcnow().isoformat() + "Z",
              "advisory_count":  int("$ITEM_COUNT"),
              "source":          "sentinel-blogger",
              "pipeline_version":"${{ env.PIPELINE_VERSION }}",
              "run_id":          "${{ github.run_id }}",
              "p0_fix":          "v111.0 รขโฌ" blogger_removed, queue_cleared"
          }
          with open("/tmp/sync_meta.json", "w") as fh:
              json.dump(meta, fh, indent=2)
          PYEOF

          aws s3 cp /tmp/sync_meta.json \
            s3://sentinel-apex-data/intel/_sync_meta.json \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/json"
          echo "OK: Sync metadata written ($ITEM_COUNT advisories synced to R2)"
          echo "R2_UPLOAD_COUNT=$ITEM_COUNT" >> $GITHUB_ENV

      - name: "รฐลธโโ Bust Worker KV Cache (MANDATORY)"
        if: always()  # v112.0: ALWAYS bust cache, even if R2 upload had issues
        run: |
          # Always attempt cache bust. Non-fatal if secret not set.
          if [ -z "${{ secrets.WORKER_ADMIN_SECRET }}" ]; then
            echo "INFO: WORKER_ADMIN_SECRET not set รขโฌ" KV cache will expire naturally (3 min TTL)"
            echo "ACTION REQUIRED: Set WORKER_ADMIN_SECRET secret for instant cache invalidation."
            exit 0
          fi

          # Bust feed index cache
          HTTP=$(curl -s -o /tmp/bust_resp.json -w "%{http_code}" \
            -X POST "https://intel.cyberdudebivash.com/api/admin/cache/bust?key=idx:reports" \
            -H "X-Admin-Secret: ${{ secrets.WORKER_ADMIN_SECRET }}")
          echo "Cache bust idx:reports รขโ โ HTTP $HTTP"
          cat /tmp/bust_resp.json || true

          # Bust preview cache
          HTTP2=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://intel.cyberdudebivash.com/api/admin/cache/bust?key=idx:preview" \
            -H "X-Admin-Secret: ${{ secrets.WORKER_ADMIN_SECRET }}")
          echo "Cache bust idx:preview รขโ โ HTTP $HTTP2"

          # Bust AI cache keys
          for AI_KEY in "ai:index" "ai:analyze" "ai:respond" "ai:correlate"; do
            HTTP_AI=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://intel.cyberdudebivash.com/api/admin/cache/bust?key=${AI_KEY}" \
              -H "X-Admin-Secret: ${{ secrets.WORKER_ADMIN_SECRET }}")
            echo "Cache bust ${AI_KEY} รขโ โ HTTP $HTTP_AI"
          done

          [ "$HTTP" = "200" ] && echo "OK: Worker KV cache busted" || \
            echo "INFO: Cache bust HTTP $HTTP (non-fatal)"

# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
# STAGE 4: GIT SYNC รขโฌโ Non-sensitive metadata only
# Intel data (feed_manifest.json) is R2-only. NOT committed to GitHub.
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโโ Git Sync รขโฌโ Commit non-sensitive metadata"
        if: always()  # v112.0: ALWAYS sync metadata รขโฌโ persists run state regardless of upstream failures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "sentinel@cyberdudebivash.com"
          git config --local user.name  "CDB-Sentinel-Bot"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"

          # Clear stale locks
          rm -f .git/index.lock .git/config.lock .git/HEAD.lock 2>/dev/null || true
          git rebase --abort 2>/dev/null || true
          git merge  --abort  2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          # Stage NON-SENSITIVE files only
          # CRITICAL: feed_manifest.json, api/feed.json รขโ โ R2 ONLY (never to GitHub)

          # รข"โฌรข"โฌ FIX: Persist STIX bundles across runs รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          # ROOT CAUSE (run #744): STIX bundles were not in git, so every run
          # started with 0 bundles.  --force-rebuild's fallback path could only
          # see the current run's bundles (52), producing only 9 valid entries.
          # By committing bundles, --force-rebuild's fallback now has full
          # cumulative history (hundreds of bundles) if the engine manifest is
          # ever absent or undersized.
          #
          # Bundles are capped at the 500 newest files to prevent repo bloat.
          # Each bundle is ~2-4 KB so 500 bundles รขโฐห 1-2 MB รขโฌ" acceptable.
          python3 - << 'PYEOF'
          import os, glob, json
          from pathlib import Path
          bundles = sorted(Path("data/stix").glob("CDB-APEX-*.json"),
                           key=lambda p: p.stat().st_mtime, reverse=True)
          if len(bundles) > 500:
              # Remove oldest bundles from disk before staging รขโฌ" keeps repo lean
              for old in bundles[500:]:
                  try:
                      old.unlink()
                  except Exception:
                      pass
              print(f"Pruned STIX bundles to 500 newest (removed {len(bundles)-500} oldest).")
          else:
              print(f"STIX bundle count: {len(bundles)} (under 500 cap, no pruning needed).")
          PYEOF
          git add -f data/stix/CDB-APEX-*.json           2>/dev/null || true
          # รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ

          git add -f data/sync_marker.json               2>/dev/null || true
          git add -f api/latest.json api/status.json     2>/dev/null || true
          git add -f api/engines.json api/ai/            2>/dev/null || true
          git add    index.html sitemap.xml               2>/dev/null || true
          git add    .gitignore                           2>/dev/null || true
          # Stage generated HTML reports so they are accessible via GitHub Pages
          # gh-pages serves reports/YYYY/MM/<id>.html รขโ โ matches report_url fields
          git add -f reports/                             2>/dev/null || true
          git add -f data/status/status.json              2>/dev/null || true
          git add -f data/health/guardian_report.json    2>/dev/null || true
          git add -f data/health/apex_engine_report.json 2>/dev/null || true
          git add -f data/health/apex_v2_audit.json      2>/dev/null || true
          git add -f data/apex_v2_manifest.json          2>/dev/null || true
          git add -f data/apex_v2_strategic_report.json  2>/dev/null || true
          git add -f data/apex_intelligence_report.json  2>/dev/null || true
          git add -f data/apex_enriched_manifest.json    2>/dev/null || true
          git add -f data/validated_manifest.json        2>/dev/null || true
          git add -f config/feature_flags.json           2>/dev/null || true
          # P0 FIX v111.0: Always commit cleared publish queue
          git add -f data/publish_queue.json             2>/dev/null || true
          # P0 FIX v116.2: Commit synced feed_manifest.json (with schema_version)
          # so next run's v70 starts with a valid manifest and does NOT fall back
          # to stale backups (data/.manifest_backups/manifest_20260326T055548.json).
          # The pre-v70 sync step writes this file; committing it here ensures
          # persistence across runs.
          git add -f data/feed_manifest.json             2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No metadata changes to commit."
          else
            ENTRY_COUNT="${{ env.R2_UPLOAD_COUNT }}"
            [ -z "$ENTRY_COUNT" ] && ENTRY_COUNT=$(python3 -c "
          import json, os
          try:
              d = json.load(open('data/stix/feed_manifest.json'))
              items = d.get('advisories', d.get('reports', []))
              print(len(items))
          except: print('N/A')
            " 2>/dev/null || echo "N/A")
            git commit -m "รฐลธล SENTINEL APEX v${PIPELINE_VERSION} รขโฌ" ${ENTRY_COUNT} advisories @ $(date -u +'%Y-%m-%dT%H:%M:%SZ') [P0-FIXED] [skip ci]"
          fi

          # 4-attempt push with merge recovery
          for i in 1 2 3 4; do
            git fetch origin main --quiet
            rm -f .git/index.lock 2>/dev/null || true
            git merge origin/main -X ours --no-edit --quiet 2>/dev/null || {
              git merge --abort 2>/dev/null || true
              git stash push -m "sentinel-recovery-$i" 2>/dev/null || true
              git reset --hard origin/main 2>/dev/null || true
              git stash pop 2>/dev/null || true
            }
            if git push origin main; then
              echo "OK: Push succeeded (attempt $i)"
              break
            fi
            sleep $((i * 15))
            [ $i -eq 4 ] && echo "WARN: All push attempts exhausted รขโฌ" syncs next run"
          done

