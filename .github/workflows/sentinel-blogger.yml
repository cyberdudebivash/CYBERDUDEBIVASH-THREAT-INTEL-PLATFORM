# ================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Sovereign Intelligence Cycle
# Version: v64.4 (FULL FIX — Zero Regression + All Stages Preserved)
# ================================================================

name: CDB Sentinel Blogger - Threat Intel Auto-Publisher v64.4

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

concurrency:
  group: sentinel-sync
  cancel-in-progress: false

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

# ================================================================
# STAGE 0: CHECKOUT & SETUP
# ================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Directories
        run: |
          mkdir -p data/stix data/nexus data/genesis data/cortex data/quantum data/sovereign data/rule_packs data/playbooks data/playbooks/scripts data/premium_packs data/enterprise_kits data/enrichment data/status data/logs data/remediation secrets

# ================================================================
# STAGE 1: PRE-FLIGHT
# ================================================================
      - name: Monthly Maintenance
        if: github.event.schedule == '0 0 1 * *'
        run: python -m agent.janitor || true

      - name: Inject Sovereign Key
        run: |
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem

# ================================================================
# STAGE 2: INGEST (FAULT-TOLERANT FIX)
# ================================================================
      - name: Run Sentinel Engine
        continue-on-error: true
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "Running Sentinel Engine (SAFE MODE)"

          set +e
          timeout 1500 python -m agent.sentinel_blogger
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "⚠ Sentinel engine error ignored (non-blocking)"
          fi

# ================================================================
# STAGE 2.1: STATE UPDATE
# ================================================================
      - name: Update Sync State
        run: |
          python3 scripts/update_embedded_intel.py || true

# ================================================================
# STAGE 3: SAFE GIT SYNC (CRITICAL FIX)
# ================================================================
      - name: Safe Git Sync (AUTOSTASH)
        run: |
          rm -rf .git/rebase-merge || true
          rm -rf .git/rebase-apply || true

          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          git pull origin main --rebase --autostash || {
            echo "Fallback merge..."
            git fetch origin main
            git merge -X ours origin/main || true
          }

# ================================================================
# STAGE 4: COMMIT CORE DATA
# ================================================================
      - name: Commit Core Data
        continue-on-error: true
        run: |
          git add data/*.json data/stix/feed_manifest.json index.html threat/ sitemap.xml 2>/dev/null || true

          if ! git diff --staged --quiet; then
            git commit -m "v64.4 Core Sync [skip ci]"
            git push origin main || {
              echo "Push failed — retrying after rebase..."
              git pull origin main --rebase --autostash || true
              git push origin main || echo "Push failed after retry (non-blocking)"
            }
          fi

# ================================================================
# STAGE 5: DEPLOY CORE
# ================================================================
      - name: Deploy Core
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false

# ================================================================
# STAGE 5.1: OPTIONAL HARDENING
# ================================================================
      - name: Pipeline Hardener
        continue-on-error: true
        run: |
          python agent/v48_pipeline_hardening/pipeline_hardener.py || true

      - name: Quality Gate
        continue-on-error: true
        run: |
          python agent/quality_gate_audit.py || true

      - name: Generate Threat Pages
        continue-on-error: true
        run: |
          python scripts/threat_page_generator.py || true

# ================================================================
# STAGE 6: POST-EXTRAS COMMIT + DEPLOY (RESTORED)
# ================================================================
      - name: Commit Post Extras
        continue-on-error: true
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          git add data/*.json threat/ sitemap.xml 2>/dev/null || true

          if ! git diff --staged --quiet; then
            git commit -m "v64.4 Post Extras [skip ci]"
            git push origin main
          fi

      - name: Deploy Post Extras
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
