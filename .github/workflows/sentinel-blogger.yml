#   รขลโฆ FIX-5: Manifest Stabilisation now handles JSON LIST format from engine.
#             sentinel_blogger writes data/stix/feed_manifest.json as a raw
#             JSON array [...] not {"advisories":[...]}.  Previous fix called
#             d.get() on the list รขโ โ AttributeError รขโ โ engine_count=0 รขโ โ fell
#             back to --force-rebuild รขโ โ 9 entries รขโ โ Freshness Gate failed.
#             Fix: detect list vs dict, if list with >= 50 entries normalise
#             to DICT envelope in-place, then run clean_feed_manifest.py.
#   รขลโฆ FIX-6: Freshness Gate hardened to handle LIST format as safety net.
#             If list reaches gate, counts items correctly instead of crashing.
# =============================================================================
# v116.2 PATCH (2026-04-18 รขโฌโ root cause: run #748 dashboard staleness):
#   รขลโฆ FIX-7: Pre-v70 manifest sync added. data/feed_manifest.json was written
#             by v101.0.0 with 2463 items but MISSING 'schema_version' key.
#             v70's validate_manifest() requires schema_version รขโ โ rejected รขโ โ
#             fell back to manifest_20260326T055548.json (3-week-old stale
#             backup, 497 items) รขโ โ v70 processed stale data every run.
#             Fix: New "Pre-v70 Manifest Sync" step copies authoritative
#             data/stix/feed_manifest.json รขโ โ data/feed_manifest.json with
#             schema_version="v70.0" added. v70 now loads fresh 2000+ items.
#             Also deletes v70 backups older than 7 days (prevents future
#             fallback to stale data across pipeline restarts).
#   รขลโฆ FIX-8: data/feed_manifest.json now committed to git in Git Sync step.
#             Ensures next run starts with a valid (schema_version-bearing)
#             file so the pre-v70 sync has a correct baseline even if the
#             authoritative stix manifest is temporarily unavailable.
#   รขลโฆ FIX-9: EMBEDDED_INTEL in index.html now refreshed on every run.
#             update_embedded_intel.py runs after HTML report generation.
#             Previously EMBEDDED_INTEL was never updated after v111.0 purge
#             รขโฌโ it retained April 16 data baked from a previous run. Dashboard
