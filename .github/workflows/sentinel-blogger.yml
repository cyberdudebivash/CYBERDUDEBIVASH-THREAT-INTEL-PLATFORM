name: CDB Sentinel Blogger – Threat Intel Auto-Publisher v25.0

on:
  schedule:
    - cron: '0 */4 * * *'  # Changed: Every 4 hours (was 6) for fresher data
    - cron: '0 0 1 * *'    # Monthly Sovereign Workspace Reset (1st of the month)
  workflow_dispatch:       # Manual trigger for immediate Zero-Day response
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false

permissions:
  contents: write          # Required for bot to sync forensic manifests
  pages: write             # Required for gh-pages deployment

# v25.0: Prevent concurrent runs to avoid data corruption
concurrency:
  group: sentinel-sync
  cancel-in-progress: false

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # v21.0: increased for EPSS/CVSS enrichment calls

    steps:
      - name: Checkout repository (v25.0 Full Sync)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Crucial for stable git rebase operations
          ref: main        # v25.0: Explicit branch reference

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Institutional Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # v25.0: Install additional dependencies if requirements_v25.txt exists
          if [ -f requirements_v25.txt ]; then
            pip install -r requirements_v25.txt || echo "Some v25 deps skipped (optional)"
          fi

      - name: Ensure Production Directories Exist
        run: |
          mkdir -p data/stix
          mkdir -p data/rule_packs
          mkdir -p data/playbooks
          mkdir -p data/playbooks/scripts
          mkdir -p data/premium_packs
          mkdir -p data/enterprise_kits
          mkdir -p data/enrichment
          mkdir -p data/status
          mkdir -p secrets

      # 🧹 MONTHLY WORKSPACE PURIFICATION
      - name: Monthly Maintenance Purge
        if: github.event.schedule == '0 0 1 * *'
        run: python -m agent.janitor || echo "Janitor module not found, skipping"
        env:
          CI: true

      # 🛡️ SOVEREIGN KEY INJECTION (v16.x Layer)
      - name: Inject Sovereign Key
        run: |
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem
          echo "::add-mask::$(cat secrets/cdb_sovereign.pem)"

      # ─── v25.0: PRE-FLIGHT DIAGNOSTIC ─────────────────────────────────────────
      - name: Pre-flight Sync Diagnostic
        run: |
          echo "🔍 Pre-flight check..."
          echo "  Current time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          
          if [ -f "data/stix/feed_manifest.json" ]; then
            LATEST_TS=$(python3 -c "import json; d=json.load(open('data/stix/feed_manifest.json')); print(d[0].get('timestamp','N/A') if isinstance(d,list) and d else 'N/A')" 2>/dev/null || echo "N/A")
            echo "  Last manifest entry: $LATEST_TS"
          else
            echo "  No existing manifest found - first run"
          fi

      # ─── PRIMARY PIPELINE ────────────────────────────────────────────────────
      - name: Run Sentinel Blogger APEX Engine (v25.0)
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
        run: python -m agent.sentinel_blogger
      # ─────────────────────────────────────────────────────────────────────────

      # ─── v25.0: FORCE UPDATE SYNC TIMESTAMP ──────────────────────────────────
      - name: Force Update Sync Timestamp
        run: |
          python3 << 'PYEOF'
          import json
          import os
          from datetime import datetime, timezone

          # Update status.json with current timestamp
          status_path = "data/status/status.json"
          now = datetime.now(timezone.utc).isoformat()
          
          status = {
              "platform": "CYBERDUDEBIVASH® SENTINEL APEX",
              "version": "v25.0",
              "status": "OPERATIONAL",
              "status_message": "Pipeline sync complete",
              "components": {
                  "threat_feed": {
                      "status": "OPERATIONAL",
                      "last_updated": now,
                      "age_hours": 0.0
                  },
                  "pipeline": {
                      "status": "OPERATIONAL",
                      "last_run_at": now
                  }
              },
              "generated_at": now
          }
          
          os.makedirs(os.path.dirname(status_path), exist_ok=True)
          with open(status_path, "w") as f:
              json.dump(status, f, indent=2)
          
          print(f"✓ Status updated: {now}")
          
          # Also create a sync marker for the dashboard
          sync_marker = {"last_sync": now, "sync_source": "github-actions-v25"}
          with open("data/sync_marker.json", "w") as f:
              json.dump(sync_marker, f, indent=2)
          print(f"✓ Sync marker created")
          PYEOF

      # ─── v21.0: BUILD DETECTION PACK ─────────────────────────────────────────
      - name: Build Detection Pack (v21.0 — Real IOC Rules)
        continue-on-error: true
        run: |
          python - << 'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          try:
              from tools.detection_pack_builder import build_latest_pack
              result = build_latest_pack()
              print(f"Detection pack built: {result}")
          except Exception as e:
              print(f"Detection pack skipped (non-critical): {e}")
          PYEOF

      # ─── v21.0: MAP GUMROAD PRODUCT URL ─────────────────────────────────────
      - name: Map Detection Pack to Gumroad Product
        continue-on-error: true
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: |
          python - << 'PYEOF'
          import sys, os
          sys.path.insert(0, os.getcwd())
          try:
              from tools.gumroad_publisher import publish_latest
              result = publish_latest()
              print(f"Gumroad product URL: {result}")
          except Exception as e:
              print(f"Gumroad mapping skipped (non-critical): {e}")
          PYEOF

      # ─── COMMIT & PUSH ─────────────────────────────────────────────────────
      - name: Commit & Atomic Push Intelligence Data
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          # Stage all intelligence artifacts
          git add data/*.json data/stix/*.json data/status/*.json 2>/dev/null || true
          git add data/playbooks/*.json 2>/dev/null || true
          git add data/playbooks/scripts/ 2>/dev/null || true
          git add data/enrichment/*.json 2>/dev/null || true

          # Atomic Commit & Rebase Loop (Hardened Stability Logic)
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "v25.0 Apex: Intel Sync @ $TIMESTAMP [skip ci]"
            for i in {1..5}; do
              git pull origin main --rebase && git push origin main && break || \
              (echo "Push collision detected. Retrying in 15s (Attempt $i)..." && sleep 15)
            done
          fi

      # ─── v25.0: POST-SYNC VERIFICATION ────────────────────────────────────────
      - name: Post-Sync Verification
        run: |
          echo "📋 Post-sync verification..."
          if [ -f "data/stix/feed_manifest.json" ]; then
            ENTRIES=$(python3 -c "import json; d=json.load(open('data/stix/feed_manifest.json')); print(len(d) if isinstance(d,list) else len(d.get('entries',[])))" 2>/dev/null || echo "0")
            LATEST=$(python3 -c "import json; d=json.load(open('data/stix/feed_manifest.json')); print(d[0].get('timestamp','?')[:19] if isinstance(d,list) and d else '?')" 2>/dev/null || echo "?")
            echo "  ✓ Manifest entries: $ENTRIES"
            echo "  ✓ Latest entry: $LATEST"
          fi
          
          if [ -f "data/sync_marker.json" ]; then
            echo "  ✓ Sync marker present"
          fi

      # ─── DEPLOY TO GH-PAGES ─────────────────────────────────────────────────
      - name: Deploy Live Feed to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          single-commit: false
          git-config-name: CDB-Sentinel-Bot
          git-config-email: bivash@cyberdudebivash.com
          commit-message: "v26.0 Deploy: Live feed update"

      # ─── v25.0: DEPLOYMENT VERIFICATION ────────────────────────────────────
      - name: Verify Deployment
        run: |
          echo "🚀 Deployment complete"
          echo "   Dashboard: https://intel.cyberdudebivash.com"
          echo "   Status: https://intel.cyberdudebivash.com/data/status/status.json"
          echo "   Manifest: https://intel.cyberdudebivash.com/data/stix/feed_manifest.json"
