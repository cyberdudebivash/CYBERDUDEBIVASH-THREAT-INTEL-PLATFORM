# ════════════════════════════════════════════════════════════════════
# CYBERDUDEBIVASH® SENTINEL APEX v45.0 — CI/CD Pipeline
# ════════════════════════════════════════════════════════════════════
# Runs on push to main + scheduled (every 6 hours)
# Stages:
#   1. Feed ingestion (sentinel_blogger.py)
#   2. NEXUS Engine v2 — exposure/hunt/campaign/briefing
#   3. GENESIS Engine v2 — 12 strategic intelligence engines
#   4. All legacy engines (cortex, quantum, sovereign)
#   5. Commit & push all data/ outputs
# ════════════════════════════════════════════════════════════════════
name: SENTINEL APEX — Full Intelligence Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write

jobs:
  sentinel_pipeline:
    name: SENTINEL APEX Intelligence Run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python Setup ──────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || \
          pip install requests feedparser python-dateutil pytz stix2 \
                      aiohttp beautifulsoup4 lxml pyyaml

      # ── 3. Ensure Output Directories ─────────────────────────────
      - name: Create Data Directories
        run: |
          mkdir -p data/nexus data/genesis data/cortex \
                   data/quantum data/sovereign data/stix data/logs

      # ── 4. Stage 1: Feed Ingestion ───────────────────────────────
      - name: "[Stage 1] Feed Ingestion — sentinel_blogger.py"
        run: |
          echo "▌ STAGE 1: Feed Ingestion"
          python sentinel_blogger.py 2>&1 | tee data/logs/ingest_$(date +%Y%m%d_%H%M%S).log
          echo "✅ Feed manifest updated"
        env:
          PYTHONUNBUFFERED: "1"

      # ── 5. Stage 2: NEXUS Engine v2 ──────────────────────────────
      - name: "[Stage 2] NEXUS Engine v2 — Threat Intelligence Core"
        run: |
          echo "▌ STAGE 2: NEXUS ENGINE v2"
          python agent/v39_nexus/nexus_engine_v2.py 2>&1 | tee -a data/logs/nexus_$(date +%Y%m%d_%H%M%S).log
          echo "✅ nexus_output.json generated"
          python -c "
          import json, sys
          with open('data/nexus/nexus_output.json') as f: d=json.load(f)
          print(f'  Exposure Index : {d.get(\"exposure_index\",\"?\")}')
          print(f'  Threat Hunts   : {len(d.get(\"threat_hunts\",[]))}')
          print(f'  Campaigns      : {len(d.get(\"campaigns\",[]))}')
          print(f'  Detection Rules: {d.get(\"detection_pack\",{}).get(\"total_rules\",0)}')
          print(f'  PIR Coverage   : {d.get(\"pir_coverage\",{}).get(\"coverage_pct\",0)}%')
          "
        env:
          PYTHONUNBUFFERED: "1"

      # ── 6. Stage 3: GENESIS Engine v2 ────────────────────────────
      - name: "[Stage 3] GENESIS Engine v2 — 12 Strategic Intelligence Engines"
        run: |
          echo "▌ STAGE 3: GENESIS ENGINE v2 (12 engines)"
          python agent/v43_genesis/genesis_engine_v2.py 2>&1 | tee -a data/logs/genesis_$(date +%Y%m%d_%H%M%S).log
          echo "✅ genesis_output.json generated"
          python -c "
          import json
          with open('data/genesis/genesis_output.json') as f: d=json.load(f)
          eng = d.get('engines',{})
          ok  = sum(1 for e in eng.values() if e.get('status')=='OK')
          print(f'  Engines OK: {ok}/{len(eng)}')
          for k,v in eng.items(): print(f'  [{v.get(\"status\",\"?\"):2s}] {k}')
          "
        env:
          PYTHONUNBUFFERED: "1"

      # ── 7. Stage 4: Legacy Engines ───────────────────────────────
      - name: "[Stage 4] CORTEX Engine"
        run: |
          if [ -f agent/v40_cortex/cortex_engine.py ]; then
            echo "▌ CORTEX ENGINE"
            python agent/v40_cortex/cortex_engine.py 2>&1 || echo "⚠️  CORTEX non-fatal"
          else echo "ℹ️  cortex_engine.py not found — skipping"; fi
        continue-on-error: true

      - name: "[Stage 4] QUANTUM Engine"
        run: |
          if [ -f agent/v41_quantum/quantum_engine.py ]; then
            echo "▌ QUANTUM ENGINE"
            python agent/v41_quantum/quantum_engine.py 2>&1 || echo "⚠️  QUANTUM non-fatal"
          else echo "ℹ️  quantum_engine.py not found — skipping"; fi
        continue-on-error: true

      - name: "[Stage 4] SOVEREIGN Engine"
        run: |
          if [ -f agent/v42_sovereign/sovereign_engine.py ]; then
            echo "▌ SOVEREIGN ENGINE"
            python agent/v42_sovereign/sovereign_engine.py 2>&1 || echo "⚠️  SOVEREIGN non-fatal"
          else echo "ℹ️  sovereign_engine.py not found — skipping"; fi
        continue-on-error: true

      # ── 8. Stage 5: Validate Outputs ─────────────────────────────
      - name: "[Stage 5] Validate All Engine Outputs"
        run: |
          echo "▌ OUTPUT VALIDATION"
          python -c "
          import json, os, sys
          required = {
              'data/stix/feed_manifest.json': ['entries'],
              'data/nexus/nexus_output.json': ['exposure_index','threat_hunts','campaigns'],
              'data/genesis/genesis_output.json': ['engines'],
          }
          fail = False
          for path, fields in required.items():
              if not os.path.exists(path):
                  print(f'  ❌ MISSING: {path}'); fail=True; continue
              try:
                  with open(path) as f: d=json.load(f)
                  sz = os.path.getsize(path)
                  missing = [fld for fld in fields if fld not in d]
                  if missing:
                      print(f'  ❌ {path} — missing fields: {missing}'); fail=True
                  else:
                      print(f'  ✅ {path} ({sz:,} bytes)')
              except Exception as e:
                  print(f'  ❌ {path} — parse error: {e}'); fail=True
          if fail: sys.exit(1)
          print('  ✅ All outputs validated')
          "

      # ── 9. Stage 6: Commit & Push ─────────────────────────────────
      - name: "[Stage 6] Commit Intelligence Outputs"
        run: |
          git config user.name  "SENTINEL-APEX-BOT"
          git config user.email "sentinel@cyberdudebivash.com"
          git add data/nexus/ data/genesis/ data/cortex/ \
                  data/quantum/ data/sovereign/ data/stix/ data/logs/ \
                  || true
          CHANGED=$(git diff --cached --stat | tail -1)
          if [ -z "$(git diff --cached)" ]; then
            echo "ℹ️  No data changes — nothing to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "🔱 SENTINEL APEX v45.0 — Auto-Intel Run ${TIMESTAMP}

  Engines: NEXUS-v2 | GENESIS-v2 | CORTEX | QUANTUM | SOVEREIGN
  Pipeline: Feed Ingestion → Risk Scoring → Detection Generation → STIX Export
  ${CHANGED}

  [skip ci]"
            git push origin main
            echo "✅ Intelligence outputs committed and pushed"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Pipeline Summary ──────────────────────────────────────
      - name: Pipeline Run Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════"
          echo "  SENTINEL APEX v45.0 — Pipeline Complete"
          echo "  Run: ${{ github.run_number }} | ${{ github.sha }}"
          echo "  Trigger: ${{ github.event_name }}"
          echo "═══════════════════════════════════════════════"
          ls -lh data/nexus/ data/genesis/ 2>/dev/null || true
