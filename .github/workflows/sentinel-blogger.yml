          echo "รข"โ REPORT GENERATION COMPLETE                  รข"โ"
          echo "รข"โ Reports written : $REPORT_COUNT"
          echo "รข"โ Elapsed         : ${ELAPSED}s"
          echo "รข"โ Public prefix   : https://intel.cyberdudebivash.com"
          echo "รข""รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"ห"

