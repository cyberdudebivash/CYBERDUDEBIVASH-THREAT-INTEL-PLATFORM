name: CDB Sentinel Blogger – Threat Intel Auto-Publisher

on:
  schedule:
    - cron: '0 */6 * * *' # Automated 6-hour GOC sweep
  workflow_dispatch:      # Manual GOC trigger for immediate Intel

permissions:
  contents: write         # Required for CDB-Sentinel-Bot to push data

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Forensic Directories Exist
        run: mkdir -p data/stix

      - name: Run Sentinel Blogger APEX Engine
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: python -m agent.sentinel_blogger

      - name: Commit & Push Intelligence Data
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          git add data/stix/*.json
          # v10.1 Fix: Ensures manifest is pushed to main for Raw Fetch
          git commit -m "v10.1 Apex: Intelligence manifest sync [skip ci]" || echo "No changes"
          git push origin main

      - name: Deploy Live Feed & Protect Branding
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # ACTIONABLE HARDENING:
          # This flag prevents the action from deleting your branded index.html 
          # and ecosystem assets during the manifest update.
          keep_files: true
