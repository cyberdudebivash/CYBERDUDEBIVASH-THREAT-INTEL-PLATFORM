#   r2_upload.py       (Stage 3.5) - Cloudflare R2 upload (mandatory)
#   bust_kv_cache.py   (Stage 3.7) - Worker KV cache invalidation
#   safe_git_commit.py (Stage 4)   - git commit + push (always runs)
#   GitHub Pages       (Stage 5)   - deploy action
