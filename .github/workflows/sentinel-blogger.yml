# STAGE 6: E2E PIPELINE VALIDATION
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รขลโฆ E2E Pipeline Validation"
        continue-on-error: true
        run: |
          echo "=== SENTINEL APEX v131.0.0 รขโฌ" E2E PIPELINE VALIDATION ==="

          # Test 1: Worker health
          HEALTH=$(curl -s --max-time 10 "https://intel.cyberdudebivash.com/api/health" 2>/dev/null || echo '{}')
          R2_STATUS=$(echo "$HEALTH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('checks',{}).get('r2_intel','unknown'))" 2>/dev/null || echo "error")
          GATEWAY=$(echo "$HEALTH" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('gateway','unknown'))" 2>/dev/null || echo "error")
          echo "[Health] Gateway: $GATEWAY | R2: $R2_STATUS"

          # Test 2: Version endpoint
          VERSION=$(curl -s --max-time 10 "https://intel.cyberdudebivash.com/api/version" 2>/dev/null || echo '{}')
          VER=$(echo "$VERSION" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('version','unknown'))" 2>/dev/null || echo "error")
          echo "[Version] Platform version: $VER"

          # Test 3: Preview endpoint (public, no auth)
          PREVIEW=$(curl -s --max-time 10 "https://intel.cyberdudebivash.com/api/preview" 2>/dev/null || echo '{}')
          TOTAL=$(echo "$PREVIEW" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('preview',{}).get('total_in_feed',0))" 2>/dev/null || echo 0)
          ITEMS=$(echo "$PREVIEW" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('preview',{}).get('items',[])))" 2>/dev/null || echo 0)
          echo "[Preview] $ITEMS preview items | $TOTAL total in feed"

          # Test 4: Auth enforcement
          FEED_RESP=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "https://intel.cyberdudebivash.com/api/feed" 2>/dev/null || echo "000")
          echo "[Auth] /api/feed (no key) รขโ โ HTTP $FEED_RESP (expect 401)"

          # Test 5: STIX endpoint reachability
          STIX_RESP=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "https://intel.cyberdudebivash.com/api/stix/test" 2>/dev/null || echo "000")
          echo "[STIX] /api/stix/test (no key) รขโ โ HTTP $STIX_RESP (expect 401)"

          echo "=== REPORT_COUNT=${{ env.REPORT_COUNT }} | VERIFY_PASS=${{ env.REPORT_VERIFY_PASS }} ==="
          if [ "$R2_STATUS" = "ok" ] && [ "$TOTAL" -gt "10" ] && [ "$FEED_RESP" = "401" ]; then
            echo "=== VALIDATION PASSED: Pipeline v117.0.0 fully operational ==="
          else
            echo "=== VALIDATION WARNING: R2=$R2_STATUS TOTAL=$TOTAL FEED_HTTP=$FEED_RESP ==="
          fi

      - name: "รฐลธโยง Post-pipeline extras"
        continue-on-error: true
        run: |
          python agent/v48_pipeline_hardening/pipeline_hardener.py || true
          python agent/quality_gate_audit.py || true
          python3 scripts/generate_ai_endpoints.py || true



