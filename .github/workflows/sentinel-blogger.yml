name: CDB Sentinel Blogger - Threat Intel Auto-Publisher v48.0

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

concurrency:
  group: sentinel-sync
  cancel-in-progress: false

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ================================================================
      # STAGE 0: CHECKOUT & ENVIRONMENT SETUP
      # ================================================================
      - name: Checkout repository (v48.0 Full Sync)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Institutional Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Production Directories Exist
        run: |
          mkdir -p data/stix
          mkdir -p data/nexus
          mkdir -p data/genesis
          mkdir -p data/cortex
          mkdir -p data/quantum
          mkdir -p data/sovereign
          mkdir -p data/rule_packs
          mkdir -p data/playbooks
          mkdir -p data/playbooks/scripts
          mkdir -p data/premium_packs
          mkdir -p data/enterprise_kits
          mkdir -p data/enrichment
          mkdir -p data/status
          mkdir -p data/logs
          mkdir -p data/remediation
          mkdir -p secrets

      # ================================================================
      # STAGE 1: MAINTENANCE & PRE-FLIGHT
      # ================================================================
      - name: Monthly Maintenance Purge
        if: github.event.schedule == '0 0 1 * *'
        run: python -m agent.janitor || echo "Janitor module not found, skipping"
        env:
          CI: true

      - name: Inject Sovereign Key
        run: |
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem
          echo "::add-mask::$(cat secrets/cdb_sovereign.pem)"

      - name: Pre-flight Sync Diagnostic
        run: |
          echo "Pre-flight check..."
          echo "  Current time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          if [ -f "data/stix/feed_manifest.json" ]; then
            LATEST_TS=$(python3 -c "import json; d=json.load(open('data/stix/feed_manifest.json')); print(d[0].get('timestamp','N/A') if isinstance(d,list) and d else 'N/A')" 2>/dev/null || echo "N/A")
            echo "  Last manifest entry: $LATEST_TS"
          else
            echo "  No existing manifest found - first run"
          fi

      # ================================================================
      # STAGE 2: CORE FEED INGESTION
      # ================================================================
      - name: Run Sentinel Blogger APEX Engine (v48.0)
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
        run: |
          echo "STAGE 2: Feed Ingestion"
          python -m agent.sentinel_blogger
          echo "Feed ingestion complete"

      - name: Force Update Sync Timestamp
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          status_path = "data/status/status.json"
          now = datetime.now(timezone.utc).isoformat()
          status = {
              "platform": "CYBERDUDEBIVASH(R) SENTINEL APEX",
              "version": "v48.0",
              "status": "OPERATIONAL",
              "status_message": "Pipeline sync complete",
              "components": {
                  "threat_feed": {"status": "OPERATIONAL", "last_updated": now, "age_hours": 0.0},
                  "pipeline": {"status": "OPERATIONAL", "last_run_at": now}
              },
              "generated_at": now
          }
          os.makedirs(os.path.dirname(status_path), exist_ok=True)
          with open(status_path, "w") as f:
              json.dump(status, f, indent=2)
          print("Status updated: " + now)
          sync_marker = {"last_sync": now, "sync_source": "github-actions-v48"}
          with open("data/sync_marker.json", "w") as f:
              json.dump(sync_marker, f, indent=2)
          print("Sync marker created")
          PYEOF

      # ================================================================
      # STAGE 2.1: CRITICAL DATA COMMIT (v55.3 — Anti-Timeout Safeguard)
      # ================================================================
      - name: Intermediate Commit — Save Feed Intel (v55.3 Anti-Timeout)
        continue-on-error: true
        run: |
          echo "STAGE 2.1: Intermediate commit — saving critical intel data"
          python3 scripts/update_embedded_intel.py || echo "EMBEDDED_INTEL update non-fatal"
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          git add data/stix/feed_manifest.json data/blogger_processed.json data/status/status.json data/sync_marker.json index.html
          if git diff --staged --quiet; then
            echo "No feed intel changes to commit"
          else
            git commit -m "v55.3 Intel checkpoint: manifest + dedup [skip ci]"
            for i in {1..3}; do
              git pull origin main --rebase && git push origin main && break || (sleep 10)
            done
          fi

      # ================================================================
      # STAGE 2.5: PIPELINE HARDENER v48.0
      # ================================================================
      - name: Pipeline Hardener v48.0 - Sort + EPSS Batch + KEV + Validate
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          PYTHONPATH: ${{ github.workspace }} # --- PATCH: Module Resolution Fix ---
        run: |
          echo "STAGE 2.5: PIPELINE HARDENER v48.0"
          if [ -f "agent/v48_pipeline_hardening/pipeline_hardener.py" ]; then
            python agent/v48_pipeline_hardening/pipeline_hardener.py
            python3 -c "
          import json, os
          try:
            with open('data/enrichment/v48_hardening_results.json') as f: d=json.load(f)
            print('  Sort fixed      : ' + str(d.get('sort_fixed', False)))
            print('  EPSS enriched  : ' + str(d.get('epss_enriched', 0)) + ' fields')
          except Exception as e:
            print('v48 results check: ' + str(e))
          "
          fi

      # ================================================================
      # STAGE 8: ATOMIC COMMIT & SOVEREIGN SYNC
      # ================================================================
      - name: Commit and Push Intelligence Data
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          echo "Refreshing EMBEDDED_INTEL in index.html..."
          python3 scripts/update_embedded_intel.py || true

          # --- PATCH: Extended Asset Sync ---
          git add data/*.json
          git add data/stix/*.json
          git add data/status/*.json
          git add data/nexus/*.json
          git add data/genesis/*.json
          git add data/enrichment/*.json
          git add data/bughunter/*.json
          git add data/remediation/*.sh
          git add data/remediation/*.yml
          git add data/remediation/*.yaml
          git add data/premium_packs/*.zip
          git add index.html
          # --- END PATCH ---

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "v55.3 Apex: Intel + Remediation + Dashboard Sync [skip ci]"
            for i in {1..5}; do
              git pull origin main --rebase
              # --- PATCH: Sovereign Conflict Override ---
              git checkout --ours data/status/status.json 2>/dev/null || true
              git checkout --ours data/stix/feed_manifest.json 2>/dev/null || true
              # --- END PATCH ---
              git push origin main && break || (echo "Push collision - retry $i..." && sleep 15)
            done
          fi

      # ================================================================
      # STAGE 10: DEPLOY TO GITHUB PAGES
      # ================================================================
      - name: Deploy Live Feed to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          git-config-name: CDB-Sentinel-Bot
          git-config-email: bivash@cyberdudebivash.com
          commit-message: "v48.0 Deploy: Live feed update"