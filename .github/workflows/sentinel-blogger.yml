# STAGE 3.6a: MANIFEST INTEGRITY CHECK รขโฌโ ZERO SILENT FAILURES
# Hard-validates every manifest entry has report_url + validation_status.
# Pipeline FAILS if any entry has write_error or file_missing status.
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโโ Manifest Integrity Check รขโฌโ report_url + validation_status"
        continue-on-error: false
        run: |
          echo "=== SENTINEL APEX รขโฌ" MANIFEST INTEGRITY CHECK ==="
          python3 - << 'PYEOF'
          import json, sys
          with open("data/stix/feed_manifest.json") as f:
              d = json.load(f)
          items = d.get("advisories", d.get("reports", []))
          HARD_FAIL_STATUSES = {"write_error", "file_missing"}
          missing_url  = []
          hard_fail    = []
          stale_domain = []
          for item in items:
              sid = item.get("id", "?")
              vs  = item.get("validation_status", "")
              ru  = item.get("report_url", "")
              if vs == "brand_skip":
                  continue
              if vs in HARD_FAIL_STATUSES:
                  hard_fail.append(f"  HARD_FAIL [{vs}] {sid}")
                  continue
              if not ru:
                  missing_url.append(f"  MISSING_URL {sid}")
                  continue
              if "reports.cyberdudebivash.com" in ru:
                  stale_domain.append(f"  STALE_DOMAIN {sid}")
          total = len(items)
          ok = total - len(missing_url) - len(hard_fail) - len(stale_domain)
          print(f"Manifest entries : {total}")
          print(f"report_url ok    : {ok}")
          print(f"Missing URL      : {len(missing_url)}")
          print(f"Hard failures    : {len(hard_fail)}")
          print(f"Stale domain     : {len(stale_domain)}")
          if stale_domain:
              print("STALE DOMAINS (will be rewritten by Worker at serve time):")
              for s in stale_domain[:10]:
                  print(s)
          if hard_fail:
              print("::error::MANIFEST INTEGRITY FAIL รขโฌ" write_error/file_missing entries:")
              for h in hard_fail:
                  print(h)
              sys.exit(1)
          print("MANIFEST INTEGRITY CHECK PASSED")
          PYEOF

