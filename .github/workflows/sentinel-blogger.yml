#   run_pipeline.py    (Stage 1-3)  - master orchestrator:
#       Stage 0.5  purge_publish_queue
#       Stage 1    bootstrap_critical_files
#       Stage 1.1  validate_bootstrap
#       Stage 1.2  inject_sovereign_key
