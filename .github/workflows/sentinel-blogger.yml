# ================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Sovereign Intelligence Cycle
# Version: v48.2 (Quality Gate Integration)
# Path: .github/workflows/sentinel-blogger.yml
# ================================================================

name: CDB Sentinel Blogger - Threat Intel Auto-Publisher v48.0

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

concurrency:
  group: sentinel-sync
  cancel-in-progress: false

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ================================================================
      # STAGE 0: CHECKOUT & ENVIRONMENT SETUP
      # ================================================================
      - name: Checkout repository (v48.2 Sovereign Sync)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Institutional Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Production Directories Exist
        run: |
          mkdir -p data/stix data/nexus data/genesis data/cortex data/quantum data/sovereign data/rule_packs data/playbooks data/playbooks/scripts data/premium_packs data/enterprise_kits data/enrichment data/status data/logs data/remediation secrets

      # ================================================================
      # STAGE 1: MAINTENANCE & PRE-FLIGHT
      # ================================================================
      - name: Monthly Maintenance Purge
        if: github.event.schedule == '0 0 1 * *'
        run: python -m agent.janitor || echo "Janitor module not found, skipping"
        env:
          CI: true

      - name: Inject Sovereign Key
        run: |
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem
          echo "::add-mask::$(cat secrets/cdb_sovereign.pem)"

      # ================================================================
      # STAGE 2: CORE FEED INGESTION
      # ================================================================
      - name: Run Sentinel Blogger APEX Engine (v48.0)
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
        run: |
          echo "STAGE 2: Feed Ingestion"
          python -m agent.sentinel_blogger
          echo "Feed ingestion complete"

      - name: Force Update Sync Timestamp
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          status_path = "data/status/status.json"
          now = datetime.now(timezone.utc).isoformat()
          status = {
              "platform": "CYBERDUDEBIVASH(R) SENTINEL APEX",
              "version": "v48.2",
              "status": "OPERATIONAL",
              "status_message": "Quality Gate Audit integrated",
              "components": {
                  "threat_feed": {"status": "OPERATIONAL", "last_updated": now},
                  "pipeline": {"status": "OPERATIONAL", "last_run_at": now}
              },
              "generated_at": now
          }
          os.makedirs(os.path.dirname(status_path), exist_ok=True)
          with open(status_path, "w") as f:
              json.dump(status, f, indent=2)
          with open("data/sync_marker.json", "w") as f:
              json.dump({"last_sync": now, "sync_source": "github-actions-v48.2"}, f, indent=2)
          PYEOF

      # ================================================================
      # STAGE 2.1: CRITICAL DATA COMMIT (v55.3 — Anti-Timeout Safeguard)
      # ================================================================
      - name: Intermediate Commit — Save Feed Intel (v55.3 Anti-Timeout)
        continue-on-error: true
        run: |
          echo "STAGE 2.1: Intermediate commit — saving critical intel data"
          python3 scripts/update_embedded_intel.py || echo "EMBEDDED_INTEL update non-fatal"
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          git add data/stix/feed_manifest.json data/blogger_processed.json data/status/status.json data/sync_marker.json index.html
          if ! git diff --staged --quiet; then
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "v55.3 Intel checkpoint: manifest + dedup @ $TIMESTAMP [skip ci]"
            for i in {1..3}; do
              git pull origin main --rebase --autostash && git push origin main && break || (sleep 10)
            done
          fi

      # ================================================================
      # STAGE 2.5: PIPELINE HARDENER v48.0
      # ================================================================
      - name: Pipeline Hardener v48.0
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "STAGE 2.5: PIPELINE HARDENER v48.0"
          if [ -f "agent/v48_pipeline_hardening/pipeline_hardener.py" ]; then
            python agent/v48_pipeline_hardening/pipeline_hardener.py
          fi

      # ================================================================
      # STAGE 2.6: SOVEREIGN QUALITY GATE AUDIT (NEW)
      # ================================================================
      # ===== PATCH START: Automated Quality Audit =====
      - name: Sovereign Quality Gate Audit
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "STAGE 2.6: SOVEREIGN QUALITY GATE AUDIT"
          if [ -f "agent/quality_gate_audit.py" ]; then
            python agent/quality_gate_audit.py
          else
            echo "Quality Gate Audit module not found - skipping"
          fi
      # ===== PATCH END =====

      # ================================================================
      # STAGE 8: ATOMIC COMMIT & SOVEREIGN SYNC
      # ================================================================
      - name: Commit and Push Intelligence Data
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          python3 scripts/update_embedded_intel.py || true

          # Persistence logic for all core intelligence and audit artifacts
          git add data/*.json 2>/dev/null || true
          git add data/stix/*.json 2>/dev/null || true
          git add data/status/*.json 2>/dev/null || true
          git add data/sovereign/*.json 2>/dev/null || true
          git add data/enrichment/*.json 2>/dev/null || true
          git add data/bughunter/*.json 2>/dev/null || true
          git add data/remediation/*.sh 2>/dev/null || true
          git add data/remediation/*.yml 2>/dev/null || true
          git add data/premium_packs/*.zip 2>/dev/null || true
          git add index.html 2>/dev/null || true

          if ! git diff --staged --quiet; then
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "v55.3 Apex: Sovereign Recovery & Dash Sync @ $TIMESTAMP [skip ci]"
            for i in {1..5}; do
              git pull origin main --rebase --autostash
              git checkout --ours data/status/status.json 2>/dev/null || true
              git push origin main && break || sleep 15
            done
          fi

      # ================================================================
      # STAGE 10: DEPLOY TO GITHUB PAGES
      # ================================================================
      - name: Deploy Live Feed to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          git-config-name: CDB-Sentinel-Bot
          git-config-email: bivash@cyberdudebivash.com
          commit-message: "v48.2 Deploy: Live feed + Quality Audit update"
