####################################################################
# SENTINEL APEX v70 — Enhanced Pipeline Workflow
# ================================================================
# Hardened GitHub Actions workflow with:
# - Structured logging at every stage
# - Validation gate BEFORE deploy
# - Failure alerts (via workflow annotations)
# - Idempotent runs (safe to re-trigger)
# - Preserve sync artifacts between stages
# - Timeout protection
# - Rollback on validation failure
####################################################################

name: sentinel-blogger-v70

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:
    inputs:
      skip_ai:
        description: 'Skip AI phases (faster run)'
        required: false
        default: 'false'
      dry_run:
        description: 'Dry run (no writes)'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: '1'
  SENTINEL_DATA_DIR: 'data'
  SENTINEL_VERSION: 'v70.0'

jobs:
  sentinel-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ─── STAGE 0: Checkout ───
      - name: "STAGE 0: Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── STAGE 1: Environment Setup ───
      - name: "STAGE 1: Setup Python environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "STAGE 1.1: Install dependencies"
        run: |
          echo "::group::Installing dependencies"
          pip install --upgrade pip
          pip install \
            feedparser requests beautifulsoup4 \
            scikit-learn numpy \
            google-api-python-client google-auth-httplib2 google-auth-oauthlib \
            stix2 \
            2>&1 | tail -5
          # Optional: transformers (heavy, may skip for speed)
          pip install transformers torch --quiet 2>/dev/null || echo "⚠ Transformers not installed (optional)"
          echo "::endgroup::"
          echo "✓ Dependencies installed"

      # ─── STAGE 2: Preserve Existing Data ───
      - name: "STAGE 2: Preserve existing sync artifacts"
        run: |
          echo "::group::Preserving sync artifacts"
          mkdir -p data/.manifest_backups data/manifest_versions
          if [ -f data/feed_manifest.json ]; then
            cp data/feed_manifest.json data/.manifest_backups/pre_run_$(date +%Y%m%dT%H%M%S).json
            echo "✓ Manifest backed up"
            echo "manifest_size=$(stat -c%s data/feed_manifest.json)" >> $GITHUB_OUTPUT
            echo "advisory_count=$(python3 -c 'import json;d=json.load(open("data/feed_manifest.json"));print(len(d.get("advisories",[])))')" >> $GITHUB_OUTPUT
          else
            echo "⚠ No existing manifest found"
          fi
          # Preserve blogger_processed.json
          if [ -f data/blogger_processed.json ]; then
            cp data/blogger_processed.json data/.manifest_backups/blogger_processed_backup.json
            echo "✓ Blogger processed state backed up"
          fi
          echo "::endgroup::"
        id: preserve
        continue-on-error: true

      # ─── STAGE 3: Run Feed Ingestion (existing pipeline) ───
      - name: "STAGE 3: Feed ingestion"
        run: |
          echo "::group::Feed Ingestion"
          echo "▶ Running sentinel_blogger feed ingestion..."
          if [ -f "agent/sentinel_blogger.py" ]; then
            python -m agent.sentinel_blogger 2>&1 || echo "⚠ sentinel_blogger encountered issues"
          elif [ -f "sentinel_blogger.py" ]; then
            python sentinel_blogger.py 2>&1 || echo "⚠ sentinel_blogger encountered issues"
          else
            echo "⚠ No sentinel_blogger entry point found — checking for feed_manifest"
          fi
          echo "::endgroup::"
        timeout-minutes: 30
        continue-on-error: true
        env:
          BLOGGER_API_KEY: ${{ secrets.BLOGGER_API_KEY }}
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      # ─── STAGE 4: Run v70 Intelligence Pipeline ───
      - name: "STAGE 4: v70 Intelligence Pipeline"
        run: |
          echo "::group::v70 Intelligence Pipeline"
          echo "▶ Running SENTINEL APEX v70 orchestrator..."

          AI_FLAG=""
          DRY_FLAG=""
          if [ "${{ github.event.inputs.skip_ai }}" = "true" ]; then
            AI_FLAG="--no-ai"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          python -m agent.v70_apex_upgrade.orchestrator \
            --data-dir data \
            --dashboard index.html \
            --json \
            $AI_FLAG $DRY_FLAG \
            | tee /tmp/v70_pipeline_result.json

          # Check result
          RESULT=$(python3 -c 'import json;d=json.load(open("/tmp/v70_pipeline_result.json"));print("PASS" if d.get("success") else "FAIL")')
          echo "pipeline_result=$RESULT" >> $GITHUB_OUTPUT
          echo "▶ Pipeline result: $RESULT"
          echo "::endgroup::"
        id: v70_pipeline
        timeout-minutes: 30
        continue-on-error: true

      # ─── STAGE 5: Update EMBEDDED_INTEL in dashboard ───
      - name: "STAGE 5: Update dashboard EMBEDDED_INTEL"
        run: |
          echo "::group::Update EMBEDDED_INTEL"
          if [ -f "scripts/update_embedded_intel.py" ]; then
            python scripts/update_embedded_intel.py 2>&1 || echo "⚠ EMBEDDED_INTEL update had issues"
          else
            echo "ℹ No update_embedded_intel.py — dashboard uses manifest fetch"
          fi
          echo "::endgroup::"
        continue-on-error: true

      # ─── STAGE 6: Pre-Deploy Validation Gate ───
      - name: "STAGE 6: Pre-deploy validation"
        run: |
          echo "::group::Pre-Deploy Validation"
          echo "▶ Running validation gate..."

          python -m agent.v70_apex_upgrade.pipeline.validator \
            --data-dir data \
            --dashboard index.html \
            --json \
            | tee /tmp/v70_validation_result.json

          VALID=$(python3 -c 'import json;d=json.load(open("/tmp/v70_validation_result.json"));print("PASS" if d.get("passed") else "FAIL")')
          echo "validation_result=$VALID" >> $GITHUB_OUTPUT

          if [ "$VALID" = "FAIL" ]; then
            echo "::error::Pre-deploy validation FAILED — deployment blocked"
            echo "▶ Attempting rollback to last valid manifest..."
            python3 -c "
from agent.v70_apex_upgrade.core.manifest_manager import ManifestManager
mgr = ManifestManager('data')
ok, msg = mgr.rollback()
print(f'Rollback: {\"OK\" if ok else \"FAILED\"} — {msg}')
"
          fi
          echo "::endgroup::"
        id: validation
        continue-on-error: true

      # ─── STAGE 7: Intermediate commit (preserve data) ───
      - name: "STAGE 7: Intermediate data commit"
        run: |
          echo "::group::Intermediate Commit"
          git config user.name "sentinel-apex-bot"
          git config user.email "sentinel@cyberdudebivash.com"
          git add -A data/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ No data changes to commit"
          else
            git commit -m "[SENTINEL v70] Pipeline data update $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
            git push || echo "⚠ Push failed — will retry in final stage"
          fi
          echo "::endgroup::"
        continue-on-error: true

      # ─── STAGE 8: Final commit + deploy ───
      - name: "STAGE 8: Final commit and deploy"
        if: steps.validation.outputs.validation_result != 'FAIL'
        run: |
          echo "::group::Final Deploy"
          git add -A
          if git diff --cached --quiet; then
            echo "ℹ No changes to deploy"
          else
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            ADVISORY_COUNT=$(python3 -c 'import json;d=json.load(open("data/feed_manifest.json"));print(len(d.get("advisories",[])))' 2>/dev/null || echo "?")
            git commit -m "[SENTINEL v70] Deploy: ${ADVISORY_COUNT} advisories @ ${TIMESTAMP}"
            git push
            echo "✓ Deployed successfully"
          fi
          echo "::endgroup::"

      # ─── STAGE 9: Post-run report ───
      - name: "STAGE 9: Pipeline summary"
        if: always()
        run: |
          echo "═══════════════════════════════════════════════"
          echo "SENTINEL APEX v70 Pipeline Summary"
          echo "═══════════════════════════════════════════════"
          echo "Timestamp: $(date -u)"
          echo "Version: ${{ env.SENTINEL_VERSION }}"
          if [ -f /tmp/v70_pipeline_result.json ]; then
            python3 -c "
import json
d = json.load(open('/tmp/v70_pipeline_result.json'))
print(f\"Status: {'PASS ✓' if d.get('success') else 'FAIL ✗'}\")
print(f\"Advisories: {d.get('total_advisories', '?')}\")
print(f\"Dedup Removed: {d.get('dedup_removed', '?')}\")
print(f\"Correlations: {d.get('correlations_found', '?')}\")
print(f\"Campaigns: {d.get('campaigns_detected', '?')}\")
print(f\"Duration: {d.get('duration_seconds', '?')}s\")
for p in d.get('phases', []):
    icon = {'OK':'✓','SKIPPED':'⏭','DEGRADED':'⚠','FAILED':'✗'}.get(p['status'],'?')
    print(f\"  [{icon}] {p['phase']}: {p['status']} ({p['duration_s']}s)\")
"
          else
            echo "⚠ No pipeline result available"
          fi
          echo "═══════════════════════════════════════════════"
