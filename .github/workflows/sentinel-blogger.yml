name: CDB Sentinel Blogger - Threat Intel Auto-Publisher v48.0

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

concurrency:
  group: sentinel-sync
  cancel-in-progress: false

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ================================================================
      # STAGE 0: CHECKOUT & ENVIRONMENT SETUP
      # ================================================================
      - name: Checkout repository (v48.0 Full Sync)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Institutional Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Production Directories Exist
        run: |
          mkdir -p data/stix data/nexus data/genesis data/cortex data/quantum data/sovereign data/rule_packs data/playbooks data/playbooks/scripts data/premium_packs data/enterprise_kits data/enrichment data/status data/logs data/incidents data/responses data/threathunts secrets

      # ================================================================
      # STAGE 1: MAINTENANCE & PRE-FLIGHT
      # ================================================================
      - name: Monthly Maintenance Purge
        if: github.event.schedule == '0 0 1 * *'
        run: python -m agent.janitor || echo "Janitor module not found, skipping"

      - name: Inject Sovereign Key
        run: |
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem

      # ================================================================
      # STAGE 2: CORE FEED INGESTION
      # ================================================================
      - name: Run Sentinel Blogger APEX Engine
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          CI: true
        run: python -m agent.sentinel_blogger

      - name: Force Update Sync Timestamp
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc).isoformat()
          status = {
              "platform": "CYBERDUDEBIVASH(R) SENTINEL APEX",
              "version": "v48.0",
              "status": "OPERATIONAL",
              "generated_at": now
          }
          with open("data/status/status.json", "w") as f: json.dump(status, f, indent=2)
          with open("data/sync_marker.json", "w") as f: json.dump({"last_sync": now}, f, indent=2)
          PYEOF

      # ================================================================
      # STAGE 2.1: CRITICAL DATA COMMIT (v55.3 — Anti-Timeout Safeguard)
      # ================================================================
      - name: Intermediate Commit — Save Feed Intel
        continue-on-error: true
        run: |
          python3 scripts/update_embedded_intel.py || echo "EMBEDDED_INTEL update failed"
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          git add data/stix/feed_manifest.json data/blogger_processed.json data/status/status.json data/sync_marker.json index.html
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "v55.3 Intel checkpoint [skip ci]"
            git pull origin main --rebase
            git push origin main
          fi

      # ================================================================
      # STAGE 2.5: PIPELINE HARDENER v48.0
      # ================================================================
      - name: "STAGE 2.5: PIPELINE HARDENER v48.0"
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python agent/v48_pipeline_hardening/pipeline_hardener.py

      # ================================================================
      # STAGE 3, 4, 5: DISTRIBUTED ENGINES
      # ================================================================
      - name: Run NEXUS Engine v2
        continue-on-error: true
        run: python agent/v39_nexus/nexus_engine_v2.py

      - name: Run GENESIS Engine v2
        continue-on-error: true
        run: python agent/v43_genesis/genesis_engine_v2.py

      - name: Run v60-v63 Advanced Engines
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 -c "from agent.v60_incident_engine import run; run()"
          python3 -c "from agent.v61_playbook_engine import run; run()"
          python3 -c "from agent.v62_response_engine import run; run()"
          python3 -c "from agent.v63_threathunter import run; run()"

      - name: v54 Bug Hunter Recon Scanner
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python agent/v54_bughunter_resilience/resilient_scanner.py

      # ================================================================
      # STAGE 8: ATOMIC COMMIT & SOVEREIGN SYNC
      # ================================================================
      - name: Commit and Push Sovereign Data
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"
          
          echo "Refreshing EMBEDDED_INTEL..."
          python3 scripts/update_embedded_intel.py || true

          git add data/stix/*.json data/status/*.json data/nexus/*.json data/genesis/*.json 
          git add data/bughunter/*.json data/incidents/*.json data/responses/*.json index.html
          
          if git diff --staged --quiet; then
            echo "No final changes."
          else
            git commit -m "v55.1 Apex: Final Sovereign Dash Sync [skip ci]"
            for i in {1..5}; do
              git pull origin main --rebase
              # FIX: Force resolve conflicts in dashboard data
              git checkout --ours data/status/status.json 2>/dev/null || true
              git checkout --ours data/stix/feed_manifest.json 2>/dev/null || true
              git push origin main && break || (echo "Retry $i..." && sleep 15)
            done
          fi

      # ================================================================
      # STAGE 10: DEPLOY TO GITHUB PAGES
      # ================================================================
      - name: Deploy Live Feed to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          git-config-name: CDB-Sentinel-Bot
          git-config-email: bivash@cyberdudebivash.com
          commit-message: "v48.0 Deploy: Live feed update"
