      - name: "รฐลธยงยน Manifest Cleanup รขโฌโ Remove brand entries + deduplicate"
        continue-on-error: true
        run: |
          python3 scripts/clean_feed_manifest.py || echo "Cleanup skipped (non-critical)"

      - name: "รฐลธโ Schema Validation รขโฌโ Hard gate (v119.0.0)"
        continue-on-error: false
        run: |
          echo "=== SENTINEL APEX v131.0.0 รขโฌ" SCHEMA VALIDATION HARD GATE ==="
          # Run schema validator; capture exit code
          python3 scripts/validate_intel_schema.py
          SCHEMA_RC=$?
          if [ $SCHEMA_RC -ne 0 ]; then
            echo "::error::Schema validation FAILED (exit $SCHEMA_RC). Malformed data must not reach R2 or gh-pages."
            echo "::error::Fix manifest data and re-run pipeline."
            exit 1
          fi
          echo "SCHEMA VALIDATION PASSED รขโฌ" data is structurally sound."
          echo "Schema validation complete."

