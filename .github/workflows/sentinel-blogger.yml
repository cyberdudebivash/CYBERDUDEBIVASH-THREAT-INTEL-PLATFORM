# STAGE 5.5: REPORT DEPLOYMENT VERIFICATION (v118.0.0)
# Two-gate approach:
#   5.5a รขโฌโ LOCAL file-existence check (HARD gate, no CDN dependency)
#   5.5b รขโฌโ HTTP smoke test (SOFT / informational, CDN propagation-tolerant)
# Root cause of run #755: sleep 20 was insufficient for gh-pages CDN to
# propagate 2543 new HTML files. Local check is the reliable gate.
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโโ Verify Report Files รขโฌโ Local Existence Check (Hard Gate)"
        continue-on-error: false
        run: |
          echo "=== SENTINEL APEX v131.0.0 รขโฌ" LOCAL REPORT FILE VERIFICATION ==="

          LOCAL_FAIL=0
          LOCAL_PASS=0
          LOCAL_SKIP=0

          SAMPLE_URLS=$(python3 -c "
          import json, random, sys
          try:
              with open('data/stix/feed_manifest.json') as f:
                  d = json.load(f)
              items = d.get('advisories', d.get('reports', []))
              valid = [i for i in items if i.get('report_url','').startswith('https://intel.cyberdudebivash.com/reports/')]
              sample = random.sample(valid, min(5, len(valid)))
              for i in sample:
                  print(i['report_url'])
          except Exception as e:
              print('SKIP:' + str(e), file=sys.stderr)
          " 2>/dev/null || true)

          if [ -z "$SAMPLE_URLS" ]; then
            if [ "${REPORT_COUNT:-0}" -gt 0 ]; then
              echo "::error::REPORT_COUNT=$REPORT_COUNT but zero valid report_url fields found in manifest รขโฌ" report_url not being set correctly."
              exit 1
            fi
            echo "WARN: No reports generated this run รขโฌ" skipping local file verification."
            LOCAL_SKIP=1
          else
            BASE_URL="https://intel.cyberdudebivash.com"
            while IFS= read -r url; do
              [ -z "$url" ] && continue
              # Derive local path: strip domain prefix to get e.g. reports/2026/04/intel--XYZ.html
              LOCAL_PATH="${url#$BASE_URL/}"
              if [ -f "$LOCAL_PATH" ]; then
                FILE_SIZE=$(wc -c < "$LOCAL_PATH" 2>/dev/null || echo 0)
                if [ "$FILE_SIZE" -gt 512 ]; then
                  echo "  PASS LOCAL OK (${FILE_SIZE}B) รขโฌ" $LOCAL_PATH"
                  LOCAL_PASS=$((LOCAL_PASS + 1))
                else
                  echo "  FAIL LOCAL EMPTY/TINY (${FILE_SIZE}B) รขโฌ" $LOCAL_PATH"
                  LOCAL_FAIL=$((LOCAL_FAIL + 1))
                fi
              else
                echo "  FAIL LOCAL MISSING รขโฌ" $LOCAL_PATH"
                LOCAL_FAIL=$((LOCAL_FAIL + 1))
              fi
            done <<< "$SAMPLE_URLS"
          fi

          echo ""
          echo "รข"ลรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข""
          echo "รข"โ LOCAL FILE VERIFICATION RESULTS             รข"โ"
          echo "รข"โ PASS: $LOCAL_PASS  FAIL: $LOCAL_FAIL  SKIP: $LOCAL_SKIP"
          echo "รข""รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"ห"

          if [ "$LOCAL_FAIL" -gt 0 ]; then
            echo "::error::$LOCAL_FAIL report file(s) missing or empty on disk after generation. Reports not written correctly."
            exit 1
          fi
          echo "REPORT_LOCAL_VERIFY_PASS=$LOCAL_PASS" >> $GITHUB_ENV
          echo "LOCAL FILE VERIFICATION PASSED รขโฌ" files confirmed on disk."

      - name: "รฐลธล Smoke Test Report URLs รขโฌโ HTTP 200 (Informational)"
        continue-on-error: true
        run: |
          echo "=== SENTINEL APEX v131.0.0 รขโฌ" HTTP SMOKE TEST (informational, non-blocking) ==="
          echo "NOTE: GitHub Pages CDN propagation for large deployments takes 2-5 min."
          echo "      This step is SOFT (continue-on-error: true) รขโฌ" pipeline will not fail here."
          echo "      Hard file-existence check already passed in STAGE 5.5a."

          sleep 120  # Allow gh-pages CDN to propagate new/updated HTML files

          SMOKE_FAIL=0
          SMOKE_PASS=0
          SMOKE_SKIP=0

          SAMPLE_URLS=$(python3 -c "
          import json, random, sys
          try:
              with open('data/stix/feed_manifest.json') as f:
                  d = json.load(f)
              items = d.get('advisories', d.get('reports', []))
              valid = [i for i in items if i.get('report_url','').startswith('https://intel.cyberdudebivash.com/reports/')]
              sample = random.sample(valid, min(5, len(valid)))
              for i in sample:
                  print(i['report_url'])
          except Exception as e:
              print('SKIP:' + str(e), file=sys.stderr)
          " 2>/dev/null || true)

          if [ -z "$SAMPLE_URLS" ]; then
            echo "WARN: No reports to HTTP-check รขโฌ" skipping smoke test."
            SMOKE_SKIP=1
          else
            while IFS= read -r url; do
              [ -z "$url" ] && continue
              # 3-attempt retry per URL with 30s between attempts
              HTTP_CODE="000"
              for attempt in 1 2 3; do
                HTTP_CODE=$(curl -s --max-time 20 -o /dev/null -w "%{http_code}" "$url" 2>/dev/null || echo "000")
                if [ "$HTTP_CODE" = "200" ]; then
                  break
                fi
                [ $attempt -lt 3 ] && echo "  RETRY $attempt/3 (HTTP $HTTP_CODE) รขโฌ" $url" && sleep 30
              done
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  PASS HTTP $HTTP_CODE รขโฌ" $url"
                SMOKE_PASS=$((SMOKE_PASS + 1))
              else
                echo "  WARN HTTP $HTTP_CODE รขโฌ" $url (CDN may still be propagating)"
                SMOKE_FAIL=$((SMOKE_FAIL + 1))
              fi
            done <<< "$SAMPLE_URLS"
          fi

          echo ""
          echo "รข"ลรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข""
          echo "รข"โ HTTP SMOKE TEST RESULTS (informational)     รข"โ"
          echo "รข"โ PASS: $SMOKE_PASS  WARN: $SMOKE_FAIL  SKIP: $SMOKE_SKIP"
