# ARCHITECTURE (v116.0 รขโฌโ canonical):
#   Intel Engine รขโ โ writes data/stix/feed_manifest.json (authoritative)
#       รขโ โ Manifest Stabilisation (preserve if valid, --force-rebuild only fallback)
#       รขโ โ Freshness Gate (blocks if < 10 entries รขโฌโ GATES R2 upload)
#       รขโ โ Schema Validation (non-blocking)
