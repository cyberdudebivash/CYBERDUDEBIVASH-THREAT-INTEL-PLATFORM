# ================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Sovereign Intelligence Cycle
# Version: v64.1 (Deploy-First Architecture + Circuit Breaker)
# Path: .github/workflows/sentinel-blogger.yml
#
# ARCHITECTURE CHANGE (v64.1):
#   Old: Ingest → Publish → Commit → Deploy (if publishing hangs, deploy never runs)
#   New: Ingest → Commit+Deploy DATA → Publish (deploy happens in <5min guaranteed)
# ================================================================

name: CDB Sentinel Blogger - Threat Intel Auto-Publisher v64.0

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

concurrency:
  group: sentinel-sync
  cancel-in-progress: false

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ================================================================
      # STAGE 0: CHECKOUT & ENVIRONMENT SETUP
      # ================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Institutional Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Production Directories Exist
        run: |
          mkdir -p data/stix data/nexus data/genesis data/cortex data/quantum data/sovereign data/rule_packs data/playbooks data/playbooks/scripts data/premium_packs data/enterprise_kits data/enrichment data/status data/logs data/remediation secrets

      # ================================================================
      # STAGE 1: MAINTENANCE & PRE-FLIGHT
      # ================================================================
      - name: Monthly Maintenance Purge
        if: github.event.schedule == '0 0 1 * *'
        run: python -m agent.janitor || echo "Janitor module not found, skipping"
        env:
          CI: true

      - name: Inject Sovereign Key
        run: |
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem
          echo "::add-mask::$(cat secrets/cdb_sovereign.pem)"

      # ================================================================
      # STAGE 2: CORE FEED INGESTION
      # ================================================================
      - name: Run Sentinel Blogger APEX Engine (v64.1)
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          CI: true
          GITHUB_ACTIONS: true
        run: |
          echo "STAGE 2: Feed Ingestion + Blog Publishing"
          timeout 1500 python -m agent.sentinel_blogger || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 124 ]; then
              echo "⚠ Pipeline hit 25-minute safety timeout — data saved, blog publishing truncated"
            else
              echo "⚠ Pipeline exited with code $EXIT_CODE"
            fi
          }
          echo "Feed ingestion complete"

      # ================================================================
      # STAGE 2.1: UPDATE SYNC STATE + EMBEDDED INTEL
      # ================================================================
      - name: Update Sync State and Embedded Intel
        run: |
          echo "STAGE 2.1: Update timestamps and embedded intel"

          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          status_path = "data/status/status.json"
          now = datetime.now(timezone.utc).isoformat()

          status = {
              "platform": "CYBERDUDEBIVASH(R) SENTINEL APEX",
              "version": "v64.1",
              "status": "OPERATIONAL",
              "status_message": "Deploy-first pipeline active",
              "components": {
                  "threat_feed": {"status": "OPERATIONAL", "last_updated": now},
                  "pipeline": {"status": "OPERATIONAL", "last_run_at": now}
              },
              "generated_at": now
          }

          os.makedirs(os.path.dirname(status_path), exist_ok=True)
          with open(status_path, "w") as f:
              json.dump(status, f, indent=2)

          with open("data/sync_marker.json", "w") as f:
              json.dump({"last_sync": now, "sync_source": "github-actions-v64.1"}, f, indent=2)
          PYEOF

          python3 scripts/update_embedded_intel.py || true

      # ================================================================
      # STAGE 3: FIX GIT STATE + COMMIT ALL DATA
      # ================================================================
      - name: Fix Git State
        run: |
          rm -rf .git/rebase-merge || true
          rm -rf .git/rebase-apply || true
          git reset --hard

      - name: Commit All Intelligence Data
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          git fetch origin main
          git reset --hard origin/main

          # Re-run embedded intel update after reset
          python3 scripts/update_embedded_intel.py || true

          git add data/*.json 2>/dev/null || true
          git add data/stix/*.json 2>/dev/null || true
          git add data/status/*.json 2>/dev/null || true
          git add data/sovereign/*.json 2>/dev/null || true
          git add data/enrichment/*.json 2>/dev/null || true
          git add data/bughunter/*.json 2>/dev/null || true
          git add data/remediation/*.sh 2>/dev/null || true
          git add data/remediation/*.yml 2>/dev/null || true
          git add data/premium_packs/*.zip 2>/dev/null || true
          git add index.html 2>/dev/null || true
          git add threat/ 2>/dev/null || true
          git add sitemap.xml 2>/dev/null || true

          if ! git diff --staged --quiet; then
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "v64.1 Apex Sync @ $TIMESTAMP [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

      # ================================================================
      # STAGE 4: DEPLOY TO GH-PAGES (CRITICAL — RUNS BEFORE ANY EXTRAS)
      # This ensures dashboard data is ALWAYS deployed, even if later
      # stages (quality gate, threat pages) fail or timeout.
      # ================================================================
      - name: Deploy Live Feed to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          git-config-name: CDB-Sentinel-Bot
          git-config-email: bivash@cyberdudebivash.com
          commit-message: "v64.1 Deploy: Live feed update"

      # ================================================================
      # STAGE 5: POST-DEPLOY EXTRAS (safe — deploy already done)
      # ================================================================
      - name: Pipeline Hardener
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -f "agent/v48_pipeline_hardening/pipeline_hardener.py" ]; then
            python agent/v48_pipeline_hardening/pipeline_hardener.py
          fi

      - name: Sovereign Quality Gate Audit
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -f "agent/quality_gate_audit.py" ]; then
            python agent/quality_gate_audit.py
          fi

      - name: Generate SEO Threat Pages
        continue-on-error: true
        run: |
          if [ -f "scripts/threat_page_generator.py" ]; then
            python scripts/threat_page_generator.py
          fi

      # ================================================================
      # STAGE 6: POST-EXTRAS COMMIT + DEPLOY (if extras generated new files)
      # ================================================================
      - name: Commit and Deploy Post-Extras
        continue-on-error: true
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"

          git add data/*.json threat/ sitemap.xml 2>/dev/null || true

          if ! git diff --staged --quiet; then
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "v64.1 Post-extras @ $TIMESTAMP [skip ci]"
            git push origin main
          else
            echo "No post-extras changes"
          fi

      - name: Deploy Post-Extras to gh-pages
        continue-on-error: true
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          git-config-name: CDB-Sentinel-Bot
          git-config-email: bivash@cyberdudebivash.com
          commit-message: "v64.1 Post-extras deploy"
