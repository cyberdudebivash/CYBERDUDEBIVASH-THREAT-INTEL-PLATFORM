name: sentinel-blogger

on:
  schedule:
    - cron: '0 */4 * * *'    # Primary: every 4h
    - cron: '0 0 1 * *'      # Monthly maintenance
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full sync even if no new data'
        required: false
        type: boolean
        default: false
      skip_ai:
        description: 'Skip AI enrichment phases (faster run)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIPELINE_VERSION: "131.1.0"

# Only ONE data-writing workflow at a time รขโฌโ prevents manifest corruption
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  generate-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
# STAGE 0: CHECKOUT & ENVIRONMENT SETUP
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโยง Checkout repository"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "รฐลธ Setup Python 3.12"
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "รฐลธโยฆ Install pipeline dependencies"
        run: |
          python -m pip install --upgrade pip --quiet
          # Core intelligence pipeline deps
          pip install --quiet requests feedparser beautifulsoup4 pydantic \
            python-dotenv psutil cryptography pyjwt
          # NOTE: google-api-python-client and google-auth-oauthlib are NOT
          # installed รขโฌ" Blogger is permanently disabled in v111.0.
          # Any remaining import of blogger_auth will degrade gracefully.
          pip install --quiet reportlab fpdf2 || true
          [ -f requirements.txt ] && pip install --quiet -r requirements.txt || true

      - name: โรฐลธโ Ensure required directoriesโ
        run: |
          mkdir -p data/stix data/nexus data/genesis data/cortex data/quantum \
                   data/sovereign data/playbooks/scripts data/premium_packs \
                   data/enterprise_kits data/enrichment data/status data/logs \
                   data/remediation data/health data/ai_predictions data/bughunter \
                   data/analyst data/arsenal data/convergence data/incidents \
                   data/intelligence/detection_rules secrets api \
                   data/ai_intelligence

# โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
# STAGE 0.1: P0 PRE-FLIGHT โ JSON SANITIZER & SELF-HEALING ENGINE
# v131.1.0 FIX (run #793): Runs BEFORE any Python validation, engine invocation,
# or manifest read. Strips BOM from all .json files, validates JSON structure,
# auto-heals minor corruption, and regenerates minimal valid structure for any
# file that is unrecoverable. Detects and normalises boolean 'published' fields
# that caused AttributeError: 'bool' object has no attribute 'replace' in
# threat_scoring.py:288 (root cause of run #793).
# Exit 0 guaranteed โ this step NEVER breaks the pipeline.
# โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
      - name: โ๐ฌ P0 Pre-Flight โ JSON Sanitizer & Self-Healing (v131.1.0)โ
        run: |
          python3 scripts/sanitize_repo.py || true
          echo "JSON sanitizer complete (exit forced 0)"

# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
# STAGE 0.5: P0 SAFETY รขโฌโ CLEAR PUBLISH QUEUE BOMB
# Ensures the queue does not consume the runner timeout on retry.
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธยงยน P0 Safety รขโฌโ Purge Blogger publish queue"
        run: |
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          queue_path = "data/publish_queue.json"
          if os.path.exists(queue_path):
              try:
                  with open(queue_path) as f:
                      q = json.load(f)
                  queue = q.get("queue", q) if isinstance(q, dict) else q
                  count = len(queue) if isinstance(queue, list) else 0
                  if count > 0:
                      print(f"[P0] Clearing {count} stale Blogger queue entries (queue bomb neutralised)")
              except Exception:
                  pass
          # Always write empty queue
          empty = {"queue": [], "version": "111.0",
                   "cleared_at": datetime.now(timezone.utc).isoformat()}
          with open(queue_path, "w") as f:
              json.dump(empty, f)
          print("[P0] publish_queue.json cleared.")
          PYEOF

# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
# STAGE 1: SELF-HEALING BOOTSTRAP
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโบยกรฏยธ Bootstrap รขโฌโ Ensure critical files exist"
        run: |
          python3 scripts/bootstrap_critical_files.py
          echo "Bootstrap complete."

      - name: "รขลโฆ Validate bootstrap output"
        run: |
          python3 - << 'PYEOF'
          import json, sys, os
          manifest = "data/stix/feed_manifest.json"
          if not os.path.exists(manifest):
              print(f"WARNING: {manifest} missing after bootstrap รขโฌ" will be created by engine")
          else:
              try:
                  d = json.load(open(manifest))
                  items = d.get("advisories", d.get("reports", d.get("items", [])))
                  print(f"Bootstrap manifest: {len(items)} items")
              except Exception as e:
                  print(f"WARNING: {manifest} issue: {e}")
          print("Bootstrap validation COMPLETE")
          PYEOF

