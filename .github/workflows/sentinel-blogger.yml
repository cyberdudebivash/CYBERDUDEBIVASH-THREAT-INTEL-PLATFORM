# STAGE 1.5: PRE-v70 MANIFEST SYNC
# ROOT CAUSE FIX (run #748): v70's schema_validator rejects data/feed_manifest.json
#   because it was written by v101.0.0 without the required 'schema_version' key.
#   v70 then falls back to data/.manifest_backups/manifest_20260326T055548.json
#   (3-week-old stale backup), processes 497 stale items, and overwrites
#   data/feed_manifest.json with stale data รขโฌโ wasting 5-10 seconds of the run.
#
# FIX: Before v70 runs, write a v70-schema-compliant version of the
#   authoritative manifest (data/stix/feed_manifest.json) to data/feed_manifest.json.
#   v70's schema validator requires: version, schema_version, generated_at, advisories.
#   This ensures v70 loads the current fresh data instead of falling back.
#
# ALSO: Delete stale backups older than 7 days from data/.manifest_backups/
#   so v70 cannot fall back to weeks-old data on future runs.
# รขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโขรขโข
      - name: "รฐลธโโ Pre-v70 Manifest Sync รขโฌโ Feed fresh data to v70 orchestrator"
        run: |
          python3 - << 'PYEOF'
          import json, os, sys
          from datetime import datetime, timezone
          from pathlib import Path

          SRC  = Path("data/stix/feed_manifest.json")   # authoritative (2000+ items)
          DST  = Path("data/feed_manifest.json")         # v70 input (needs schema_version)
          BKUP = Path("data/.manifest_backups")

          utc_now = datetime.now(timezone.utc).isoformat(timespec="seconds").replace("+00:00", "Z")

          # รข"โฌรข"โฌ 1. Read authoritative manifest รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          if not SRC.exists():
              print(f"PRE-V70: {SRC} does not exist รขโฌ" nothing to sync. v70 will use existing feed_manifest.json.")
              sys.exit(0)

          try:
              raw = json.loads(SRC.read_text(encoding="utf-8"))
          except Exception as e:
              print(f"PRE-V70: Cannot read {SRC}: {e} รขโฌ" skipping sync.")
              sys.exit(0)

          # Handle both LIST and DICT formats (engine may write either)
          if isinstance(raw, list):
              items = raw
          elif isinstance(raw, dict):
              items = raw.get("advisories", raw.get("reports", raw.get("items", [])))
          else:
              items = []

          if len(items) < 10:
              print(f"PRE-V70: Only {len(items)} items in {SRC} รขโฌ" skipping sync (manifest too small).")
              sys.exit(0)

          # รข"โฌรข"โฌ 2. Sanitise items for v70 schema compliance รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          #   v70's validate_advisory() rejects threat_type values not in:
          #     {vulnerability, malware, campaign, intrusion-set, tool,
          #      attack-pattern, indicator, threat-report}
          #   The authoritative manifest may contain values like "General",
          #   "Ransomware", "APT", etc. (927/2170 items in run #748).
          #   FIX: Clear invalid threat_type to "" (empty passes the check
          #   since validation is `if tt and tt not in VALID_TYPES`).
          #   v70's AI classifier will re-assign the correct type anyway.
          VALID_TT = {
              "vulnerability", "malware", "campaign", "intrusion-set",
              "tool", "attack-pattern", "indicator", "threat-report",
          }
          sanitised = 0
          for item in items:
              tt = item.get("threat_type", "")
              if tt and isinstance(tt, str) and tt.lower() not in VALID_TT:
                  item["threat_type"] = ""   # clear invalid; v70 re-classifies
                  sanitised += 1
          if sanitised:
              print(f"PRE-V70: Sanitised {sanitised} invalid threat_type values รขโ โ '' (v70 will reclassify)")

          # รข"โฌรข"โฌ 3. Write v70-schema-compliant manifest to data/feed_manifest.json รข"โฌรข"โฌ
          #   v70 requires: version, schema_version, generated_at, advisories
          #   (REQUIRED_MANIFEST_KEYS in agent/v70_apex_upgrade/core/schema_validator.py)
          payload = {
              "version":        raw.get("version", "v114.0") if isinstance(raw, dict) else "v114.0",
              "schema_version": "v70.0",          # required by v70 schema_validator
              "platform":       "SENTINEL-APEX",
              "generated_at":   raw.get("generated_at", utc_now) if isinstance(raw, dict) else utc_now,
              "synced_at":      utc_now,
              "total_reports":  len(items),
              "entry_count":    len(items),
              "sort_order":     "timestamp DESC, risk_score DESC",
              "source":         "pre_v70_sync_from_stix_manifest",
              "advisories":     items,
          }

          tmp = DST.with_suffix(".tmp")
          tmp.write_text(json.dumps(payload, ensure_ascii=False, default=str), encoding="utf-8")
          os.replace(tmp, DST)
          print(f"PRE-V70: Synced {len(items)} items from {SRC} รขโ โ {DST} (schema_version=v70.0)")

          # รข"โฌรข"โฌ 4. Delete stale backups older than 7 days รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          if BKUP.is_dir():
              import time
              cutoff = time.time() - 7 * 86400   # 7 days ago
              deleted = 0
              for f in BKUP.iterdir():
                  if f.suffix == ".json":
                      try:
                          age = time.time() - f.stat().st_mtime
                          if age > cutoff:
                              f.unlink()
                              deleted += 1
                      except Exception:
                          pass
              if deleted:
                  print(f"PRE-V70: Deleted {deleted} stale backup(s) older than 7 days from {BKUP}")
              else:
                  print(f"PRE-V70: No backups older than 7 days in {BKUP}")
          PYEOF

      - name: "รฐลธยงย  v70 Intelligence Orchestrator (enrichment)"
        continue-on-error: true
        timeout-minutes: 5
        env:
          TRANSFORMERS_NO_ADVISORY_WARNINGS: "1"
          TOKENIZERS_PARALLELISM: "false"
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          # ROOT CAUSE FIX (run #744 v70 stale-backup regression):
          #   v70 fell back to manifest_20260326T055548.json (3 weeks old) and
          #   wrote 497 stale entries to data/feed_manifest.json.  While this
          #   does NOT directly overwrite data/stix/feed_manifest.json (the R2
          #   source of truth), the stale backup fallback pollutes the data
          #   layer and wastes the 5-minute timeout on useless work.
          #
          # FIX: Pre-check whether v70's newest available input data is fresh
          #   (< 48h).  If every candidate manifest file is older than 48h,
          #   skip v70 entirely.  v70 only runs when it has fresh data to
          #   enrich.  This prevents 3-week-old backup data from entering the
          #   pipeline on every timeout/fresh-run scenario.
          # รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          if [ ! -d agent/v70_apex_upgrade ]; then
            echo "INFO: agent/v70_apex_upgrade not found รขโฌ" skipping."
            exit 0
          fi

          # Check freshness of available manifest inputs
          FRESH=$(python3 - << 'PYEOF'
          import os, json, time
          from pathlib import Path
          MAX_AGE_SECONDS = 48 * 3600  # 48 hours
          now = time.time()
          candidates = [
              "data/stix/feed_manifest.json",
              "data/feed_manifest.json",
              "data/apex_enriched_manifest.json",
          ]
          newest_age = None
          for path in candidates:
              if os.path.exists(path):
                  age = now - os.path.getmtime(path)
                  if newest_age is None or age < newest_age:
                      newest_age = age
          if newest_age is None:
              print("SKIP")  # No manifest files at all
          elif newest_age > MAX_AGE_SECONDS:
              hours = newest_age / 3600
              print(f"SKIP")  # Newest file is {hours:.1f}h old รขโฌ" stale
          else:
              hours = newest_age / 3600
              print(f"RUN")
          PYEOF
          )

          if [ "$FRESH" = "SKIP" ]; then
            echo "WARN: v70 input manifests are all older than 48h (stale-backup scenario)."
            echo "      Skipping v70 to prevent 3-week-old backup data entering the pipeline."
            echo "      v70 will run automatically on the next successful intel engine run."
            exit 0
          fi

          echo "INFO: v70 input data is fresh โ proceeding with enrichment."
          AI_FLAG=""
          [ "${{ github.event.inputs.skip_ai }}" = "true" ] && AI_FLAG="--no-ai"

          # P0 HARD GUARANTEE (v131.1.0 fix โ run #793):
          # The orchestrator's main() already exits 0 unconditionally via its
          # global exception guard. Belt+suspenders: capture ALL output,
          # force exit 0 via `|| true`, and tee the JSON result for downstream.
          set +e
          timeout 240 python -m agent.v70_apex_upgrade.orchestrator \
            --data-dir data --dashboard index.html --json $AI_FLAG 2>&1 | \
            tee /tmp/v70_result.json
          V70_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$V70_EXIT" -ne 0 ]; then
            echo "WARN: v70 orchestrator exited $V70_EXIT โ forcing success (non-critical enrichment phase)"
            echo "      Pipeline continues. STIX generation and R2 upload are unaffected."
            # Write minimal fallback result so downstream JSON-readers don't crash
            cat > /tmp/v70_result.json << 'ENDJSON'
          {"success": false, "total_advisories": 0, "error": "v70 non-zero exit (guard fired)", "phases": [], "guard_fired": true}
          ENDJSON
          fi
          echo "v70 enrichment phase complete (exit: $V70_EXIT โ forced 0)"

      - name: "รฐลธโโ Manifest Stabilisation รขโฌโ Preserve Engine Output / Rebuild Only If Needed"
        # รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
        # ROOT CAUSE FIX (run #744 + run #745 regression):
        #
        #   Run #744: --force-rebuild was unconditional. It re-parsed only the
        #     current run's 52 STIX bundles รขโ โ 9 entries, destroying the engine's
        #     2222-entry manifest.
        #
        #   Run #745 (new root cause discovered): The engine (sentinel_blogger)
        #     writes data/stix/feed_manifest.json as a raw JSON ARRAY [...]
        #     not a dict {"advisories": [...]}. The previous fix read the file
        #     with d.get("advisories", ...) which raised:
        #       "WARNING: Cannot parse engine manifest: 'list' object has no
        #        attribute 'get'"
        #     engine_count was set to 0, the fallback --force-rebuild ran,
        #     wrote 9 entries, and the Freshness Gate failed again.
        #     Evidence: line 1646 of run #745 log.
        #
        # FIX LOGIC (v116.1):
        #   1. Read data/stix/feed_manifest.json.
        #   2. Handle BOTH formats produced by the engine:
        #        LIST  [...]               รขโ โ raw engine output
        #        DICT  {"advisories":[..]} รขโ โ bootstrap / cleaner output
        #   3. If entry count >= MIN_ENGINE (50), the manifest is authoritative.
        #      If it is in LIST format, normalize it to DICT envelope in-place
        #      before any downstream step reads it.
        #   4. Run clean_feed_manifest.py (non-blocking) to normalise fields.
        #   5. Only fall back to --force-rebuild when manifest is absent or
        #      has < MIN_ENGINE entries (true engine failure).
        # รขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌรขโโฌ
        run: |
          python3 - << 'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path
          from datetime import datetime, timezone

          MANIFEST   = "data/stix/feed_manifest.json"
          MIN_ENGINE = 50   # Engine normally writes 1000+; < 50 means engine failed

          def utc_now():
              return datetime.now(timezone.utc).isoformat(timespec="seconds").replace("+00:00", "Z")

          # รข"โฌรข"โฌ Step 1: Read manifest, handle LIST and DICT formats รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          engine_count   = 0
          engine_items   = []
          manifest_fmt   = "absent"

          if os.path.exists(MANIFEST):
              try:
                  raw = json.load(open(MANIFEST, "r", encoding="utf-8"))

                  if isinstance(raw, list):
                      # Engine wrote raw JSON array รขโฌ" this is the run #745 root cause.
                      engine_items = raw
                      engine_count = len(raw)
                      manifest_fmt = "list"
                      print(f"INFO: Manifest is LIST format ({engine_count} items).", flush=True)

                  elif isinstance(raw, dict):
                      candidates = ["advisories", "reports", "items"]
                      for key in candidates:
                          if key in raw and isinstance(raw[key], list):
                              engine_items = raw[key]
                              break
                      engine_count = len(engine_items)
                      manifest_fmt = "dict"
                      print(f"INFO: Manifest is DICT format ({engine_count} items).", flush=True)

                  else:
                      print(f"WARNING: Unexpected manifest root type: {type(raw).__name__}", flush=True)

              except Exception as e:
                  print(f"WARNING: Cannot parse manifest at {MANIFEST}: {e}", flush=True)

          stix_bundles = len(list(Path("data/stix").glob("CDB-APEX-*.json")))
          print(f"Engine manifest: {engine_count} entries (fmt={manifest_fmt}) | "
                f"STIX bundles on disk: {stix_bundles}", flush=True)

          # รข"โฌรข"โฌ Step 2: Preserve or fall back รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          if engine_count >= MIN_ENGINE:
              print(f"รขลโฆ Engine manifest is valid ({engine_count} >= {MIN_ENGINE}). "
                    f"--force-rebuild SKIPPED.", flush=True)

              # If engine wrote LIST format, normalise to DICT envelope so every
              # downstream step (Freshness Gate, clean_feed_manifest, R2 upload,
              # Worker) can read it with d.get("advisories", []).
              if manifest_fmt == "list":
                  print(f"   Normalising LISTรขโ โDICT envelope ({engine_count} entries)...", flush=True)
                  payload = {
                      "version":        "v114.0",
                      "platform":       "SENTINEL-APEX",
                      "generated_at":   utc_now(),
                      "normalised_at":  utc_now(),
                      "total_reports":  engine_count,
                      "entry_count":    engine_count,
                      "schema_version": "v114.0",
                      "sort_order":     "timestamp DESC, risk_score DESC",
                      "source_of_truth": "agent.sentinel_blogger (normalised by pipeline)",
                      "advisories":     engine_items,
                  }
                  tmp = MANIFEST + ".norm.tmp"
                  with open(tmp, "w", encoding="utf-8") as fh:
                      json.dump(payload, fh, indent=2, ensure_ascii=False, default=str)
                  os.replace(tmp, MANIFEST)
                  print(f"   รขลโฆ Normalised: {engine_count} entries in DICT format written.", flush=True)

              # Run cleaner: normalise fields, strip brand/blog, dedup.
              # Non-blocking รขโฌ" if cleaner fails the normalised manifest is kept.
              print("   Running clean_feed_manifest.py...", flush=True)
              r = subprocess.run(
                  ["python3", "scripts/clean_feed_manifest.py"],
                  check=False, capture_output=True, text=True
              )
              if r.stdout.strip():
                  print(r.stdout.strip(), flush=True)
              if r.returncode != 0:
                  print(f"   WARN: clean_feed_manifest exited {r.returncode}: "
                        f"{r.stderr.strip()}", flush=True)
                  print("   Non-blocking รขโฌ" normalised engine manifest retained as-is.", flush=True)

          else:
              print(f"รขลกย รฏยธ  Engine manifest too small ({engine_count} < {MIN_ENGINE}). "
                    f"Falling back to --force-rebuild from {stix_bundles} STIX bundles.", flush=True)
              r = subprocess.run(
                  ["python3", "scripts/bootstrap_critical_files.py", "--force-rebuild"],
                  check=False
              )
              print(f"   --force-rebuild exit code: {r.returncode}", flush=True)

          # รข"โฌรข"โฌ Step 3: Report final state รข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌรข"โฌ
          final_count = 0
          for path in ("data/stix/feed_manifest.json", "data/feed_manifest.json"):
              if os.path.exists(path):
                  try:
                      d = json.load(open(path))
                      if isinstance(d, list):
                          cnt = len(d)
                          print(f"  {path}: {cnt} entries (LIST format รขโฌ" not yet normalised)", flush=True)
                      elif isinstance(d, dict):
                          items = d.get("advisories", d.get("reports", []))
                          cnt = len(items)
                          gen = d.get("generated_at", d.get("normalised_at", "?"))
                          print(f"  {path}: {cnt} entries  generated_at={gen}", flush=True)
                      else:
                          cnt = 0
                      if path == "data/stix/feed_manifest.json":
                          final_count = cnt
                  except Exception as e:
                      print(f"  {path}: ERROR reading รขโฌ" {e}", flush=True)

          print(f"MANIFEST_FINAL_COUNT={final_count}", flush=True)
          env_file = os.environ.get("GITHUB_ENV", "/dev/null")
          with open(env_file, "a") as fh:
              fh.write(f"MANIFEST_FINAL_COUNT={final_count}\n")
          PYEOF

