name: CDB Sentinel Blogger – Threat Intel Auto-Publisher

on:
  schedule:
    - cron: '0 */6 * * *' # Automated 6-hour GOC sweep
  workflow_dispatch:      # Manual GOC trigger for immediate Intel

permissions:
  contents: write         # Required for CDB-Sentinel-Bot to push data

jobs:
  publish-threat-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for stable git rebase operations

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Forensic Directories Exist
        run: mkdir -p data/stix

      # 🛡️ v16.0 SOVEREIGN KEY INJECTION (NEW)
      # Injects the encrypted master key into a temporary production folder
      - name: Inject Sovereign Key
        run: |
          mkdir -p secrets
          echo "${{ secrets.CDB_SOVEREIGN_KEY }}" > secrets/cdb_sovereign.pem
          chmod 600 secrets/cdb_sovereign.pem

      - name: Run Sentinel Blogger APEX Engine
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          # 💰 GUMROAD REVENUE ENGINE ACTIVATION
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
        run: python -m agent.sentinel_blogger

      - name: Commit & Push Intelligence Data
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name "CDB-Sentinel-Bot"          
          
          # Stage manifest and institutional bundles
          git add data/blogger_sentinel_manifest.json data/stix/*.json
          
          # Clean workspace for rebase
          git commit -m "v16.0 Apex: Sovereign Intel Manifest Sync [skip ci]" || echo "No changes"
          
          git pull origin main --rebase
          git push origin main

      - name: Deploy Live Feed & Protect Branding
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: true
