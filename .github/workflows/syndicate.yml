name: CyberDudeBivash Sentinel Syndication Engine

on:
  schedule:
    # Run every 2 hours  -  checks for new blog posts and syndicates them
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no new items detected'
        required: false
        default: 'false'

permissions:
  contents: write   # Required to commit syndication state back to repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: sentinel-data-writer
  cancel-in-progress: false

jobs:
  syndicate:
    name: RSS -> Social Media Syndication
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -- 1. Checkout repo with full history -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # -- 2. Set up Python -----------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: syndicate/requirements_syndicate.txt

      # -- 3. Install dependencies ----------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r syndicate/requirements_syndicate.txt
          pip install requests  # [v30-APEX] Added for the Marketing Broadcaster

      # -- 4. Create data directory --------------------------------------
      - name: Create data directory
        run: |
          mkdir -p syndicate/data
          mkdir -p data/syndication_queue  # [v30-APEX] Dedicated directory for AI outputs

      # -- 5. Run Syndication Engine (LEGACY PRESERVED) -------------------
      - name: Run Syndication Engine
        working-directory: syndicate
        continue-on-error: true
        env:
          # RSS Source
          RSS_URL: ${{ vars.RSS_URL || 'https://cyberbivash.blogspot.com/feeds/posts/default?alt=rss' }}
          MAX_ITEMS_PER_RUN: ${{ vars.MAX_ITEMS_PER_RUN || '5' }}

          # LinkedIn
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_PERSONAL_URN: ${{ secrets.LINKEDIN_PERSONAL_URN }}

          # Twitter / X
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

          # Mastodon
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}

          # Bluesky
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

          # Facebook
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}

          # Tumblr
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN: ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET: ${{ secrets.TUMBLR_OAUTH_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}

          # Reddit
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_SUBREDDIT: ${{ secrets.REDDIT_SUBREDDIT }}

          # Threads
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

        run: python -m syndicate.main

      # ==================================================================
      # [v30-APEX] CYBERGOD MARKETING MATRIX INJECTION
      # ==================================================================
      - name: Generate APEX Viral Marketing Payload
        continue-on-error: true
        run: |
          echo "Engaging APEX Neural CMO..."
          # Uses the root directory to access Phase 1 AI predictions seamlessly
          python -m agent.v30_apex.apex_marketing_matrix || echo "APEX Matrix generation passed with soft fallback."

      - name: Broadcast APEX Payloads (Enterprise Override)
        continue-on-error: true
        env:
          # Reusing your existing tokens for 0-friction deployment
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      # ==================================================================
      # [v30-APEX] END INJECTION
      # ==================================================================

      # -- 6. Commit updated state back to repo (LEGACY PRESERVED) -------
        run: |
          python3 scripts/broadcast_apex_syndication.py
      - name: Commit syndication state
        working-directory: syndicate
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git add -f data/syndication_state.json data/last_run_summary.json data/syndication_run.log 2>/dev/null || true
          git diff --staged --quiet || git commit -m " Syndication state update  -  $(date -u +'%Y-%m-%d %H:%M UTC')"
          # FIX v148.0 BUG-B: stash-safe 5-attempt push retry
          git stash --include-untracked --quiet 2>/dev/null || true
          git fetch origin main --quiet 2>/dev/null || true
          git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
          git stash pop --quiet 2>/dev/null || true
          SYND_PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            if git push origin main; then SYND_PUSH_OK=1; break; fi
            echo "::warning::Syndicate state push attempt ${ATTEMPT}/5..."
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            sleep $((ATTEMPT * 8))
          done
          [ "$SYND_PUSH_OK" -eq 0 ] && echo "::warning::Syndicate push deferred — non-blocking." || true

      # -- 6.1 [v30-APEX] Commit APEX Matrix State -----------------------
      - name: Commit APEX Marketing State
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git add -f data/syndication_queue/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m " APEX Matrix state update [skip ci]"
          # FIX v148.0 BUG-A: if-statement is set-e-immune; stash prevents exit-128
          git stash --include-untracked --quiet 2>/dev/null || true
          git fetch origin main --quiet 2>/dev/null || true
          git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
          git stash pop --quiet 2>/dev/null || true
          APEX_PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            if git push origin main; then APEX_PUSH_OK=1; break; fi
            echo "::warning::APEX Matrix push attempt ${ATTEMPT}/5..."
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            sleep $((ATTEMPT * 8))
          done
          [ "$APEX_PUSH_OK" -eq 0 ] && echo "::warning::APEX push deferred — non-blocking." || true

      # -- 7. Upload run log as artifact ---------------------------------
      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: syndication-log-${{ github.run_number }}
          path: syndicate/data/syndication_run.log
          retention-days: 30
          if-no-files-found: ignore
