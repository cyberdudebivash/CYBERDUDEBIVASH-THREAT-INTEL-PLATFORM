# ══════════════════════════════════════════════════════════════════════════════
# GITHUB ACTIONS — WEB3 MODULE CI/CD
# ══════════════════════════════════════════════════════════════════════════════
# Place at: .github/workflows/web3-ci.yml
#
# ISOLATION:
# ───────────
# • This workflow ONLY runs on changes inside web3/ or web3-api/
# • It NEVER triggers on changes to the core system
# • Uses separate jobs so a Web3 failure never blocks core CI
# • Deploys to a separate service — never touches your main deployment
#
# TRIGGERS:
# ─────────
# • Push to main/develop with changes in web3/ or web3-api/
# • Pull requests affecting web3/ or web3-api/
# • Manual dispatch (workflow_dispatch)
# ══════════════════════════════════════════════════════════════════════════════

name: Web3 Module CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'web3/**'
      - 'web3-api/**'
      - '.github/workflows/web3-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web3/**'
      - 'web3-api/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after successful tests?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

# Cancel in-progress runs for the same branch
concurrency:
  group: web3-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WEB3_ENABLED: 'true'
  WEB3_USE_MOCK: 'true'
  NODE_ENV: 'test'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: LINT + TYPE CHECK
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web3-api/package-lock.json'

      - name: Install Web3 API dependencies
        working-directory: web3-api
        run: npm ci

      - name: Run ESLint (Web3 API)
        working-directory: web3-api
        run: npx eslint . --ext .js --max-warnings 0
        continue-on-error: false   # Fail on lint errors

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./web3-api
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true   # Don't block on this — alert separately

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: UNIT TESTS
  # ──────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web3-api/package-lock.json'

      - name: Install dependencies
        working-directory: web3-api
        run: npm ci

      - name: Run unit tests
        working-directory: web3-api
        run: npx jest --testPathPattern=tests/unit --config tests/jest.config.js
        env:
          WEB3_ENABLED: 'true'
          WEB3_USE_MOCK: 'true'
          NODE_ENV:     'test'

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: web3-api/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3: INTEGRATION TESTS
  # ──────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web3-api/package-lock.json'

      - name: Install dependencies
        working-directory: web3-api
        run: npm ci

      - name: Run integration tests
        working-directory: web3-api
        run: npx jest --testPathPattern=tests/integration --config tests/jest.config.js --forceExit
        env:
          WEB3_ENABLED: 'true'
          WEB3_USE_MOCK: 'true'
          WEB3_PORT:    '3099'
          NODE_ENV:     'test'

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: web3-api/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4: FEATURE FLAG VERIFICATION
  # ──────────────────────────────────────────────────────────────────────────
  feature-flag-test:
    name: Feature Flag Kill Switch Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web3-api/package-lock.json'

      - name: Install dependencies
        working-directory: web3-api
        run: npm ci

      - name: Run feature flag tests (WEB3_ENABLED=false)
        working-directory: web3-api
        run: npx jest --testPathPattern=tests/integration/featureFlag --config tests/jest.config.js --forceExit
        env:
          WEB3_ENABLED: 'false'
          WEB3_USE_MOCK: 'true'
          WEB3_PORT:    '3098'
          NODE_ENV:     'test'

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 5: SECURITY AUDIT
  # ──────────────────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: NPM audit (high + critical only)
        working-directory: web3-api
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Check dependency licenses
        working-directory: web3-api
        run: |
          npm ci
          npx license-checker --onlyAllow 'MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause' \
            --excludePrivatePackages || true

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 6: BUILD DOCKER IMAGE (PR + main only)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web3 API image (verify only)
        uses: docker/build-push-action@v5
        with:
          context:   ./web3-api
          file:      ./Dockerfile.web3-api
          push:      false          # Don't push on PR — just verify it builds
          tags:      sentinel-web3-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 7: DEPLOY (main branch only, after all tests pass)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Web3 API
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests, integration-tests, feature-flag-test, security-audit, docker-build]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true')
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context:   ./web3-api
          file:      ./Dockerfile.web3-api
          push:      true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sentinel-web3-api:latest
            ghcr.io/${{ github.repository_owner }}/sentinel-web3-api:${{ github.sha }}

      - name: Deploy to Railway/Render
        # Replace with your actual deployment command
        run: |
          echo "Deploy command here"
          # Example Railway:  railway up --service web3-api
          # Example Render:   curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          # Example SSH:      ssh user@server 'cd /app && docker-compose pull web3-api && docker-compose up -d web3-api'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_WEB3_DEPLOY_HOOK }}

      - name: Verify deployment health
        run: |
          sleep 15   # Wait for service to start
          curl --fail --retry 5 --retry-delay 5 \
            "${{ secrets.WEB3_API_PROD_URL }}/web3-api/health" | jq .

      - name: Notify on success
        if: success()
        run: echo "✅ Web3 API deployed successfully at $(date)"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Web3 API deployment FAILED at $(date)"

  # ──────────────────────────────────────────────────────────────────────────
  # SUMMARY JOB — Gatekeeper
  # ──────────────────────────────────────────────────────────────────────────
  ci-complete:
    name: CI Complete ✓
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, feature-flag-test, security-audit]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint failed"; exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"; exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "❌ Integration tests failed"; exit 1
          fi
          if [[ "${{ needs.feature-flag-test.result }}" != "success" ]]; then
            echo "❌ Feature flag test failed"; exit 1
          fi
          if [[ "${{ needs.security-audit.result }}" != "success" ]]; then
            echo "⚠️  Security audit warning (non-blocking)"; 
          fi
          echo "✅ All Web3 CI checks passed"
