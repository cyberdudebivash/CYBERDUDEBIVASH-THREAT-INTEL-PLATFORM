# =============================================================================
# CYBERDUDEBIVASH SENTINEL APEX v141.0.0 -- Telegram Revenue Automation
# =============================================================================
# Sends automated threat briefs to Telegram channel with upgrade CTAs.
# Drives revenue via: API subscriptions, detection pack sales, enterprise leads.
#
# SCHEDULE:
#   Daily brief    -> 08:00 UTC every day
#   Weekly digest  -> 06:00 UTC every Monday
#   P1 alerts      -> 10:00 UTC (checks for critical/KEV threats)
#
# SECRETS REQUIRED (set in repo Settings -> Secrets -> Actions):
#   TELEGRAM_BOT_TOKEN      -- from @BotFather
#   TELEGRAM_CHANNEL_ID     -- @yourchannel or numeric -100XXXXXXX
#   TELEGRAM_ALERT_CHAT_ID  -- (optional) admin-only private chat for P1 alerts
#
# REVENUE FLOWS:
#   Daily brief   -> API subscription CTAs ($49/mo Pro)
#   Weekly digest -> Enterprise trial CTAs ($299/mo)
#   P1 alerts     -> Urgency upsell (Pro + Detection Packs)
# =============================================================================

name: telegram-revenue

on:
  schedule:
    # Daily brief -- 08:00 UTC every day
    - cron: '0 8 * * *'
    # Weekly enterprise digest -- 06:00 UTC Monday
    - cron: '0 6 * * 1'
    # P1 critical alert check -- 10:00 UTC every day
    - cron: '0 10 * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Message type: daily | weekly | alert | all'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - alert
          - all

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLATFORM_VERSION: "148.0.0"  # v148.1.0 FIX: updated from stale 143.0.0

concurrency:
  group: telegram-revenue
  cancel-in-progress: true

jobs:
  send-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: " Checkout SENTINEL APEX"
        uses: actions/checkout@v4

      - name: " Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: " Validate secrets"
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN not set -- skipping Telegram dispatch."
            echo "SKIP_TG=true" >> $GITHUB_ENV
          else
            echo "SKIP_TG=false" >> $GITHUB_ENV
          fi

      - name: " Locate feed.json"
        if: env.SKIP_TG == 'false'
        run: |
          if [ -f "feed.json" ]; then
            echo "FEED_PATH=feed.json" >> $GITHUB_ENV
            echo "Feed found at feed.json ($(wc -l < feed.json) chars)"
          elif [ -f "api/feed.json" ]; then
            echo "FEED_PATH=api/feed.json" >> $GITHUB_ENV
            echo "Feed found at api/feed.json"
          elif [ -f "data/stix/feed_manifest.json" ]; then
            echo "FEED_PATH=data/stix/feed_manifest.json" >> $GITHUB_ENV
            echo "Feed found at data/stix/feed_manifest.json"
          else
            echo "::warning::No feed.json found -- using empty fallback"
            echo "[]" > /tmp/feed_empty.json
            echo "FEED_PATH=/tmp/feed_empty.json" >> $GITHUB_ENV
          fi

      - name: " Determine message mode"
        if: env.SKIP_TG == 'false'
        run: |
          # Manual dispatch uses explicit input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TELEGRAM_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
            echo "Mode (manual): ${{ github.event.inputs.mode }}"
            exit 0
          fi

          # Scheduled: determine by UTC hour + weekday
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)   # 1=Monday ... 7=Sunday
          echo "Scheduled run: UTC hour=$HOUR, DOW=$DOW"

          if [ "$HOUR" = "06" ] && [ "$DOW" = "1" ]; then
            echo "TELEGRAM_MODE=weekly" >> $GITHUB_ENV
            echo "Mode: weekly (Monday 06:00)"
          elif [ "$HOUR" = "10" ]; then
            echo "TELEGRAM_MODE=alert" >> $GITHUB_ENV
            echo "Mode: alert (10:00 P1 check)"
          else
            echo "TELEGRAM_MODE=daily" >> $GITHUB_ENV
            echo "Mode: daily (08:00 brief)"
          fi

      - name: " Run Telegram Revenue Bot"
        if: env.SKIP_TG == 'false'
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:    ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          TELEGRAM_MODE:          ${{ env.TELEGRAM_MODE }}
          FEED_PATH:              ${{ env.FEED_PATH }}
        run: |
          echo "=== SENTINEL APEX v${PLATFORM_VERSION} -- Telegram Revenue Bot ==="
          echo "Mode: $TELEGRAM_MODE | Feed: $FEED_PATH"
          python3 scripts/telegram_revenue_bot.py
          echo "Telegram dispatch complete."

      - name: " Skipped (no token)"
        if: env.SKIP_TG == 'true'
        run: |
          echo "::notice::TELEGRAM_BOT_TOKEN not configured."
          echo "To enable: Settings -> Secrets -> Actions -> New secret -> TELEGRAM_BOT_TOKEN"
          echo "Get a bot token from @BotFather on Telegram."
