name: CDB Sentinel APEX — Zero-Day Hunter v45.0

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Signal collection lookback window (hours)"
        required: false
        type: number
        default: 168

permissions:
  contents: write

concurrency:
  group: zerodayhunter
  cancel-in-progress: false

concurrency:
  group: sentinel-main-deploy
  cancel-in-progress: false

jobs:
  zerodayhunter:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser networkx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Zero-Day Hunter Engine
        env:
          MANIFEST_PATH: data/stix/feed_manifest.json
          STIX_DIR: data/stix
          FUSION_DIR: data/fusion
          ZDH_OUTPUT_DIR: data/zerodayhunter
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "SENTINEL APEX v45.0 — ZERO-DAY HUNTER"
          echo "═══════════════════════════════════════════════════"
          python -m agent.v35_zerodayhunter.zeroday.zerodayhunter_engine

      - name: Commit outputs
        run: |
          git config user.name "CDB-GOC-ZeroDayHunter"
          git config user.email "bivash@cyberdudebivash.com"

          # Stage generated JSON outputs only
          git add data/zerodayhunter/*.json || true

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Extract metrics safely
          GTI=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/global_threat_index.json')); print(f\"{d['index']}/10 ({d['level']})\")" 2>/dev/null || echo "N/A")

          ZD=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/zdh_report.json')); print(d['pipeline_stats']['zeroday_alerts'])" 2>/dev/null || echo "0")

          git commit -m "🎯 ZERO-DAY HUNTER v45.0 — GTI: ${GTI} | ${ZD} zero-day alerts"

          # Sync with latest repo state
          git pull --rebase origin main || true

          # Push changes
          git push origin main || (
            echo "Push failed due to race condition, retrying..."
            git pull --rebase origin main
            for i in 1 2 3; do
              git pull --rebase origin main || true
              git push origin main && break
              echo "Retry $i failed, retrying..."
              sleep 3
            done
          )
