name: CDB Sentinel APEX — Zero-Day Hunter v45.0

on:
  schedule:
    - cron: '45 */6 * * *'  # Every 6 hours, offset from other pipelines
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Signal collection lookback window (hours)'
        required: false
        type: number
        default: 168

permissions:
  contents: write

concurrency:
  group: zerodayhunter
  cancel-in-progress: false

jobs:
  zerodayhunter:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests feedparser networkx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Zero-Day Hunter Engine
        env:
          MANIFEST_PATH: data/stix/feed_manifest.json
          STIX_DIR: data/stix
          FUSION_DIR: data/fusion
          ZDH_OUTPUT_DIR: data/zerodayhunter
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "SENTINEL APEX v45.0 — ZERO-DAY HUNTER"
          echo "═══════════════════════════════════════════════════"
          python -m agent.v45_zerodayhunter.zeroday.zerodayhunter_engine

      - name: Commit outputs
        run: |
          git config user.name "CDB-GOC-ZeroDayHunter"
          git config user.email "bivash@cyberdudebivash.com"

          # Sync with latest repository state to avoid push rejection
          git pull --rebase origin main || true

          # Stage only JSON outputs
          git add data/zerodayhunter/*.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            GTI=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/global_threat_index.json')); print(f\"{d['index']}/10 ({d['level']})\")" 2>/dev/null || echo "N/A")

            ZD=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/zdh_report.json')); print(d['pipeline_stats']['zeroday_alerts'])" 2>/dev/null || echo "0")

            git commit -m "🎯 ZERO-DAY HUNTER v45.0 — GTI: ${GTI} | ${ZD} zero-day alerts"

            git push origin main
          fi
