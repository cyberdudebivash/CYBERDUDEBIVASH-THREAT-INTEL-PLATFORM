name: CDB Sentinel APEX -- Zero-Day Hunter v140.0

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Signal collection lookback window (hours)"
        required: false
        type: number
        default: 168

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# v141.0 FIX (2026-06-08): Unique concurrency group prevents cancellation by
# other sentinel-data-writer workflows queuing simultaneously.
concurrency:
  group: sentinel-data-writer-zerodayhunter
  cancel-in-progress: false

jobs:
  zerodayhunter:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests feedparser networkx --quiet
          if [ -f requirements.txt ]; then pip install -r requirements-ci-light.txt; fi

      - name: Run Zero-Day Hunter Engine
        continue-on-error: true
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          MANIFEST_PATH: data/stix/feed_manifest.json
          STIX_DIR: data/stix
          FUSION_DIR: data/fusion
          ZDH_OUTPUT_DIR: data/zerodayhunter
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "***************************************************"
          echo "SENTINEL APEX v134.0 " ZERO-DAY HUNTER"
          echo "***************************************************"
          python -m agent.v35_zerodayhunter.zeroday.zerodayhunter_engine

      - name: Commit outputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CYBERDUDEBIVASH"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}

          # Stage generated JSON outputs only
          git add -f data/zerodayhunter/*.json 2>/dev/null || true

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Extract metrics safely
          GTI=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/global_threat_index.json')); print(f\"{d['index']}/10 ({d['level']})\")" 2>/dev/null || echo "N/A")

          ZD=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/zdh_report.json')); print(d['pipeline_stats']['zeroday_alerts'])" 2>/dev/null || echo "0")

          git commit -m " ZERO-DAY HUNTER v45.0 - GTI: ${GTI} | ${ZD} zero-day alerts [skip ci]"

          # Push changes
          # ── Stash-safe retry (BUG-E: nested subshell push was fragile) ──
          PUSH_OK=0
          for ATTEMPT in 1 2 3 4 5; do
            if git push origin main; then PUSH_OK=1; break; fi
            echo "::warning::ZeroDayHunter push attempt ${ATTEMPT}/5..."
            git stash --include-untracked --quiet 2>/dev/null || true
            git fetch origin main --quiet 2>/dev/null || true
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null || true; git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true; }
            git stash pop --quiet 2>/dev/null || true
            sleep $(( ATTEMPT * 8 ))
          done
          [ "$PUSH_OK" -eq 0 ] && echo "::warning::ZDH push deferred — non-blocking." || true


