name: CDB Sentinel APEX -- Zero-Day Hunter v134.0

on:
  schedule:
    - cron: '45 */6 * * *'
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Signal collection lookback window (hours)"
        required: false
        type: number
        default: 168

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: zerodayhunter
  cancel-in-progress: false

jobs:
  zerodayhunter:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests feedparser networkx --quiet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Zero-Day Hunter Engine
        continue-on-error: true
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          MANIFEST_PATH: data/stix/feed_manifest.json
          STIX_DIR: data/stix
          FUSION_DIR: data/fusion
          ZDH_OUTPUT_DIR: data/zerodayhunter
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "***************************************************"
          echo "SENTINEL APEX v134.0 " ZERO-DAY HUNTER"
          echo "***************************************************"
          python -m agent.v35_zerodayhunter.zeroday.zerodayhunter_engine

      - name: Commit outputs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "CDB-GOC-ZeroDayHunter"
          git config user.email "bivash@cyberdudebivash.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}

          # Stage generated JSON outputs only
          git add -f data/zerodayhunter/*.json 2>/dev/null || true

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Extract metrics safely
          GTI=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/global_threat_index.json')); print(f\"{d['index']}/10 ({d['level']})\")" 2>/dev/null || echo "N/A")

          ZD=$(python3 -c "import json; d=json.load(open('data/zerodayhunter/zdh_report.json')); print(d['pipeline_stats']['zeroday_alerts'])" 2>/dev/null || echo "0")

          git commit -m " ZERO-DAY HUNTER v45.0 " GTI: ${GTI} | ${ZD} zero-day alerts"

          # Push changes
          git push origin main || (
            echo "Push failed due to race condition, retrying..."
            git pull --rebase origin main
            git pull --rebase origin main || true
            git push origin main
          )


