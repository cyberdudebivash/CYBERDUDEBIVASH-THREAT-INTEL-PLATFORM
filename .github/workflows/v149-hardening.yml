name: "SENTINEL APEX v149 - Production Hardening Suite"

# ─────────────────────────────────────────────────────────────────────────────
# v149 PRODUCTION HARDENING WORKFLOW
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE: Standalone execution of all v149 hardening scripts for:
#   - On-demand P0 emergency ingestion recovery (published field fixer)
#   - On-demand P0/P1 intelligence quality hardening
#   - On-demand P1 frontend deduplication patch
#   - On-demand P4 SIEM/webhook delivery
#   - Scheduled weekly full hardening pass (every Sunday 02:00 UTC)
#
# WHEN TO USE:
#   1. After any pipeline run showing ingestion rate < 60%
#   2. After any dashboard showing duplicate advisory cards
#   3. After enabling new SIEM/webhook endpoints
#   4. Weekly maintenance (automatic via schedule)
#
# ALL SCRIPTS EXIT 0 - pipeline will never be blocked by hardening failures.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      run_published_fixer:
        description: "Run P0 published field fixer"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_intel_hardening:
        description: "Run P0/P1 intelligence hardening"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_frontend_patch:
        description: "Run P1 frontend dedup patch"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      run_siem_delivery:
        description: "Run P4 SIEM webhook delivery"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]
      dry_run:
        description: "Dry-run mode (no writes)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

  schedule:
    # Every Sunday at 02:00 UTC - weekly full hardening pass
    - cron: "0 2 * * 0"

concurrency:
  group: v149-hardening-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIPELINE_VERSION: "160.0"

jobs:
  v149-hardening:
    name: "v149 Production Hardening Suite"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'

    env:
      CDB_JWT_SECRET:          ${{ secrets.CDB_JWT_SECRET }}
      SPLUNK_HEC_URL:          ${{ secrets.SPLUNK_HEC_URL }}
      SPLUNK_HEC_TOKEN:        ${{ secrets.SPLUNK_HEC_TOKEN }}
      SENTINEL_WORKSPACE_ID:   ${{ secrets.SENTINEL_WORKSPACE_ID }}
      SENTINEL_WORKSPACE_KEY:  ${{ secrets.SENTINEL_WORKSPACE_KEY }}
      CDB_WEBHOOK_SECRET:      ${{ secrets.CDB_WEBHOOK_SECRET }}
      DRY_RUN:                 ${{ github.event.inputs.dry_run || 'false' }}

    steps:

      # ───────────────────────────────────────────────────────────────────────
      # INIT
      # ───────────────────────────────────────────────────────────────────────
      - name: "INIT - Hardening suite header"
        run: |
          echo "========================================================"
          echo "SENTINEL APEX v149 PRODUCTION HARDENING SUITE"
          echo "Version  : ${PIPELINE_VERSION}"
          echo "Run ID   : ${{ github.run_id }}"
          echo "Trigger  : ${{ github.event_name }}"
          echo "Dry Run  : ${DRY_RUN}"
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "========================================================"

      # ───────────────────────────────────────────────────────────────────────
      # CHECKOUT
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 1 - Checkout repository"
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          ref: main

      # ───────────────────────────────────────────────────────────────────────
      # PYTHON
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 2 - Python 3.12 setup"
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.12'
          cache: 'pip'

      # ───────────────────────────────────────────────────────────────────────
      # SYNTAX GUARD - fail fast before any execution
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 3 - Syntax guard (v149 scripts)"
        run: |
          ERRORS=0
          for f in scripts/v149_*.py; do
            [ -f "$f" ] || continue
            python3 -m py_compile "$f" 2>/tmp/v149_syn_err.txt
            if [ $? -ne 0 ]; then
              echo "::error::SYNTAX ERROR: $f"
              cat /tmp/v149_syn_err.txt
              ERRORS=$((ERRORS+1))
            else
              echo "[OK] $f"
            fi
          done
          [ "$ERRORS" -eq 0 ] || { echo "::error::ABORTING - syntax errors in v149 scripts"; exit 1; }
          echo "[PASS] All v149 scripts syntax-clean"

      # ───────────────────────────────────────────────────────────────────────
      # P0 - PUBLISHED FIELD TYPE FIXER
      # Fixes 446-item ingestion failure (published bool → ISO-8601)
      # Ingestion rate recovery: 30.5% → 60%+
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 4 - P0: Published field type fixer"
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_published_fixer == 'true' }}
        run: |
          FLAGS=""
          [ "${DRY_RUN}" = "true" ] && FLAGS="--dry-run --verbose"
          python3 scripts/v149_published_field_fixer.py ${FLAGS}
          echo "[STAGE 4] Published field fixer complete"

      # ───────────────────────────────────────────────────────────────────────
      # P0/P1 - INTELLIGENCE HARDENING ENGINE
      # Fixes: false CRITICAL, NONE threat_level, UNKNOWN categories,
      #        confidence gate (min 30%), source trust differentiation
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 5 - P0/P1: Intelligence hardening engine"
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_intel_hardening == 'true' }}
        run: |
          FLAGS=""
          [ "${DRY_RUN}" = "true" ] && FLAGS="--dry-run"
          python3 scripts/v149_intelligence_hardening.py ${FLAGS}
          echo "[STAGE 5] Intelligence hardening complete"

      # ───────────────────────────────────────────────────────────────────────
      # P1 - FRONTEND DEDUPLICATION PATCH
      # Patches index.html: dedup guard + unified risk + container clear
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 6 - P1: Frontend deduplication patch"
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_frontend_patch == 'true' }}
        run: |
          FLAGS=""
          [ "${DRY_RUN}" = "true" ] && FLAGS="--dry-run"
          python3 scripts/v149_frontend_dedup_patch.py ${FLAGS}
          echo "[STAGE 6] Frontend dedup patch complete"

      # ───────────────────────────────────────────────────────────────────────
      # P4 - SIEM + ENTERPRISE WEBHOOK DELIVERY
      # Delivers current feed to Splunk HEC, Sentinel, custom webhooks
      # Non-fatal: always continue-on-error
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 7 - P4: SIEM + webhook delivery"
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_siem_delivery == 'true' }}
        continue-on-error: true
        run: |
          [ "${DRY_RUN}" = "false" ] && python3 scripts/v149_siem_webhook_provisioner.py \
            || echo "[SKIP] SIEM delivery skipped in dry-run mode"
          echo "[STAGE 7] SIEM delivery complete"

      # ───────────────────────────────────────────────────────────────────────
      # AUDIT SUMMARY
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 8 - Audit summary"
        if: always()
        run: |
          echo "========================================================"
          echo "v149 HARDENING SUITE - AUDIT SUMMARY"
          echo "========================================================"
          for audit in \
            data/governance/v149_published_fix_audit.json \
            data/governance/v149_intel_hardening_audit.json \
            data/governance/v149_siem_delivery_audit.json; do
            if [ -f "$audit" ]; then
              echo ""
              echo "-- $(basename $audit) --"
              python3 -c 'import json,sys; d=json.load(open(sys.argv[1])); [print(" ",k,":",d.get(k,"N/A")) for k in ["status","total_fixed","items_processed","timestamp"]]' "$audit" 2>/dev/null || head -10 "$audit"
            fi
          done
          echo ""
          echo "========================================================"
          echo "[PASS] v149 Hardening Suite complete"
          echo "========================================================"

      # ───────────────────────────────────────────────────────────────────────
      # COMMIT - push hardening outputs (audit logs, patched files)
      # ───────────────────────────────────────────────────────────────────────
      - name: "STAGE 9 - Commit hardening outputs"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the expected output paths (no runaway commits)
          git add -f \
            data/governance/v149_*.json \
            data/siem/ \
            data/quarantine/ \
            data/quality/ \
            config/feature_flags.json \
            index.html \
            2>/dev/null || true

          # Skip commit if nothing changed
          if git diff --cached --quiet; then
            echo "[SKIP] No changes to commit"
          else
            FIXED_COUNT=$(python3 -c 'import json,glob; t=sum(json.load(open(f)).get("total_fixed",0)+json.load(open(f)).get("items_processed",0) for f in glob.glob("data/governance/v149_*.json") if __import__("os").path.exists(f))' 2>/dev/null || echo "0")
            git commit -m "ci(v149-hardening): production hardening pass - ${FIXED_COUNT} items hardened [skip ci]" \
              --no-verify
            # 4-attempt push retry with rebase -- prevents rejection when concurrent
            # workflows (e.g. storage-lifecycle-governance, sentinel-blogger) push to
            # main during the same window (both run Sundays 02:00 UTC).
            git rebase --abort 2>/dev/null || true
            git merge  --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            PUSH_OK=0
            for i in 1 2 3 4; do
              git fetch origin main --quiet 2>/dev/null || true
              git rebase origin/main --quiet 2>/dev/null || {
                git rebase --abort 2>/dev/null || true
                git merge origin/main -X ours --no-edit --quiet 2>/dev/null || true
              }
              if git push origin main; then
                echo "[COMMIT] Hardening outputs pushed to main (attempt ${i}/4)"
                PUSH_OK=1
                break
              fi
              echo "::warning::Push attempt ${i}/4 rejected -- remote ahead, retrying in $((i*15))s"
              sleep $((i * 15))
            done
            [ "$PUSH_OK" -eq 0 ] && echo "::warning::Push deferred after 4 attempts -- outputs retained in git, will sync next run" || true
          fi
