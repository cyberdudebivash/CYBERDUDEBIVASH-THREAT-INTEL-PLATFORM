# =============================================================================
# CYBERDUDEBIVASH(R) SENTINEL APEX v134.0.0 " AUTONOMOUS GUARDIAN AGENT
# Version: v134.0.0 " unified platform version
# NOTE: sync-dashboard.yml DISABLED in v134.0.0 " removed from workflow_run list.
#       Guardian still triggers on sentinel-blogger completion + hourly schedule.
# =============================================================================
name: Autonomous Guardian Agent v140.0

on:
  workflow_run:
    # v134.0.0: sync-dashboard removed " it is DISABLED (merged into sentinel-blogger).
    # Only sentinel-blogger triggers guardian post-run checks.
    workflows: ["sentinel-blogger"]
    types: [completed]
  schedule:
    - cron: '30 * * * *'   # Hourly at :30 " catches ALL workflow failures
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Hours to look back for failures'
        default: '6'
        required: false
      force_report:
        description: 'Force full report even if no failures'
        default: 'false'
        required: false

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: autonomous-guardian
  cancel-in-progress: false

jobs:
  guardian:
    name: Autonomous Guardian Cycle v140
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Set up Python 3.12"
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.12'

      - name: "Install Dependencies"
        run: pip install requests pyyaml --quiet

      - name: "Bootstrap Critical Files"
        run: python3 scripts/bootstrap_critical_files.py

      - name: "Run Autonomous Guardian"
        env:
          CDB_JWT_SECRET: ${{ secrets.CDB_JWT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '6' }}
          FORCE_REPORT: ${{ github.event.inputs.force_report || 'false' }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name || 'scheduled' }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion || 'n/a' }}
        run: python3 agent/autonomous_guardian/guardian.py || true

      - name: "Commit Guardian Report"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "bivash@cyberdudebivash.com"
          git config --local user.name  "CYBERDUDEBIVASH"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git rebase --abort 2>/dev/null || true
          git merge  --abort 2>/dev/null || true
          rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true

          git add -f data/health/ 2>/dev/null || true
          # STRICT: do NOT stage feed_manifest.json " sentinel-blogger owns it
          git restore --staged data/stix/feed_manifest.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No guardian report changes."
            exit 0
          fi

          git commit -m "Guardian report @ $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"

          for i in 1 2 3 4; do
            git fetch origin main --quiet
            git rebase origin/main --quiet 2>/dev/null || { git rebase --abort 2>/dev/null||true; git merge origin/main -X ours --no-edit --quiet||true; }
            git push origin main && { echo "Push OK"; break; }
            sleep $((i*10))
            [ $i -eq 4 ] && echo "Push deferred."
          done

      - name: "Summary"
        if: always()
        run: |
          [ -f data/health/guardian_report.json ] && \
            python3 -c "import json; d=json.load(open('data/health/guardian_report.json')); print(f'Guardian: {d.get(\"status\",\"N/A\")} | Failures: {d.get(\"failures_detected\",0)} | Fixes: {d.get(\"fixes_applied\",0)}')" || \
            echo "No guardian report."

