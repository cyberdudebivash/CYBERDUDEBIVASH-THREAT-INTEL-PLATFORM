name: "SENTINEL APEX -- Storage Governance"

# Scheduled storage governance: prune old artifacts, archive historical data,
# run telemetry collection for enterprise observability dashboards

on:
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Governance mode"
        required: true
        type: choice
        options: [dry-run, execute]
        default: dry-run

concurrency:
  group: sentinel-storage-governance
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_AUTHOR_NAME: "SENTINEL APEX Storage Governance"
  GIT_AUTHOR_EMAIL: "actions@github.com"
  GIT_COMMITTER_NAME: "SENTINEL APEX Storage Governance"
  GIT_COMMITTER_EMAIL: "actions@github.com"

jobs:

  telemetry-collection:
    name: "Enterprise Telemetry Collection"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        timeout-minutes: 3

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Run enterprise telemetry collection"
        timeout-minutes: 8
        run: |
          echo "[TELEMETRY] Starting collection pass..."
          python3 scripts/enterprise_telemetry.py collect 2>&1 | tee /tmp/telemetry_output.txt
          echo "[TELEMETRY] Collection complete"

      - name: "Print telemetry report"
        run: |
          python3 scripts/enterprise_telemetry.py report 2>&1 || true

      - name: "Anomaly alert if detected"
        timeout-minutes: 2
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

        run: |
          python3 scripts/print_anomaly_alert.py
  storage-scan:
    name: "Storage Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        timeout-minutes: 3

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Run storage scan"
        run: |
          python3 scripts/storage_governance.py scan 2>&1

  storage-prune:
    name: "Storage Prune"
    runs-on: ubuntu-latest
    needs: [storage-scan]
    timeout-minutes: 10

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        timeout-minutes: 3

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Run storage prune"
        run: |
          MODE="${{ github.event.inputs.mode || 'dry-run' }}"
          if [ "$MODE" = "execute" ]; then
            echo "[PRUNE] Executing storage prune..."
            python3 scripts/storage_governance.py prune --execute 2>&1
          else
            echo "[PRUNE] Dry-run storage prune..."
            python3 scripts/storage_governance.py prune 2>&1
          fi

      - name: "Archive old data (dry-run only for safety)"
        run: |
          python3 scripts/storage_governance.py archive 2>&1

      - name: "Commit telemetry data if changed"
        if: github.event.inputs.mode == 'execute'
        timeout-minutes: 5
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          git add data/telemetry/ data/governance/ || true
          if git diff --cached --quiet; then
            echo "No telemetry changes to commit"
          else
            git commit -m "chore: storage governance + telemetry update [skip ci]" || true
            git push origin main || true
            echo "Telemetry data committed"
          fi
