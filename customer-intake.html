<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting to Upgrade &mdash; CYBERDUDEBIVASH SENTINEL APEX</title>
<!--
  customer-intake.html was a manual payment intake form (UPI / NEFT / PayPal
  / Crypto method picker + a Transaction ID / UTR submission field, posting
  to Formspree) -- no automated processor at all. Per executive decision,
  manual payment is retired platform-wide in favor of automated checkout
  (Razorpay, plus the existing Gumroad channel) -- see /upgrade.html. No
  other page in this repo links here, but the URL may still be reachable
  directly (old campaigns, QR codes, bookmarks), so it's replaced with a
  redirect rather than deleted outright.

  The inline script normalizes this page's old param names (p/plan,
  b/billing=annual, e/email) to the "plan=X" / "plan=X-annual" form
  /upgrade.html expects, and drops the now-meaningless "method" param.
-->
<meta name="description" content="This page has moved. Continue to the automated checkout at /upgrade.html.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://intel.cyberdudebivash.com/upgrade.html">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<script>
  var params  = new URLSearchParams(window.location.search);
  var plan    = params.get('plan') || params.get('p') || '';
  var billing = params.get('billing') || params.get('b') || '';
  var email   = params.get('email') || params.get('e') || '';

  var out = new URLSearchParams();
  if (plan) {
    plan = plan.toLowerCase();
    if (billing === 'annual' && !plan.endsWith('-annual')) plan += '-annual';
    out.set('plan', plan);
  }
  if (email) out.set('email', email);

  var qs = out.toString();
  window.location.replace('/upgrade.html' + (qs ? '?' + qs : ''));
</script>
<meta http-equiv="refresh" content="0; url=/upgrade.html">
<style>
  body { background:#050c18; color:#e2e8f0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; text-align:center; }
  a { color:#00ffc6; }
</style>
</head>
<body>
  <p>Redirecting to <a href="/upgrade.html">the upgrade page</a>&hellip;</p>
</body>
</html>
