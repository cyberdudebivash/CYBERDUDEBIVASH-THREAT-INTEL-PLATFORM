{{- if .Values.intelCore.enabled -}}
---
# ============================================================
# Intel Core — Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel-apex.fullname" . }}-intel-core
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: intel-core
spec:
  replicas: {{ .Values.intelCore.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel-apex.selectorLabels" (dict "component" "intel-core" "root" .) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "sentinel-apex.selectorLabels" (dict "component" "intel-core" "root" .) | nindent 8 }}
        sidecar.istio.io/inject: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "sentinel-apex.serviceAccountName" (dict "component" "intel-core" "root" .) }}
      securityContext:
        {{- include "sentinel-apex.securityContext" . | nindent 8 }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      affinity:
        {{- include "sentinel-apex.affinity" (dict "component" "intel-core") | nindent 8 }}
      terminationGracePeriodSeconds: 90
      containers:
        - name: intel-core
          image: {{ include "sentinel-apex.image" (dict "image" .Values.intelCore.image "root" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "sentinel-apex.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.intelCore.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: {{ .Values.intelCore.service.port | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            {{- range $key, $val := .Values.intelCore.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            # Injected secrets
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: pg-password
            - name: VT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: virustotal-api-key
            - name: ABUSEIPDB_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: abuseipdb-key
            - name: OPENAI_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: openai-key
            - name: ANTHROPIC_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: anthropic-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.intelCore.resources | nindent 12 }}
          volumeMounts:
            - name: intel-cache
              mountPath: /app/cache
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: intel-cache
          emptyDir:
            sizeLimit: "5Gi"
        - name: tmp
          emptyDir: {}
---
# ============================================================
# Intel Core — Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: intel-core
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: intel-core
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.intelCore.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sentinel-apex.selectorLabels" (dict "component" "intel-core" "root" .) | nindent 4 }}
---
# ============================================================
# Intel Core — HPA
# ============================================================
{{- if .Values.intelCore.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sentinel-apex.fullname" . }}-intel-core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sentinel-apex.fullname" . }}-intel-core
  minReplicas: {{ .Values.intelCore.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.intelCore.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.intelCore.autoscaling.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
{{- end }}
---
# ============================================================
# Intel Core — PodDisruptionBudget
# ============================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sentinel-apex.fullname" . }}-intel-core
spec:
  minAvailable: 2
  selector:
    matchLabels:
      {{- include "sentinel-apex.selectorLabels" (dict "component" "intel-core" "root" .) | nindent 6 }}
---
# ============================================================
# Intel Core — ServiceAccount
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sentinel-apex.serviceAccountName" (dict "component" "intel-core" "root" .) }}
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
  {{- with .Values.rbac.serviceAccounts.intelCore.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
