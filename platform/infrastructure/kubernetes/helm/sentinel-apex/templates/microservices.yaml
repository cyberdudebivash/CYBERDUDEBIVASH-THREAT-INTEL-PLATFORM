{{/* SOC Automation, AgentShield, SurfaceWatch, Billing Engine — generated from shared pattern */}}

{{- $services := list
  (dict "name" "soc-automation" "values" .Values.socAutomation "port" 8003 "memory" "90s")
  (dict "name" "agentshield"    "values" .Values.agentShield    "port" 8004 "memory" "60s")
  (dict "name" "surfacewatch"   "values" .Values.surfaceWatch   "port" 8005 "memory" "90s")
  (dict "name" "billing-engine" "values" .Values.billingEngine  "port" 8006 "memory" "30s")
-}}

{{- range $svc := $services }}
{{- if $svc.values.enabled }}
---
# ============================================================
# {{ $svc.name | title }} — Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel-apex.fullname" $ }}-{{ $svc.name }}
  labels:
    {{- include "sentinel-apex.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $svc.name }}
spec:
  replicas: {{ $svc.values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel-apex.selectorLabels" (dict "component" $svc.name "root" $) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "sentinel-apex.selectorLabels" (dict "component" $svc.name "root" $) | nindent 8 }}
        sidecar.istio.io/inject: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: {{ include "sentinel-apex.fullname" $ }}-{{ $svc.name }}
      securityContext:
        {{- include "sentinel-apex.securityContext" $ | nindent 8 }}
      imagePullSecrets:
        {{- toYaml $.Values.global.imagePullSecrets | nindent 8 }}
      affinity:
        {{- include "sentinel-apex.affinity" (dict "component" $svc.name) | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: {{ $svc.name }}
          image: {{ $.Values.global.imageRegistry }}/{{ $svc.values.image.repository }}:{{ $.Values.global.imageTag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          securityContext:
            {{- include "sentinel-apex.containerSecurityContext" $ | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ $svc.values.service.port }}
              protocol: TCP
          env:
            - name: SERVICE_PORT
              value: {{ $svc.values.service.port | quote }}
            - name: ENVIRONMENT
              value: {{ $.Values.global.environment | quote }}
            {{- if $svc.values.env }}
            {{- range $key, $val := $svc.values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
            {{- if eq $svc.name "billing-engine" }}
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: stripe-webhook-secret
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml $svc.values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  labels:
    {{- include "sentinel-apex.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $svc.name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ $svc.values.service.port }}
      targetPort: http
  selector:
    {{- include "sentinel-apex.selectorLabels" (dict "component" $svc.name "root" $) | nindent 4 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sentinel-apex.fullname" $ }}-{{ $svc.name }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "sentinel-apex.selectorLabels" (dict "component" $svc.name "root" $) | nindent 6 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sentinel-apex.fullname" $ }}-{{ $svc.name }}
  labels:
    {{- include "sentinel-apex.labels" $ | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
