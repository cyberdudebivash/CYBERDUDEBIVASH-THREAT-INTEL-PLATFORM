---
# ============================================================
# Sentinel APEX  -  Secrets (External Secrets Operator / Vault)
# NOTE: These are placeholder secrets for bootstrapping.
# In production, use External Secrets Operator with Vault/AWS SM.
# ============================================================
# IMPORTANT: Do NOT store real secrets here. Use:
#   helm upgrade --install sentinel-apex . \
#     --set-string externalSecrets.vaultPath=secret/sentinel-apex
# Or pre-create the secret via ESO before chart installation.

{{- if .Values.vault.agentInjector.enabled }}
# Vault Agent Injector handles secret injection  -  no K8s Secret needed
# Secrets are mounted at /vault/secrets/ via annotations
{{- else }}
---
# Bootstrap secret for development/staging only
# In production: provision via Vault/ESO/SOPS
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-apex-secrets
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
  annotations:
    # helm.sh/resource-policy: keep  # uncomment to preserve on helm delete
    sentinel.io/managed-by: "external-secrets-operator"
type: Opaque
# IMPORTANT: All values are EMPTY. Populate via ESO or inject at deploy time:
#   kubectl create secret generic sentinel-apex-secrets \
#     --from-literal=jwt-secret=$(openssl rand -hex 32) \
#     --from-literal=pg-password=<PG_PASS> \
#     --from-literal=redis-password=<REDIS_PASS> \
#     --from-literal=virustotal-api-key=<VT_KEY> \
#     --from-literal=abuseipdb-key=<ABUSE_KEY> \
#     --from-literal=openai-key=<OPENAI_KEY> \
#     --from-literal=anthropic-key=<ANTHROPIC_KEY> \
#     --from-literal=stripe-secret-key=<STRIPE_KEY> \
#     --from-literal=stripe-webhook-secret=<STRIPE_WEBHOOK> \
#     --from-literal=nextauth-secret=$(openssl rand -hex 32) \
#     -n sentinel-apex
stringData:
  jwt-secret: ""
  pg-password: ""
  redis-password: ""
  virustotal-api-key: ""
  abuseipdb-key: ""
  openai-key: ""
  anthropic-key: ""
  stripe-secret-key: ""
  stripe-webhook-secret: ""
  nextauth-secret: ""
{{- end }}
---
# ============================================================
# GHCR Image Pull Secret (template  -  populate before deploy)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  # base64 of: {"auths":{"ghcr.io":{"username":"<USER>","password":"<GHCR_PAT>","auth":"<BASE64>"}}}
  .dockerconfigjson: ""
