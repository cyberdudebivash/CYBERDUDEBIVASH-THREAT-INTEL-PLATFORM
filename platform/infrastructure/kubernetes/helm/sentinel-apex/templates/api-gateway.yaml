{{- if .Values.apiGateway.enabled -}}
---
# ============================================================
# API Gateway  -  Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel-apex.fullname" . }}-api-gateway
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel-apex.selectorLabels" (dict "component" "api-gateway" "root" .) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "sentinel-apex.selectorLabels" (dict "component" "api-gateway" "root" .) | nindent 8 }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        sidecar.istio.io/inject: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "sentinel-apex.serviceAccountName" (dict "component" "api-gateway" "root" .) }}
      securityContext:
        {{- include "sentinel-apex.securityContext" . | nindent 8 }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      affinity:
        {{- include "sentinel-apex.affinity" (dict "component" "api-gateway") | nindent 8 }}
      {{- if .Values.apiGateway.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.apiGateway.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: api-gateway
          image: {{ include "sentinel-apex.image" (dict "image" .Values.apiGateway.image "root" .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "sentinel-apex.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.apiGateway.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.apiGateway.service.port | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.global.environment | quote }}
            - name: DOMAIN
              value: {{ .Values.global.domain | quote }}
            {{- range $key, $val := .Values.apiGateway.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            # Injected secrets
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: jwt-secret
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-apex-secrets
                  key: redis-password
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: "1Gi"
---
# ============================================================
# API Gateway  -  Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - name: http
      port: {{ .Values.apiGateway.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "sentinel-apex.selectorLabels" (dict "component" "api-gateway" "root" .) | nindent 4 }}
---
# ============================================================
# API Gateway  -  HPA
# ============================================================
{{- if .Values.apiGateway.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sentinel-apex.fullname" . }}-api-gateway
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sentinel-apex.fullname" . }}-api-gateway
  minReplicas: {{ .Values.apiGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.apiGateway.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiGateway.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.apiGateway.autoscaling.targetMemoryUtilizationPercentage | default 80 }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
{{- end }}
---
# ============================================================
# API Gateway  -  PodDisruptionBudget
# ============================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "sentinel-apex.fullname" . }}-api-gateway
spec:
  minAvailable: {{ .Values.apiGateway.podDisruptionBudget.minAvailable | default 2 }}
  selector:
    matchLabels:
      {{- include "sentinel-apex.selectorLabels" (dict "component" "api-gateway" "root" .) | nindent 6 }}
---
# ============================================================
# API Gateway  -  Ingress
# ============================================================
{{- if .Values.apiGateway.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sentinel-apex.fullname" . }}-api-gateway
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.apiGateway.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.apiGateway.ingress.tls }}
  tls:
    {{- toYaml .Values.apiGateway.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.apiGateway.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: api-gateway
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
---
# ============================================================
# API Gateway  -  ServiceAccount
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sentinel-apex.serviceAccountName" (dict "component" "api-gateway" "root" .) }}
  labels:
    {{- include "sentinel-apex.labels" . | nindent 4 }}
  {{- with .Values.rbac.serviceAccounts.apiGateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
