# ============================================================
# SENTINEL APEX  -  Helm Values (Production)
# ============================================================
global:
  imageRegistry: "ghcr.io/cyberdudebivash"
  imageTag: "2.0.0"
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-secret
  storageClass: "fast-ssd"
  environment: production
  domain: "intel.cyberdudebivash.com"
  tlsSecretName: "sentinel-apex-tls"

# ============================================================
# API Gateway
# ============================================================
apiGateway:
  enabled: true
  replicaCount: 3
  image:
    repository: sentinel-apex/api-gateway
    tag: ""  # Inherits global.imageTag
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 50
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/rate-limit: "100"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/enable-cors: "true"
    hosts:
      - host: "api.intel.cyberdudebivash.com"
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: sentinel-api-tls
        hosts:
          - "api.intel.cyberdudebivash.com"
  env:
    KEYCLOAK_URL: "https://auth.intel.cyberdudebivash.com/realms/sentinel-apex"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    REDIS_URL: "redis://redis-master:6379/0"
    INTEL_CORE_URL: "http://intel-core:8001"
    AI_ENGINE_URL: "http://ai-engine:8002"
    SOC_AUTOMATION_URL: "http://soc-automation:8003"
  podDisruptionBudget:
    minAvailable: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule

# ============================================================
# Intel Core Microservice
# ============================================================
intelCore:
  enabled: true
  replicaCount: 3
  image:
    repository: sentinel-apex/intel-core
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilizationPercentage: 75
  service:
    port: 8001
  env:
    DATABASE_URL: "postgresql://sentinel:$(PG_PASSWORD)@postgresql:5432/sentinel_intel"
    QDRANT_URL: "http://qdrant:6333"
    NEO4J_URL: "bolt://neo4j:7687"
    KAFKA_BROKERS: "kafka:9092"
    VIRUSTOTAL_API_KEY: "$(VT_API_KEY)"
    ABUSEIPDB_API_KEY: "$(ABUSEIPDB_KEY)"
    OPENAI_API_KEY: "$(OPENAI_KEY)"
    ANTHROPIC_API_KEY: "$(ANTHROPIC_KEY)"
  volumes:
    - name: intel-cache
      emptyDir:
        sizeLimit: "5Gi"

# ============================================================
# AI Engine Microservice
# ============================================================
aiEngine:
  enabled: true
  replicaCount: 2
  image:
    repository: sentinel-apex/ai-engine
  resources:
    requests:
      cpu: "2000m"
      memory: "4Gi"
    limits:
      cpu: "8000m"
      memory: "16Gi"
      # nvidia.com/gpu: "1"  # Uncomment for GPU nodes
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 80
  service:
    port: 8002
  nodeSelector:
    # node-type: gpu  # Uncomment for GPU scheduling
    workload: ai-inference
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

# ============================================================
# SOC Automation Service
# ============================================================
socAutomation:
  enabled: true
  replicaCount: 2
  image:
    repository: sentinel-apex/soc-automation
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  service:
    port: 8003

# ============================================================
# AgentShield  -  AI Runtime Protection
# ============================================================
agentShield:
  enabled: true
  replicaCount: 3
  image:
    repository: sentinel-apex/agentshield
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  service:
    port: 8004

# ============================================================
# SurfaceWatch  -  Dark Web + Attack Surface
# ============================================================
surfaceWatch:
  enabled: true
  replicaCount: 2
  image:
    repository: sentinel-apex/surfacewatch
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  service:
    port: 8005

# ============================================================
# Billing Engine
# ============================================================
billingEngine:
  enabled: true
  replicaCount: 2
  image:
    repository: sentinel-apex/billing-engine
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  service:
    port: 8006
  env:
    STRIPE_SECRET_KEY: "$(STRIPE_SECRET_KEY)"
    STRIPE_WEBHOOK_SECRET: "$(STRIPE_WEBHOOK_SECRET)"

# ============================================================
# Frontend  -  Next.js Enterprise Dashboard
# ============================================================
frontend:
  enabled: true
  replicaCount: 3
  image:
    repository: sentinel-apex/frontend
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
  service:
    port: 3000
  ingress:
    enabled: true
    hosts:
      - host: "intel.cyberdudebivash.com"
    tls:
      - secretName: sentinel-frontend-tls
        hosts:
          - "intel.cyberdudebivash.com"

# ============================================================
# Infrastructure Dependencies
# ============================================================
postgresql:
  enabled: true
  auth:
    postgresPassword: ""  # Set via secret
    database: sentinel_intel
  primary:
    persistence:
      size: 100Gi
      storageClass: fast-ssd
    resources:
      requests:
        cpu: "2000m"
        memory: "4Gi"
      limits:
        cpu: "8000m"
        memory: "16Gi"
  readReplicas:
    replicaCount: 2

redis:
  enabled: true
  auth:
    enabled: true
    password: ""  # Set via secret
  master:
    persistence:
      size: 20Gi
  replica:
    replicaCount: 2

kafka:
  enabled: true
  replicaCount: 3
  persistence:
    size: 100Gi
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "4000m"
      memory: "8Gi"

keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: ""  # Set via secret
  postgresql:
    enabled: false  # Use global PostgreSQL
    externalDatabase:
      host: postgresql
      database: keycloak
  ingress:
    enabled: true
    hostname: "auth.intel.cyberdudebivash.com"
    tls: true

grafana:
  enabled: true
  adminPassword: ""  # Set via secret
  ingress:
    enabled: true
    hosts:
      - "monitoring.intel.cyberdudebivash.com"
  persistence:
    enabled: true
    size: 10Gi

prometheus:
  enabled: true
  server:
    persistentVolume:
      size: 50Gi
    retention: "30d"

# ============================================================
# Zero Trust + Service Mesh (Istio)
# ============================================================
istio:
  enabled: true
  mtls:
    mode: STRICT  # All service-to-service traffic mTLS
  authorizationPolicies:
    enabled: true

# ============================================================
# OPA Policy Engine
# ============================================================
opa:
  enabled: true
  replicaCount: 2
  image:
    repository: openpolicyagent/opa
    tag: "0.64.1"
  policies:
    configMap: sentinel-opa-policies

# ============================================================
# Secrets Management (Vault)
# ============================================================
vault:
  enabled: false  # External Vault via Agent Injector
  agentInjector:
    enabled: true
  address: "https://vault.cyberdudebivash.com"

# ============================================================
# Vector Database (Qdrant)
# ============================================================
qdrant:
  enabled: true
  replicaCount: 3
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: "1000m"
      memory: "4Gi"
    limits:
      cpu: "4000m"
      memory: "16Gi"

# ============================================================
# Graph Database (Neo4j)
# ============================================================
neo4j:
  enabled: true
  neo4j:
    edition: enterprise
    password: ""  # Set via secret
  volumes:
    data:
      requests:
        storage: 100Gi

# ============================================================
# Network Policies (Zero Trust)
# ============================================================
networkPolicies:
  enabled: true
  defaultDenyAll: true
  allowDNS: true

# ============================================================
# Pod Security Standards
# ============================================================
podSecurityStandards:
  enforce: restricted
  audit: restricted
  warn: baseline

# ============================================================
# RBAC
# ============================================================
rbac:
  create: true
  serviceAccounts:
    apiGateway:
      create: true
      annotations:
        eks.amazonaws.com/role-arn: ""  # AWS IRSA
    intelCore:
      create: true
    aiEngine:
      create: true
