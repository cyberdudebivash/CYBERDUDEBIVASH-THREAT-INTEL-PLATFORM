<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDB Sentinel APEX | Global Operations Center</title>
    <style>
        :root { --tlp-red: #ff3e3e; --apex-green: #00d4aa; --bg-black: #020202; --border-gray: #1a1a1a; }
        body { background: var(--bg-black); color: #dcdcdc; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        .goc-container { max-width: 1200px; margin: auto; padding: 20px; box-sizing: border-box; }
        
        /* RESPONSIVE HEADER */
        .brand-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border-gray); 
            padding-bottom: 20px;
            flex-wrap: wrap; 
            gap: 20px;
        }
        .brand-logo h1 { letter-spacing: -2px; margin: 0; font-size: 28px; font-weight: 800; color: #fff; }
        .brand-logo span { color: var(--apex-green); }
        .company-url { 
            font-size: 10px; 
            color: var(--apex-green); 
            text-decoration: none; 
            letter-spacing: 1px; 
            font-weight: bold; 
            border: 1px solid var(--apex-green); 
            padding: 8px 15px; 
            border-radius: 2px;
            white-space: nowrap;
        }
        
        /* RESPONSIVE STATUS BAR */
        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 15px; 
            background: #080808; 
            font-size: 9px; 
            letter-spacing: 1px; 
            border: 1px solid var(--border-gray); 
            margin-top: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        #threat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .intel-card { background: #050505; border: 1px solid var(--border-gray); padding: 25px; border-left: 4px solid var(--apex-green); transition: 0.3s; }
        .intel-card:hover { border-color: #fff; transform: translateY(-5px); }
        
        /* MOBILE OPTIMIZATIONS */
        @media (max-width: 600px) {
            .brand-header { justify-content: center; text-align: center; }
            .brand-logo h1 { font-size: 24px; }
            .status-bar { flex-direction: column; align-items: center; text-align: center; }
            #threat-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="goc-container">
        <header class="brand-header">
            <div class="brand-logo">
                <h1>SENTINEL<span>APEX</span></h1>
                <p style="font-size: 8px; color: #555; text-transform: uppercase; letter-spacing: 2px;">V10.1 GLOBAL INFRASTRUCTURE</p>
            </div>
            <a href="https://www.cyberdudebivash.com" target="_blank" class="company-url">WWW.CYBERDUDEBIVASH.COM</a>
        </header>

        <div class="status-bar">
            <div>NODE: <span style="color: var(--apex-green);">CDB-GOC-01</span></div>
            <div id="sync-indicator">SYNC: <span id="sync-val" style="color: #ff9d00;">INITIALIZING...</span></div>
            <div>STATUS: <span style="color: var(--apex-green);">ACTIVE PROTECTION</span></div>
        </div>

        <div id="threat-grid">
            <div id="loader" style="grid-column: 1 / -1; text-align: center; padding: 100px; color: #444;">SYNCING GOC NEURAL CORE...</div>
        </div>
    </div>

    <script>
        // Use the RAW_MANIFEST fix that restored connectivity
        const RAW_MANIFEST = 'https://raw.githubusercontent.com/cyberdudebivash/CYBERDUDEBIVASH-THREAT-INTEL-PLATFORM/main/data/stix/feed_manifest.json';

        async function loadTacticalIntel() {
            const grid = document.getElementById('threat-grid');
            const syncVal = document.getElementById('sync-val');
            try {
                const response = await fetch(RAW_MANIFEST);
                const data = await response.json();
                grid.innerHTML = data.reverse().map(item => `
                    <div class="intel-card">
                        <h3 style="margin: 0; font-size: 18px; color: #fff;">${item.title}</h3>
                        <p style="font-size: 12px; color: #888; margin: 15px 0;">Severity: ${item.risk_score}/10</p>
                        <a href="${item.blog_url}" target="_blank" style="color: var(--apex-green); text-decoration: none; font-size: 11px; font-weight: bold;">VIEW DOSSIER &rarr;</a>
                    </div>
                `).join('');
                syncVal.innerText = 'LATEST';
                syncVal.style.color = 'var(--apex-green)';
            } catch (err) {
                grid.innerHTML = `<div style="color:var(--tlp-red); text-align:center; width:100%; border:1px dashed var(--tlp-red); padding:50px;">GOC SYNC OFFLINE</div>`;
            }
        }
        window.onload = loadTacticalIntel;
    </script>
</body>
</html>
