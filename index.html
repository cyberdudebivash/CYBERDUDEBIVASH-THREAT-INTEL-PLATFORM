<!-- ═══ NEW SUBSCRIBE SECTION (NON-BREAKING ADDITION) ═══ -->
<div style="
    margin:20px 0 30px;
    padding:16px 20px;
    background:var(--bg-surface);
    border:1px solid var(--border);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
">
    <span style="
        font-family:var(--font-mono);
        font-size:10px;
        letter-spacing:2px;
        text-transform:uppercase;
        color:var(--accent);
    ">
        Weekly Threat Intelligence Digest
    </span>

    <input type="email"
           id="subscribe-email"
           placeholder="Work Email"
           style="
                background:var(--bg);
                border:1px solid var(--border);
                padding:8px 12px;
                color:var(--white);
                font-family:var(--font-mono);
                font-size:10px;
                outline:none;
           ">

    </button>

<!-- THREAT GRID SECTION UNCHANGED ABOVE -->

<script>
/* YOUR ENTIRE ORIGINAL SCRIPT REMAINS UNCHANGED */

/* ONLY CHANGE: card footer inside renderCards() */

function renderCards(data) {
    const grid = document.getElementById('threat-grid');
    if (!data.length) {
        grid.innerHTML = '<div class="loading-state">No advisories match the current filter.</div>';
        return;
    }

    grid.innerHTML = data.map(item => {
        const sev = getSeverity(item.risk_score, item);
        const sevColor = getSevColor(sev);

        return `
        <div class="intel-card sev-${sev.toLowerCase()}">
            <h3 class="card-title">${item.title}</h3>

            <div class="card-footer">
                <span class="card-score" style="color:${sevColor};">
                    ◆ ${item.risk_score}/10
                </span>

                <div style="display:flex;gap:12px;flex-wrap:wrap;">

                    <a href="${item.blog_url}"
                       target="_blank"
                       rel="noopener"
                       class="card-link">
                        View Tactical Dossier →
                    </a>

                    <a href="${item.premium_url || 'https://cyberdudebivash.gumroad.com/'}"
                       target="_blank"
                       rel="noopener"
                       class="card-link"
                       style="color:var(--purple);border-bottom:1px solid var(--purple);">
                        🔒 Premium Detection Pack
                    </a>

                </div>
            </div>
        </div>`;
    }).join('');
}

/* NEW SAFE FUNCTION */
function subscribeUser() {
    const email = document.getElementById('subscribe-email').value.trim();
    if (!email || !email.includes('@')) {
        alert('Please enter a valid work email.');
        return;
    }
    window.open('https://cyberbivash.blogspot.com', '_blank');
}
</script>

<!-- EVERYTHING BELOW (ECO SYSTEM / SOCIAL / FOOTER) REMAINS 100% UNCHANGED -->
