<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERDUDEBIVASH® Sentinel APEX | GOC Hub</title>
    <style>
        :root { --apex-green: #00d4aa; --bg-black: #020202; --border: #1a1a1a; }
        body { background: var(--bg-black); color: #dcdcdc; font-family: 'Inter', sans-serif; margin: 0; }
        .goc-container { max-width: 1200px; margin: auto; padding: 20px; }
        .status-bar { display: flex; justify-content: space-between; padding: 15px; background: #080808; border: 1px solid var(--border); font-size: 10px; margin: 20px 0; }
        #threat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .intel-card { background: #050505; border: 1px solid var(--border); padding: 30px; border-left: 4px solid var(--apex-green); transition: 0.3s; }
        .intel-card:hover { transform: translateY(-5px); border-color: #fff; }
    </style>
</head>
<body>
    <div class="goc-container">
        <header style="border-bottom: 1px solid var(--border); padding-bottom: 20px;">
            <h1 style="margin:0; font-size:32px;">CYBERDUDEBIVASH<span>®</span></h1>
            <p style="font-size:9px; color:#555; letter-spacing:3px;">SENTINEL APEX v10.1 // GLOBAL INFRASTRUCTURE</p>
        </header>

        <div class="status-bar">
            <div>NODE: <span style="color: var(--apex-green);">CDB-GOC-01</span></div>
            <div id="sync-indicator">SYNC: <span id="sync-val">INITIALIZING...</span></div>
        </div>

        <div id="threat-grid"></div>
    </div>

    <script>
        // Use RAW URL to bypass GitHub Pages cache delays
        const RAW_MANIFEST = 'https://raw.githubusercontent.com/cyberdudebivash/CYBERDUDEBIVASH-THREAT-INTEL-PLATFORM/main/data/stix/feed_manifest.json';
        async function loadIntel() {
            const response = await fetch(RAW_MANIFEST);
            const data = await response.json();
            document.getElementById('threat-grid').innerHTML = data.reverse().map(item => `
                <div class="intel-card">
                    <h3 style="color:#fff;">${item.title}</h3>
                    <p style="color:var(--apex-green);">Risk Score: ${item.risk_score}/10</p>
                    <a href="${item.blog_url}" target="_blank" style="color:#fff; font-size:11px;">VIEW TACTICAL DOSSIER &rarr;</a>
                </div>
            `).join('');
            document.getElementById('sync-val').innerText = 'LATEST';
            document.getElementById('sync-val').style.color = 'var(--apex-green)';
        }
        window.onload = loadIntel;
    </script>
</body>
</html>
