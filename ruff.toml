# SENTINEL APEX root ruff config
target-version = "py311"
line-length = 120

[lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = [
  "E501", "F401", "F811", "UP007", "UP006", "UP035",
  "B008", "B904", "C408", "E402", "F821", "F841",
]

[lint.per-file-ignores]
"platform/**/*.py" = ["F401", "E402", "B008", "UP"]
