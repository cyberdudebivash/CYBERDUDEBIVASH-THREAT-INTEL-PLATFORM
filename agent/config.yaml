# CYBERDUDEBIVASH SENTINEL APEX PLATFORM
# Agent Configuration File
# Feature flags for modular rollout of new components

features:
  detection_engine_v2:
    enabled: false        # Toggle Detection Engine v2
    parallel_mode: true   # Run in parallel with existing engine
    rollback_safe: true   # Ensure reversible rollout
    containerized: true   # Isolated Kubernetes pods

  ai_analyst_module:
    enabled: false        # Toggle AI Threat Analyst module
    query_api: true       # Enable /api/analyst endpoint
    reporting_service: true # Enable automated reporting
    rollback_safe: true   # Ensure reversible rollout
    containerized: true   # Isolated Kubernetes pods

# Security guardrails
security:
  validate_inputs: true
  enforce_schema: true
  integrity_checks: true

# Performance optimizations
performance:
  bloom_filters: true
  sharded_pipelines: true
  gpu_acceleration: true

# Monetization endpoints
api:
  detection_api: "/api/detect"
  analyst_api: "/api/analyst"
