name              = "sentinel-apex-gateway"
main              = "src/index.js"
compatibility_date = "2024-01-01"


[vars]
GATEWAY_VERSION = "121.0.0"

# ── KV Namespaces ──────────────────────────────────────────────────────────────
# Deployed KV IDs — verified live on intel.cyberdudebivash.com (v121.0.0)
# To add new namespace: npx wrangler kv namespace create "<NAME>"

[[kv_namespaces]]
binding = "API_KEYS_KV"
id      = "ca786702c6df47b7a95d9777536c7cfb"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "647efdda28dc4a2db91378931cfa02dc"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id      = "baa66e510f7247d4b268af943bfb7213"

[[kv_namespaces]]
# v121.0.0: SECURITY_HUB_KV — used for:
#   1. JWT revocation blocklist  (jwt_revoked:<hash> keys)
#   2. Structured error tracking (error:<component>:<date> keys, 7-day TTL)
#   3. SIEM webhook registrations (webhook:<key_id> keys)
# Surface via: GET /api/admin/observability
binding = "SECURITY_HUB_KV"
id      = "95faae90943f43afa26d552b8385d339"

# ── R2 Bucket ─────────────────────────────────────────────────────────────────
# Primary intel storage — private, never public
# Create: npx wrangler r2 bucket create sentinel-apex-data

[[r2_buckets]]
binding     = "INTEL_R2"
bucket_name = "sentinel-apex-data"

# ── Secrets (set via wrangler CLI — NEVER commit to source control) ───────────
# npx wrangler secret put ADMIN_SECRET        → cache bust + admin key management
# npx wrangler secret put GITHUB_TOKEN        → emergency GitHub fallback reads
# npx wrangler secret put CDB_JWT_SECRET      → JWT HS256 signing key (REQUIRED for auth)
#                                               Minimum 32 random characters. Generate:
#                                               openssl rand -hex 32
# Verify configured: GET /api/health → checks.jwt_configured: true

# ── Production environment ────────────────────────────────────────────────────
[env.production]
name = "sentinel-apex-gateway"
[env.production.vars]
GATEWAY_VERSION = "121.0.0"

[[env.production.kv_namespaces]]
binding = "API_KEYS_KV"
id      = "ca786702c6df47b7a95d9777536c7cfb"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "647efdda28dc4a2db91378931cfa02dc"

[[env.production.kv_namespaces]]
binding = "ANALYTICS_KV"
id      = "baa66e510f7247d4b268af943bfb7213"

[[env.production.kv_namespaces]]
binding = "SECURITY_HUB_KV"
id      = "95faae90943f43afa26d552b8385d339"

[[env.production.r2_buckets]]
binding     = "INTEL_R2"
bucket_name = "sentinel-apex-data"
