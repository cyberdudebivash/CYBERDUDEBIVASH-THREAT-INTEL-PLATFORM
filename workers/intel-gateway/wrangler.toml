name              = "sentinel-apex-gateway"
main              = "src/index.js"
compatibility_date = "2025-09-01"

# v143.0.0: Cron trigger for scheduled webhook push + cache refresh
# Fires every 15 minutes -- matches typical CTI pipeline run cadence
[triggers]
crons = ["*/15 * * * *"]

[vars]
GATEWAY_VERSION = "166.2"

# -- KV Namespaces --
# Deployed KV IDs -- verified live on intel.cyberdudebivash.com (v142.3.1)
# To add new namespace: npx wrangler kv namespace create "<NAME>"

[[kv_namespaces]]
binding = "API_KEYS_KV"
id      = "ca786702c6df47b7a95d9777536c7cfb"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "647efdda28dc4a2db91378931cfa02dc"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id      = "baa66e510f7247d4b268af943bfb7213"

[[kv_namespaces]]
# v142.3.1: SECURITY_HUB_KV -- used for:
#   1. JWT revocation blocklist  (jwt_revoked:<hash> keys)
#   2. Structured error tracking (error:<component>:<date> keys, 7-day TTL)
#   3. SIEM webhook registrations (webhook:<key_id> keys)
# Surface via: GET /api/admin/observability
binding = "SECURITY_HUB_KV"
id      = "95faae90943f43afa26d552b8385d339"

# -- R2 Buckets --
# INTEL_R2: Primary intel storage (feed, STIX, manifests, CTI data)
# Create: npx wrangler r2 bucket create sentinel-apex-data

[[r2_buckets]]
binding     = "INTEL_R2"
bucket_name = "sentinel-apex-data"

# REPORTS_R2: Advisory HTML report storage
# r2_upload.py uploads reports/ to sentinel-apex-reports (dedicated token).
# Worker serves /reports/**/*.html from this bucket.
# Fix (v167.1): was missing — caused all /reports/ URLs to 404.
# Create: npx wrangler r2 bucket create sentinel-apex-reports

[[r2_buckets]]
binding     = "REPORTS_R2"
bucket_name = "sentinel-apex-reports"

# -- Secrets (set via wrangler CLI -- NEVER commit to source control) --
# npx wrangler secret put ADMIN_SECRET             -> cache bust + admin key management
# npx wrangler secret put GITHUB_TOKEN             -> emergency GitHub fallback reads
# npx wrangler secret put CDB_JWT_SECRET           -> JWT HS256 signing key (REQUIRED for auth)
#                                                     Minimum 32 random characters. Generate:
#                                                     openssl rand -hex 32
# npx wrangler secret put STRIPE_WEBHOOK_SECRET    -> Stripe webhook endpoint secret
#                                                     Get from: Stripe Dashboard -> Webhooks -> Signing secret
# npx wrangler secret put RAZORPAY_WEBHOOK_SECRET  -> Razorpay webhook secret
#                                                     Get from: Razorpay Dashboard -> Webhooks
# npx wrangler secret put STRIPE_PRO_PRICE_ID      -> Stripe Price ID for PRO plan ($29/mo)
# npx wrangler secret put STRIPE_ENT_PRICE_ID      -> Stripe Price ID for ENTERPRISE plan ($199/mo)
# v142.4.0: GOD-MODE PAYMENT ALERTS + BSC AUTO-VERIFY
# npx wrangler secret put TG_BOT_TOKEN             -> Telegram bot token (from @BotFather)
#                                                     Create: t.me/BotFather -> /newbot -> copy token
# npx wrangler secret put TG_CHAT_ID               -> Your personal Telegram chat ID (as integer)
#                                                     Get: message @userinfobot -> it replies with your ID
# npx wrangler secret put BSCSCAN_API_KEY          -> BscScan API key for on-chain BSC tx verification
#                                                     Free key: https://bscscan.com/register -> API Keys tab
# Verify configured: GET /api/health -> checks.jwt_configured: true

# -- Production environment --
[env.production]
name = "sentinel-apex-gateway"
[env.production.vars]
GATEWAY_VERSION = "166.2"

[[env.production.kv_namespaces]]
binding = "API_KEYS_KV"
id      = "ca786702c6df47b7a95d9777536c7cfb"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "647efdda28dc4a2db91378931cfa02dc"

[[env.production.kv_namespaces]]
binding = "ANALYTICS_KV"
id      = "baa66e510f7247d4b268af943bfb7213"

[[env.production.kv_namespaces]]
binding = "SECURITY_HUB_KV"
id      = "95faae90943f43afa26d552b8385d339"

[[env.production.r2_buckets]]
binding     = "INTEL_R2"
bucket_name = "sentinel-apex-data"

[[env.production.r2_buckets]]
binding     = "REPORTS_R2"
bucket_name = "sentinel-apex-reports"
