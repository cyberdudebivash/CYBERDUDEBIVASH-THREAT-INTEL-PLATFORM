name = "sentinel-apex-gateway"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
GATEWAY_VERSION = "109.0"

# KV Namespaces — create with: npx wrangler kv namespace create "<NAME>"
[[kv_namespaces]]
binding     = "API_KEYS_KV"
id          = "REPLACE_WITH_YOUR_API_KEYS_KV_ID"

[[kv_namespaces]]
binding     = "RATE_LIMIT_KV"
id          = "REPLACE_WITH_YOUR_RATE_LIMIT_KV_ID"

[[kv_namespaces]]
binding     = "ANALYTICS_KV"
id          = "REPLACE_WITH_YOUR_ANALYTICS_KV_ID"

# R2 Bucket — create with: npx wrangler r2 bucket create sentinel-apex-data
[[r2_buckets]]
binding     = "INTEL_R2"
bucket_name = "sentinel-apex-data"

# Secrets — set with: npx wrangler secret put ADMIN_SECRET
# npx wrangler secret put GITHUB_TOKEN

[env.production]
name = "sentinel-apex-gateway"

[[env.production.kv_namespaces]]
binding     = "API_KEYS_KV"
id          = "REPLACE_WITH_YOUR_API_KEYS_KV_ID"

[[env.production.kv_namespaces]]
binding     = "RATE_LIMIT_KV"
id          = "REPLACE_WITH_YOUR_RATE_LIMIT_KV_ID"

[[env.production.kv_namespaces]]
binding     = "ANALYTICS_KV"
id          = "REPLACE_WITH_YOUR_ANALYTICS_KV_ID"

[[env.production.r2_buckets]]
binding     = "INTEL_R2"
bucket_name = "sentinel-apex-data"