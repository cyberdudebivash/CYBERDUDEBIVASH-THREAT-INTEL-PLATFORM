version: "3.9"

# CYBERDUDEBIVASH® SENTINEL APEX — Production Docker Compose Override
# Extends docker-compose.yml with production hardening.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# All secrets loaded from environment (set in Railway / Cloud provider secrets).
# Never commit actual secrets to this file.

name: sentinel-apex-prod

networks:
  sentinel-internal:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:

  # ── Redis (production config) ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cdb-redis
    restart: always
    command: >
      redis-server
        --save 300 1
        --save 60 1000
        --loglevel warning
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD}
        --bind 0.0.0.0
        --protected-mode yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # No external port exposure in production — internal network only
    expose:
      - "6379"
    networks:
      - sentinel-internal
    deploy:
      resources:
        limits:
          memory: 600m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── SENTINEL APEX API (production hardening) ──────────────────────────────
  api:
    image: ${DOCKER_IMAGE:-cyberdudebivash/sentinel-apex:latest}
    container_name: cdb-api
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      # Core
      CDB_ENV:             production
      PLATFORM_VERSION:    ${PLATFORM_VERSION:-152.0.0}
      # Redis (use AUTH password)
      REDIS_URL:           redis://:${REDIS_PASSWORD}@redis:6379/0
      # JWT — RS256 keys from secrets
      CDB_JWT_PRIVATE_KEY: ${CDB_JWT_PRIVATE_KEY}
      CDB_JWT_PUBLIC_KEY:  ${CDB_JWT_PUBLIC_KEY}
      CDB_JWT_SECRET:      ${CDB_JWT_SECRET}   # HS256 fallback during migration
      # CORS — explicit allowlist
      CDB_CORS_ALLOWED_ORIGINS: ${CDB_CORS_ALLOWED_ORIGINS:-https://cyberdudebivash.com,https://api.cyberdudebivash.com}
      CDB_CORS_ALLOW_ALL:       "false"
      # Stripe
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:    ${STRIPE_WEBHOOK_SECRET}
      # Enterprise features
      CDB_METRICS_ENABLED:          "true"
      CDB_METRICS_ALLOWED_IPS:      ${CDB_METRICS_ALLOWED_IPS:-127.0.0.1}
      CDB_AUDIT_ENABLED:            "true"
      CDB_TRACING_ENABLED:          ${CDB_TRACING_ENABLED:-false}
      CDB_STRUCTURED_LOGGING:       "true"
      CDB_LOG_LEVEL:                INFO
      CDB_RBAC_ENABLED:             "true"
      CDB_MULTI_TENANT_ENABLED:     ${CDB_MULTI_TENANT_ENABLED:-false}
      CDB_MFA_ENABLED:              ${CDB_MFA_ENABLED:-false}
      # MFA encryption
      CDB_MFA_ENCRYPTION_KEY:       ${CDB_MFA_ENCRYPTION_KEY}
      # Backup
      CDB_BACKUP_ENABLED:           ${CDB_BACKUP_ENABLED:-false}
      CDB_BACKUP_DESTINATION:       ${CDB_BACKUP_DESTINATION:-r2}
      CDB_BACKUP_ENCRYPTION_KEY:    ${CDB_BACKUP_ENCRYPTION_KEY}
      CDB_BACKUP_R2_ENDPOINT:       ${CDB_BACKUP_R2_ENDPOINT}
      CDB_BACKUP_R2_BUCKET:         ${CDB_BACKUP_R2_BUCKET}
      # OpenTelemetry
      OTEL_SERVICE_NAME:            cdb-sentinel-apex
      OTEL_EXPORTER_OTLP_ENDPOINT:  ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
    networks:
      - sentinel-internal
    read_only: false
    security_opt:
      - no-new-privileges:true
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
          cpus: "0.25"
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first   # Zero-downtime rolling update
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Prometheus (production — external access disabled) ────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cdb-prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.listen-address=0.0.0.0:9090"
    expose:
      - "9090"   # Internal only — access via Grafana
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/rules/alert_rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - sentinel-internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ── Grafana (production) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: cdb-grafana
    restart: always
    expose:
      - "3000"   # Expose via reverse proxy only
    environment:
      GF_SECURITY_ADMIN_PASSWORD:   ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY:       ${GRAFANA_SECRET_KEY}
      GF_USERS_ALLOW_SIGN_UP:       "false"
      GF_SERVER_ROOT_URL:           ${GRAFANA_ROOT_URL:-https://grafana.cyberdudebivash.com}
      GF_AUTH_DISABLE_LOGIN_FORM:   "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - sentinel-internal
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Loki (production) ─────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    container_name: cdb-loki
    restart: always
    expose:
      - "3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - sentinel-internal
    deploy:
      resources:
        limits:
          memory: 512m
