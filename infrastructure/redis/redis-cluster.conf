# =============================================================================
# CYBERDUDEBIVASH® SENTINEL APEX — Redis Cluster Configuration
# infrastructure/redis/redis-cluster.conf
# Version: 162.0.0
#
# Purpose: Production Redis cluster for:
#   1. API rate limiting (sliding window counters)
#   2. Session & JWT token store
#   3. Intelligence pipeline job queues
#   4. Real-time feed caching
#   5. MSSP tenant quota metering
#   6. WebSocket presence/subscription tracking
#
# Cluster: 3 primary + 3 replica (6-node minimum for HA)
# Memory: 8GB per node (configurable)
# Eviction: allkeys-lru (cache use-case)
# Persistence: AOF + RDB (durability)
# =============================================================================

# ── Network ──────────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
cluster-announce-port 6379
cluster-announce-bus-port 16379
protected-mode yes
requirepass ${REDIS_PASSWORD}
masterauth ${REDIS_PASSWORD}
tcp-backlog 511
tcp-keepalive 300
timeout 0

# ── Cluster ──────────────────────────────────────────────────────────────────
cluster-enabled yes
cluster-config-file /data/nodes.conf
cluster-node-timeout 5000
cluster-require-full-coverage no          # Operate with partial coverage
cluster-slave-no-failover no
cluster-allow-reads-when-down no
cluster-link-sendbuf-limit 0

# ── Replication ───────────────────────────────────────────────────────────────
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-max-replicas 0
repl-backlog-size 64mb
repl-backlog-ttl 3600
replica-lazy-flush no
replica-priority 100
min-replicas-to-write 1
min-replicas-max-lag 10

# ── Memory & Eviction ─────────────────────────────────────────────────────────
maxmemory 8gb
maxmemory-policy allkeys-lru
maxmemory-samples 10
activerehashing yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Persistence (AOF primary + RDB backup) ───────────────────────────────────
appendonly yes
appendfilename "sentinel-apex.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-rewrite-incremental-fsync yes
aof-use-rdb-preamble yes

# RDB snapshots
save 3600 1     # Every hour if at least 1 change
save 300 100    # Every 5 min if at least 100 changes
save 60 10000   # Every minute if 10,000 changes
rdbcompression yes
rdbchecksum yes
dbfilename sentinel-apex.rdb
dir /data

# ── Performance ───────────────────────────────────────────────────────────────
hz 25
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes
lfu-log-factor 10
lfu-decay-time 1

# ── Slow Log ──────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 256

# ── Keyspace Notifications ────────────────────────────────────────────────────
notify-keyspace-events "Ex"              # Enable expired key notifications

# ── Security ──────────────────────────────────────────────────────────────────
rename-command FLUSHALL ""               # Disable dangerous commands
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   "CONFIG_ADMIN_ONLY"
rename-command SLAVEOF  ""
rename-command REPLICAOF ""

# ── Sentinel Integration (for non-cluster fallback) ──────────────────────────
# sentinel monitor mymaster 127.0.0.1 6379 2
# sentinel down-after-milliseconds mymaster 5000
# sentinel failover-timeout mymaster 60000
# sentinel parallel-syncs mymaster 1
