modified: 2026/06/27
tags:
    - attack.initial_access
logsource:
    category: process_creation
    product: generic
detection:
    selection_process:
        CommandLine|contains:
            - 'cmd.exe /c'
            - 'powershell -enc'
            - '/bin/sh -c'
            - 'wget http'
            - 'curl http'
    selection_webshell:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '/bash'
            - '/sh'
        ParentImage|contains:
            - 'w3wp.exe'
            - 'httpd'
            - 'nginx'
            - 'apache2'
            - 'tomcat'
    condition: selection_process or selection_webshell
falsepositives:
    - Legitimate administrative scripts executing via web server
    - Deployment automation tools
level: medium

